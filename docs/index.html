<div id="root"><p id="boot-note">Loading the Groundwater Toolkit demo.
The Python runtime and scientific libraries (about 60 MB) are downloaded
on first visit and cached by the browser afterwards.</p></div>
<script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";

const FILES = {"streamlit_app.py": {"t": "text", "d": "\"\"\"Groundwater toolkit web interface.\n\nLets the field team upload data files in the standard templates and\nproduces the analysis figures and client-ready reports without\ntouching code. Covers the full project lifecycle: VES siting surveys,\npumping tests, water quality, borehole design, cost estimation and\ndrilling supervision checklists.\n\nRun from the repository root:\n\n    streamlit run app/streamlit_app.py\n\"\"\"\n\nfrom __future__ import annotations\n\nimport sys\nimport tempfile\nfrom pathlib import Path\n\nimport streamlit as st\n\nimport groundwater\nfrom groundwater.config import Config\nfrom groundwater.costing import (\n    CostingInputs,\n    RateItem,\n    estimate_borehole_cost,\n    inputs_from_design,\n    load_rates,\n    plot_cost_breakdown,\n    write_boq_workbook,\n)\nfrom groundwater.design import design_borehole, draw_borehole_design\nfrom groundwater.hydraulics import analyse_pumping_test\nfrom groundwater.hydraulics.plots import (\n    plot_cooper_jacob,\n    plot_recovery,\n    plot_step_test,\n    plot_test_overview,\n)\nfrom groundwater.ingestion import (\n    check_all,\n    read_drilling_workbook,\n    read_pumping_docx,\n    read_pumping_workbook,\n    read_quality_workbook,\n    read_ves_workbook,\n)\nfrom groundwater.ingestion.templates import write_all_templates\nfrom groundwater.models import SiteMetadata\nfrom groundwater.quality import assess_sample, plot_piper, plot_stiff\nfrom groundwater.reporting.costing import CostReportInputs, build_cost_report\nfrom groundwater.reporting.geophysical import (\n    GeophysicalReportInputs,\n    build_geophysical_report,\n)\nfrom groundwater.reporting.pumping import PumpingReportInputs, build_pumping_report\nfrom groundwater.reporting.quality import QualityReportInputs, build_quality_report\nfrom groundwater.reporting.supervision import (\n    SupervisionReportInputs,\n    build_supervision_report,\n)\nfrom groundwater.supervision import (\n    ChecklistResponse,\n    annular_space_check,\n    disinfection_dose,\n    evaluate_checklist,\n    handpump_corrosion_check,\n    load_checklists,\n    load_separation_distances,\n    sand_content_check,\n    specific_capacity_check,\n    stage_title,\n    verticality_check,\n)\nfrom groundwater.utils import fmt_num\nfrom groundwater.ves import interpret_model, invert_sounding\nfrom groundwater.ves.interpret import drilling_preference_table\nfrom groundwater.ves.plots import plot_sounding_curve\n\n# ---------------------------------------------------------------------------\n# Page setup and branding\n# ---------------------------------------------------------------------------\n\n_BRAND_DIR = Path(groundwater.__file__).resolve().parent / \"data\" / \"brand\"\n\n\ndef _brand(name: str) -> str | None:\n    path = _BRAND_DIR / name\n    return str(path) if path.exists() else None\n\n\n_ICON = _brand(\"icon.png\")\n_LOGO = _brand(\"logo.png\")\n\nst.set_page_config(\n    page_title=\"Groundwater Toolkit\",\n    page_icon=_ICON or \":droplet:\",\n    layout=\"wide\",\n    menu_items={\n        \"About\": (\n            \"Groundwater Investigation Toolkit - analysis and reporting \"\n            \"for rural water supply borehole projects in Sierra Leone. \"\n            \"Methods follow RWSN/UNICEF professional drilling guidance \"\n            \"and WHO drinking water quality guidelines.\"\n        ),\n    },\n)\n\nst.markdown(\n    \"\"\"\n    <style>\n      .block-container { padding-top: 2.4rem; }\n      div[data-testid=\"stMetric\"] {\n        background: var(--secondary-background-color, #F2F6FA);\n        border: 1px solid rgba(31, 92, 139, 0.18);\n        border-radius: 0.6rem;\n        padding: 0.65rem 0.9rem;\n      }\n      div[data-testid=\"stMetric\"] label { color: #1F5C8B; }\n      button[data-baseweb=\"tab\"] { font-size: 0.95rem; }\n      div[data-testid=\"stSidebarUserContent\"] .stCaption p { line-height: 1.35; }\n    </style>\n    \"\"\",\n    unsafe_allow_html=True,\n)\n\nif _LOGO:\n    try:\n        st.logo(_LOGO, icon_image=_ICON)\n    except Exception:\n        pass\n\nCONFIG = Config()\nIN_BROWSER = sys.platform == \"emscripten\"  # running under Pyodide (GitHub Pages demo)\n\n\n# Static catalogues, parsed once per session (the script reruns on\n# every widget interaction; without caching each rerun re-reads the\n# bundled CSVs).\n@st.cache_data\ndef cached_rates():\n    return load_rates()\n\n\n@st.cache_data\ndef cached_checklists():\n    return load_checklists()\n\n\n@st.cache_data\ndef cached_separation_distances():\n    return load_separation_distances()\n\n\ndef workdir() -> Path:\n    if \"workdir\" not in st.session_state:\n        st.session_state.workdir = Path(tempfile.mkdtemp(prefix=\"gw_\"))\n    return st.session_state.workdir\n\n\ndef save_upload(uploaded) -> Path:\n    path = workdir() / uploaded.name\n    path.write_bytes(uploaded.getbuffer())\n    return path\n\n\ndef sample_data_dir() -> Path | None:\n    \"\"\"Bundled sample datasets, when present (repo checkout or web demo).\"\"\"\n    here = Path(__file__).resolve().parent\n    for candidate in (\n        here.parent / \"examples\" / \"data\",\n        here / \"examples\" / \"data\",\n        Path(\"examples/data\"),\n    ):\n        if candidate.is_dir():\n            return candidate\n    return None\n\n\ndef choose_input(label: str, key: str, types: list[str], samples: list[str]) -> Path | None:\n    \"\"\"File uploader with an optional bundled-sample fallback.\n\n    Returns the path of the uploaded file, the chosen sample, or None.\n    \"\"\"\n    upload = st.file_uploader(label, type=types, key=f\"upload_{key}\")\n    if upload is not None:\n        return save_upload(upload)\n    root = sample_data_dir()\n    if root is not None:\n        available = [s for s in samples if (root / s).exists()]\n        if available:\n            none_option = \"(or pick a bundled sample to try)\"\n            pick = st.selectbox(\n                \"No file uploaded yet\", [none_option] + available, key=f\"sample_{key}\"\n            )\n            if pick != none_option:\n                return root / pick\n    return None\n\n\ndef show_flags(flags, collapse_after: int = 4) -> None:\n    \"\"\"Data check flags, folded into an expander when there are many.\"\"\"\n    flags = list(flags)\n    if not flags:\n        return\n\n    def _render(items) -> None:\n        for flag in items:\n            text = str(flag)\n            if flag.level == \"error\":\n                st.error(text)\n            elif flag.level == \"warning\":\n                st.warning(text)\n            else:\n                st.info(text)\n\n    if len(flags) <= collapse_after:\n        _render(flags)\n        return\n    worst = \"error\" if any(f.level == \"error\" for f in flags) else (\n        \"warning\" if any(f.level == \"warning\" for f in flags) else \"info\"\n    )\n    icon = {\"error\": \"\ud83d\udeab\", \"warning\": \"\u26a0\ufe0f\", \"info\": \"\u2139\ufe0f\"}[worst]\n    with st.expander(f\"{icon} Data checks ({len(flags)})\", expanded=(worst == \"error\")):\n        _render(flags)\n\n\ndef offer_download(path: Path, label: str) -> None:\n    with open(path, \"rb\") as fh:\n        st.download_button(label, fh.read(), file_name=path.name)\n\n\ndef site_from_state(prefix: str = \"meta\") -> SiteMetadata:\n    \"\"\"Site metadata from the shared report details widgets.\"\"\"\n    get = st.session_state.get\n    return SiteMetadata(\n        community=get(f\"{prefix}_community\", \"\") or \"\",\n        district=get(f\"{prefix}_district\", \"\") or \"\",\n        client=get(f\"{prefix}_client\", \"\") or \"\",\n        contractor=get(f\"{prefix}_contractor\", \"\") or \"\",\n        supervisor=get(f\"{prefix}_supervisor\", \"\") or \"\",\n    )\n\n\n# ---------------------------------------------------------------------------\n# Sidebar\n# ---------------------------------------------------------------------------\n\nwith st.sidebar:\n    st.markdown(\"### \ud83d\udca7 Groundwater Toolkit\")\n    st.caption(\n        \"Field data in, client-ready reports out - for rural water \"\n        \"supply borehole projects in Sierra Leone.\"\n    )\n    with st.expander(\"\ud83e\udded Suggested workflow\", expanded=False):\n        st.markdown(\n            \"1. **VES survey** - siting and drilling depth\\n\"\n            \"2. **Costing** - budget and bill of quantities\\n\"\n            \"3. **Supervision** - checklists while drilling\\n\"\n            \"4. **Borehole design** - from the drilling log\\n\"\n            \"5. **Pumping test** - safe yield and pump depth\\n\"\n            \"6. **Water quality** - WHO/national verdict\\n\\n\"\n            \"Every tab offers bundled sample data, so you can try \"\n            \"each step without your own files.\"\n        )\n    with st.expander(\"\ud83d\udcc4 Report branding\"):\n        st.text_input(\n            \"Organisation name\",\n            key=\"org_name\",\n            help=\"Shown in the headers of generated reports.\",\n        )\n        st.text_input(\"Organisation details\", key=\"org_details\",\n                      help=\"Address or contact line under the name.\")\n    st.caption(\n        \"Methods follow RWSN/UNICEF professional drilling guidance \"\n        \"and WHO water quality guidelines. \"\n        f\"Toolkit version {groundwater.__version__}.\"\n    )\n\n\ndef app_config() -> Config:\n    \"\"\"Config with the sidebar branding applied (per rerun, not global).\"\"\"\n    cfg = Config()\n    cfg.style.organisation = st.session_state.get(\"org_name\", \"\") or \"\"\n    cfg.style.organisation_details = st.session_state.get(\"org_details\", \"\") or \"\"\n    return cfg\n\n\n# ---------------------------------------------------------------------------\n# Header\n# ---------------------------------------------------------------------------\n\nst.title(\"Groundwater Investigation Toolkit\")\nst.caption(\n    \"Vertical electrical soundings, pumping tests, water quality, \"\n    \"borehole design, costing and drilling supervision for rural water \"\n    \"supply projects in Sierra Leone.\"\n)\nif IN_BROWSER:\n    st.info(\n        \"This demo runs entirely in your browser; nothing is uploaded to any \"\n        \"server. Heavy steps such as the VES inversion take noticeably longer \"\n        \"here than in the full installation. Every tab has bundled sample \"\n        \"data so you can try it without your own files.\"\n    )\n\n(\n    tab_ves,\n    tab_pump,\n    tab_quality,\n    tab_design,\n    tab_cost,\n    tab_supervision,\n    tab_extract,\n    tab_templates,\n) = st.tabs(\n    [\n        \"\ud83d\uddfa\ufe0f VES survey\",\n        \"\u23f1\ufe0f Pumping test\",\n        \"\ud83e\uddea Water quality\",\n        \"\ud83d\udee0\ufe0f Borehole design\",\n        \"\ud83d\udcb0 Costing\",\n        \"\u2705 Supervision\",\n        \"\ud83d\udcc4 Scanned sheets\",\n        \"\ud83d\udccb Templates\",\n    ]\n)\n\n# ---------------------------------------------------------------------------\n# VES\n# ---------------------------------------------------------------------------\nwith tab_ves:\n    st.header(\"VES survey analysis\")\n    st.caption(\n        \"Upload the VES workbook, run the inversion and get sounding \"\n        \"curves, water zones and a drilling preference table.\"\n    )\n    path = choose_input(\n        \"VES workbook (standard template)\", \"ves\", [\"xlsx\"],\n        [\"rokel/rokel_ves.xlsx\"],\n    )\n    if path is not None:\n        soundings = read_ves_workbook(path)\n        if not soundings:\n            st.error(\"No soundings found in the workbook.\")\n        else:\n            st.success(f\"Parsed {len(soundings)} sounding(s).\")\n            for s in soundings:\n                show_flags(s.flags)\n            show_flags(check_all([(s.sounding_id, s.site) for s in soundings]))\n\n            if st.button(\"Run inversion and interpretation\", key=\"run_ves\",\n                         type=\"primary\"):\n                results = []\n                interps = []\n                progress = st.progress(0.0)\n                for i, sounding in enumerate(soundings):\n                    result = invert_sounding(sounding, CONFIG.ves)\n                    interp = interpret_model(sounding, result.model, CONFIG.ves)\n                    results.append(result)\n                    interps.append(interp)\n                    progress.progress((i + 1) / len(soundings))\n                st.session_state.ves_results = (soundings, results, interps)\n\n    if \"ves_results\" in st.session_state:\n        soundings, results, interps = st.session_state.ves_results\n        for sounding, result, interp in zip(soundings, results, interps):\n            with st.container(border=True):\n                st.subheader(f\"{sounding.sounding_id}\")\n                col_fig, col_txt = st.columns([3, 2])\n                fig_path = workdir() / f\"curve_{sounding.sounding_id.replace(' ', '_')}.png\"\n                plot_sounding_curve(\n                    sounding, result.model, result.rho_calc, result.ab2, path=fig_path\n                )\n                col_fig.image(str(fig_path))\n                col_txt.metric(\"Model fit (ERR)\", f\"{result.fit_error_percent:.1f}%\")\n                col_txt.metric(\n                    \"Water bearing zones\",\n                    \", \".join(f\"{int(t)}-{int(b)} m\" for t, b in interp.water_zones)\n                    or \"none\",\n                )\n                col_txt.write(interp.narrative)\n        st.subheader(\"Drilling preference\")\n        st.table(drilling_preference_table(interps))\n\n        if st.button(\"Build geophysical survey report\", key=\"build_geo_report\"):\n            report_path = build_geophysical_report(\n                GeophysicalReportInputs(\n                    soundings=soundings,\n                    inversions=results,\n                    interpretations=interps,\n                    figures_dir=workdir(),\n                    flags=check_all([(s.sounding_id, s.site) for s in soundings]),\n                    include_qa_annex=True,\n                ),\n                workdir() / \"Geophysical_Survey_Report.docx\",\n                app_config(),\n            )\n            offer_download(report_path, \"Download geophysical survey report (.docx)\")\n\n# ---------------------------------------------------------------------------\n# Pumping test\n# ---------------------------------------------------------------------------\nwith tab_pump:\n    st.header(\"Pumping test analysis\")\n    st.caption(\n        \"Constant discharge, step and recovery tests; missing discharges \"\n        \"can be entered here and the yield analysis completes on the spot.\"\n    )\n    path = choose_input(\n        \"Pumping test sheet (template .xlsx or field .docx)\", \"pump\", [\"xlsx\", \"docx\"],\n        [\"dr_timbo/dr_timbo_constant_test.xlsx\", \"kuntolo/kuntolo_step_test.xlsx\"],\n    )\n    if path is not None:\n        test = (\n            read_pumping_docx(path) if path.suffix == \".docx\" else read_pumping_workbook(path)\n        )\n        st.success(\n            f\"Parsed {test.test_type} test with {len(test.steps)} pumping series \"\n            f\"and {'a' if test.recovery_time_min is not None else 'no'} recovery record.\"\n        )\n        show_flags(test.flags)\n\n        missing = [s for s in test.steps if s.discharge_m3_per_h is None]\n        if missing:\n            st.info(\"Enter discharge rates to complete the analysis (m3/h).\")\n            cols = st.columns(len(test.steps))\n            for col, step in zip(cols, test.steps):\n                with col:\n                    q = st.number_input(\n                        f\"{step.label} Q\", min_value=0.0, value=0.0, step=0.1,\n                        key=f\"q_{step.step_number}\",\n                    )\n                    if q > 0:\n                        step.discharge_m3_per_h = q\n\n        analysis = analyse_pumping_test(test, CONFIG.pumping)\n        st.session_state.pump_analysis = analysis\n\n        overview = workdir() / \"overview.png\"\n        plot_test_overview(test, path=overview)\n        st.image(str(overview))\n\n        col1, col2 = st.columns(2)\n        with col1:\n            if analysis.cooper_jacob is not None:\n                cj_path = workdir() / \"cj.png\"\n                swl = test.static_water_level_m\n                step = test.steps[0]\n                plot_cooper_jacob(step.time_min, step.water_level_m - swl,\n                                  analysis.cooper_jacob, path=cj_path)\n                st.image(str(cj_path))\n        with col2:\n            if analysis.recovery is not None:\n                rec_path = workdir() / \"rec.png\"\n                plot_recovery(test.recovery_time_min, test.residual_drawdown(),\n                              test.pumping_duration_min, analysis.recovery, path=rec_path)\n                st.image(str(rec_path))\n        if test.test_type.startswith(\"step\"):\n            st_path = workdir() / \"steps.png\"\n            plot_step_test(test, analysis.step_test, path=st_path)\n            st.image(str(st_path))\n\n        st.subheader(\"Results\")\n        yr = analysis.yield_recommendation\n        cols = st.columns(4)\n        cols[0].metric(\n            \"Transmissivity\",\n            f\"{analysis.transmissivity_m2_per_day:.1f} m2/day\"\n            if analysis.transmissivity_m2_per_day\n            else \"pending\",\n        )\n        if yr is not None:\n            cols[1].metric(\n                \"Available drawdown\",\n                f\"{fmt_num(yr.available_drawdown_m)} m\" if yr.available_drawdown_m else \"n/a\",\n            )\n            cols[2].metric(\n                \"Safe yield\",\n                f\"{fmt_num(yr.safe_yield_m3_per_h)} m3/h\" if yr.safe_yield_m3_per_h else \"pending\",\n            )\n            cols[3].metric(\n                \"Pump depth\",\n                f\"{fmt_num(yr.pump_installation_depth_m)} m\"\n                if yr.pump_installation_depth_m\n                else \"pending\",\n            )\n            st.caption(yr.basis)\n\n        if st.button(\"Build pumping test report\", key=\"build_pump_report\"):\n            report_path = build_pumping_report(\n                PumpingReportInputs(analysis=analysis, figures_dir=workdir()),\n                workdir() / \"Pumping_Test_Report.docx\",\n                app_config(),\n            )\n            offer_download(report_path, \"Download pumping test report (.docx)\")\n\n# ---------------------------------------------------------------------------\n# Water quality\n# ---------------------------------------------------------------------------\nwith tab_quality:\n    st.header(\"Water quality assessment\")\n    st.caption(\n        \"Laboratory results against WHO and national standards, with \"\n        \"ionic balance checks and Piper/Stiff diagrams.\"\n    )\n    path = choose_input(\n        \"Laboratory results (standard template)\", \"wq\", [\"xlsx\"],\n        [\"dr_timbo/dr_timbo_water_quality.xlsx\"],\n    )\n    if path is not None:\n        sample = read_quality_workbook(path)\n        assessment = assess_sample(sample)\n        show_flags(assessment.flags)\n        st.subheader(\"Verdict\")\n        if assessment.health_exceedances:\n            st.error(assessment.verdict)\n        elif assessment.aesthetic_exceedances:\n            st.warning(assessment.verdict)\n        else:\n            st.success(assessment.verdict)\n\n        ph_result = sample.get(\"pH\")\n        if ph_result is not None and ph_result.value is not None:\n            corrosion = handpump_corrosion_check(ph_result.value)\n            if corrosion.passed is False:\n                st.warning(f\"Handpump corrosion risk ({corrosion.measured}): \"\n                           f\"{corrosion.message}\")\n\n        rows = [\n            {\n                \"Parameter\": r.parameter,\n                \"Value\": \"< DL\" if (r.below_detection and r.value is None) else r.value,\n                \"Unit\": r.unit,\n                \"WHO health\": r.who_health,\n                \"National\": r.sl_standard,\n                \"Status\": r.status,\n            }\n            for r in assessment.rows\n        ]\n        st.dataframe(rows, use_container_width=True)\n\n        if assessment.ionic is not None:\n            st.write(\n                f\"Ionic balance: cations {assessment.ionic.sum_cations_meq:.2f} meq/L, \"\n                f\"anions {assessment.ionic.sum_anions_meq:.2f} meq/L, \"\n                f\"error {assessment.ionic.error_percent:+.1f}%\"\n            )\n            col1, col2 = st.columns(2)\n            piper = workdir() / \"piper.png\"\n            stiff = workdir() / \"stiff.png\"\n            plot_piper([sample], path=piper)\n            plot_stiff(sample, path=stiff)\n            col1.image(str(piper))\n            col2.image(str(stiff))\n\n        if st.button(\"Build water quality report\", key=\"build_wq_report\"):\n            report_path = build_quality_report(\n                QualityReportInputs(assessment=assessment, figures_dir=workdir()),\n                workdir() / \"Water_Quality_Report.docx\",\n                app_config(),\n            )\n            offer_download(report_path, \"Download water quality report (.docx)\")\n\n# ---------------------------------------------------------------------------\n# Borehole design\n# ---------------------------------------------------------------------------\nwith tab_design:\n    st.header(\"Borehole design\")\n    st.caption(\n        \"A to-scale construction design from the drilling log, following \"\n        \"the configured design rules.\"\n    )\n    path = choose_input(\n        \"Drilling log (standard template)\", \"log\", [\"xlsx\"],\n        [\"dr_timbo/dr_timbo_drilling_log.xlsx\"],\n    )\n    swl_input = st.number_input(\"Static water level (m)\", min_value=0.0, value=0.0, step=0.1)\n    if path is not None:\n        log = read_drilling_workbook(path)\n        show_flags(log.flags)\n        design = design_borehole(\n            log=log,\n            static_water_level_m=swl_input or None,\n            rules=CONFIG.design,\n        )\n        st.session_state.borehole_design = design\n        col_table, col_draw = st.columns([2, 3])\n        with col_table:\n            st.table(design.summary_rows())\n            annulus = annular_space_check(\n                design.borehole_diameter_in,\n                design.casing_diameter_in * 25.4,\n            )\n            note = f\"Annular space {annulus.measured}: {annulus.message}\"\n            if annulus.passed:\n                st.caption(note)\n            else:\n                st.warning(note)\n        with col_draw:\n            drawing = workdir() / \"design.png\"\n            draw_borehole_design(\n                design, log, path=drawing,\n                title=f\"Borehole design - {log.site.community or 'site'}\",\n            )\n            st.image(str(drawing))\n            offer_download(drawing, \"Download design drawing (.png)\")\n        st.info(\n            \"The Costing tab can price this design: casing, screen and \"\n            \"gravel quantities carry over automatically.\"\n        )\n\n# ---------------------------------------------------------------------------\n# Costing\n# ---------------------------------------------------------------------------\nwith tab_cost:\n    st.header(\"Borehole costing\")\n    st.caption(\n        \"Cost estimate and bill of quantities following the RWSN \"\n        \"Cost-Effective Boreholes methodology: cost first, price \"\n        \"separately, both stage and resource breakdowns.\"\n    )\n\n    design = st.session_state.get(\"borehole_design\")\n    use_design = False\n    if design is not None:\n        use_design = st.toggle(\n            f\"Use the design from the Borehole design tab \"\n            f\"({design.total_depth_m:g} m, {design.casing_diameter_in:g} inch casing)\",\n            value=True,\n            key=\"cost_use_design\",\n        )\n\n    col1, col2, col3 = st.columns(3)\n    with col1:\n        depth = st.number_input(\n            \"Total depth (m)\", min_value=1.0,\n            value=float(design.total_depth_m) if use_design else 60.0,\n            step=1.0, key=\"cost_depth\", disabled=use_design,\n        )\n    with col2:\n        overburden = st.number_input(\n            \"Overburden thickness (m)\", min_value=0.0, value=0.0, step=1.0,\n            key=\"cost_overburden\",\n            help=\"Weathered zone drilled by rotary; 0 applies the rule of \"\n            \"thumb (half the depth, at most 30 m).\",\n        )\n    with col3:\n        distance = st.number_input(\n            \"Mobilisation distance, one way (km)\", min_value=0.0, value=100.0,\n            step=10.0, key=\"cost_distance\",\n        )\n\n    with st.expander(\"Adjust assumptions and percentages\"):\n        c1, c2, c3, c4 = st.columns(4)\n        overheads_pct = c1.number_input(\"Overheads (%)\", 0.0, 100.0, 15.0, 1.0,\n                                        key=\"cost_overheads\",\n                                        help=\"RWSN: usually 10 to 20 percent of contract value.\")\n        margin_pct = c2.number_input(\"Margin (%)\", 0.0, 100.0, 20.0, 1.0,\n                                     key=\"cost_margin\")\n        contingency_pct = c3.number_input(\"Contingency (%)\", 0.0, 100.0, 10.0, 1.0,\n                                          key=\"cost_contingency\")\n        fx = c4.number_input(\"Exchange rate (SLE per USD)\", 1.0, 1000.0, 23.0, 0.5,\n                             key=\"cost_fx\")\n        c5, c6, c7, c8 = st.columns(4)\n        handpumps = c5.number_input(\"Handpumps\", 0, 5, 1, key=\"cost_handpumps\")\n        samples = c6.number_input(\"Water quality samples\", 0, 10, 1, key=\"cost_samples\")\n        dev_hours = c7.number_input(\"Development (h)\", 0.0, 200.0, 6.0, 1.0,\n                                    key=\"cost_dev_hours\")\n        test_hours = c8.number_input(\"Test pumping (h)\", 0.0, 200.0, 30.0, 1.0,\n                                     key=\"cost_test_hours\")\n        c9, c10 = st.columns(2)\n        vat_pct = c9.number_input(\n            \"VAT/GST (%) - optional\", 0.0, 50.0, 0.0, 1.0, key=\"cost_vat\",\n            help=\"Optional; leave at 0 to keep tax out of the price. \"\n            \"Sierra Leone GST is 15 percent where it applies.\",\n        )\n        success_rate = c10.number_input(\n            \"Expected success rate (%)\", 1.0, 100.0, 100.0, 5.0,\n            key=\"cost_success\",\n            help=\"Under a no water no pay contract the successful wells \"\n            \"must carry the failures: price / success rate.\",\n        )\n\n    with st.expander(\"Unit rate catalogue (edit to match local prices)\"):\n        st.caption(\n            \"Bundled rates are indicative; confirm against local quotations. \"\n            \"Rates are in USD.\"\n        )\n        base_rates = cached_rates()\n        rate_rows = [\n            {\n                \"Code\": r.code,\n                \"Stage\": r.stage,\n                \"Item\": r.item,\n                \"Unit\": r.unit,\n                \"Rate (USD)\": r.unit_cost_usd,\n            }\n            for r in base_rates\n        ]\n        try:\n            edited = st.data_editor(\n                rate_rows,\n                key=\"rates_editor\",\n                hide_index=True,\n                disabled=[\"Code\", \"Stage\", \"Item\", \"Unit\"],\n                use_container_width=True,\n            )\n        except Exception:\n            # very old or limited runtimes: show read-only rates instead\n            st.dataframe(rate_rows, use_container_width=True)\n            edited = rate_rows\n        edited_by_code = {row[\"Code\"]: row for row in edited}\n        rates = [\n            RateItem(\n                code=r.code, stage=r.stage, category=r.category, item=r.item,\n                unit=r.unit, quantity_basis=r.quantity_basis,\n                unit_cost_usd=float(\n                    edited_by_code.get(r.code, {}).get(\"Rate (USD)\", r.unit_cost_usd)\n                ),\n                note=r.note,\n            )\n            for r in base_rates\n        ]\n\n    if st.button(\"Estimate cost\", key=\"run_cost\", type=\"primary\"):\n        if use_design and design is not None:\n            inputs = inputs_from_design(\n                design, mobilisation_distance_km=distance,\n                overburden_m=overburden or None,\n            )\n        else:\n            inputs = CostingInputs(\n                total_depth_m=depth,\n                overburden_m=overburden or None,\n                mobilisation_distance_km=distance,\n            )\n        inputs.handpumps = int(handpumps)\n        inputs.wq_samples = int(samples)\n        inputs.development_hours = float(dev_hours)\n        inputs.test_pumping_hours = float(test_hours)\n        new_estimate = estimate_borehole_cost(\n            inputs, rates,\n            overheads_percent=overheads_pct,\n            margin_percent=margin_pct,\n            contingency_percent=contingency_pct,\n            vat_percent=vat_pct,\n            exchange_rate_sle_per_usd=fx,\n        )\n        st.session_state.cost_estimate = new_estimate\n        # build the artifacts once per estimate, not on every rerun\n        chart_path = workdir() / \"cost_breakdown.png\"\n        plot_cost_breakdown(new_estimate, chart_path, app_config().style)\n        boq_path = workdir() / \"Bill_of_Quantities.xlsx\"\n        write_boq_workbook(new_estimate, boq_path)\n        st.session_state.cost_artifacts = (chart_path, boq_path)\n\n    estimate = st.session_state.get(\"cost_estimate\")\n    if estimate is not None:\n        show_flags(estimate.flags)\n        cols = st.columns(4)\n        cols[0].metric(\"Direct works cost\", f\"${estimate.direct_cost_usd:,.0f}\")\n        cols[1].metric(\n            \"Total cost\",\n            f\"${estimate.total_cost_usd:,.0f}\",\n            help=\"Direct works plus overheads - what the job costs the contractor.\",\n        )\n        cols[2].metric(\"Cost per metre\", f\"${estimate.cost_per_meter_usd:,.0f}/m\")\n        cols[3].metric(\n            \"Contract price\",\n            f\"${estimate.price_usd:,.0f}\",\n            help=\"Total cost plus margin; the contingency for budgeting sits on top.\",\n        )\n        st.caption(\n            f\"Planning budget with contingency: \"\n            f\"**${estimate.budget_usd:,.0f}** \"\n            f\"(SLE {estimate.in_local(estimate.budget_usd):,.0f} at \"\n            f\"{estimate.exchange_rate_sle_per_usd:g} SLE/USD).\"\n        )\n        if st.session_state.get(\"cost_success\", 100.0) < 100.0:\n            rate = st.session_state[\"cost_success\"]\n            st.warning(\n                f\"No water no pay at {rate:g}% success: each successful \"\n                f\"well must be priced at \"\n                f\"${estimate.price_per_successful_well_usd(rate):,.0f} \"\n                \"to carry the expected failures.\"\n            )\n\n        if \"cost_artifacts\" not in st.session_state:\n            chart_path = workdir() / \"cost_breakdown.png\"\n            plot_cost_breakdown(estimate, chart_path, app_config().style)\n            boq_path = workdir() / \"Bill_of_Quantities.xlsx\"\n            write_boq_workbook(estimate, boq_path)\n            st.session_state.cost_artifacts = (chart_path, boq_path)\n        chart_path, boq_path = st.session_state.cost_artifacts\n        st.image(str(chart_path))\n\n        col_boq, col_sum = st.columns([3, 2])\n        with col_boq:\n            st.subheader(\"Bill of quantities\")\n            st.dataframe(estimate.boq_rows(), use_container_width=True)\n        with col_sum:\n            st.subheader(\"Summary\")\n            st.table(\n                [\n                    {\"Item\": label, \"USD\": usd, \"SLE\": sle}\n                    for label, usd, sle in estimate.summary_rows()\n                ]\n            )\n        if estimate.assumptions:\n            with st.expander(\"Assumptions applied\"):\n                for assumption in estimate.assumptions:\n                    st.markdown(f\"- {assumption}\")\n\n        with st.expander(\"Report details\"):\n            st.text_input(\"Community\", key=\"meta_community\")\n            st.text_input(\"District\", key=\"meta_district\")\n            st.text_input(\"Client\", key=\"meta_client\")\n        dl1, dl2 = st.columns(2)\n        with dl1:\n            offer_download(boq_path, \"Download bill of quantities (.xlsx)\")\n        with dl2:\n            if st.button(\"Build cost estimate report\", key=\"build_cost_report\"):\n                report_path = build_cost_report(\n                    CostReportInputs(\n                        estimate=estimate,\n                        site=site_from_state(),\n                        figures_dir=workdir(),\n                    ),\n                    workdir() / \"Cost_Estimate_Report.docx\",\n                    app_config(),\n                )\n                offer_download(report_path, \"Download cost estimate report (.docx)\")\n\n# ---------------------------------------------------------------------------\n# Supervision\n# ---------------------------------------------------------------------------\nwith tab_supervision:\n    st.header(\"Drilling supervision\")\n    st.caption(\n        \"Stage by stage checklists from the RWSN/UNICEF supervision \"\n        \"guidance, plus the numeric acceptance checks a supervisor \"\n        \"needs on site. Critical items stop acceptance when they fail.\"\n    )\n\n    checklist_items = cached_checklists()\n\n    def _responses() -> dict[str, ChecklistResponse]:\n        responses: dict[str, ChecklistResponse] = {}\n        for item in checklist_items:\n            status = st.session_state.get(f\"chk_{item.item_id}\", \"Pending\")\n            remark = st.session_state.get(f\"rmk_{item.item_id}\", \"\")\n            responses[item.item_id] = ChecklistResponse(\n                item.item_id,\n                {\"Pending\": \"pending\", \"Yes\": \"yes\", \"No\": \"no\", \"N/A\": \"na\"}[status],\n                remark,\n            )\n        return responses\n\n    responses = _responses()\n    assessment = evaluate_checklist(checklist_items, responses)\n    top1, top2, top3 = st.columns([1, 1, 2])\n    top1.metric(\"Items answered\", f\"{assessment.answered}/{assessment.total}\")\n    top2.metric(\"Critical failures\", assessment.critical_failures)\n    with top3:\n        st.progress(assessment.percent / 100.0)\n        if assessment.critical_failures:\n            st.error(assessment.verdict)\n        else:\n            st.info(assessment.verdict)\n\n    stage_keys: list[str] = []\n    for item in checklist_items:\n        if item.checklist not in stage_keys:\n            stage_keys.append(item.checklist)\n    progress_by_stage = {s.stage: s for s in assessment.stages}\n    stage_pick = st.selectbox(\n        \"Supervision stage\",\n        stage_keys,\n        format_func=lambda k: (\n            f\"{stage_title(k)}  \"\n            f\"({progress_by_stage[k].answered}/{progress_by_stage[k].total})\"\n        ),\n        key=\"sup_stage\",\n    )\n\n    current_section = None\n    for item in [i for i in checklist_items if i.checklist == stage_pick]:\n        if item.section != current_section:\n            current_section = item.section\n            st.markdown(f\"**{current_section}**\")\n        with st.container(border=True):\n            label = item.text + (\" \ud83d\udd34 *critical*\" if item.critical else \"\")\n            st.markdown(label)\n            if item.guidance:\n                st.caption(item.guidance)\n            st.radio(\n                \"Status\",\n                [\"Pending\", \"Yes\", \"No\", \"N/A\"],\n                horizontal=True,\n                key=f\"chk_{item.item_id}\",\n                label_visibility=\"collapsed\",\n            )\n            if st.session_state.get(f\"chk_{item.item_id}\") == \"No\":\n                st.text_input(\n                    \"Remark / action\", key=f\"rmk_{item.item_id}\",\n                    placeholder=\"What failed and what happens next\",\n                )\n\n    st.divider()\n    with st.expander(\"\ud83e\uddee Field acceptance checks\"):\n        fc1, fc2 = st.columns(2)\n        with fc1:\n            st.markdown(\"**Chlorine disinfection dose (WHO 20 mg/L)**\")\n            d1, d2 = st.columns(2)\n            water_col = d1.number_input(\"Water column (m)\", 0.0, 200.0, 40.0, 1.0,\n                                        key=\"fx_watercol\")\n            casing_id = d2.number_input(\"Casing ID (mm)\", 50.0, 400.0, 103.0, 1.0,\n                                        key=\"fx_casingid\")\n            st.caption(disinfection_dose(water_col, casing_id).summary())\n\n            st.markdown(\"**Verticality (plumb test)**\")\n            v1, v2 = st.columns(2)\n            dev = v1.number_input(\"Deviation (mm)\", 0.0, 1000.0, 50.0, 5.0, key=\"fx_dev\")\n            vdepth = v2.number_input(\"Depth (m)\", 1.0, 300.0, 60.0, 1.0, key=\"fx_vdepth\")\n            v = verticality_check(dev, vdepth, casing_id)\n            (st.success if v.passed else st.error)(f\"{v.measured} vs {v.limit}: {v.message}\")\n\n        with fc2:\n            st.markdown(\"**Sand content (three 20 L samples)**\")\n            s1, s2, s3 = st.columns(3)\n            sand = [\n                s1.number_input(\"S1 (cm3)\", 0.0, 10.0, 0.1, 0.05, key=\"fx_sand1\"),\n                s2.number_input(\"S2 (cm3)\", 0.0, 10.0, 0.1, 0.05, key=\"fx_sand2\"),\n                s3.number_input(\"S3 (cm3)\", 0.0, 10.0, 0.1, 0.05, key=\"fx_sand3\"),\n            ]\n            sc = sand_content_check(sand)\n            (st.success if sc.passed else st.error)(f\"{sc.measured}: {sc.message}\")\n\n            st.markdown(\"**Specific capacity (handpump rule)**\")\n            q1, q2 = st.columns(2)\n            q_test = q1.number_input(\"Discharge (m3/h)\", 0.0, 100.0, 3.0, 0.1, key=\"fx_q\")\n            dd = q2.number_input(\"Drawdown (m)\", 0.0, 100.0, 2.0, 0.1, key=\"fx_dd\")\n            spc = specific_capacity_check(q_test, dd)\n            if spc.passed is None:\n                st.info(spc.message)\n            else:\n                (st.success if spc.passed else st.warning)(f\"{spc.measured}: {spc.message}\")\n\n    with st.expander(\"\ud83d\udccf Minimum separation distances\"):\n        st.table(\n            [\n                {\n                    \"Structure\": d.structure,\n                    \"Minimum distance (m)\": f\"{d.min_distance_m:g}\",\n                    \"Note\": d.note,\n                }\n                for d in cached_separation_distances()\n            ]\n        )\n        st.caption(\"Adapted from FGN/NWRI 2010 via the RWSN supervision guide.\")\n\n    with st.expander(\"\ud83d\udcdd Checklist record and sign off\"):\n        m1, m2 = st.columns(2)\n        with m1:\n            st.text_input(\"Community\", key=\"meta_community_sup\")\n            st.text_input(\"District\", key=\"meta_district_sup\")\n            st.text_input(\"Client\", key=\"meta_client_sup\")\n        with m2:\n            st.text_input(\"Supervisor\", key=\"meta_supervisor_sup\")\n            st.text_input(\"Drilling contractor\", key=\"meta_contractor_sup\")\n            st.text_input(\"Community representative\", key=\"meta_community_rep_sup\")\n        if st.button(\"Build supervision checklist report\", key=\"build_sup_report\"):\n            site = SiteMetadata(\n                community=st.session_state.get(\"meta_community_sup\", \"\"),\n                district=st.session_state.get(\"meta_district_sup\", \"\"),\n                client=st.session_state.get(\"meta_client_sup\", \"\"),\n                contractor=st.session_state.get(\"meta_contractor_sup\", \"\"),\n                supervisor=st.session_state.get(\"meta_supervisor_sup\", \"\"),\n            )\n            report_path = build_supervision_report(\n                SupervisionReportInputs(\n                    site=site,\n                    items=checklist_items,\n                    responses=responses,\n                    assessment=assessment,\n                    supervisor=st.session_state.get(\"meta_supervisor_sup\", \"\"),\n                    driller=st.session_state.get(\"meta_contractor_sup\", \"\"),\n                    community_rep=st.session_state.get(\"meta_community_rep_sup\", \"\"),\n                ),\n                workdir() / \"Supervision_Checklist_Report.docx\",\n                app_config(),\n            )\n            offer_download(report_path, \"Download supervision report (.docx)\")\n\n# ---------------------------------------------------------------------------\n# Scanned sheets\n# ---------------------------------------------------------------------------\nwith tab_extract:\n    st.header(\"Scanned field sheet extraction\")\n    st.write(\n        \"Upload a scanned sheet or PDF. Text PDFs are extracted directly; \"\n        \"photos and image scans use the AI assisted extractor when an \"\n        \"Anthropic API key is configured. Uncertain values are highlighted \"\n        \"in the review workbook, never silently accepted.\"\n    )\n    import importlib.util\n\n    # probe availability without importing (imports happen on Extract click)\n    extraction_available = importlib.util.find_spec(\"pdfplumber\") is not None\n    if not extraction_available:\n        st.info(\n            \"Extraction is not available in this installation. It needs the \"\n            \"optional dependencies: pip install groundwater-toolkit[extract] \"\n            \"for text PDFs and [ai] for photographed sheets.\"\n        )\n    upload = st.file_uploader(\"Scan or PDF\", type=[\"pdf\", \"png\", \"jpg\", \"jpeg\"], key=\"scan\")\n    use_ai = st.checkbox(\"Use AI assisted extraction (needs ANTHROPIC_API_KEY)\")\n    if upload is not None and st.button(\"Extract\", key=\"run_extract\"):\n        path = save_upload(upload)\n        try:\n            if use_ai or path.suffix.lower() != \".pdf\":\n                from groundwater.extraction import ClaudeExtractor\n\n                document = ClaudeExtractor().extract(path)\n            else:\n                from groundwater.extraction import extract_pdf_text\n\n                document = extract_pdf_text(path)\n        except Exception as exc:  # surfaced to the operator\n            st.error(str(exc))\n        else:\n            st.success(\n                f\"Extracted a {document.document_kind} sheet: \"\n                f\"{len(document.header)} header fields, {len(document.tables)} table(s), \"\n                f\"{len(document.review_items)} item(s) to review.\"\n            )\n            from groundwater.extraction import write_review_workbook\n\n            review_path = workdir() / (path.stem + \"_review.xlsx\")\n            write_review_workbook(document, review_path)\n            offer_download(review_path, \"Download review workbook (.xlsx)\")\n            if document.document_kind == \"ves\" and document.tables:\n                from groundwater.extraction import fill_ves_template\n\n                template_path = workdir() / (path.stem + \"_ves_template.xlsx\")\n                fill_ves_template(document, template_path)\n                offer_download(template_path, \"Download filled VES template (.xlsx)\")\n\n# ---------------------------------------------------------------------------\n# Templates\n# ---------------------------------------------------------------------------\nwith tab_templates:\n    st.header(\"Blank field data templates\")\n    st.write(\"Download the standard templates for the field team.\")\n    template_dir = workdir() / \"templates\"\n    if st.button(\"Generate templates\", key=\"gen_templates\"):\n        for template in write_all_templates(template_dir):\n            offer_download(template, f\"Download {template.name}\")\n"}, "groundwater/__init__.py": {"t": "text", "d": "\"\"\"Groundwater investigation analysis and reporting toolkit.\n\nA modular toolkit for rural water supply borehole projects in Sierra\nLeone, covering geophysical siting surveys (VES), borehole design,\ndrilling records, pumping tests, water quality assessment and report\ngeneration.\n\nSubpackages\n-----------\ningestion\n    Data templates, parsers and metadata consistency checks.\nves\n    Vertical electrical sounding analysis: geometric factors, forward\n    modelling, 1D inversion, IPI2Win import, curve classification,\n    hydrogeological interpretation and plotting.\nhydraulics\n    Pumping test analysis: Cooper-Jacob, Theis, recovery, step tests,\n    specific capacity and safe yield.\nquality\n    Water quality assessment against WHO and national standards.\ndesign\n    Borehole design rules and to-scale schematic drawings.\ncosting\n    Borehole cost estimation, pricing and bill of quantities following\n    the RWSN Cost-Effective Boreholes methodology.\nsupervision\n    Drilling supervision checklists and field acceptance checks from\n    the RWSN/UNICEF supervision guidance.\nmapping\n    Site maps, iso-resistivity and overburden thickness maps, GIS export.\nreporting\n    Templated .docx report generation.\n\"\"\"\n\n__version__ = \"0.1.0\"\n\nfrom .project import Project\n\n__all__ = [\"Project\", \"__version__\"]\n"}, "groundwater/config.py": {"t": "text", "d": "\"\"\"Toolkit configuration: house style, analysis defaults and design rules.\n\nAll values can be overridden per project from a ``config.yaml`` placed\nin the project folder, so client specific standards do not require code\nchanges.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field, asdict\nfrom pathlib import Path\n\nimport yaml\n\n\n# ---------------------------------------------------------------------------\n# House style (figures and reports)\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass HouseStyle:\n    accent_color: str = \"#1F5C8B\"  # muted blue used for headings and curves\n    secondary_color: str = \"#C15A2A\"  # burnt orange for model/overlay lines\n    neutral_color: str = \"#4D4D4D\"\n    background: str = \"#FFFFFF\"\n    font_name: str = \"Calibri\"\n    base_font_size_pt: float = 11.0\n    figure_dpi: int = 200\n    figure_width_in: float = 6.3  # fits A4 with 2.5 cm margins\n    organisation: str = \"\"\n    organisation_details: str = \"\"\n    logo_path: str = \"\"  # optional logo for report headers\n\n\n# ---------------------------------------------------------------------------\n# VES analysis defaults\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass VESConfig:\n    max_layers: int = 4\n    min_layers: int = 2\n    target_fit_percent: float = 10.0  # accept the simplest model under this\n    damping: float = 0.02\n    max_iterations: int = 60\n    # hydrogeological interpretation thresholds (ohm-m), crystalline basement\n    fresh_basement_min_rho: float = 3000.0\n    fractured_zone_rho: tuple = (20.0, 800.0)  # likely water bearing when saturated\n    clay_max_rho: float = 20.0\n    laterite_min_rho: float = 800.0  # dry laterite / duricrust near surface\n    max_drilling_margin_m: float = 10.0  # added below deepest target zone\n    round_drilling_depth_to_m: float = 5.0\n\n\n# ---------------------------------------------------------------------------\n# Pumping test defaults\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass PumpingConfig:\n    safety_factor: float = 1.5  # applied to long term yield, stated in reports\n    design_period_days: float = 365.0  # projection horizon for safe yield\n    available_drawdown_fraction: float = 0.7  # usable share of available drawdown\n    pump_clearance_above_screen_m: float = 1.0\n    pump_submergence_min_m: float = 3.0  # minimum water column above pump\n    seasonal_allowance_m: float = 2.0  # dry season decline allowance\n    cooper_jacob_u_max: float = 0.05  # validity criterion for straight line fit\n\n\n# ---------------------------------------------------------------------------\n# Borehole design rules (defaults follow common Sierra Leone practice and\n# RWSN professional drilling guidance; adjust per client in config.yaml)\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass DesignRules:\n    borehole_diameter_in: float = 6.5  # drilled diameter\n    casing_diameter_in: float = 5.0  # uPVC production casing\n    casing_material: str = \"uPVC\"\n    screen_slot_mm: float = 0.75\n    screen_length_default_m: float = 9.0\n    sanitary_seal_depth_m: float = 3.0  # cement grout from surface\n    grout_min_depth_m: float = 15.0  # backfill/seal above gravel pack\n    gravel_pack_above_top_screen_m: float = 2.0\n    gravel_pack_material: str = \"well sorted siliceous gravel, 2-4 mm\"\n    sump_length_m: float = 2.0  # plain casing below the lowest screen\n    stickup_m: float = 0.5  # casing stick-up above ground\n    min_screen_below_swl_m: float = 5.0  # keep screens well below static level\n    apron_note: str = \"concrete apron with drainage channel and soakaway\"\n\n\n# ---------------------------------------------------------------------------\n# Top level configuration\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass Config:\n    style: HouseStyle = field(default_factory=HouseStyle)\n    ves: VESConfig = field(default_factory=VESConfig)\n    pumping: PumpingConfig = field(default_factory=PumpingConfig)\n    design: DesignRules = field(default_factory=DesignRules)\n\n    @classmethod\n    def load(cls, path: str | Path | None = None) -> \"Config\":\n        \"\"\"Load configuration, overlaying a YAML file if provided.\"\"\"\n        cfg = cls()\n        if path is None:\n            return cfg\n        path = Path(path)\n        if not path.exists():\n            return cfg\n        with open(path, \"r\", encoding=\"utf-8\") as fh:\n            data = yaml.safe_load(fh) or {}\n        for section_name, section in (\n            (\"style\", cfg.style),\n            (\"ves\", cfg.ves),\n            (\"pumping\", cfg.pumping),\n            (\"design\", cfg.design),\n        ):\n            overrides = data.get(section_name, {}) or {}\n            for key, value in overrides.items():\n                if hasattr(section, key):\n                    setattr(section, key, value)\n        return cfg\n\n    def dump(self, path: str | Path) -> None:\n        with open(path, \"w\", encoding=\"utf-8\") as fh:\n            yaml.safe_dump(asdict(self), fh, sort_keys=False)\n\n\nDEFAULT_CONFIG = Config()\n"}, "groundwater/costing/__init__.py": {"t": "text", "d": "\"\"\"Borehole cost estimation, pricing and bill of quantities.\n\nFollows the RWSN Cost-Effective Boreholes methodology: line items\ntagged by construction stage and resource category, cost kept apart\nfrom price, and an editable unit rate catalogue.\n\"\"\"\n\nfrom .model import (\n    DEFAULT_EXCHANGE_RATE_SLE_PER_USD,\n    RESOURCE_CATEGORIES,\n    STAGES,\n    CostEstimate,\n    CostLineItem,\n    CostingInputs,\n    RateItem,\n    annulus_volume_m3,\n    estimate_borehole_cost,\n    inputs_from_design,\n    load_rates,\n)\nfrom .enterprise import (\n    DRAG_BIT,\n    DRILL_STRING,\n    HAMMER,\n    HAMMER_BIT,\n    LoanSummary,\n    RigSpec,\n    WearItem,\n    loan_schedule,\n    rig_cost_per_well,\n    running_cost_overburden_per_m,\n    running_cost_rock_per_m,\n)\nfrom .plots import plot_cost_breakdown\nfrom .export import write_boq_workbook\n\n__all__ = [\n    \"DEFAULT_EXCHANGE_RATE_SLE_PER_USD\",\n    \"RESOURCE_CATEGORIES\",\n    \"STAGES\",\n    \"CostEstimate\",\n    \"CostLineItem\",\n    \"CostingInputs\",\n    \"RateItem\",\n    \"annulus_volume_m3\",\n    \"estimate_borehole_cost\",\n    \"inputs_from_design\",\n    \"load_rates\",\n    \"plot_cost_breakdown\",\n    \"write_boq_workbook\",\n    \"DRAG_BIT\",\n    \"DRILL_STRING\",\n    \"HAMMER\",\n    \"HAMMER_BIT\",\n    \"LoanSummary\",\n    \"RigSpec\",\n    \"WearItem\",\n    \"loan_schedule\",\n    \"rig_cost_per_well\",\n    \"running_cost_overburden_per_m\",\n    \"running_cost_rock_per_m\",\n]\n"}, "groundwater/costing/enterprise.py": {"t": "text", "d": "\"\"\"Drilling enterprise calculators from the RWSN costing guidance.\n\nImplements the worked models in \"Costing and Pricing: a Guide for\nWater Well Drilling Enterprises\" (RWSN 2014-12): rig depreciation on\nthe 10,000 working hour rule of thumb (Rowles 1995), per metre wear\ncosts of the drilling string and bits, the amortised loan repayment\nused for equipment finance, and the rig cost per well sensitivity.\n\nThe guide's example figures (a 170,000 USD rig gives 17 USD/hour\ndepreciation; drag bit 1.67 USD/m; hammer bit 4.00 USD/m; overburden\nrunning cost 2.42 USD/m and rock 7.42 USD/m) fall straight out of\nthese functions and are pinned by the test suite.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\n\n@dataclass\nclass RigSpec:\n    \"\"\"A drilling rig for depreciation purposes.\n\n    The default lifetime is the 10,000 working hour rule of thumb\n    (about 1,000 hours per year over 10 years; at 8 hour days that is\n    1,250 working days). Maintenance is taken as 5 percent of\n    depreciation, following the guide's Table 3.\n    \"\"\"\n\n    capital_cost_usd: float\n    lifetime_hours: float = 10_000.0\n    hours_per_day: float = 8.0\n    maintenance_fraction: float = 0.05\n\n    @property\n    def depreciation_per_hour(self) -> float:\n        return self.capital_cost_usd / self.lifetime_hours\n\n    @property\n    def depreciation_per_day(self) -> float:\n        return self.depreciation_per_hour * self.hours_per_day\n\n    @property\n    def maintenance_per_hour(self) -> float:\n        return self.depreciation_per_hour * self.maintenance_fraction\n\n    @property\n    def hourly_rate(self) -> float:\n        \"\"\"Depreciation plus maintenance, charged per working hour.\"\"\"\n        return self.depreciation_per_hour + self.maintenance_per_hour\n\n\n@dataclass\nclass WearItem:\n    \"\"\"A consumable that wears out over drilled metres.\"\"\"\n\n    name: str\n    lifetime_m: float\n    replacement_cost_usd: float\n\n    @property\n    def cost_per_m(self) -> float:\n        return self.replacement_cost_usd / self.lifetime_m\n\n\n# The guide's Table 3 example wear items.\nDRILL_STRING = WearItem(\"Drilling string\", 20_000.0, 15_000.0)\nDRAG_BIT = WearItem(\"Drag bit\", 300.0, 500.0)\nHAMMER = WearItem(\"Hammer\", 3_000.0, 8_000.0)\nHAMMER_BIT = WearItem(\"Hammer bit\", 300.0, 1_200.0)\n\n\ndef running_cost_overburden_per_m(\n    string: WearItem = DRILL_STRING, bit: WearItem = DRAG_BIT\n) -> float:\n    \"\"\"Per metre wear cost drilling overburden (string plus drag bit).\"\"\"\n    return string.cost_per_m + bit.cost_per_m\n\n\ndef running_cost_rock_per_m(\n    string: WearItem = DRILL_STRING,\n    hammer: WearItem = HAMMER,\n    bit: WearItem = HAMMER_BIT,\n) -> float:\n    \"\"\"Per metre wear cost in hard rock (string, hammer and hammer bit).\"\"\"\n    return string.cost_per_m + hammer.cost_per_m + bit.cost_per_m\n\n\n@dataclass\nclass LoanSummary:\n    principal_usd: float\n    annual_rate_percent: float\n    years: float\n    monthly_payment_usd: float\n    total_paid_usd: float\n    total_interest_usd: float\n\n\ndef loan_schedule(\n    principal_usd: float, annual_rate_percent: float, years: float\n) -> LoanSummary:\n    \"\"\"Amortised equipment loan (the Excel PMT formula).\n\n    The guide advises planning to repay drilling equipment loans\n    within 5 years even when the rig lasts 10, because longer loans\n    are hard to find in sub-Saharan Africa and interest mounts.\n    \"\"\"\n    months = int(round(years * 12))\n    rate = annual_rate_percent / 100.0 / 12.0\n    if rate == 0:\n        payment = principal_usd / months\n    else:\n        payment = principal_usd * rate / (1.0 - (1.0 + rate) ** (-months))\n    total = payment * months\n    return LoanSummary(\n        principal_usd=principal_usd,\n        annual_rate_percent=annual_rate_percent,\n        years=years,\n        monthly_payment_usd=payment,\n        total_paid_usd=total,\n        total_interest_usd=total - principal_usd,\n    )\n\n\ndef rig_cost_per_well(\n    capital_cost_usd: float, depreciation_years: float, wells_per_year: float\n) -> float:\n    \"\"\"Rig capital charged to each well at a given productivity.\n\n    The guide's sensitivity: a 170,000 USD rig depreciated over 5\n    years costs 3,400 USD per well at 10 wells/year but only 340 USD\n    at 100 wells/year - utilisation drives competitiveness.\n    \"\"\"\n    if depreciation_years <= 0 or wells_per_year <= 0:\n        raise ValueError(\"depreciation years and wells per year must be positive\")\n    return capital_cost_usd / depreciation_years / wells_per_year\n"}, "groundwater/costing/export.py": {"t": "text", "d": "\"\"\"Bill of quantities Excel export.\n\nWrites the estimate as a working BoQ workbook the contractor or client\ncan edit: quantities and rates stay as numbers with an amount formula\nper line, so adjusting a rate updates the totals in Excel.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nfrom openpyxl import Workbook\nfrom openpyxl.styles import Alignment, Border, Font, PatternFill, Side\nfrom openpyxl.utils import get_column_letter\n\nfrom .model import CostEstimate\n\nACCENT = \"1F5C8B\"\nLIGHT = \"DCE6F1\"\n\n_thin = Side(style=\"thin\", color=\"9BB3C8\")\nBORDER = Border(left=_thin, right=_thin, top=_thin, bottom=_thin)\n\n\ndef write_boq_workbook(estimate: CostEstimate, path: str | Path) -> Path:\n    \"\"\"Write the bill of quantities with live amount formulas.\"\"\"\n    path = Path(path)\n    path.parent.mkdir(parents=True, exist_ok=True)\n    wb = Workbook()\n    ws = wb.active\n    ws.title = \"Bill of quantities\"\n\n    ws[\"A1\"] = \"BILL OF QUANTITIES - BOREHOLE CONSTRUCTION\"\n    ws[\"A1\"].font = Font(bold=True, size=13, color=ACCENT)\n    ws.merge_cells(\"A1:G1\")\n    ws[\"A2\"] = (\n        \"Amounts are formulas (quantity x rate); edit quantities or \"\n        \"rates and the totals update. All values in USD.\"\n    )\n    ws[\"A2\"].font = Font(italic=True, size=9)\n    ws.merge_cells(\"A2:G2\")\n\n    headers = [\"Code\", \"Stage\", \"Item\", \"Unit\", \"Quantity\", \"Rate (USD)\", \"Amount (USD)\"]\n    header_row = 4\n    for col, header in enumerate(headers, start=1):\n        cell = ws.cell(row=header_row, column=col, value=header)\n        cell.font = Font(bold=True, size=10, color=\"FFFFFF\")\n        cell.fill = PatternFill(\"solid\", fgColor=ACCENT)\n        cell.alignment = Alignment(horizontal=\"center\", wrap_text=True)\n        cell.border = BORDER\n\n    row = header_row + 1\n    first_item_row = row\n    current_stage = None\n    for item in sorted(\n        estimate.items,\n        key=lambda i: (\n            [s for s, _ in estimate.by_stage()].index(i.stage)\n            if i.stage in dict(estimate.by_stage())\n            else 99,\n            i.code,\n        ),\n    ):\n        if item.stage != current_stage:\n            current_stage = item.stage\n            cell = ws.cell(row=row, column=1, value=current_stage.upper())\n            cell.font = Font(bold=True, size=10, color=ACCENT)\n            cell.fill = PatternFill(\"solid\", fgColor=LIGHT)\n            ws.merge_cells(start_row=row, start_column=1, end_row=row, end_column=7)\n            row += 1\n        values = [\n            item.code,\n            item.stage,\n            item.item,\n            item.unit,\n            round(item.quantity, 2),\n            round(item.unit_cost_usd, 2),\n            f\"=E{row}*F{row}\",\n        ]\n        for col, value in enumerate(values, start=1):\n            cell = ws.cell(row=row, column=col, value=value)\n            cell.border = BORDER\n            if col in (5, 6, 7):\n                cell.number_format = \"#,##0.00\"\n        row += 1\n    last_item_row = row - 1\n\n    def _summary(label: str, formula: str, bold: bool = False) -> None:\n        nonlocal row\n        cell = ws.cell(row=row, column=3, value=label)\n        cell.font = Font(bold=True, size=10)\n        amount = ws.cell(row=row, column=7, value=formula)\n        amount.number_format = \"#,##0.00\"\n        amount.font = Font(bold=bold, size=10)\n        amount.border = BORDER\n        row += 1\n\n    row += 1\n    direct_cell = f\"G{row}\"\n    _summary(\n        \"Direct works cost\",\n        f\"=SUMPRODUCT(E{first_item_row}:E{last_item_row},F{first_item_row}:F{last_item_row})\",\n        bold=True,\n    )\n    _summary(\n        f\"Overheads ({estimate.overheads_percent:g}%)\",\n        f\"={direct_cell}*{estimate.overheads_percent / 100.0}\",\n    )\n    total_cell = f\"G{row}\"\n    _summary(\"Total cost\", f\"={direct_cell}*{1 + estimate.overheads_percent / 100.0}\", bold=True)\n    _summary(\n        f\"Margin ({estimate.margin_percent:g}%)\",\n        f\"={total_cell}*{estimate.margin_percent / 100.0}\",\n    )\n    _summary(\n        \"Contract price\",\n        f\"={total_cell}*{1 + estimate.margin_percent / 100.0}\",\n        bold=True,\n    )\n\n    widths = (8, 14, 52, 10, 10, 12, 14)\n    for col, width in enumerate(widths, start=1):\n        ws.column_dimensions[get_column_letter(col)].width = width\n\n    wb.save(path)\n    return path\n"}, "groundwater/costing/model.py": {"t": "text", "d": "\"\"\"Borehole cost estimation following the RWSN costing methodology.\n\nThe structure follows the RWSN Borehole Costing Model (Heath, Carter\nand Danert, Cost-Effective Boreholes Flagship) and the RWSN guide\n\"Costing and Pricing: a Guide for Water Well Drilling Enterprises\":\n\n- every cost line item carries a construction *stage* (mobilisation,\n  drilling, casing, development, test pumping, water quality, wellhead)\n  and a *resource category* (equipment, labour, consumables, fuel,\n  vehicles), so the same items roll up along both axes;\n- the model computes the actual *cost* of the borehole; the *price* is\n  derived separately as cost plus overheads plus margin, keeping the\n  contractor's cost and the client's price clearly apart;\n- all amounts are stored in US dollars with a single exchange rate for\n  display in the local currency, mirroring the reference-cell rule of\n  the RWSN workbook.\n\nUnit rates live in an editable CSV (``data/borehole_cost_items.csv``);\nthe bundled values are indicative and must be confirmed against local\nSierra Leone prices - no code change is needed to update them.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport csv\nimport math\nfrom dataclasses import dataclass, field\nfrom importlib import resources\nfrom pathlib import Path\nfrom typing import Optional\n\nfrom ..models import DataFlag\nfrom ..utils import fmt_num\n\n# Canonical stage order for tables and charts (the six RWSN cost\n# components, with development and test pumping kept separate and the\n# water quality sampling shown in its own stage).\nSTAGES = (\n    \"Siting\",\n    \"Mobilisation\",\n    \"Drilling\",\n    \"Casing\",\n    \"Development\",\n    \"Test pumping\",\n    \"Water quality\",\n    \"Wellhead\",\n)\n\n# The five RWSN resource categories.\nRESOURCE_CATEGORIES = (\"equipment\", \"labour\", \"consumables\", \"fuel\", \"vehicles\")\n\n# Default exchange rate for display only (new Sierra Leonean leone per\n# US dollar). Confirm against the current market rate.\nDEFAULT_EXCHANGE_RATE_SLE_PER_USD = 23.0\n\n\n# ---------------------------------------------------------------------------\n# Rate catalogue\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass RateItem:\n    \"\"\"One row of the unit rate catalogue.\"\"\"\n\n    code: str\n    stage: str\n    category: str\n    item: str\n    unit: str\n    quantity_basis: str\n    unit_cost_usd: float\n    note: str = \"\"\n\n\ndef load_rates(path: str | Path | None = None) -> list[RateItem]:\n    \"\"\"Load the unit rate catalogue (bundled CSV unless a path is given).\"\"\"\n    if path is not None:\n        text = Path(path).read_text(encoding=\"utf-8\")\n    else:\n        text = (\n            resources.files(\"groundwater\") / \"data\" / \"borehole_cost_items.csv\"\n        ).read_text(encoding=\"utf-8\")\n    rates: list[RateItem] = []\n    for row in csv.DictReader(text.splitlines()):\n        rates.append(\n            RateItem(\n                code=row[\"code\"].strip(),\n                stage=row[\"stage\"].strip(),\n                category=row[\"category\"].strip().lower(),\n                item=row[\"item\"].strip(),\n                unit=row[\"unit\"].strip(),\n                quantity_basis=row[\"quantity_basis\"].strip(),\n                unit_cost_usd=float(row[\"unit_cost_usd\"]),\n                note=(row.get(\"note\") or \"\").strip(),\n            )\n        )\n    return rates\n\n\n# ---------------------------------------------------------------------------\n# Inputs\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass CostingInputs:\n    \"\"\"Quantities that drive the bill of quantities.\n\n    Only ``total_depth_m`` is required; every derived field falls back\n    to a documented rule of thumb and the assumption is recorded on the\n    estimate so nothing is hidden.\n    \"\"\"\n\n    total_depth_m: float\n    overburden_m: Optional[float] = None  # weathered zone drilled by rotary\n    casing_m: Optional[float] = None  # plain casing length\n    screen_m: Optional[float] = None  # screen length\n    borehole_diameter_in: float = 6.5\n    casing_diameter_in: float = 5.0\n    gravel_interval_m: Optional[float] = None  # gravel packed annulus length\n    cement_bags: Optional[float] = None  # sanitary seal and grout\n    crew_days: Optional[float] = None  # days on site including moves\n    development_hours: float = 6.0\n    test_pumping_hours: float = 30.0  # step plus constant plus recovery\n    mobilisation_distance_km: float = 0.0  # one way, base to site\n    wq_samples: int = 1\n    handpumps: int = 1  # set 0 when the pump is a separate contract\n\n    def resolved(self) -> tuple[\"CostingInputs\", list[str]]:\n        \"\"\"Fill missing fields from rules of thumb; return the assumptions.\"\"\"\n        r = CostingInputs(**self.__dict__)\n        assumptions: list[str] = []\n        if r.overburden_m is None:\n            r.overburden_m = min(30.0, 0.5 * r.total_depth_m)\n            assumptions.append(\n                f\"Overburden thickness assumed {fmt_num(r.overburden_m)} m \"\n                \"(half the total depth, at most 30 m); supply the real \"\n                \"split from the drilling log or the VES interpretation.\"\n            )\n        r.overburden_m = min(r.overburden_m, r.total_depth_m)\n        if r.screen_m is None:\n            r.screen_m = 9.0\n            assumptions.append(\"Screen length assumed 9 m (design default).\")\n        if r.casing_m is None:\n            r.casing_m = max(0.0, r.total_depth_m + 0.5 - r.screen_m)\n            assumptions.append(\n                f\"Plain casing length taken as {fmt_num(r.casing_m)} m \"\n                \"(total depth plus 0.5 m stick-up minus the screen length).\"\n            )\n        if r.gravel_interval_m is None:\n            r.gravel_interval_m = max(0.0, r.total_depth_m - 15.0)\n            assumptions.append(\n                f\"Gravel packed interval assumed {fmt_num(r.gravel_interval_m)} m \"\n                \"(from 15 m below ground to the bottom of the borehole).\"\n            )\n        if r.cement_bags is None:\n            seal_volume = annulus_volume_m3(\n                r.borehole_diameter_in, r.casing_diameter_in, 15.0\n            )\n            r.cement_bags = max(4.0, math.ceil(seal_volume * 20.0))\n            assumptions.append(\n                f\"Cement estimated at {fmt_num(r.cement_bags)} bags for the \"\n                \"grout seal (about 20 bags per cubic metre of annulus).\"\n            )\n        if r.crew_days is None:\n            r.crew_days = math.ceil(r.total_depth_m / 25.0) + 4\n            assumptions.append(\n                f\"Crew time assumed {fmt_num(r.crew_days)} days on site \"\n                \"(drilling at 25 m per day plus four days for moving, \"\n                \"set up, development, testing and completion).\"\n            )\n        return r, assumptions\n\n    @property\n    def bedrock_m(self) -> float:\n        over = self.overburden_m if self.overburden_m is not None else 0.0\n        return max(0.0, self.total_depth_m - over)\n\n    @property\n    def gravel_pack_m3(self) -> float:\n        interval = self.gravel_interval_m or 0.0\n        return annulus_volume_m3(\n            self.borehole_diameter_in, self.casing_diameter_in, interval, allowance=1.3\n        )\n\n\ndef annulus_volume_m3(\n    borehole_diameter_in: float,\n    casing_diameter_in: float,\n    interval_m: float,\n    allowance: float = 1.0,\n) -> float:\n    \"\"\"Volume of the borehole/casing annulus over an interval.\n\n    ``allowance`` covers washout and placement losses (a 1.3 factor is\n    common for gravel pack ordering).\n    \"\"\"\n    to_m = 0.0254\n    d_bore = borehole_diameter_in * to_m\n    d_casing = casing_diameter_in * to_m\n    area = math.pi / 4.0 * max(0.0, d_bore**2 - d_casing**2)\n    return area * max(0.0, interval_m) * allowance\n\n\ndef inputs_from_design(design, *, mobilisation_distance_km: float = 0.0,\n                       overburden_m: float | None = None) -> CostingInputs:\n    \"\"\"Pre-fill costing quantities from a :class:`BoreholeDesign`.\n\n    Casing and screen lengths, diameters and the gravel packed interval\n    come straight from the design so the bill of quantities always\n    matches the drawing.\n    \"\"\"\n    screen_m = design.total_screen_length_m\n    casing_m = max(\n        0.0,\n        design.total_depth_m + design.stickup_m - screen_m,\n    )\n    gravel_top, gravel_bottom = design.gravel_pack\n    return CostingInputs(\n        total_depth_m=design.total_depth_m,\n        overburden_m=overburden_m,\n        casing_m=casing_m,\n        screen_m=screen_m,\n        borehole_diameter_in=design.borehole_diameter_in,\n        casing_diameter_in=design.casing_diameter_in,\n        gravel_interval_m=max(0.0, gravel_bottom - gravel_top),\n        mobilisation_distance_km=mobilisation_distance_km,\n    )\n\n\n# ---------------------------------------------------------------------------\n# Estimate\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass CostLineItem:\n    \"\"\"One priced line of the bill of quantities.\"\"\"\n\n    code: str\n    stage: str\n    category: str\n    item: str\n    unit: str\n    quantity: float\n    unit_cost_usd: float\n    note: str = \"\"\n\n    @property\n    def amount_usd(self) -> float:\n        return self.quantity * self.unit_cost_usd\n\n\n@dataclass\nclass CostEstimate:\n    \"\"\"A complete borehole cost estimate with both RWSN roll-ups.\"\"\"\n\n    items: list[CostLineItem]\n    inputs: CostingInputs\n    overheads_percent: float\n    margin_percent: float\n    contingency_percent: float\n    exchange_rate_sle_per_usd: float\n    vat_percent: float = 0.0\n    assumptions: list[str] = field(default_factory=list)\n    flags: list[DataFlag] = field(default_factory=list)\n\n    # ---- roll-ups ------------------------------------------------------\n\n    @property\n    def direct_cost_usd(self) -> float:\n        return sum(i.amount_usd for i in self.items)\n\n    @property\n    def overheads_usd(self) -> float:\n        return self.direct_cost_usd * self.overheads_percent / 100.0\n\n    @property\n    def total_cost_usd(self) -> float:\n        \"\"\"The contractor's full cost (direct plus overheads).\"\"\"\n        return self.direct_cost_usd + self.overheads_usd\n\n    @property\n    def margin_usd(self) -> float:\n        return self.total_cost_usd * self.margin_percent / 100.0\n\n    @property\n    def price_usd(self) -> float:\n        \"\"\"A sustainable contract price: cost plus margin.\"\"\"\n        return self.total_cost_usd + self.margin_usd\n\n    @property\n    def cost_per_meter_usd(self) -> float:\n        \"\"\"Total cost per drilled metre, the sector's comparison figure.\"\"\"\n        depth = self.inputs.total_depth_m\n        return self.total_cost_usd / depth if depth else 0.0\n\n    @property\n    def vat_usd(self) -> float:\n        return self.price_usd * self.vat_percent / 100.0\n\n    @property\n    def price_with_vat_usd(self) -> float:\n        return self.price_usd + self.vat_usd\n\n    @property\n    def contingency_usd(self) -> float:\n        return self.price_with_vat_usd * self.contingency_percent / 100.0\n\n    @property\n    def budget_usd(self) -> float:\n        \"\"\"Client-side planning budget: price (with any VAT) plus contingency.\"\"\"\n        return self.price_with_vat_usd + self.contingency_usd\n\n    def price_per_successful_well_usd(self, success_rate_percent: float) -> float:\n        \"\"\"Risk loaded price under a no water no pay contract.\n\n        When the client only pays for successful boreholes, the price\n        of each successful well must carry the cost of the expected\n        failures: price / success rate.\n        \"\"\"\n        if not 0 < success_rate_percent <= 100:\n            raise ValueError(\"success rate must be in (0, 100]\")\n        return self.price_with_vat_usd / (success_rate_percent / 100.0)\n\n    def in_local(self, usd: float) -> float:\n        return usd * self.exchange_rate_sle_per_usd\n\n    def by_stage(self) -> list[tuple[str, float]]:\n        totals = {stage: 0.0 for stage in STAGES}\n        for item in self.items:\n            totals.setdefault(item.stage, 0.0)\n            totals[item.stage] += item.amount_usd\n        return [(s, v) for s, v in totals.items() if v > 0]\n\n    def by_category(self) -> list[tuple[str, float]]:\n        totals = {cat: 0.0 for cat in RESOURCE_CATEGORIES}\n        for item in self.items:\n            totals.setdefault(item.category, 0.0)\n            totals[item.category] += item.amount_usd\n        return [(c, v) for c, v in totals.items() if v > 0]\n\n    def boq_rows(self) -> list[dict]:\n        rows = []\n        for item in sorted(\n            self.items,\n            key=lambda i: (STAGES.index(i.stage) if i.stage in STAGES else 99, i.code),\n        ):\n            rows.append(\n                {\n                    \"Code\": item.code,\n                    \"Stage\": item.stage,\n                    \"Item\": item.item,\n                    \"Unit\": item.unit,\n                    \"Quantity\": round(item.quantity, 2),\n                    \"Rate (USD)\": round(item.unit_cost_usd, 2),\n                    \"Amount (USD)\": round(item.amount_usd, 2),\n                }\n            )\n        return rows\n\n    def summary_rows(self) -> list[tuple[str, str, str]]:\n        def pair(usd: float) -> tuple[str, str]:\n            return (\n                f\"{usd:,.0f}\",\n                f\"{self.in_local(usd):,.0f}\",\n            )\n\n        rows = [\n            (\"Direct works cost\", *pair(self.direct_cost_usd)),\n            (f\"Overheads ({self.overheads_percent:g}%)\", *pair(self.overheads_usd)),\n            (\"Total cost\", *pair(self.total_cost_usd)),\n            (\"Cost per metre drilled\", *pair(self.cost_per_meter_usd)),\n            (f\"Margin ({self.margin_percent:g}%)\", *pair(self.margin_usd)),\n            (\"Contract price\", *pair(self.price_usd)),\n        ]\n        if self.vat_percent:\n            rows += [\n                (f\"VAT/GST ({self.vat_percent:g}%)\", *pair(self.vat_usd)),\n                (\"Price including VAT\", *pair(self.price_with_vat_usd)),\n            ]\n        rows += [\n            (\n                f\"Contingency ({self.contingency_percent:g}%)\",\n                *pair(self.contingency_usd),\n            ),\n            (\"Planning budget\", *pair(self.budget_usd)),\n        ]\n        return rows\n\n\ndef _quantity(basis: str, inputs: CostingInputs) -> Optional[float]:\n    \"\"\"Quantity for a rate item, or None when the basis is unknown.\"\"\"\n    table = {\n        \"lump_sum\": 1.0,\n        \"per_km_round_trip\": 2.0 * inputs.mobilisation_distance_km,\n        \"per_crew_day\": inputs.crew_days or 0.0,\n        \"per_m_drilled\": inputs.total_depth_m,\n        \"per_m_overburden\": inputs.overburden_m or 0.0,\n        \"per_m_bedrock\": inputs.bedrock_m,\n        \"per_m_casing\": inputs.casing_m or 0.0,\n        \"per_m_screen\": inputs.screen_m or 0.0,\n        \"per_m3_gravel\": inputs.gravel_pack_m3,\n        \"per_bag_cement\": inputs.cement_bags or 0.0,\n        \"per_hour_development\": inputs.development_hours,\n        \"per_hour_test\": inputs.test_pumping_hours,\n        \"per_sample\": float(inputs.wq_samples),\n        \"per_handpump\": float(inputs.handpumps),\n    }\n    return table.get(basis)\n\n\ndef estimate_borehole_cost(\n    inputs: CostingInputs,\n    rates: list[RateItem] | None = None,\n    *,\n    overheads_percent: float = 15.0,\n    margin_percent: float = 20.0,\n    contingency_percent: float = 10.0,\n    vat_percent: float = 0.0,\n    exchange_rate_sle_per_usd: float = DEFAULT_EXCHANGE_RATE_SLE_PER_USD,\n) -> CostEstimate:\n    \"\"\"Build the bill of quantities and roll it up to a cost and a price.\n\n    Percentage defaults follow the RWSN costing and pricing guidance\n
