ivity values must be positive.\",\n                sounding.sounding_id,\n            )\n        )\n    if np.any(np.diff(sounding.ab2) < 0):\n        flags.append(\n            DataFlag(\n                \"warning\",\n                \"ab2_not_sorted\",\n                \"AB/2 values are not in increasing order; check the sheet.\",\n                sounding.sounding_id,\n            )\n        )\n    finite_mn = sounding.mn[np.isfinite(sounding.mn)]\n    if len(finite_mn) and np.any(sounding.ab2[np.isfinite(sounding.mn)] <= finite_mn / 2):\n        flags.append(\n            DataFlag(\n                \"warning\",\n                \"mn_exceeds_ab\",\n                \"MN/2 is not smaller than AB/2 for some readings.\",\n                sounding.sounding_id,\n            )\n        )\n    dup = _duplicate_ab2_count(sounding.ab2)\n    if dup:\n        flags.append(\n            DataFlag(\n                \"info\",\n                \"segment_overlap\",\n                f\"{dup} AB/2 value(s) repeated with different MN (segment changes); \"\n                \"both readings kept.\",\n                sounding.sounding_id,\n            )\n        )\n    sounding.flags = flags\n    return sounding\n\n\ndef _duplicate_ab2_count(ab2: np.ndarray) -> int:\n    unique, counts = np.unique(ab2, return_counts=True)\n    return int(np.sum(counts > 1))\n\n\ndef read_ves_workbook(path: str | Path) -> list[VESSounding]:\n    \"\"\"Read every sounding in a VES workbook (one worksheet per sounding).\"\"\"\n    path = Path(path)\n    soundings = []\n    for name in common.sheet_names(path):\n        grid, title = common.load_grid(path, sheet=name)\n        sounding = _sounding_from_grid(grid, source=str(path), sheet_name=title)\n        if sounding is not None:\n            soundings.append(sounding)\n    return soundings\n\n\ndef read_ves_csv(path: str | Path) -> VESSounding:\n    \"\"\"Read a single sounding from CSV (same layout as one worksheet).\"\"\"\n    path = Path(path)\n    with open(path, newline=\"\", encoding=\"utf-8-sig\") as fh:\n        grid = [row for row in csv.reader(fh)]\n    grid = [[cell if cell != \"\" else None for cell in row] for row in grid]\n    sounding = _sounding_from_grid(grid, source=str(path), sheet_name=path.stem)\n    if sounding is None:\n        raise ValueError(f\"No VES data table found in {path}\")\n    return sounding\n"}, "groundwater/ingestion/waterquality.py": {"t": "text", "d": "\"\"\"Parser for water quality laboratory result sheets.\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nfrom ..models import DataFlag, WaterQualityResult, WaterQualitySample\nfrom ..utils import clean_text, parse_number\nfrom . import common\n\n\ndef _find_results_header(grid: list[list]) -> tuple[int, dict] | None:\n    for r, row in enumerate(grid):\n        texts = common.row_text(row)\n        cols: dict[str, int] = {}\n        for c, t in enumerate(texts):\n            if not t:\n                continue\n            if t.startswith(\"parameter\") or t.startswith(\"determinand\"):\n                cols[\"parameter\"] = c\n            elif t.startswith(\"unit\"):\n                cols[\"unit\"] = c\n            elif t.startswith(\"value\") or t.startswith(\"result\"):\n                cols[\"value\"] = c\n            elif \"detection\" in t or t == \"dl\":\n                cols[\"dl\"] = c\n            elif t.startswith(\"method\"):\n                cols[\"method\"] = c\n        if \"parameter\" in cols and \"value\" in cols:\n            return r, cols\n    return None\n\n\ndef read_quality_workbook(path: str | Path) -> WaterQualitySample:\n    grid, _ = common.load_grid(path)\n    fields = common.extract_header_fields(grid)\n    site = common.site_from_fields(fields, source=str(path))\n    flags: list[DataFlag] = []\n\n    located = _find_results_header(grid)\n    if located is None:\n        raise ValueError(f\"No results table (Parameter/Value) found in {path}\")\n    header_row, cols = located\n\n    results: list[WaterQualityResult] = []\n    for row in grid[header_row + 1 :]:\n        def cell(key):\n            c = cols.get(key)\n            return row[c] if c is not None and c < len(row) else None\n\n        parameter = clean_text(cell(\"parameter\"))\n        if not parameter or parameter.lower().startswith(\"note\"):\n            continue\n        raw_value = cell(\"value\")\n        text_value = clean_text(raw_value)\n        below_detection = text_value.startswith(\"<\")\n        value = parse_number(raw_value)\n        dl = parse_number(cell(\"dl\"))\n        if below_detection and dl is None:\n            dl = value\n            value = None\n        results.append(\n            WaterQualityResult(\n                parameter=parameter,\n                value=value,\n                unit=clean_text(cell(\"unit\")),\n                detection_limit=dl,\n                below_detection=below_detection or (value is None and dl is not None),\n                method=clean_text(cell(\"method\")),\n            )\n        )\n\n    sample = WaterQualitySample(\n        site=site,\n        sample_id=str(fields.get(\"sample_id\", \"\") or \"\"),\n        borehole_ref=str(fields.get(\"borehole_ref\", \"\") or \"\"),\n        sample_date=str(fields.get(\"sample_date\", fields.get(\"date\", \"\"))),\n        laboratory=fields.get(\"laboratory\", \"\"),\n        results=results,\n        source=str(path),\n    )\n    measured = [r for r in results if r.value is not None or r.below_detection]\n    if not measured:\n        flags.append(\n            DataFlag(\"error\", \"no_results\", \"No measured values found in the sheet.\")\n        )\n    sample.flags = flags\n    return sample\n"}, "groundwater/mapping/__init__.py": {"t": "text", "d": "\"\"\"Maps and GIS export: site location, iso-resistivity, overburden.\"\"\"\n\nfrom .maps import (\n    site_location_map,\n    iso_resistivity_map,\n    overburden_thickness_map,\n    MapPoint,\n)\nfrom .export import export_geojson, export_gpkg\n\n__all__ = [\n    \"site_location_map\",\n    \"iso_resistivity_map\",\n    \"overburden_thickness_map\",\n    \"MapPoint\",\n    \"export_geojson\",\n    \"export_gpkg\",\n]\n"}, "groundwater/mapping/export.py": {"t": "text", "d": "\"\"\"GIS layer export: GeoJSON always, GeoPackage when geopandas is\ninstalled (``pip install groundwater-toolkit[gis]``).\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nfrom pathlib import Path\n\nfrom ..geo import utm_to_geographic\nfrom .maps import MapPoint\n\n\ndef export_geojson(\n    points: list[MapPoint],\n    zone: int,\n    path: str | Path,\n    extra_properties: dict[str, dict] | None = None,\n) -> Path:\n    \"\"\"Write survey points as a WGS84 GeoJSON FeatureCollection.\n\n    ``extra_properties`` maps point label to additional attribute\n    dictionaries (for example layer tables or water zones).\n    \"\"\"\n    features = []\n    for p in points:\n        lat, lon = utm_to_geographic(p.easting, p.northing, zone)\n        props = {\n            \"label\": p.label,\n            \"kind\": p.kind,\n            \"easting_utm\": p.easting,\n            \"northing_utm\": p.northing,\n            \"utm_zone\": f\"{zone}N\",\n        }\n        if p.value is not None:\n            props[\"value\"] = p.value\n        if extra_properties and p.label in extra_properties:\n            props.update(extra_properties[p.label])\n        features.append(\n            {\n                \"type\": \"Feature\",\n                \"geometry\": {\"type\": \"Point\", \"coordinates\": [round(lon, 6), round(lat, 6)]},\n                \"properties\": props,\n            }\n        )\n    collection = {\"type\": \"FeatureCollection\", \"features\": features}\n    path = Path(path)\n    path.parent.mkdir(parents=True, exist_ok=True)\n    with open(path, \"w\", encoding=\"utf-8\") as fh:\n        json.dump(collection, fh, indent=2)\n    return path\n\n\ndef export_gpkg(\n    points: list[MapPoint],\n    zone: int,\n    path: str | Path,\n    layer: str = \"survey_points\",\n) -> Path:\n    \"\"\"Write survey points to a GeoPackage (requires geopandas).\"\"\"\n    try:\n        import geopandas as gpd\n        from shapely.geometry import Point\n    except ImportError as exc:\n        raise ImportError(\n            \"GeoPackage export needs geopandas; install with \"\n            \"'pip install groundwater-toolkit[gis]' or use export_geojson()\"\n        ) from exc\n\n    records = []\n    geometry = []\n    for p in points:\n        records.append(\n            {\n                \"label\": p.label,\n                \"kind\": p.kind,\n                \"value\": p.value,\n                \"easting_utm\": p.easting,\n                \"northing_utm\": p.northing,\n            }\n        )\n        geometry.append(Point(p.easting, p.northing))\n    epsg = 32600 + zone  # WGS84 / UTM north\n    gdf = gpd.GeoDataFrame(records, geometry=geometry, crs=f\"EPSG:{epsg}\")\n    path = Path(path)\n    path.parent.mkdir(parents=True, exist_ok=True)\n    gdf.to_file(path, layer=layer, driver=\"GPKG\")\n    return path\n"}, "groundwater/mapping/maps.py": {"t": "text", "d": "\"\"\"Publication-quality static maps without heavy GIS dependencies.\n\nMaps are drawn in projected UTM coordinates (metres), which keeps\nscale bars honest. Administrative or geological boundary layers can be\noverlaid from user-supplied GeoJSON files (in geographic WGS84\ncoordinates; they are projected on the fly). District boundary data\nfor Sierra Leone can be downloaded from GADM or HDX; the toolkit does\nnot bundle these datasets.\n\nEvery map gets a scale bar, north arrow, legend, coordinate grid and\nthe UTM zone note, per the house mapping rules.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nfrom dataclasses import dataclass\nfrom pathlib import Path\n\nimport matplotlib.pyplot as plt\nimport numpy as np\nfrom scipy.interpolate import griddata\n\nfrom ..config import HouseStyle\nfrom ..geo import geographic_to_utm\nfrom ..plotting import figure_context, save_figure\n\n\n@dataclass\nclass MapPoint:\n    label: str\n    easting: float\n    northing: float\n    value: float | None = None  # attribute for interpolated maps\n    kind: str = \"VES point\"\n\n\ndef _scale_bar(ax, style: HouseStyle) -> None:\n    \"\"\"Draw a scale bar sized to a round number near 1/4 of the width.\"\"\"\n    x0, x1 = ax.get_xlim()\n    y0, y1 = ax.get_ylim()\n    span = x1 - x0\n    target = span / 4.0\n    nice = 10 ** np.floor(np.log10(target))\n    for mult in (5, 2, 1):\n        if nice * mult <= target:\n            nice *= mult\n            break\n    bx = x0 + span * 0.06\n    by = y0 + (y1 - y0) * 0.05\n    ax.plot([bx, bx + nice], [by, by], color=\"#222222\", lw=3, solid_capstyle=\"butt\")\n    ax.plot([bx, bx + nice / 2], [by, by], color=\"white\", lw=1.4, solid_capstyle=\"butt\")\n    label = f\"{nice / 1000:g} km\" if nice >= 1000 else f\"{nice:g} m\"\n    ax.text(bx + nice / 2, by + (y1 - y0) * 0.015, label, ha=\"center\", fontsize=8)\n\n\ndef _north_arrow(ax) -> None:\n    x0, x1 = ax.get_xlim()\n    y0, y1 = ax.get_ylim()\n    x = x1 - (x1 - x0) * 0.07\n    y = y1 - (y1 - y0) * 0.16\n    dy = (y1 - y0) * 0.09\n    ax.annotate(\n        \"\", xy=(x, y + dy), xytext=(x, y),\n        arrowprops=dict(arrowstyle=\"-|>\", color=\"#222222\", lw=1.6),\n    )\n    ax.text(x, y + dy * 1.15, \"N\", ha=\"center\", fontsize=10, fontweight=\"bold\")\n\n\ndef _plot_boundary(ax, geojson_path: str | Path, zone: int, color=\"#888888\") -> None:\n    \"\"\"Overlay polygon/line features from a WGS84 GeoJSON file.\"\"\"\n    with open(geojson_path, \"r\", encoding=\"utf-8\") as fh:\n        data = json.load(fh)\n    features = data.get(\"features\", [data] if data.get(\"type\") == \"Feature\" else [])\n\n    def draw_ring(ring):\n        coords = np.array(\n            [\n                (geographic_to_utm(lat, lon, zone).easting,\n                 geographic_to_utm(lat, lon, zone).northing)\n                for lon, lat in ring\n            ]\n        )\n        ax.plot(coords[:, 0], coords[:, 1], color=color, lw=1.0)\n\n    for feature in features:\n        geom = feature.get(\"geometry\", {})\n        gtype = geom.get(\"type\")\n        coords = geom.get(\"coordinates\", [])\n        if gtype == \"Polygon\":\n            for ring in coords:\n                draw_ring(ring)\n        elif gtype == \"MultiPolygon\":\n            for poly in coords:\n                for ring in poly:\n                    draw_ring(ring)\n        elif gtype == \"LineString\":\n            draw_ring(coords)\n        elif gtype == \"MultiLineString\":\n            for line in coords:\n                draw_ring(line)\n\n\ndef _format_grid(ax, zone: int) -> None:\n    ax.ticklabel_format(style=\"plain\", useOffset=False)\n    ax.tick_params(labelsize=7.5)\n    for label in ax.get_yticklabels():\n        label.set_rotation(90)\n        label.set_va(\"center\")\n    ax.set_xlabel(f\"Easting (m), UTM zone {zone}N / WGS84\", fontsize=8.5)\n    ax.set_ylabel(\"Northing (m)\", fontsize=8.5)\n    ax.grid(True, color=\"#CCCCCC\", lw=0.5)\n    ax.set_aspect(\"equal\")\n\n\ndef _pad_limits(ax, points: list[MapPoint], pad_frac=0.25, min_pad=150.0) -> None:\n    e = np.array([p.easting for p in points])\n    n = np.array([p.northing for p in points])\n    pe = max((e.max() - e.min()) * pad_frac, min_pad)\n    pn = max((n.max() - n.min()) * pad_frac, min_pad)\n    pad = max(pe, pn)\n    ax.set_xlim(e.min() - pad, e.max() + pad)\n    ax.set_ylim(n.min() - pad, n.max() + pad)\n\n\ndef site_location_map(\n    points: list[MapPoint],\n    zone: int,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n    title: str = \"Site location map\",\n    boundary_geojson: str | Path | None = None,\n):\n    \"\"\"Survey point location map on a UTM grid.\"\"\"\n    style = style or HouseStyle()\n    with figure_context(style):\n        fig, ax = plt.subplots(figsize=(style.figure_width_in, 5.4))\n        _pad_limits(ax, points)\n        if boundary_geojson:\n            _plot_boundary(ax, boundary_geojson, zone)\n        kinds = {}\n        markers = {\"VES point\": \"o\", \"borehole\": \"^\", \"water point\": \"s\"}\n        for p in points:\n            marker = markers.get(p.kind, \"o\")\n            handle, = ax.plot(\n                p.easting, p.northing, marker, ms=8, mfc=style.secondary_color,\n                mec=\"white\", mew=1.0, zorder=5,\n            )\n            kinds.setdefault(p.kind, handle)\n            ax.annotate(\n                p.label, xy=(p.easting, p.northing), xytext=(6, 6),\n                textcoords=\"offset points\", fontsize=8.5, fontweight=\"bold\",\n                color=style.accent_color,\n            )\n        _format_grid(ax, zone)\n        _scale_bar(ax, style)\n        _north_arrow(ax)\n        ax.legend(kinds.values(), kinds.keys(), loc=\"lower right\", fontsize=8)\n        ax.set_title(title)\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n\n\ndef _interpolated_map(\n    points: list[MapPoint],\n    zone: int,\n    title: str,\n    cbar_label: str,\n    path: str | Path | None,\n    style: HouseStyle | None,\n    log_scale: bool = False,\n    cmap: str = \"viridis\",\n):\n    style = style or HouseStyle()\n    valued = [p for p in points if p.value is not None]\n    if len(valued) < 3:\n        raise ValueError(\n            \"Interpolated maps need at least three points with values; \"\n            f\"got {len(valued)}. Produce a site location map instead.\"\n        )\n    e = np.array([p.easting for p in valued])\n    n = np.array([p.northing for p in valued])\n    v = np.array([p.value for p in valued], dtype=float)\n    if log_scale:\n        v = np.log10(v)\n    pad = max(max(e.max() - e.min(), n.max() - n.min()) * 0.25, 100.0)\n    gx, gy = np.meshgrid(\n        np.linspace(e.min() - pad, e.max() + pad, 220),\n        np.linspace(n.min() - pad, n.max() + pad, 220),\n    )\n    grid_lin = griddata((e, n), v, (gx, gy), method=\"linear\")\n    grid_near = griddata((e, n), v, (gx, gy), method=\"nearest\")\n    grid = np.where(np.isnan(grid_lin), grid_near, grid_lin)\n\n    with figure_context(style):\n        fig, ax = plt.subplots(figsize=(style.figure_width_in, 5.4))\n        cs = ax.contourf(gx, gy, grid, levels=12, cmap=cmap, alpha=0.9)\n        lines = ax.contour(gx, gy, grid, levels=cs.levels, colors=\"white\", linewidths=0.5)\n        cbar = fig.colorbar(cs, ax=ax, pad=0.02, shrink=0.85)\n        if log_scale:\n            ticks = cbar.get_ticks()\n            cbar.set_ticks(ticks)\n            cbar.set_ticklabels([f\"{10**t:.0f}\" for t in ticks])\n        cbar.set_label(cbar_label)\n        for p in valued:\n            ax.plot(p.easting, p.northing, \"o\", ms=7, mfc=\"white\",\n                    mec=\"#222222\", mew=1.2, zorder=5)\n            ax.annotate(\n                p.label, xy=(p.easting, p.northing), xytext=(6, 6),\n                textcoords=\"offset points\", fontsize=8.5, fontweight=\"bold\",\n                color=\"#222222\",\n            )\n        ax.set_xlim(gx.min(), gx.max())\n        ax.set_ylim(gy.min(), gy.max())\n        _format_grid(ax, zone)\n        _scale_bar(ax, style)\n        _north_arrow(ax)\n        ax.set_title(title)\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n\n\ndef iso_resistivity_map(\n    points: list[MapPoint],\n    zone: int,\n    ab2: float,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n):\n    \"\"\"Iso-apparent-resistivity map for one AB/2 spacing.\n\n    ``points`` carry the apparent resistivity at that spacing as their\n    value. Needs at least three sounding positions.\n    \"\"\"\n    return _interpolated_map(\n        points,\n        zone,\n        title=f\"Iso-resistivity map at AB/2 = {ab2:g} m\",\n        cbar_label=\"Apparent resistivity (ohm-m)\",\n        path=path,\n        style=style,\n        log_scale=True,\n    )\n\n\ndef overburden_thickness_map(\n    points: list[MapPoint],\n    zone: int,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n):\n    \"\"\"Overburden (depth to bedrock) thickness map from the VES models.\"\"\"\n    return _interpolated_map(\n        points,\n        zone,\n        title=\"Overburden thickness map\",\n        cbar_label=\"Overburden thickness (m)\",\n        path=path,\n        style=style,\n        log_scale=False,\n        cmap=\"YlGnBu\",\n    )\n"}, "groundwater/models.py": {"t": "text", "d": "\"\"\"Core data structures shared across the toolkit.\n\nEvery parser returns one of these objects and every analysis module\nconsumes them, so the raw-data-to-report chain stays traceable: each\nobject keeps a ``source`` path and parsers attach ``flags`` describing\nanything that needs analyst attention (missing discharge, inconsistent\nmetadata, negative drawdown and so on).\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom typing import Optional\n\nimport numpy as np\n\nfrom .geo import UTMCoordinate, utm_to_geographic\n\n\n# ---------------------------------------------------------------------------\n# Flags raised during parsing and checking\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass DataFlag:\n    \"\"\"A data quality or consistency issue that needs analyst review.\"\"\"\n\n    level: str  # \"info\" | \"warning\" | \"error\"\n    code: str  # short machine readable code, e.g. \"missing_discharge\"\n    message: str  # human readable explanation\n    context: str = \"\"  # e.g. \"VES 2\", \"step 3\"\n\n    def __str__(self) -> str:\n        prefix = f\"[{self.level.upper()}] {self.code}\"\n        ctx = f\" ({self.context})\" if self.context else \"\"\n        return f\"{prefix}{ctx}: {self.message}\"\n\n\n# ---------------------------------------------------------------------------\n# Site metadata\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass SiteMetadata:\n    \"\"\"Header block information shared by all field sheets.\"\"\"\n\n    client: str = \"\"\n    project: str = \"\"\n    community: str = \"\"\n    chiefdom: str = \"\"\n    district: str = \"\"\n    country: str = \"Sierra Leone\"\n    project_ref: str = \"\"\n    easting: Optional[float] = None\n    northing: Optional[float] = None\n    utm_zone: Optional[int] = None\n    elevation_m: Optional[float] = None\n    date: str = \"\"\n    supervisor: str = \"\"\n    contractor: str = \"\"\n    source: str = \"\"\n\n    @property\n    def utm(self) -> Optional[UTMCoordinate]:\n        if self.easting is None or self.northing is None:\n            return None\n        zone = self.utm_zone or 28\n        return UTMCoordinate(self.easting, self.northing, zone)\n\n    @property\n    def latlon(self) -> Optional[tuple[float, float]]:\n        utm = self.utm\n        if utm is None:\n            return None\n        return utm_to_geographic(utm.easting, utm.northing, utm.zone)\n\n    def merged_with(self, other: \"SiteMetadata\") -> \"SiteMetadata\":\n        \"\"\"Fill blank fields from another metadata record.\"\"\"\n        merged = SiteMetadata(**self.__dict__)\n        for key, value in other.__dict__.items():\n            if not getattr(merged, key) and value:\n                setattr(merged, key, value)\n        return merged\n\n\n# ---------------------------------------------------------------------------\n# VES\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass VESSounding:\n    \"\"\"A single vertical electrical sounding.\n\n    ``mn`` stores the full potential electrode spacing MN (not MN/2),\n    matching the field sheets. Duplicate ``ab2`` values with different\n    ``mn`` mark Schlumberger segment changes and are preserved.\n    \"\"\"\n\n    site: SiteMetadata\n    sounding_id: str\n    ab2: np.ndarray  # AB/2 in metres\n    mn: np.ndarray  # full MN spacing in metres\n    rho_app: np.ndarray  # apparent resistivity, ohm-m\n    array_type: str = \"schlumberger\"\n    instrument: str = \"\"\n    flags: list[DataFlag] = field(default_factory=list)\n    source: str = \"\"\n\n    def __post_init__(self) -> None:\n        self.ab2 = np.asarray(self.ab2, dtype=float)\n        self.mn = np.asarray(self.mn, dtype=float)\n        self.rho_app = np.asarray(self.rho_app, dtype=float)\n\n    @property\n    def n_readings(self) -> int:\n        return len(self.ab2)\n\n    @property\n    def label(self) -> str:\n        return self.sounding_id or \"VES\"\n\n    def segments(self) -> list[np.ndarray]:\n        \"\"\"Indices of readings grouped by MN spacing, in field order.\"\"\"\n        groups: list[np.ndarray] = []\n        mn_vals: list[float] = []\n        for mn in self.mn:\n            if not mn_vals or mn != mn_vals[-1]:\n                mn_vals.append(mn)\n                groups.append(np.array([], dtype=int))\n        idx = 0\n        gi = -1\n        last_mn = None\n        out: list[list[int]] = []\n        for idx, mn in enumerate(self.mn):\n            if last_mn is None or mn != last_mn:\n                out.append([])\n                gi += 1\n                last_mn = mn\n            out[gi].append(idx)\n        return [np.array(g, dtype=int) for g in out]\n\n\n@dataclass\nclass LayeredModel:\n    \"\"\"A 1D layered earth model (the IPI2Win style result).\n\n    ``thicknesses`` has one entry fewer than ``resistivities``; the\n    last layer is the half-space (its thickness is infinite).\n    \"\"\"\n\n    resistivities: np.ndarray  # ohm-m, length n\n    thicknesses: np.ndarray  # m, length n-1\n    fit_error_percent: Optional[float] = None  # RMS misfit, like IPI2Win ERR\n    method: str = \"\"  # \"ipi2win-import\" | \"damped-lsq\" | ...\n    sounding_id: str = \"\"\n\n    def __post_init__(self) -> None:\n        self.resistivities = np.asarray(self.resistivities, dtype=float)\n        self.thicknesses = np.asarray(self.thicknesses, dtype=float)\n        if len(self.thicknesses) != len(self.resistivities) - 1:\n            raise ValueError(\n                \"thicknesses must have exactly one entry fewer than resistivities\"\n            )\n\n    @property\n    def n_layers(self) -> int:\n        return len(self.resistivities)\n\n    @property\n    def depths_top(self) -> np.ndarray:\n        \"\"\"Depth to the top of each layer (first entry 0).\"\"\"\n        return np.concatenate([[0.0], np.cumsum(self.thicknesses)])\n\n    @property\n    def depths_bottom(self) -> np.ndarray:\n        \"\"\"Depth to the bottom of each layer (last entry inf).\"\"\"\n        return np.concatenate([np.cumsum(self.thicknesses), [np.inf]])\n\n    def as_table(self) -> list[dict]:\n        \"\"\"Rows in the IPI2Win layout: N, rho, h, z (depth to top).\"\"\"\n        rows = []\n        tops = self.depths_top\n        for i in range(self.n_layers):\n            h = self.thicknesses[i] if i < len(self.thicknesses) else None\n            z = \"0/0\" if i == 0 else tops[i]\n            rows.append(\n                {\n                    \"N\": i + 1,\n                    \"rho_ohm_m\": float(self.resistivities[i]),\n                    \"h_m\": None if h is None else float(h),\n                    \"z_m\": z,\n                }\n            )\n        return rows\n\n\n# ---------------------------------------------------------------------------\n# Pumping test\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass PumpingStep:\n    \"\"\"One step of a step-drawdown or constant discharge test.\"\"\"\n\n    step_number: int\n    time_min: np.ndarray  # minutes since the start of the whole test\n    water_level_m: np.ndarray  # depth to water below datum\n    discharge_m3_per_h: Optional[float] = None  # None when missing on sheet\n    label: str = \"\"\n\n    def __post_init__(self) -> None:\n        self.time_min = np.asarray(self.time_min, dtype=float)\n        self.water_level_m = np.asarray(self.water_level_m, dtype=float)\n\n\n@dataclass\nclass PumpingTest:\n    \"\"\"A pumping test record built from the field sheet.\n\n    The field sheets record an incremental \"drawdown\" column (change\n    between successive readings). Parsers keep only time and water\n    level; true drawdown below static is always recomputed here.\n    \"\"\"\n\n    site: SiteMetadata\n    borehole_ref: str = \"\"\n    test_type: str = \"step\"  # \"step\" | \"constant\" | \"constant+recovery\"\n    static_water_level_m: Optional[float] = None\n    borehole_depth_m: Optional[float] = None\n    pump_setting_m: Optional[float] = None\n    step_length_min: Optional[float] = None\n    steps: list[PumpingStep] = field(default_factory=list)\n    recovery_time_min: Optional[np.ndarray] = None  # minutes since pump stop\n    recovery_level_m: Optional[np.ndarray] = None\n    pumping_duration_min: Optional[float] = None  # total pumping before recovery\n    flags: list[DataFlag] = field(default_factory=list)\n    source: str = \"\"\n\n    @property\n    def has_discharge(self) -> bool:\n        return any(s.discharge_m3_per_h is not None for s in self.steps)\n\n    def drawdown(self, step: PumpingStep) -> np.ndarray:\n        \"\"\"True drawdown below static water level, metres.\"\"\"\n        if self.static_water_level_m is None:\n            raise ValueError(\"static water level is required to compute drawdown\")\n        return step.water_level_m - self.static_water_level_m\n\n    def all_times_levels(self) -> tuple[np.ndarray, np.ndarray]:\n        \"\"\"Concatenated pumping phase time series.\"\"\"\n        t = np.concatenate([s.time_min for s in self.steps]) if self.steps else np.array([])\n        wl = (\n            np.concatenate([s.water_level_m for s in self.steps])\n            if self.steps\n            else np.array([])\n        )\n        order = np.argsort(t, kind=\"stable\")\n        return t[order], wl[order]\n\n    def residual_drawdown(self) -> Optional[np.ndarray]:\n        if self.recovery_level_m is None or self.static_water_level_m is None:\n            return None\n        return self.recovery_level_m - self.static_water_level_m\n\n\n# ---------------------------------------------------------------------------\n# Drilling log\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass LithologyInterval:\n    top_m: float\n    bottom_m: float\n    description: str = \"\"\n    from_time: str = \"\"\n    to_time: str = \"\"\n    penetration_rate_m_per_min: Optional[float] = None\n    bit_diameter_in: Optional[float] = None\n\n    @property\n    def thickness_m(self) -> float:\n        return self.bottom_m - self.top_m\n\n\n@dataclass\nclass DrillingLog:\n    site: SiteMetadata\n    borehole_ref: str = \"\"\n    total_depth_m: Optional[float] = None\n    drilling_method: str = \"\"\n    intervals: list[LithologyInterval] = field(default_factory=list)\n    water_strikes_m: list[float] = field(default_factory=list)\n    grouting_depth_m: Optional[float] = None\n    start_date: str = \"\"\n    completion_date: str = \"\"\n    status: str = \"\"  # e.g. \"Successful\"\n    flags: list[DataFlag] = field(default_factory=list)\n    source: str = \"\"\n\n\n# ---------------------------------------------------------------------------\n# Water quality\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass WaterQualityResult:\n    parameter: str\n    value: Optional[float]\n    unit: str = \"\"\n    detection_limit: Optional[float] = None\n    below_detection: bool = False\n    method: str = \"\"\n\n\n@dataclass\nclass WaterQualitySample:\n    site: SiteMetadata\n    sample_id: str = \"\"\n    borehole_ref: str = \"\"\n    sample_date: str = \"\"\n    laboratory: str = \"\"\n    results: list[WaterQualityResult] = field(default_factory=list)\n    flags: list[DataFlag] = field(default_factory=list)\n    source: str = \"\"\n\n    def get(self, parameter: str) -> Optional[WaterQualityResult]:\n        key = parameter.strip().lower()\n        for r in self.results:\n            if r.parameter.strip().lower() == key:\n                return r\n        return None\n"}, "groundwater/plotting.py": {"t": "text", "d": "\"\"\"Shared matplotlib styling: one accent colour, clean grids, no clutter.\n\nEvery figure in the toolkit goes through :func:`figure_context` so\nreports look uniform. The style follows the house rules: white\nbackground, a single accent colour with one secondary colour for\noverlays, no unnecessary ornamentation.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom contextlib import contextmanager\nfrom pathlib import Path\n\nimport matplotlib\n\nmatplotlib.use(\"Agg\")\n\nimport matplotlib.pyplot as plt\n\nfrom .config import HouseStyle\n\n_DEFAULT = HouseStyle()\n\n\n@contextmanager\ndef figure_context(style: HouseStyle | None = None):\n    \"\"\"rcParams context applying the house style.\"\"\"\n    style = style or _DEFAULT\n    rc = {\n        \"figure.facecolor\": style.background,\n        \"axes.facecolor\": style.background,\n        \"savefig.facecolor\": style.background,\n        \"axes.edgecolor\": \"#666666\",\n        \"axes.labelcolor\": \"#222222\",\n        \"axes.titlesize\": 11,\n        \"axes.titleweight\": \"bold\",\n        \"axes.labelsize\": 10,\n        \"axes.grid\": True,\n        \"grid.color\": \"#D9D9D9\",\n        \"grid.linewidth\": 0.6,\n        \"grid.linestyle\": \"-\",\n        \"xtick.labelsize\": 9,\n        \"ytick.labelsize\": 9,\n        \"xtick.color\": \"#444444\",\n        \"ytick.color\": \"#444444\",\n        \"legend.fontsize\": 9,\n        \"legend.framealpha\": 0.95,\n        \"legend.edgecolor\": \"#CCCCCC\",\n        \"font.family\": \"DejaVu Sans\",\n        \"font.size\": 10,\n        \"lines.linewidth\": 1.6,\n        \"figure.dpi\": 110,\n    }\n    with plt.rc_context(rc):\n        yield\n\n\ndef save_figure(fig, path: str | Path, style: HouseStyle | None = None) -> Path:\n    \"\"\"Save with consistent DPI and tight layout; return the path.\"\"\"\n    style = style or _DEFAULT\n    path = Path(path)\n    path.parent.mkdir(parents=True, exist_ok=True)\n    fig.savefig(path, dpi=style.figure_dpi, bbox_inches=\"tight\", metadata={\"Software\": None})\n    plt.close(fig)\n    return path\n\n\nRESISTIVITY_CMAP = \"viridis\"\n"}, "groundwater/project.py": {"t": "text", "d": "\"\"\"Project folder management.\n\nEvery borehole project lives in one folder with a fixed layout::\n\n    <project>/\n        project.yaml     project metadata and configuration overrides\n        raw/             field data exactly as received (never modified)\n        processed/       parsed and derived tables (CSV)\n        figures/         all generated figures (PNG)\n        reports/         generated .docx reports\n\nRe-running the analysis on the same raw data regenerates processed/,\nfigures/ and reports/ deterministically.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import asdict\nfrom pathlib import Path\n\nimport yaml\n\nfrom .config import Config\nfrom .models import SiteMetadata\n\nSUBFOLDERS = (\"raw\", \"processed\", \"figures\", \"reports\")\n\n\nclass Project:\n    \"\"\"A borehole project folder with the standard layout.\"\"\"\n\n    def __init__(self, root: str | Path, site: SiteMetadata | None = None):\n        self.root = Path(root)\n        self.site = site or SiteMetadata()\n        self.config = Config.load(self.root / \"config.yaml\")\n\n    # -- folders ------------------------------------------------------------\n\n    @property\n    def raw(self) -> Path:\n        return self.root / \"raw\"\n\n    @property\n    def processed(self) -> Path:\n        return self.root / \"processed\"\n\n    @property\n    def figures(self) -> Path:\n        return self.root / \"figures\"\n\n    @property\n    def reports(self) -> Path:\n        return self.root / \"reports\"\n\n    def ensure_folders(self) -> \"Project\":\n        for sub in SUBFOLDERS:\n            (self.root / sub).mkdir(parents=True, exist_ok=True)\n        return self\n\n    # -- persistence ----------------------------------------------------------\n\n    @classmethod\n    def create(cls, root: str | Path, site: SiteMetadata | None = None) -> \"Project\":\n        project = cls(root, site).ensure_folders()\n        project.save_metadata()\n        return project\n\n    @classmethod\n    def open(cls, root: str | Path) -> \"Project\":\n        root = Path(root)\n        meta_path = root / \"project.yaml\"\n        site = SiteMetadata()\n        if meta_path.exists():\n            with open(meta_path, \"r\", encoding=\"utf-8\") as fh:\n                data = yaml.safe_load(fh) or {}\n            site_data = data.get(\"site\", {}) or {}\n            site = SiteMetadata(\n                **{k: v for k, v in site_data.items() if k in SiteMetadata().__dict__}\n            )\n        return cls(root, site).ensure_folders()\n\n    def save_metadata(self) -> None:\n        data = {\"site\": {k: v for k, v in asdict(self.site).items() if v not in (None, \"\")}}\n        with open(self.root / \"project.yaml\", \"w\", encoding=\"utf-8\") as fh:\n            yaml.safe_dump(data, fh, sort_keys=False)\n\n    def figure_path(self, name: str) -> Path:\n        self.figures.mkdir(parents=True, exist_ok=True)\n        return self.figures / name\n\n    def report_path(self, name: str) -> Path:\n        self.reports.mkdir(parents=True, exist_ok=True)\n        return self.reports / name\n\n    def processed_path(self, name: str) -> Path:\n        self.processed.mkdir(parents=True, exist_ok=True)\n        return self.processed / name\n"}, "groundwater/quality/__init__.py": {"t": "text", "d": "\"\"\"Water quality assessment against WHO and Sierra Leone standards.\"\"\"\n\nfrom .standards import load_standards, StandardEntry\nfrom .assess import assess_sample, WaterQualityAssessment, ParameterAssessment\nfrom .ionic import ionic_balance, IonicBalanceResult\nfrom .diagrams import plot_piper, plot_stiff\n\n__all__ = [\n    \"load_standards\",\n    \"StandardEntry\",\n    \"assess_sample\",\n    \"WaterQualityAssessment\",\n    \"ParameterAssessment\",\n    \"ionic_balance\",\n    \"IonicBalanceResult\",\n    \"plot_piper\",\n    \"plot_stiff\",\n]\n"}, "groundwater/quality/assess.py": {"t": "text", "d": "\"\"\"Compare laboratory results against WHO and national standards.\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom pathlib import Path\nfrom typing import Optional\n\nfrom ..models import DataFlag, WaterQualitySample\nfrom .ionic import IonicBalanceResult, ionic_balance\nfrom .standards import StandardEntry, load_standards, normalise_parameter\n\n# status codes, ordered by severity for the summary\nSTATUS_ORDER = [\n    \"exceeds_health\",\n    \"exceeds_national\",\n    \"exceeds_aesthetic\",\n    \"within_limits\",\n    \"below_detection\",\n    \"no_guideline\",\n    \"not_measured\",\n]\n\n\n@dataclass\nclass ParameterAssessment:\n    parameter: str\n    value: Optional[float]\n    unit: str\n    below_detection: bool\n    who_health: str\n    who_aesthetic: str\n    sl_standard: str\n    status: str\n    remark: str\n\n\n@dataclass\nclass WaterQualityAssessment:\n    sample: WaterQualitySample\n    rows: list[ParameterAssessment]\n    ionic: Optional[IonicBalanceResult]\n    flags: list[DataFlag] = field(default_factory=list)\n\n    @property\n    def health_exceedances(self) -> list[ParameterAssessment]:\n        return [r for r in self.rows if r.status == \"exceeds_health\"]\n\n    @property\n    def aesthetic_exceedances(self) -> list[ParameterAssessment]:\n        return [r for r in self.rows if r.status in (\"exceeds_aesthetic\", \"exceeds_national\")]\n\n    @property\n    def verdict(self) -> str:\n        \"\"\"One line suitability statement for reports.\"\"\"\n        health = self.health_exceedances\n        aesthetic = self.aesthetic_exceedances\n        if health:\n            names = \", \".join(r.parameter for r in health)\n            return (\n                \"The water does not meet the health based guideline value(s) \"\n                f\"for: {names}. Treatment or an alternative source is required \"\n                \"before the water is used for drinking.\"\n            )\n        if aesthetic:\n            names = \", \".join(r.parameter for r in aesthetic)\n            return (\n                \"The water meets all health based guideline values. \"\n                f\"Acceptability (aesthetic) limits are exceeded for: {names}. \"\n                \"The water is usable for drinking, although taste, odour or \"\n                \"staining complaints may arise; simple treatment is advisable.\"\n            )\n        return (\n            \"All measured parameters comply with the WHO guideline values and \"\n            \"the national standard limits applied. The water is suitable for \"\n            \"drinking on the basis of the parameters tested.\"\n        )\n\n\ndef assess_sample(\n    sample: WaterQualitySample,\n    standards_path: str | Path | None = None,\n) -> WaterQualityAssessment:\n    \"\"\"Assess every result in a sample against the standards table.\"\"\"\n    table = load_standards(standards_path)\n    rows: list[ParameterAssessment] = []\n    flags: list[DataFlag] = list(sample.flags)\n\n    for result in sample.results:\n        key = normalise_parameter(result.parameter)\n        entry: StandardEntry | None = table.get(key)\n        who_h = str(entry.who_health) if entry and entry.who_health else \"\"\n        who_a = str(entry.who_aesthetic) if entry and entry.who_aesthetic else \"\"\n        sl = str(entry.sl_standard) if entry and entry.sl_standard else \"\"\n\n        if result.value is None and not result.below_detection:\n            status, remark = \"not_measured\", \"no value reported\"\n        elif result.below_detection and result.value is None:\n            status, remark = \"below_detection\", (\n                f\"below detection limit ({result.detection_limit:g})\"\n                if result.detection_limit is not None\n                else \"below detection limit\"\n            )\n        elif entry is None:\n            status, remark = \"no_guideline\", \"parameter not in the standards table\"\n            flags.append(\n                DataFlag(\n                    \"info\",\n                    \"unknown_parameter\",\n                    f\"No guideline entry for '{result.parameter}'; add it to the \"\n                    \"standards CSV if a limit applies.\",\n                )\n            )\n        else:\n            value = float(result.value)\n            if entry.who_health and entry.who_health.exceeded_by(value):\n                status = \"exceeds_health\"\n                remark = f\"exceeds the WHO health based guideline ({entry.who_health})\"\n            elif entry.sl_standard and entry.sl_standard.exceeded_by(value):\n                status = \"exceeds_national\"\n                remark = f\"exceeds the national standard limit ({entry.sl_standard})\"\n            elif entry.who_aesthetic and entry.who_aesthetic.exceeded_by(value):\n                status = \"exceeds_aesthetic\"\n                remark = f\"exceeds the WHO acceptability value ({entry.who_aesthetic})\"\n            elif not (entry.who_health or entry.who_aesthetic or entry.sl_standard):\n                status, remark = \"no_guideline\", entry.note or \"no guideline value\"\n            else:\n                status, remark = \"within_limits\", \"\"\n\n        rows.append(\n            ParameterAssessment(\n                parameter=result.parameter,\n                value=result.value,\n                unit=result.unit or (entry.unit if entry else \"\"),\n                below_detection=result.below_detection,\n                who_health=who_h,\n                who_aesthetic=who_a,\n                sl_standard=sl,\n                status=status,\n                remark=remark,\n            )\n        )\n\n    ionic = ionic_balance(sample)\n    if ionic is not None and ionic.flag is not None:\n        flags.append(ionic.flag)\n\n    assessment = WaterQualityAssessment(sample=sample, rows=rows, ionic=ionic, flags=flags)\n    return assessment\n"}, "groundwater/quality/diagrams.py": {"t": "text", "d": "\"\"\"Hydrochemical facies diagrams: Piper and Stiff.\n\nBoth work from the meq/L values produced by the ionic balance module,\nso they need the major ions to be present in the sample. Multiple\nsamples can be plotted on one Piper diagram for comparison.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nimport matplotlib.pyplot as plt\nimport numpy as np\n\nfrom ..config import HouseStyle\nfrom ..models import WaterQualitySample\nfrom ..plotting import figure_context, save_figure\nfrom .ionic import ionic_balance\n\n_SQ3 = np.sqrt(3.0)\n\n\ndef _ternary_xy(a: float, b: float, c: float, origin=(0.0, 0.0), size=1.0):\n    \"\"\"Barycentric (a bottom-left, b bottom-right, c top) to xy.\"\"\"\n    total = a + b + c\n    if total <= 0:\n        return None\n    a, b, c = a / total, b / total, c / total\n    x = origin[0] + (b + 0.5 * c) * size\n    y = origin[1] + (_SQ3 / 2.0) * c * size\n    return x, y\n\n\ndef _triangle(ax, origin, size, labels, ticks=True):\n    x0, y0 = origin\n    verts = np.array(\n        [[x0, y0], [x0 + size, y0], [x0 + 0.5 * size, y0 + _SQ3 / 2 * size], [x0, y0]]\n    )\n    ax.plot(verts[:, 0], verts[:, 1], color=\"#444444\", lw=1.2)\n    for frac in (0.2, 0.4, 0.6, 0.8):\n        # grid lines parallel to each side\n        ax.plot(\n            [x0 + frac * size, x0 + 0.5 * size + 0.5 * frac * size],\n            [y0, y0 + _SQ3 / 2 * size * (1 - frac)],\n            color=\"#DDDDDD\", lw=0.6, zorder=0,\n        )\n        ax.plot(\n            [x0 + (1 - frac) * size, x0 + 0.5 * size - 0.5 * frac * size],\n            [y0, y0 + _SQ3 / 2 * size * (1 - frac)],\n            color=\"#DDDDDD\", lw=0.6, zorder=0,\n        )\n        ax.plot(\n            [x0 + 0.5 * frac * size, x0 + size - 0.5 * frac * size],\n            [y0 + _SQ3 / 2 * size * frac, y0 + _SQ3 / 2 * size * frac],\n            color=\"#DDDDDD\", lw=0.6, zorder=0,\n        )\n    la, lb, lc = labels\n    ax.text(x0 - 0.03, y0 - 0.05, la, ha=\"right\", va=\"top\", fontsize=9)\n    ax.text(x0 + size + 0.03, y0 - 0.05, lb, ha=\"left\", va=\"top\", fontsize=9)\n    ax.text(x0 + 0.5 * size, y0 + _SQ3 / 2 * size + 0.04, lc, ha=\"center\", fontsize=9)\n\n\ndef plot_piper(\n    samples: list[WaterQualitySample],\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n    title: str = \"Piper diagram\",\n):\n    \"\"\"Piper trilinear diagram for one or more samples.\n\n    The diamond point is the classical construction: the intersection\n    of the +60 degree line through the cation point and the -60 degree\n    line through the anion point. Samples without a complete major ion\n    analysis are skipped.\n    \"\"\"\n    style = style or HouseStyle()\n    size = 1.0\n    gap = 0.18\n    cat_origin = (0.0, 0.0)\n    an_origin = (size + gap, 0.0)\n\n    # diamond vertices from the projection geometry\n    x_mid = size + gap / 2.0\n    y_bot = _SQ3 / 2.0 * gap\n    diamond = np.array(\n        [\n            [x_mid, y_bot],  # bottom: Ca+Mg with HCO3\n            [x_mid + size / 2.0, y_bot + _SQ3 / 2.0 * size],  # right: Na+K with SO4+Cl\n            [x_mid, y_bot + _SQ3 * size],  # top: Ca+Mg with SO4+Cl\n            [x_mid - size / 2.0, y_bot + _SQ3 / 2.0 * size],  # left\n            [x_mid, y_bot],\n        ]\n    )\n\n    with figure_context(style):\n        fig, ax = plt.subplots(figsize=(style.figure_width_in * 0.9, 5.6))\n        ax.set_aspect(\"equal\")\n        ax.axis(\"off\")\n        _triangle(ax, cat_origin, size, (\"Ca\", \"Na+K\", \"Mg\"))\n        _triangle(ax, an_origin, size, (\"HCO3\", \"Cl\", \"SO4\"))\n        ax.plot(diamond[:, 0], diamond[:, 1], color=\"#444444\", lw=1.2)\n        ax.annotate(\n            \"SO4 + Cl increases upward; Na + K increases to the right\",\n            xy=(x_mid, y_bot + _SQ3 * size + 0.06),\n            ha=\"center\", fontsize=7.5, color=\"#555555\",\n        )\n\n        markers = [\"o\", \"s\", \"^\", \"D\", \"v\", \"P\", \"X\"]\n        plotted = []\n        for i, sample in enumerate(samples):\n            ionic = ionic_balance(sample)\n            if ionic is None:\n                continue\n            cat = ionic.cations_meq\n            an = ionic.anions_meq\n            ca, mg = cat.get(\"calcium\", 0), cat.get(\"magnesium\", 0)\n            nak = cat.get(\"sodium\", 0) + cat.get(\"potassium\", 0)\n            cl = an.get(\"chloride\", 0)\n            so4 = an.get(\"sulfate\", 0)\n            hco3 = an.get(\"bicarbonate\", 0) + an.get(\"carbonate\", 0)\n\n            p_cat = _ternary_xy(ca, nak, mg, cat_origin, size)\n            p_an = _ternary_xy(hco3, cl, so4, an_origin, size)\n            if p_cat is None or p_an is None:\n                continue\n            # intersection of +60 deg line through the cation point and\n            # -60 deg line through the anion point\n            xc, yc = p_cat\n            xa, ya = p_an\n            xd = 0.5 * (xc + xa) + (ya - yc) / (2.0 * _SQ3)\n            yd = yc + _SQ3 * (xd - xc)\n            marker = markers[i % len(markers)]\n            label = sample.sample_id or sample.site.community or f\"sample {i + 1}\"\n            color = style.accent_color if i % 2 == 0 else style.secondary_color\n            first = True\n            for px, py in ((xc, yc), (xa, ya), (xd, yd)):\n                ax.plot(px, py, marker, ms=6, mfc=color, mec=\"white\", mew=0.8,\n                        label=label if first else None)\n                first = False\n            plotted.append(label)\n        if plotted:\n            ax.legend(loc=\"upper left\", fontsize=8, frameon=True)\n        ax.set_title(title)\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n\n\ndef plot_stiff(\n    sample: WaterQualitySample,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n    title: str | None = None,\n):\n    \"\"\"Stiff diagram: Na+K / Ca / Mg on the left, Cl / HCO3 / SO4 right.\"\"\"\n    style = style or HouseStyle()\n    ionic = ionic_balance(sample)\n    if ionic is None:\n        raise ValueError(\"Stiff diagram needs the major ions (Ca, Mg, Na, Cl, HCO3)\")\n    cat = ionic.cations_meq\n    an = ionic.anions_meq\n    rows = [\n        (cat.get(\"sodium\", 0) + cat.get(\"potassium\", 0), an.get(\"chloride\", 0), \"Na+K\", \"Cl\"),\n        (cat.get(\"calcium\", 0), an.get(\"bicarbonate\", 0) + an.get(\"carbonate\", 0), \"Ca\", \"HCO3\"),\n        (cat.get(\"magnesium\", 0), an.get(\"sulfate\", 0), \"Mg\", \"SO4\"),\n    ]\n    with figure_context(style):\n        fig, ax = plt.subplots(figsize=(style.figure_width_in * 0.7, 2.8))\n        ys = [2, 1, 0]\n        xs_left = [-r[0] for r in rows]\n        xs_right = [r[1] for r in rows]\n        poly_x = xs_left + xs_right[::-1]\n        poly_y = ys + ys[::-1]\n        ax.fill(poly_x, poly_y, color=style.accent_color, alpha=0.25, lw=0)\n        ax.plot(poly_x + [poly_x[0]], poly_y + [poly_y[0]], color=style.accent_color, lw=1.6)\n        ax.axvline(0, color=\"#555555\", lw=1.0)\n        for y, (c_meq, a_meq, c_label, a_label) in zip(ys, rows):\n            ax.plot([-c_meq], [y], \"o\", ms=4, color=style.accent_color)\n            ax.plot([a_meq], [y], \"o\", ms=4, color=style.accent_color)\n            ax.text(ax.get_xlim()[0], y, \"\", fontsize=8)\n        span = max(max(map(abs, xs_left)), max(xs_right), 0.5) * 1.3\n        ax.set_xlim(-span, span)\n        ax.set_ylim(-0.6, 2.6)\n        for y, (c, a, c_label, a_label) in zip(ys, rows):\n            ax.text(-span * 0.98, y, c_label, ha=\"left\", va=\"center\", fontsize=9)\n            ax.text(span * 0.98, y, a_label, ha=\"right\", va=\"center\", fontsize=9)\n        ax.set_yticks([])\n        ax.set_xlabel(\"meq/L (cations left, anions right)\")\n        ax.set_title(title or f\"Stiff diagram - {sample.sample_id or sample.site.community}\")\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n"}, "groundwater/quality/ionic.py": {"t": "text", "d": "\"\"\"Ionic balance check for major ion analyses.\n\nThe charge balance error is ``100 x (sum cations - sum anions) /\n(sum cations + sum anions)`` in meq/L. Errors within 5 percent are\nnormal laboratory practice; 5 to 10 percent is flagged for review and\nmore than 10 percent indicates an unreliable analysis or a missing\nmajor ion.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\nfrom typing import Optional\n\nfrom ..models import DataFlag, WaterQualitySample\nfrom .standards import normalise_parameter\n\n# meq per mg: charge / molar mass\n_CATIONS = {\n    \"calcium\": 2 / 40.078,\n    \"magnesium\": 2 / 24.305,\n    \"sodium\": 1 / 22.990,\n    \"potassium\": 1 / 39.098,\n    \"iron\": 2 / 55.845,  # ferrous, minor\n    \"manganese\": 2 / 54.938,  # minor\n}\n_ANIONS = {\n    \"chloride\": 1 / 35.453,\n    \"sulfate\": 2 / 96.06,\n    \"bicarbonate\": 1 / 61.017,\n    \"carbonate\": 2 / 60.009,\n    \"nitrate (as no3)\": 1 / 62.004,\n    \"fluoride\": 1 / 18.998,\n}\n\n# the four majors on each side that make a balance meaningful\n_REQUIRED_CATIONS = (\"calcium\", \"magnesium\", \"sodium\")\n_REQUIRED_ANIONS = (\"chloride\", \"bicarbonate\")\n\n\n@dataclass\nclass IonicBalanceResult:\n    sum_cations_meq: float\n    sum_anions_meq: float\n    error_percent: float\n    cations_meq: dict\n    anions_meq: dict\n    used_alkalinity_for_bicarbonate: bool\n    flag: Optional[DataFlag]\n\n\ndef _value(sample: WaterQualitySample, key: str) -> Optional[float]:\n    for result in sample.results:\n        if normalise_parameter(result.parameter) == key:\n            return result.value if result.value is not None else (\n                0.0 if result.below_detection else None\n            )\n    return None\n\n\ndef ionic_balance(sample: WaterQualitySample) -> Optional[IonicBalanceResult]:\n    \"\"\"Compute the charge balance; returns None when the major ions are\n    not sufficiently covered by the analysis.\"\"\"\n    cations: dict[str, float] = {}\n    anions: dict[str, float] = {}\n\n    for key, factor in _CATIONS.items():\n        value = _value(sample, key)\n        if value is not None:\n            cations[key] = value * factor\n\n    used_alk = False\n    for key, factor in _ANIONS.items():\n        value = _value(sample, key)\n        if value is not None:\n            anions[key] = value * factor\n    if \"bicarbonate\" not in anions:\n        alk = _value(sample, \"alkalinity\")\n        if alk is not None:\n            # alkalinity as CaCO3 -> bicarbonate equivalent: meq = mg/L / 50.04\n            anions[\"bicarbonate\"] = alk / 50.04\n            used_alk = True\n\n    if not all(k in cations for k in _REQUIRED_CATIONS) or not all(\n        k in anions for k in _REQUIRED_ANIONS\n    ):\n        return None\n\n    total_cat = sum(cations.values())\n    total_an = sum(anions.values())\n    if total_cat + total_an <= 0:\n        return None\n    error = 100.0 * (total_cat - total_an) / (total_cat + total_an)\n\n    flag = None\n    if abs(error) > 10:\n        flag = DataFlag(\n            \"error\",\n            \"ionic_balance\",\n            f\"Charge balance error {error:+.1f}% exceeds 10%; the analysis is \"\n            \"unreliable or a major ion is missing.\",\n        )\n    elif abs(error) > 5:\n        flag = DataFlag(\n            \"warning\",\n            \"ionic_balance\",\n            f\"Charge balance error {error:+.1f}% is between 5% and 10%; review \"\n            \"the laboratory analysis.\",\n        )\n    return IonicBalanceResult(\n        sum_cations_meq=total_cat,\n        sum_anions_meq=total_an,\n        error_percent=error,\n        cations_meq=cations,\n        anions_meq=anions,\n        used_alkalinity_for_bicarbonate=used_alk,\n        flag=flag,\n    )\n"}, "groundwater/quality/standards.py": {"t": "text", "d": "\"\"\"Guideline and standard values for drinking water parameters.\n\nThe bundled table (``data/who_guidelines.csv``) carries WHO Guidelines\nfor Drinking-water Quality values (4th edition with addenda) split\ninto health based and acceptability values, plus a Sierra Leone\nstandard column. Where a confirmed national value is not to hand the\nnational column mirrors the WHO/regional figure; confirm the values\nagainst the current Sierra Leone Standards Bureau specification and\nedit the CSV (or pass a custom file) - no code change is needed.\n\nRange values such as pH are written ``6.5-8.5`` and evaluated as an\nallowed interval.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport csv\nimport re\nfrom dataclasses import dataclass\nfrom importlib import resources\nfrom pathlib import Path\nfrom typing import Optional\n\n_RANGE_RE = re.compile(r\"^\\s*(\\d+(?:\\.\\d+)?)\\s*-\\s*(\\d+(?:\\.\\d+)?)\\s*$\")\n\n\n@dataclass\nclass Limit:\n    \"\"\"A guideline limit: either a maximum or an allowed range.\"\"\"\n\n    maximum: Optional[float] = None\n    minimum: Optional[float] = None\n\n    @classmethod\n    def parse(cls, text: str) -> Optional[\"Limit\"]:\n        text = (text or \"\").strip()\n        if not text:\n            return None\n        match = _RANGE_RE.match(text)\n        if match:\n            return cls(minimum=float(match.group(1)), maximum=float(match.group(2)))\n        try:\n            return cls(maximum=float(text))\n        except ValueError:\n            return None\n\n    def exceeded_by(self, value: float) -> bool:\n        if self.minimum is not None and value < self.minimum:\n            return True\n        if self.maximum is not None and value > self.maximum:\n            return True\n        return False\n\n    def __str__(self) -> str:\n        if self.minimum is not None:\n            return f\"{self.minimum:g}-{self.maximum:g}\"\n        if self.maximum is not None:\n            return f\"{self.maximum:g}\"\n        return \"\"\n\n\n@dataclass\nclass StandardEntry:\n    parameter: str\n    unit: str\n    who_health: Optional[Limit]\n    who_aesthetic: Optional[Limit]\n    sl_standard: Optional[Limit]\n    category: str\n    note: str\n\n\n_ALIASES = {\n    \"ec\": \"electrical conductivity\",\n    \"conductivity\": \"electrical conductivity\",\n    \"total dissolved solids\": \"tds\",\n    \"hardness\": \"total hardness\",\n    \"nitrate\": \"nitrate (as no3)\",\n    \"no3\": \"nitrate (as no3)\",\n    \"nitrite\": \"nitrite (as no2)\",\n    \"no2\": \"nitrite (as no2)\",\n    \"ammonia\": \"ammonia (as n)\",\n    \"ammonium\": \"ammonia (as n)\",\n    \"nh3\": \"ammonia (as n)\",\n    \"nh4\": \"ammonia (as n)\",\n    \"chromium\": \"chromium (total)\",\n    \"cr\": \"chromium (total)\",\n    \"faecal coliforms\": \"e. coli\",\n    \"fecal coliforms\": \"e. coli\",\n    \"e.coli\": \"e. coli\",\n    \"escherichia coli\": \"e. coli\",\n    \"coliforms\": \"total coliforms\",\n    \"sulphate\": \"sulfate\",\n    \"so4\": \"sulfate\",\n    \"aluminum\": \"aluminium\",\n}\n\n\ndef normalise_parameter(name: str) -> str:\n    key = re.sub(r\"\\s+\", \" \", name.strip().lower())\n    return _ALIASES.get(key, key)\n\n\ndef load_standards(path: str | Path | None = None) -> dict[str, StandardEntry]:\n    \"\"\"Load the standards table keyed by normalised parameter name.\"\"\"\n    if path is None:\n        source = resources.files(\"groundwater.data\").joinpath(\"who_guidelines.csv\")\n        fh = source.open(\"r\", encoding=\"utf-8\")\n    else:\n        fh = open(path, \"r\", encoding=\"utf-8\")\n    with fh:\n        rows = list(csv.DictReader(fh))\n    table: dict[str, StandardEntry] = {}\n    for row in rows:\n        entry = StandardEntry(\n            parameter=row[\"parameter\"],\n            unit=row[\"unit\"],\n            who_health=Limit.parse(row.get(\"who_health_gv\", \"\")),\n            who_aesthetic=Limit.parse(row.get(\"who_aesthetic\", \"\")),\n            sl_standard=Limit.parse(row.get(\"sl_standard\", \"\")),\n            category=row.get(\"category\", \"\"),\n            note=row.get(\"note\", \"\"),\n        )\n        table[normalise_parameter(entry.parameter)] = entry\n    return table\n"}, "groundwater/reporting/__init__.py": {"t": "text", "d": "\"\"\"Templated .docx report generation.\"\"\"\n\nfrom .docx_utils import ReportBuilder\nfrom .geophysical import build_geophysical_report\n\n__all__ = [\"ReportBuilder\", \"build_geophysical_report\"]\n\n\ndef __getattr__(name):\n    # Phase 2 report builders are imported lazily so Phase 1 users are\n    # not blocked by missing optional pieces during development.\n    if name == \"build_completion_report\":\n        from .completion import build_completion_report\n\n        return build_completion_report\n    if name == \"build_pumping_report\":\n        from .pumping import build_pumping_report\n\n        return build_pumping_report\n    if name == \"build_quality_report\":\n        from .quality import build_quality_report\n\n        return build_quality_report\n    if name == \"build_handover_report\":\n        from .handover import build_handover_report\n\n        return build_handover_report\n    raise AttributeError(name)\n"}, "groundwater/reporting/completion.py": {"t": "text", "d": "\"\"\"Borehole completion report generator.\n\nFollows the structure of the contractor completion report example:\nintroduction, methodology, drilling works, borehole log data with the\ndrilling record table, borehole construction and design drawing,\ndevelopment record, pumping test summary, borehole characteristics and\ninstallation block, recommendations and conclusions, and the preparer\nsignature block.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom pathlib import Path\n\nfrom ..config import Config\nfrom ..design.designer import BoreholeDesign\nfrom ..design.drawing import draw_borehole_design\nfrom ..hydraulics.analysis import PumpingTestAnalysis\nfrom ..hydraulics.plots import plot_test_overview\nfrom ..models import DrillingLog\nfrom ..quality.assess import WaterQualityAssessment\nfrom ..utils import fmt_num\nfrom .docx_utils import ReportBuilder\n\n\n@dataclass\nclass CompletionReportInputs:\n    log: DrillingLog\n    design: BoreholeDesign | None = None\n    pumping: PumpingTestAnalysis | None = None\n    quality: WaterQualityAssessment | None = None\n    figures_dir: Path = Path(\".\")\n    development_record: list[tuple[str, str, str, str]] = field(default_factory=list)\n    # rows of (from time, to time, estimated yield, observation)\n    development_note: str = \"\"\n    pump_type: str = \"\"\n    preparer_name: str = \"\"\n    preparer_role: str = \"Technical Manager\"\n    preparer_phone: str = \"\"\n\n\ndef build_completion_report(\n    inputs: CompletionReportInputs,\n    out_path: str | Path,\n    config: Config | None = None,\n) -> Path:\n    config = config or Config()\n    log = inputs.log\n    site = log.site\n    figures = Path(inputs.figures_dir)\n    figures.mkdir(parents=True, exist_ok=True)\n\n    rb = ReportBuilder(\n        config.style, title=f\"Borehole Completion Report - {site.community}\"\n    )\n    rb.cover(\n        title_lines=[\"BOREHOLE DRILLING AND\", \"PUMP TEST REPORT\"],\n        subtitle_lines=[f\"for {site.community}\"],\n        details=[\n            (\"Submitted to\", site.client),\n            (\"Contractor\", site.contractor or \"\"),\n            (\"Borehole Ref. No.\", log.borehole_ref or \"\"),\n            (\"Completion date\", log.completion_date or \"\"),\n            (\"Status\", log.status or \"\"),\n        ],\n    )\n    rb.table_of_contents()\n\n    # ---- introduction --------------------------------------------------------\n    rb.heading(\"1. Introduction\", 1)\n    rb.paragraph(\n        \"Groundwater can be abstracted from the ground in different ways, and \"\n        \"the choice of abstraction method depends on the resources available \"\n        \"and the local conditions. Borehole drilling was the recommended \"\n        f\"abstraction method for this project at {site.community}, and the \"\n        \"work was executed as per the specifications. Details of the \"\n        \"activities are presented in this report.\",\n        align=\"justify\",\n    )\n\n    # ---- methodology -----------------------------------------------------------\n    rb.heading(\"2. Methodology\", 1)\n    rb.paragraph(\n        \"The methodology adopted included reconnaissance, observation of the \"\n        \"geological and hydrogeological conditions, assessment of existing \"\n        \"boreholes and hand dug wells, drilling, construction, development \"\n        \"and test pumping of the borehole.\",\n        align=\"justify\",\n    )\n\n    # ---- drilling ---------------------------------------------------------------\n    rb.heading(\"3. Drilling\", 1)\n    rb.paragraph(\"The drilling work included the following:\")\n    rb.bullets(\n        [\n            \"Mobilisation of the drill rig and all necessary equipment.\",\n            \"Drilling through all formations for completion of the borehole\"\n            + (f\" using the {log.drilling_method} method.\" if log.drilling_method else \".\"),\n            \"Supply and installation of casings (plain and screen).\",\n            \"Gravel packing of the annulus.\",\n            \"Development of the borehole by surging with compressed air and airlifting.\",\n            \"Demobilisation.\",\n        ]\n    )\n    rb.header_block_table(\n        [\n            (\"Contractor\", site.contractor or \"\"), (\"Client\", site.client),\n            (\"Location\", site.community), (\"Depth of borehole\", fmt_num(log.total_depth_m) + \" m\"),\n            (\"Start date\", log.start_date), (\"Completion date\", log.completion_date),\n            (\"Drilling method\", log.drilling_method), (\"BH status\", log.status),\n        ]\n    )\n\n    # ---- borehole log -------------------------------------------------------------\n    rb.heading(\"4. Borehole Log Data\", 1)\n    rows = []\n    for iv in log.intervals:\n        rows.append(\n            [\n                f\"{iv.top_m:g}-{iv.bottom_m:g}\",\n                fmt_num(iv.thickness_m),\n                iv.from_time,\n                iv.to_time,\n                fmt_num(iv.penetration_rate_m_per_min) if iv.penetration_rate_m_per_min else \"\",\n                iv.description,\n                f'{iv.bit_diameter_in:g}\"' if iv.bit_diameter_in else \"\",\n            ]\n        )\n    rb.table(\n        rows,\n        header=[\"Depth (m)\", \"Interval (m)\", \"From\", \"To\",\n                \"Penetration rate (m/min)\", \"Sample description\", \"Diameter\"],\n        caption=\"Drilling record and formation log.\",\n        font_size_pt=8.5,\n    )\n    strikes = log.water_strikes_m\n    if strikes:\n        for i, strike in enumerate(strikes, start=1):\n            label = [\"First\", \"Second\", \"Third\", \"Fourth\"][i - 1] if i <= 4 else f\"{i}th\"\n            rb.paragraph(f\"{label} water strike: {strike:g} m\", bold=True)\n    if log.grouting_depth_m:\n        rb.paragraph(f\"Grouting: {log.grouting_depth_m:g} m\", bold=True)\n\n    # ---- construction / design ---------------------------------------------------\n    if inputs.design is not None:\n        rb.heading(\"5. Borehole Construction\", 1)\n        design_fig = figures / \"borehole_design.png\"\n        if not design_fig.exists():\n            draw_borehole_design(\n                inputs.design, log, path=design_fig, style=config.style,\n                title=f\"Borehole design - {site.community} ({log.borehole_ref})\",\n                header_pairs=[\n                    (\"Client\", site.client), (\"Contractor\", site.contractor or \"\"),\n                    (\"Method\", log.drilling_method), (\"Status\", log.status),\n                ],\n            )\n        rb.table(\n            [[k, v] for k, v in inputs.design.summary_rows()],\n            header=[\"Item\", \"Detail\"],\n            caption=\"Construction summary.\",\n        )\n        rb.figure(design_fig, \"As-built borehole design with lithology and construction columns.\", width_cm=13.5)\n        if inputs.design.design_basis:\n            rb.paragraph(\"Design basis:\", bold=True)\n            rb.bullets(inputs.design.design_basis)\n\n    # ---- development ---------------------------------------------------------------\n    section = 6 if inputs.design is not None else 5\n    if inputs.development_record or inputs.development_note:\n        rb.heading(f\"{section}. Borehole Development Record\", 1)\n        if inputs.development_note:\n            rb.paragraph(inputs.development_note)\n        if inputs.development_record:\n            rb.table(\n                [list(r) for r in inputs.development_record],\n                header=[\"From\", \"To\", \"Estimated yield (m3/h)\", \"Observation\"],\n                caption=\"Borehole development by air lifting.\",\n            )\n        section += 1\n\n    # ---- pumping test ---------------------------------------------------------------\n    if inputs.pumping is not None:\n        analysis = inputs.pumping\n        test = analysis.test\n        rb.heading(f\"{section}. Pumping Test\", 1)\n        overview = figures / \"test_overview.png\"\n        if not overview.exists():\n            plot_test_overview(test, path=overview, style=config.style)\n        rb.figure(overview, \"Constant discharge test and recovery record.\")\n        q = test.steps[0].discharge_m3_per_h if test.steps else None\n        rows = [\n            [\"Test type\", test.test_type],\n            [\"Duration\", fmt_num(test.pumping_duration_min) + \" min\" if test.pumping_duration_min else \"\"],\n            [\"Discharge\", fmt_num(q) + \" m3/h\" if q else \"pending\"],\n            [\"Static water level\", fmt_num(test.static_water_level_m) + \" m\"],\n            [\"Maximum drawdown\", fmt_num(analysis.max_drawdown_m) + \" m\" if analysis.max_drawdown_m else \"\"],\n        ]\n        if analysis.transmissivity_m2_per_day:\n            rows.append([\"Transmissivity\", fmt_num(analysis.transmissivity_m2_per_day) + \" m2/day\"])\n        yr = analysis.yield_recommendation\n        if yr and yr.specific_capacity_m3hr_per_m:\n            rows.append([\"Specific capacity\", fmt_num(yr.specific_capacity_m3hr_per_m) + \" m3/h per m\"])\n        rb.table(rows, header=[\"Item\", \"Value\"], caption=\"Pumping test summary.\")\n        section += 1\n\n    # ---- characteristics and installation ------------------------------------------\n    rb.heading(f\"{section}. Borehole Characteristics and Installation\", 1)\n    swl = inputs.pumping.test.static_water_level_m if inputs.pumping else None\n    dwl = None\n    if inputs.pumping and inputs.pumping.test.steps and swl is not None:\n        dwl = float(inputs.pumping.test.steps[-1].water_level_m[-1])\n    q = None\n    if inputs.pumping and inputs.pumping.test.steps:\n        q = inputs.pumping.test.steps[0].discharge_m3_per_h\n    yr = inputs.pumping.yield_recommendation if inputs.pumping else None\n    pairs = [\n        (\"Borehole depth\", fmt_num(log.total_depth_m) + \" m\"),\n        (\"Borehole diameter\", f'{inputs.design.borehole_diameter_in:g}\"' if inputs.design else \"\"),\n        (\"Static water level\", fmt_num(swl) + \" m\" if swl is not None else \"\"),\n        (\"Dynamic water level\", fmt_num(dwl) + \" m\" if dwl is not None else \"\"),\n        (\"Drawdown\", fmt_num(dwl - swl) + \" m\" if (dwl is not None and swl is not None) else \"\"),\n        (\"Flow rate\", fmt_num(q * 1000) + \" L/h\" if q else \"pending\"),\n        (\"Pump type\", inputs.pump_type),\n        (\"Installation depth\", fmt_num(yr.pump_installation_depth_m) + \" m\" if yr and yr.pump_installation_depth_m else\n         (fmt_num(inputs.pumping.test.pump_setting_m) + \" m\" if inputs.pumping and inputs.pumping.test.pump_setting_m else \"\")),\n    ]\n    rb.header_block_table(pairs)\n    section += 1\n\n    # ---- water quality (optional) ---------------------------------------------------\n    if inputs.quality is not None:\n        rb.heading(f\"{section}. Water Quality Summary\", 1)\n        rb.paragraph(inputs.quality.verdict, align=\"justify\")\n        exceed = inputs.quality.health_exceedances + inputs.quality.aesthetic_exceedances\n        if exceed:\n            rb.table(\n                [[r.parameter, fmt_num(r.value), r.unit, r.who_health or r.who_aesthetic or r.sl_standard, r.remark]\n                 for r in exceed],\n                header=[\"Parameter\", \"Value\", \"Unit\", \"Limit\", \"Remark\"],\n                caption=\"Parameters above guideline or standard limits.\",\n            )\n        section += 1\n\n    # ---- recommendations ----------------------------------------------------------\n    rb.heading(f\"{section}. Recommendations and Conclusions\", 1)\n    bullets = []\n    if (log.status or \"\").lower().startswith(\"success\") or (\n        inputs.pumping and inputs.pumping.yield_recommendation\n        and inputs.pumping.yield_recommendation.safe_yield_m3_per_h\n    ):\n        bullets.append(\"The borehole is successful and sustainable when operated as recommended.\")\n    yr = inputs.pumping.yield_recommendation if inputs.pumping else None\n    if yr and yr.safe_yield_m3_per_h:\n        bullets.append(\n            f\"The recommended abstraction rate is {fmt_num(yr.safe_yield_m3_per_h)} m3/h \"\n            f\"(safety factor {yr.safety_factor:g} applied to the long term yield).\"\n        )\n        if yr.pump_installation_depth_m:\n            bullets.append(\n                f\"The pump installation depth is {fmt_num(yr.pump_installation_depth_m)} m.\"\n            )\n        bullets.append(\n            \"The pump should rest for at least one hour in every pumping \"\n            \"cycle and the pumping water level should be checked routinely.\"\n        )\n    elif inputs.pumping is not None and not inputs.pumping.test.has_discharge:\n        bullets.append(\n            \"The pumping test discharge must be supplied so the yield \"\n            \"recommendation can be completed; abstraction figures remain pending.\"\n        )\n    if inputs.quality is not None and inputs.quality.health_exceedances:\n        bullets.append(\n            \"Water treatment is required before drinking; see the water \"\n            \"quality assessment.\"\n        )\n    else:\n        bullets.append(\n            \"Physico-chemical and bacteriological testing should be repeated \"\n            \"at least once a year.\"\n        )\n    rb.bullets(bullets)\n\n    rb.signature_block(\n        name=inputs.preparer_name or site.supervisor,\n        role=inputs.preparer_role,\n        phone=inputs.preparer_phone,\n        organisation=site.contractor or config.style.organisation,\n    )\n    return rb.save(out_path)\n"}, "groundwater/reporting/costing.py": {"t": "text", "d": "\"\"\"Borehole cost estimate report generator.\n\nA short client-ready document: the basis of the estimate, the bill of\nquantities, the cost and price roll-up and the assumptions, following\nthe RWSN Cost-Effective Boreholes methodology (cost first, price\nseparately, both breakdowns shown).\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\nfrom pathlib import Path\n\nfrom ..config import Config\nfrom ..costing.model import CostEstimate\nfrom ..costing.plots import plot_cost_breakdown\nfrom ..models import SiteMetadata\nfrom ..utils import fmt_num\nfrom .docx_utils import ReportBuilder\n\n\n@dataclass\nclass CostReportInputs:\n    estimate: CostEstimate\n    site: SiteMetadata | None = None\n    figures_dir: Path = Path(\".\")\n    prepared_by: str = \"\"\n\n\ndef build_cost_report(\n    inputs: CostReportInputs,\n    out_path: str | Path,\n    config: Config | None = None,\n) -> Path:\n    config = config or Config()\n    estimate = inputs.estimate\n    site = inputs.site or SiteMetadata()\n    figures = Path(inputs.figures_dir)\n    figures.mkdir(parents=True, exist_ok=True)\n\n    rb = ReportBuilder(\n        config.style,\n        title=f\"Cost Estimate - {site.community or 'Borehole'}\",\n    )\n    rb.cover(\n        title_lines=[\"BOREHOLE COST ESTIMATE\"],\n        subtitle_lines=[\n            f\"at {site.community}\" + (f\", {site.district} District\" if site.district else \"\")\n            if site.community\n            else \"Drilled Water Well Construction\",\n        ],\n        details=[\n            (\"Client\", site.client),\n            (\"Project\", site.project),\n            (\"Prepared by\", inputs.prepared_by or site.contractor),\n            (\"Date\", site.date),\n        ],\n    )\n    rb.table_of_contents()\n\n    # ---- 1 method ------------------------------------------------------\n    rb.heading(\"1. Method\", 1)\n    rb.paragraph(\n        \"The estimate follows the Rural Water Supply Network (RWSN) \"\n        \"Cost-Effective Boreholes methodology. Every line item carries a \"\n        \"construction stage and a resource category, so the total can be \"\n        \"broken down both ways. The estimate first establishes the cost \"\n        \"of the works; the contract price is then derived by adding \"\n        \"overheads and a margin, and a separate contingency allowance is \"\n        \"shown for budget planning. Keeping cost and price apart follows \"\n        \"the RWSN guidance for sustainable drilling enterprises.\",\n        align=\"justify\",\n    )\n    rb.paragraph(\n        \"The unit rates are indicative values held in an editable \"\n        \"catalogue and must be confirmed against current local prices \"\n        \"before the estimate is used for contracting.\",\n        align=\"justify\",\n    )\n\n    # ---- 2 basis -------------------------------------------------------\n    rb.heading(\"2. Basis of the Estimate\", 1)\n    quantities = inputs.estimate.inputs\n    rb.table(\n        [\n            [\"Total depth\", fmt_num(quantities.total_depth_m) + \" m\"],\n            [\"Overburden / hard rock\",\n             f\"{fmt_num(quantities.overburden_m)} m / {fmt_num(quantities.bedrock_m)} m\"],\n            [\"Plain casing / screen\",\n             f\"{fmt_num(quantities.casing_m)} m / {fmt_num(quantities.screen_m)} m \"\n             f\"({quantities.casing_diameter_in:g} inch)\"],\n            [\"Drilled diameter\", f\"{quantities.borehole_diameter_in:g} inch\"],\n            [\"Gravel packed interval\", fmt_num(quantities.gravel_interval_m) + \" m\"],\n            [\"Mobilisation distance (one way)\",\n             fmt_num(quantities.mobilisation_distance_km) + \" km\"],\n            [\"Crew time on site\", fmt_num(quantities.crew_days) + \" days\"],\n            [\"Development / test pumping\",\n             f\"{fmt_num(quantities.development_hours)} h / \"\n             f\"{fmt_num(quantities.test_pumping_hours)} h\"],\n            [\"Water quality samples\", fmt_num(quantities.wq_samples)],\n            [\"Handpumps included\", fmt_num(quantities.handpumps)],\n        ],\n        header=[\"Quantity driver\", \"Value\"],\n        caption=\"Quantities driving the bill of quantities.\",\n    )\n    if estimate.assumptions:\n        rb.paragraph(\"Assumptions applied where inputs were not supplied:\")\n        rb.bullets(estimate.assumptions)\n\n    # ---- 3 bill of quantities -------------------------------------------\n    rb.heading(\"3. Bill of Quantities\", 1)\n    rows = [\n        [\n            r[\"Code\"],\n            r[\"Item\"],\n            r[\"Unit\"],\n            fmt_num(r[\"Quantity\"]),\n            f\"{r['Rate (USD)']:,.2f}\",\n            f\"{r['Amount (USD)']:,.2f}\",\n        ]\n        for r in estimate.boq_rows()\n    ]\n    rb.table(\n        rows,\n        header=[\"Code\", \"Item\", \"Unit\", \"Qty\", \"Rate (USD)\", \"Amount (USD)\"],\n        caption=\"Bill of quantities at the catalogue unit rates.\",\n    )\n\n    # ---- 4 summary -------------------------------------------------------\n    rb.heading(\"4. Cost Summary\", 1)\n    rb.table(\n        [list(row) for row in estimate.summary_rows()],\n        header=[\"Item\", \"USD\", \"SLE\"],\n        caption=(\n            \"Cost and price roll-up. Local amounts use an exchange rate \"\n            f\"of {estimate.exchange_rate_sle_per_usd:g} SLE per USD.\"\n        ),\n    )\n    fig_path = figures / \"cost_breakdown.png\"\n    if not fig_path.exists():\n        plot_cost_breakdown(estimate, fig_path, config.style)\n    rb.figure(fig_path, \"Direct works cost by stage and by resource category.\")\n\n    # ---- 5 notes ---------------------------------------------------------\n    rb.heading(\"5. Notes and Exclusions\", 1)\n    notes = [\n        \"Unit rates are indicative and must be confirmed against local \"\n        \"supplier and contractor quotations before award.\",\n        \"The estimate covers one production borehole; failed or abandoned \"\n        \"holes, standby time and exceptional ground conditions are not \"\n        \"included and should be covered by the contract conditions.\",\n        \"Land access, community mobilisation and post-construction \"\n        \"monitoring are excluded.\",\n    ]\n    for flag in estimate.flags:\n        notes.append(str(flag.message))\n    rb.bullets(notes)\n\n    return rb.save(out_path)\n"}, "g
