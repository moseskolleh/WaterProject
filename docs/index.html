    for drilling enterprises: overheads on top of direct works cost,\n    then a margin that keeps the business viable; the contingency is a\n    client-side planning allowance, shown separately so the contract\n    price stays honest.\n    \"\"\"\n    if inputs.total_depth_m <= 0:\n        raise ValueError(\"total depth must be positive\")\n    resolved, assumptions = inputs.resolved()\n    rates = rates if rates is not None else load_rates()\n    items: list[CostLineItem] = []\n    flags: list[DataFlag] = []\n    for rate in rates:\n        quantity = _quantity(rate.quantity_basis, resolved)\n        if quantity is None:\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    \"unknown_quantity_basis\",\n                    f\"Rate {rate.code} uses unknown quantity basis \"\n                    f\"'{rate.quantity_basis}' and was skipped.\",\n                    context=rate.code,\n                )\n            )\n            continue\n        if quantity <= 0:\n            continue\n        items.append(\n            CostLineItem(\n                code=rate.code,\n                stage=rate.stage,\n                category=rate.category,\n                item=rate.item,\n                unit=rate.unit,\n                quantity=quantity,\n                unit_cost_usd=rate.unit_cost_usd,\n                note=rate.note,\n            )\n        )\n    if resolved.mobilisation_distance_km <= 0:\n        flags.append(\n            DataFlag(\n                \"info\",\n                \"no_mobilisation_distance\",\n                \"Mobilisation distance is zero; transport costs are not \"\n                \"included. Enter the one way distance from the \"\n                \"contractor's base to the site.\",\n            )\n        )\n    return CostEstimate(\n        items=items,\n        inputs=resolved,\n        overheads_percent=overheads_percent,\n        margin_percent=margin_percent,\n        contingency_percent=contingency_percent,\n        vat_percent=vat_percent,\n        exchange_rate_sle_per_usd=exchange_rate_sle_per_usd,\n        assumptions=assumptions,\n        flags=flags,\n    )\n"}, "groundwater/costing/plots.py": {"t": "text", "d": "\"\"\"Cost breakdown figures in the house style.\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nimport matplotlib.pyplot as plt\n\nfrom ..config import HouseStyle\nfrom ..plotting import figure_context, save_figure\nfrom .model import CostEstimate\n\n\ndef plot_cost_breakdown(\n    estimate: CostEstimate,\n    path: str | Path,\n    style: HouseStyle | None = None,\n) -> Path:\n    \"\"\"Two-panel breakdown: cost by stage and by resource category.\n\n    The same two roll-ups the RWSN costing model reports, drawn as\n    horizontal bars so long stage names stay readable.\n    \"\"\"\n    style = style or HouseStyle()\n    with figure_context(style):\n        fig, (ax1, ax2) = plt.subplots(\n            1, 2, figsize=(style.figure_width_in * 1.35, 3.4)\n        )\n        for ax, pairs, title in (\n            (ax1, estimate.by_stage(), \"By construction stage\"),\n            (ax2, estimate.by_category(), \"By resource category\"),\n        ):\n            labels = [p[0].capitalize() for p in pairs][::-1]\n            values = [p[1] for p in pairs][::-1]\n            bars = ax.barh(labels, values, color=style.accent_color, height=0.62)\n            ax.bar_label(\n                bars,\n                labels=[f\"{v:,.0f}\" for v in values],\n                padding=3,\n                fontsize=8,\n                color=style.neutral_color,\n            )\n            ax.set_xlabel(\"USD\")\n            ax.set_title(title)\n            ax.set_xlim(0, max(values) * 1.22 if values else 1)\n            ax.grid(axis=\"y\", visible=False)\n        fig.suptitle(\n            f\"Direct works cost {estimate.direct_cost_usd:,.0f} USD\",\n            fontweight=\"bold\",\n            fontsize=11,\n        )\n        fig.tight_layout(rect=(0, 0, 1, 0.94))\n    return save_figure(fig, path, style)\n"}, "groundwater/data/borehole_cost_items.csv": {"t": "text", "d": "code,stage,category,item,unit,quantity_basis,unit_cost_usd,note\nSIT1,Siting,equipment,Geophysical siting survey and site selection report,lump sum,lump_sum,400.00,Survey equipment and consultancy and transport (RWSN costing and pricing guide worked example)\nMOB1,Mobilisation,vehicles,Rig and equipment mobilisation and demobilisation,km,per_km_round_trip,2.50,Truck and support vehicle running cost per kilometre travelled (quantity is the round trip)\nMOB2,Mobilisation,equipment,Rig depreciation charge,crew day,per_crew_day,135.00,Capital cost / 1250 working days over a 10000 hour rig life (RWSN depreciation model; a 170000 USD rig gives about 136 USD per day)\nMOB3,Mobilisation,labour,Drilling crew wages,crew day,per_crew_day,65.00,Driller plus assistants and helpers per day on site\nMOB4,Mobilisation,labour,Site establishment and camp,lump sum,lump_sum,150.00,Access preparation and water supply for drilling and camp set up\nDRL1,Drilling,fuel,Fuel and lubricants for overburden drilling,m,per_m_overburden,7.00,Mud or foam rotary through the weathered zone\nDRL2,Drilling,fuel,Fuel and lubricants for hard rock drilling,m,per_m_bedrock,11.00,Down the hole hammer works the compressor much harder than rotary\nDRL3,Drilling,consumables,Bits and hammers and drilling consumables,m,per_m_drilled,6.00,Bit wear share and shanks and oils over the whole drilled depth\nDRL4,Drilling,consumables,Drilling fluid and foam and additives,m,per_m_overburden,3.00,Bentonite or polymer or foam for the unconsolidated section\nCAS1,Casing,consumables,uPVC plain casing supplied and installed,m,per_m_casing,12.00,Production casing including couplings and solvent\nCAS2,Casing,consumables,uPVC screen supplied and installed,m,per_m_screen,20.00,Slotted screen at the design slot size\nCAS3,Casing,consumables,Gravel pack 2-4 mm well sorted silic .90,8.05,8.52\nPort Loko,North West,-13.25,-12.45,8.45,9.25\nKambia,North West,-13.20,-12.40,8.85,9.75\nKarene,North West,-12.85,-11.95,8.90,9.70\nBombali,North,-12.35,-11.70,8.75,9.85\nFalaba,North East,-11.75,-10.55,9.15,10.00\nKoinadugu,North East,-11.95,-10.95,9.00,9.85\nTonkolili,North,-12.35,-11.30,8.35,9.35\nKono,East,-11.35,-10.45,8.25,9.35\nKenema,East,-11.70,-10.80,7.45,8.45\nKailahun,East,-11.05,-10.20,7.50,8.65\nBo,South,-12.15,-11.30,7.45,8.35\nBonthe,South,-12.80,-12.00,6.95,7.85\nMoyamba,South,-12.90,-11.95,7.75,8.65\nPujehun,South,-11.95,-11.05,6.85,7.75\n"}, "groundwater/data/supervision_checklists.csv": {"t": "text", "d": "checklist,section,item,critical,guidance\nprocurement,Prequalification,\"Contractor registered in country with a current drilling licence\",yes,\nprocurement,Prequalification,\"Contractor has completed at least 5 similar projects in the last 3 years, with referees contacted\",no,\nprocurement,Prequalification,\"Contractor owns or has secured the rig, compressor and support equipment the job needs, and key staff CVs are on file\",no,\nprocurement,Prequalification,\"Contractor financial capacity and litigation history reviewed\",no,\nprocurement,Contract,\"Contract uses a bill of quantities and payment is for actual verified quantities, not an estimated lump sum\",yes,\"Lump sum payment hides real costs; BoQ payment keeps the price honest.\"\nprocurement,Contract,\"Dry hole and low yield payment policy clearly defined, with 'dry' defined by a yield threshold\",yes,\"Refusing to pay for dry holes pushes the contractor to inflate successful holes or cut corners.\"\nprocurement,Contract,\"Bill of quantities checked for front loading (mobilisation and siting items priced far above their share of the works)\",no,\"In a documented fraud case mobilisation and geophysics carried 53 percent of the contract value.\"\nprocurement,Contract,\"Performance bond of 5 to 10 percent of the contract value in place before signature\",no,\nprocurement,Supervision,\"Independent supervision arranged and paid for, with the supervisor's transport independent of the driller\",yes,\"A supervisor who depends on the driller for transport or pay is not independent.\"\npre_contract,Equipment,\"Drilling rig inspected: mast raised and rig run for an hour without problems (record year of manufacture, manufacturer and lifting capacity)\",yes,\"Check for oil leaks and have them fixed before giving approval.\"\npre_contract,Equipment,\"Compressor run for an hour without problems (record year and manufacturer)\",yes,\npre_contract,Equipment,\"Mud pump and generator ratings checked against the estimated borehole depths and tested\",no,\npre_contract,Equipment,\"Water tanker checked for leaks\",no,\npre_contract,Equipment,\"Support trucks available and in working order\",no,\npre_contract,Equipment,\"Drill pipes adequate to reach the deepest planned borehole\",yes,\npre_contract,Equipment,\"Drill bits and hammer of the correct diameter and right type for the expected ground, in good condition\",yes,\npre_contract,Equipment,\"Geophysical survey equipment working and the personnel competent in its use\",no,\npre_contract,Personnel,\"Drilling manager and hydrogeologist qualifications and experience recorded and adequate\",no,\npre_contract,Personnel,\"Rig operator, driver, mechanic and rig assistants experienced (record years of experience)\",no,\npre_contract,Personnel,\"Record Taker designated by the driller to remain on site at all times and complete all forms\",yes,\"The Record Taker role should be specified in the contract documents.\"\nsiting,Water users,\"Site convenient to the point of use with equitable access for all water users, especially women and the most disadvantaged\",no,\nsiting,Water users,\"Land ownership and access rights for users and maintenance teams established and confirmed in writing\",yes,\nsiting,Hydrogeology,\"Expected yield, renewable resources and water quality sufficient for the intended purpose\",no,\nsiting,Hydrogeology,\"Interference with other groundwater sources and natural groundwater flows avoided\",no,\nsiting,Hydrogeology,\"Chance of success rated (high, medium or low) and accepted by the client\",no,\nsiting,Contamination,\"No potential pollution source within the minimum separation distances (see the separation distance table)\",yes,\"Pit latrines, burial grounds, refuse dumps, fuel depots, animal pens; where the aquifer is confined the distances can be relaxed.\"\nsiting,Logistics,\"Access allowed and physically possible for the drilling team, equipment and vehicles\",no,\nsiting,Logistics,\"Siting report submitted by the driller and approved by the supervisor\",yes,\nmobilisation,Contract,\"Contract signed and the pre-mobilisation meeting held with design, materials and procedures discussed\",yes,\nmobilisation,Contract,\"Programme of works submitted and approved\",no,\nmobilisation,Community,\"Community briefed: process explained, roles and contributions agreed, contact persons exchanged, driller's representative introduced\",no,\nmobilisation,Equipment,\"Equipment on site matches what was inspected and is in working condition (drill rods adequate, hammer, bit and temporary casing diameters measured)\",yes,\nmobilisation,Materials,\"Material samples approved against the specification: drilling fluid, casing and screen (length, diameter and wall thickness measured), filter pack and gravel\",yes,\"Nominal 3 m casing lengths are often actually 2.95 m; measure mid pipe, not at the threaded end.\"\nmobilisation,Records,\"Data collection forms agreed (RWSN Code of Practice Annex E formats)\",no,\nmobilisation,Records,\"Project filing system set up: a duplicate hard copy file per site with the checklists printed inside the folder flap\",no,\nmobilisation,Camp,\"Drill camp layout approved: inflammables away from heat, contaminants away from water and cooking areas, PVC casing and screens shaded from direct sunlight\",no,\ndrilling,Safety,\"Health and safety in place: rig away from traffic and power lines, not on a steep slope, public barrier tape up, crew wearing PPE, inflammables stored in marked containers, mast never raised in a thunderstorm, first aid kit and emergency procedure ready\",yes,\ndrilling,Set up,\"Rig positioned exactly over the pegged site, mast vertical (checked with a spirit level) and the ground stable\",no,\"A dry hole must not be attributable to drilling off location.\"\ndrilling,Records,\"Depth measured with marked drill pipes and logged every metre\",yes,\"Chalk marks at 1 m intervals numbered from zero; re-mark all pipes if the hammer is changed.\"\ndrilling,Records,\"Penetration rate recorded every metre\",no,\ndrilling,Fluids,\"Drilling fluid type recorded and viscosity checked with a Marsh funnel; biodegradable polymer used instead of bentonite where required\",no,\ndrilling,Fluids,\"Circulation pits hold at least three times the borehole volume and are kept clean (mud drilling)\",no,\ndrilling,Samples,\"Cutting samples taken at the agreed interval (1 m default), washed as appropriate, bagged, labelled, photographed and stored in a sample box\",yes,\"Do not wash soft rocks such as clays; reduce the interval to 0.5 m where the lithology changes rapidly.\"\ndrilling,Samples,\"Strata log prepared from the samples\",no,\ndrilling,Water,\"Water strikes recorded (depth and time) and airlift yield measured with a V plate or a timed bucket\",no,\"A handpump needs about 0.3 litres per second.\"\ndrilling,Decision,\"Final drilling depth instructed by the supervisor, not decided by the driller\",yes,\"For a handpump well with good yield: at least 5 m into the aquifer plus a 3 to 6 m sump below the screen.\"\ndrilling,Records,\"Daily drilling log signed by the rig operator and the supervisor at the end of every day\",yes,\ndesign,Preparation,\"Casing and screen assemblage sketched, laid out on the ground, measured piece by piece, totalled against the sketch and photographed before installation\",yes,\ndesign,Materials,\"Casing and screens new and to specification, with diameter and wall thickness checked with callipers mid pipe\",no,\ndesign,Installation,\"Joints clean and watertight; solvent cement setting time observed before lowering\",no,\ndesign,Installation,\"Installed casing and screen depth reconciled with the drilled depth; any discrepancy over 3 m resolved by removing, cleaning and reinstalling\",yes,\ndesign,Screens,\"Screens placed against the aquifer horizon with a slot size that retains the formation\",yes,\"Quick check: rub an aquifer sand sample against the screen; fines should pass and coarse grains be retained.\"\ndesign,Screens,\"Screen open area sufficient for the design yield (open area of at least Q/30 square metres keeps the entrance velocity below 0.03 m/s)\",no,\ndesign,Annulus,\"Gravel pack placed as designed and free of mica, clay and laterite\",yes,\"For fine formations the pack to aquifer D50 ratio should be between 4 and 6.\"\ndesign,Annulus,\"Backfill placed to 6 m below ground and the sanitary seal in the top 6 m (cement slurry at 25 litres of water per 50 kg bag, or bentonite)\",yes,\ndevelopment,Development,\"Development continued until the water runs clear and sand free, checked by letting samples settle in a clear container\",yes,\"Some holes clear in hours, some take days; months of pumping to clear indicates the wrong technique was used.\"\ndevelopment,Testing,\"Pumping test carried out to specification with rate and water level measured simultaneously against time\",yes,\"Constant discharge test always; at least a 4 step test for motorised wells; 3 to 6 hours is adequate for a handpump.\"\ndevelopment,Acceptance,\"Sand content at the end of the test no more than 0.2 cubic centimetres in each of three 20 litre samples (10 ppm by volume)\",yes,\ndevelopment,Acceptance,\"Turbidity within the stipulated limit\",no,\"Where excessive turbidity is an aquifer characteristic it is beyond the driller's control.\"\ndevelopment,Acceptance,\"Plumb test passed: the plumb moves freely and deviation does not exceed two thirds of the casing inner diameter per 30 m of depth\",yes,\ndevelopment,Quality,\"Water sampled correctly (1 litre bottle rinsed and labelled; pH, conductivity, iron and bacteriology tested at or near the site) and sent to an approved laboratory\",yes,\ndevelopment,Quality,\"Borehole disinfected with chlorine at 20 mg per litre (1 litre of 0.2 percent solution per 100 litres of well volume) and left for at least 4 hours\",yes,\ndevelopment,Platform,\"Platform cast correctly: shuttering anchored, 1:2:4 mix, 1:50 drainage slope, surface trowelled smooth, borehole number and completion data embedded, kept moist for 72 hours\",no,\ndevelopment,Decision,\"Final decision recorded: borehole successful or abortive\",yes,\ndemobilisation,Completion,\"All installation work complete and approved by the supervisor\",no,\ndemobilisation,Completion,\"All testing complete and the documentation and data handed to the supervisor\",yes,\ndemobilisation,Site,\"Site cleared: waste removed responsibly, circulation pits backfilled and compacted, barrier tape removed, site restored to its former state\",no,\ndemobilisation,Site,\"Unused materials handled according to the contract and the borehole securely capped\",no,\ndemobilisation,Certificate,\"Work completion certificate issued by the supervisor\",yes,\nhandover,Reporting,\"Drilling report completed with copies to the client, the community and the government regulator\",yes,\"Data from dry or aborted holes must also be reported.\"\nhandover,Handover,\"Handover date agreed and the certificate signed by the supervisor, the driller and a community representative\",yes,\nhandover,Follow up,\"Defect liability monitoring schedule agreed and site visits planned\",no,\nhandover,Follow up,\"Problems found during the defect liability period reported to the client and repairs mobilised according to the contract\",no,\nhandover,Payment,\"Supervision invoice submitted and final payment to the driller approved at the end of the defect liability period\",no,\npost_construction,Water safety,\"Groundwater pH tested before handpump installation; corrosion resistant riser pipes and rods (stainless steel 304/316 or uPVC) used where pH is below 6.5\",yes,\"Galvanised iron risers can fail within 3 months to 2 years in corrosive water and shed iron and heavy metals into the supply.\"\npost_construction,Water safety,\"Sanitary inspection of the completed water point carried out (WHO sanitary inspection format)\",no,\npost_construction,Monitoring,\"Water users have a way to report technical problems during the first one to two years\",no,\npost_construction,Monitoring,\"Third party inspection of the works arranged within 6 months of construction\",no,\"Independent inspection with follow up action is the strongest incentive for construction quality.\"\npost_construction,Monitoring,\"Post construction monitoring visit one to two years after construction, including a repeat water quality test\",no,\"A failure within the first one to two years usually points to a design, construction or installation defect.\"\npost_construction,Records,\"Drilling log, pumping test and water quality records submitted to the authority for successful and unsuccessful boreholes, and the water quality results shared with the community\",yes,\n"}, "groundwater/data/who_guidelines.csv": {"t": "text", "d": "parameter,unit,who_health_gv,who_aesthetic,sl_standard,category,note\npH,pH units,,6.5-8.5,6.5-8.5,physical,No health based guideline; operational range for corrosion control and disinfection\nTurbidity,NTU,,5,5,physical,Acceptability; should ideally be below 1 NTU where disinfection is practised\nTemperature,deg C,,,,physical,No guideline value\nElectrical conductivity,uS/cm,,,2500,physical,No WHO guideline; national limit adopted from regional practice\nTDS,mg/L,,1000,1000,physical,Palatability deteriorates above about 1000 mg/L\nTotal hardness,mg/L as CaCO3,,500,500,physical,No health based guideline; consumer acceptability\nAlkalinity,mg/L as CaCO3,,,,physical,No guideline value\nCalcium,mg/L,,,,major ion,No guideline value\nMagnesium,mg/L,,,,major ion,No guideline value\nSodium,mg/L,,200,200,major ion,Taste threshold\nPotassium,mg/L,,,,major ion,No guideline value; occurs at low levels in natural water\nBicarbonate,mg/L,,,,major ion,No guideline value\nChloride,mg/L,,250,250,major ion,Taste threshold\nSulfate,mg/L,,250,250,major ion,Taste threshold; WHO notes health concern above 500 mg/L\nNitrate (as NO3),mg/L,50,,50,inorganic,Short term exposure guideline protecting bottle fed infants\nNitrite (as NO2),mg/L,3,,3,inorganic,Short term exposure guideline\nAmmonia (as N),mg/L,,1.5,1.5,inorganic,Odour threshold; indicator of possible pollution\nFluoride,mg/L,1.5,,1.5,inorganic,Health based guideline\nIron,mg/L,,0.3,0.3,metal,No health based guideline at levels in drinking water; staining and taste above 0.3 mg/L\nManganese,mg/L,0.08,0.1,0.08,metal,Provisional health based guideline (2021); staining above about 0.1 mg/L\nArsenic,mg/L,0.01,,0.01,metal,Provisional health based guideline\nLead,mg/L,0.01,,0.01,metal,Provisional health based guideline\nCopper,mg/L,2,1,2,metal,Health based guideline; staining of laundry above about 1 mg/L\nZinc,mg/L,,3,3,metal,Taste threshold\nChromium (total),mg/L,0.05,,0.05,metal,Provisional health based guideline\nCadmium,mg/L,0.003,,0.003,metal,Health based guideline\nNickel,mg/L,0.07,,0.07,metal,Health based guideline\nMercury,mg/L,0.006,,0.006,metal,Inorganic mercury health based guideline\nAluminium,mg/L,0.9,0.2,0.2,metal,Health based value 0.9 mg/L; practicable acceptability 0.1 to 0.2 mg/L\nSelenium,mg/L,0.04,,0.04,metal,Provisional health based guideline\nBarium,mg/L,1.3,,1.3,metal,Health based guideline\nBoron,mg/L,2.4,,2.4,metal,Health based guideline\nUranium,mg/L,0.03,,0.03,metal,Provisional health based guideline\nAntimony,mg/L,0.02,,0.02,metal,Health based guideline\nE. coli,CFU/100 mL,0,,0,microbiological,Must not be detectable in any 100 mL sample\nTotal coliforms,CFU/100 mL,,0,0,microbiological,Indicator of treatment effectiveness and integrity; national limit 0\n"}, "groundwater/design/__init__.py": {"t": "text", "d": "\"\"\"Borehole design: construction plan generation and schematic drawing.\"\"\"\n\nfrom .designer import BoreholeDesign, CasingSegment, design_borehole\nfrom .drawing import draw_borehole_design\n\n__all__ = [\"BoreholeDesign\", \"CasingSegment\", \"design_borehole\", \"draw_borehole_design\"]\n"}, "groundwater/design/designer.py": {"t": "text", "d": "\"\"\"Generate a borehole construction design from the available data.\n\nInputs are whatever exists at design time: the drilling log (lithology\nintervals, water strikes, total depth), the VES interpretation (water\nzones, recommended depth) when the hole is still to be drilled, the\nstatic water level and the pumping test results when available.\n\nThe rules follow common Sierra Leone practice and RWSN professional\ndrilling guidance and live in :class:`~groundwater.config.DesignRules`\nso they can be adjusted per client without touching code:\n\n* plain casing from surface, screens set against the aquifer zones,\n* screens kept below static water level by a configurable margin,\n* a sump of plain casing below the lowest screen,\n* gravel pack from the bottom to a margin above the top screen,\n* backfill above the gravel pack up to the sanitary seal,\n* cement sanitary seal from surface,\n* casing stick-up above ground.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport math\nfrom dataclasses import dataclass, field\n\nfrom ..config import DesignRules\nfrom ..models import DataFlag, DrillingLog\nfrom ..ves.interpret import SiteInterpretation\n\n\n@dataclass\nclass CasingSegment:\n    top_m: float\n    bottom_m: float\n    kind: str  # \"plain\" | \"screen\" | \"sump\"\n\n    @property\n    def length_m(self) -> float:\n        return self.bottom_m - self.top_m\n\n\n@dataclass\nclass BoreholeDesign:\n    total_depth_m: float\n    borehole_diameter_in: float\n    casing_diameter_in: float\n    casing_material: str\n    segments: list[CasingSegment]\n    gravel_pack: tuple[float, float]\n    backfill: tuple[float, float]\n    sanitary_seal: tuple[float, float]\n    stickup_m: float\n    screen_slot_mm: float\n    water_strikes_m: list[float] = field(default_factory=list)\n    static_water_level_m: float | None = None\n    pump_intake_m: float | None = None\n    design_basis: list[str] = field(default_factory=list)\n    flags: list[DataFlag] = field(default_factory=list)\n\n    @property\n    def screens(self) -> list[CasingSegment]:\n        return [s for s in self.segments if s.kind == \"screen\"]\n\n    @property\n    def total_screen_length_m(self) -> float:\n        return sum(s.length_m for s in self.screens)\n\n    def summary_rows(self) -> list[tuple[str, str]]:\n        rows = [\n            (\"Total depth\", f\"{self.total_depth_m:.0f} m\"),\n            (\"Drilled diameter\", f'{self.borehole_diameter_in:g}\"'),\n            (\n                \"Casing\",\n                f'{self.casing_diameter_in:g}\" {self.casing_material}, stick-up '\n                f\"{self.stickup_m:.1f} m\",\n            ),\n            (\n                \"Screens\",\n                \"; \".join(f\"{s.top_m:.0f}-{s.bottom_m:.0f} m\" for s in self.screens)\n                + f\" (slot {self.screen_slot_mm:g} mm)\",\n            ),\n            (\"Gravel pack\", f\"{self.gravel_pack[0]:.0f}-{self.gravel_pack[1]:.0f} m\"),\n            (\"Backfill\", f\"{self.backfill[0]:.0f}-{self.backfill[1]:.0f} m\"),\n            (\n                \"Sanitary seal\",\n                f\"{self.sanitary_seal[0]:.0f}-{self.sanitary_seal[1]:.0f} m cement grout\",\n            ),\n        ]\n        if self.static_water_level_m is not None:\n            rows.append((\"Static water level\", f\"{self.static_water_level_m:.2f} m\"))\n        if self.water_strikes_m:\n            rows.append(\n                (\"Water strikes\", \", \".join(f\"{w:g} m\" for w in self.water_strikes_m))\n            )\n        if self.pump_intake_m is not None:\n            rows.append((\"Recommended pump intake\", f\"{self.pump_intake_m:.0f} m\"))\n        return rows\n\n\ndef _target_zones(\n    log: DrillingLog | None,\n    interpretation: SiteInterpretation | None,\n    swl: float | None,\n    total_depth: float,\n    rules: DesignRules,\n) -> tuple[list[tuple[float, float]], list[str]]:\n    \"\"\"Candidate aquifer intervals from strikes, lithology and VES.\"\"\"\n    basis = []\n    zones: list[tuple[float, float]] = []\n    if log is not None and log.water_strikes_m:\n        for strike in log.water_strikes_m:\n            zones.append((max(strike - 1.0, 0.0), strike + 5.0))\n        basis.append(\n            \"screens positioned against the water strikes recorded in the \"\n            \"drilling log (\" + \", \".join(f\"{w:g} m\" for w in log.water_strikes_m) + \")\"\n        )\n    if log is not None:\n        for interval in log.intervals:\n            text = interval.description.lower()\n            if any(word in text for word in (\"fracture\", \"fractured\", \"water\")):\n                zones.append((interval.top_m, interval.bottom_m))\n    if not zones and interpretation is not None and interpretation.water_zones:\n        zones = [(t, b) for t, b in interpretation.water_zones]\n        basis.append(\n            \"screens positioned against the low resistivity zones of the VES \"\n            \"interpretation (\"\n            + \", \".join(f\"{int(t)}-{int(b)} m\" for t, b in interpretation.water_zones)\n            + \")\"\n        )\n    # clip to the hole, keep below the static level margin, round to 0.5 m\n    floor = (swl or 0.0) + rules.min_screen_below_swl_m\n    clipped = []\n    for top, bottom in zones:\n        top = math.ceil(max(top, floor) * 2.0) / 2.0\n        bottom = math.floor(min(bottom, total_depth - rules.sump_length_m) * 2.0) / 2.0\n        if bottom - top >= 1.0:\n            clipped.append((top, bottom))\n    clipped.sort()\n    merged: list[tuple[float, float]] = []\n    for zone in clipped:\n        if merged and zone[0] <= merged[-1][1] + 1.0:\n            merged[-1] = (merged[-1][0], max(merged[-1][1], zone[1]))\n        else:\n            merged.append(zone)\n    return merged, basis\n\n\ndef design_borehole(\n    log: DrillingLog | None = None,\n    interpretation: SiteInterpretation | None = None,\n    static_water_level_m: float | None = None,\n    pump_intake_m: float | None = None,\n    rules: DesignRules | None = None,\n    total_depth_m: float | None = None,\n) -> BoreholeDesign:\n    \"\"\"Produce a construction design from the drilling log and/or VES model.\"\"\"\n    rules = rules or DesignRules()\n    flags: list[DataFlag] = []\n\n    if total_depth_m is None:\n        if log is not None and log.total_depth_m:\n            total_depth_m = float(log.total_depth_m)\n        elif interpretation is not None:\n            total_depth_m = float(interpretation.max_drilling_depth_m)\n        else:\n            raise ValueError(\"total depth is needed (drilling log or VES interpretation)\")\n\n    swl = static_water_level_m\n    zones, basis = _target_zones(log, interpretation, swl, total_depth_m, rules)\n\n    # screens: cover the zones, at least the default screen length overall\n    screens: list[tuple[float, float]] = []\n    for top, bottom in zones:\n        screens.append((top, bottom))\n    if not screens:\n        # fall back: screen the bottom third of the hole below the SWL margin\n        floor = (swl or 0.0) + rules.min_screen_below_swl_m\n        top = max(total_depth_m * 2.0 / 3.0, floor)\n        bottom = total_depth_m - rules.sump_length_m\n        if bottom - top < 3.0:\n            top = max(bottom - rules.screen_length_default_m, floor)\n        screens = [(top, bottom)]\n        basis.append(\n            \"no aquifer intervals identified from the data; screens default to \"\n            \"the lower third of the hole\"\n        )\n        flags.append(\n            DataFlag(\n                \"warning\",\n                \"default_screens\",\n                \"Screen placement fell back to the lower third of the hole; \"\n                \"review against the drilling observations.\",\n            )\n        )\n\n    # trim overall screen length to a sensible share of the hole\n    total_screen = sum(b - t for t, b in screens)\n    if total_screen > 0.6 * total_depth_m:\n        # keep the deepest sections, which sit in the main fractured zone\n        keep: list[tuple[float, float]] = []\n        budget = 0.6 * total_depth_m\n        for top, bottom in reversed(screens):\n            length = bottom - top\n            if budget <= 0:\n                break\n            if length > budget:\n                top = bottom - budget\n                length = budget\n            keep.append((top, bottom))\n            budget -= length\n        screens = sorted(keep)\n        flags.append(\n            DataFlag(\n                \"info\",\n                \"screen_trimmed\",\n                \"Total screen length was trimmed to 60 percent of the hole, \"\n                \"keeping the deepest aquifer sections.\",\n            )\n        )\n\n    # assemble the casing string from surface down\n    segments: list[CasingSegment] = []\n    cursor = 0.0\n    sump_top = total_depth_m - rules.sump_length_m\n    for top, bottom in screens:\n        if top > cursor:\n            segments.append(CasingSegment(cursor, top, \"plain\"))\n        segments.append(CasingSegment(top, bottom, \"screen\"))\n        cursor = bottom\n    if cursor < sump_top:\n        segments.append(CasingSegment(cursor, sump_top, \"plain\"))\n    segments.append(CasingSegment(sump_top, total_depth_m, \"sump\"))\n\n    top_screen = screens[0][0]\n    gravel_top = max(top_screen - rules.gravel_pack_above_top_screen_m, rules.sanitary_seal_depth_m)\n    gravel = (gravel_top, total_depth_m)\n    seal = (0.0, rules.sanitary_seal_depth_m)\n    backfill = (rules.sanitary_seal_depth_m, gravel_top)\n\n    basis.extend(\n        [\n            f\"{rules.casing_diameter_in:g} inch {rules.casing_material} casing in a \"\n            f\"{rules.borehole_diameter_in:g} inch hole\",\n            f\"gravel pack ({rules.gravel_pack_material}) from {gravel[0]:.0f} m to \"\n            f\"the bottom, {rules.gravel_pack_above_top_screen_m:g} m above the top screen\",\n            f\"cement sanitary seal from surface to {rules.sanitary_seal_depth_m:g} m \"\n            \"with \" + rules.apron_note,\n            f\"screens kept at least {rules.min_screen_below_swl_m:g} m below the \"\n            \"static water level\",\n        ]\n    )\n\n    if swl is not None and top_screen < swl:\n        flags.append(\n            DataFlag(\n                \"warning\",\n                \"screen_above_swl\",\n                \"The top screen is above the static water level; check the design.\",\n            )\n        )\n\n    return BoreholeDesign(\n        total_depth_m=total_depth_m,\n        borehole_diameter_in=rules.borehole_diameter_in,\n        casing_diameter_in=rules.casing_diameter_in,\n        casing_material=rules.casing_material,\n        segments=segments,\n        gravel_pack=gravel,\n        backfill=backfill,\n        sanitary_seal=seal,\n        stickup_m=rules.stickup_m,\n        screen_slot_mm=rules.screen_slot_mm,\n        water_strikes_m=list(log.water_strikes_m) if log else [],\n        static_water_level_m=swl,\n        pump_intake_m=pump_intake_m,\n        design_basis=basis,\n        flags=flags,\n    )\n"}, "groundwater/design/drawing.py": {"t": "text", "d": "\"\"\"To-scale borehole design schematic.\n\nDraws the lithology column beside the construction column with a\nshared depth axis, in the layout of the contractor borehole record\nsheets: header block, formation profile on the left, borehole diagram\nwith annotated construction elements on the right, water strikes and\nstatic water level marked, and a legend.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nimport matplotlib.pyplot as plt\nimport numpy as np\nfrom matplotlib.patches import Rectangle\n\nfrom ..config import HouseStyle\nfrom ..models import DrillingLog\nfrom ..plotting import figure_context, save_figure\nfrom .designer import BoreholeDesign\n\n# lithology keyword -> (colour, hatch)\n_LITHO_STYLES = [\n    ((\"topsoil\", \"lateritic topsoil\"), (\"#8B5A2B\", \"\")),\n    ((\"laterite\", \"clayey laterites\"), (\"#C4703E\", \"\")),\n    ((\"clay\",), (\"#B8860B\", \"--\")),\n    ((\"saprolite\", \"weathered granite fragments\"), (\"#D2B48C\", \"..\")),\n    ((\"sand\", \"gravel\"), (\"#E8D8A0\", \"..\")),\n    ((\"fracture\", \"fractured\"), (\"#9FB6CD\", \"xx\")),\n    ((\"granite\", \"gneiss\", \"basement\", \"bedrock\", \"rock\"), (\"#A9A9A9\", \"++\")),\n]\n_DEFAULT_LITHO = (\"#CCCCCC\", \"\")\n\n\ndef _litho_style(description: str) -> tuple[str, str]:\n    text = description.lower()\n    for keywords, style in _LITHO_STYLES:\n        if any(k in text for k in keywords):\n            return style\n    return _DEFAULT_LITHO\n\n\ndef draw_borehole_design(\n    design: BoreholeDesign,\n    log: DrillingLog | None = None,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n    title: str | None = None,\n    header_pairs: list[tuple[str, str]] | None = None,\n):\n    \"\"\"Draw the design; returns the saved path (or the figure).\"\"\"\n    style = style or HouseStyle()\n    depth = design.total_depth_m\n    stick = design.stickup_m\n    y_top = -stick - 1.2  # air above ground\n\n    with figure_context(style):\n        fig, (ax_l, ax_c) = plt.subplots(\n            1, 2, figsize=(style.figure_width_in, 8.2), sharey=True,\n            width_ratios=[1.0, 1.35],\n        )\n        for ax in (ax_l, ax_c):\n            ax.set_ylim(depth + depth * 0.04, y_top)\n            ax.grid(False)\n\n        # ------------------------------------------------------------------\n        # left: lithology column\n        # ------------------------------------------------------------------\n        ax_l.set_xlim(0, 1)\n        ax_l.set_xticks([])\n        ax_l.set_ylabel(\"Depth (m)\")\n        ax_l.set_title(\"Formation / profile\", fontsize=10)\n        if log is not None and log.intervals:\n            for interval in log.intervals:\n                color, hatch = _litho_style(interval.description)\n                ax_l.add_patch(\n                    Rectangle(\n                        (0.08, interval.top_m), 0.36, interval.thickness_m,\n                        facecolor=color, hatch=hatch, edgecolor=\"#555555\", lw=0.6,\n                    )\n                )\n                ax_l.text(\n                    0.50, (interval.top_m + interval.bottom_m) / 2,\n                    interval.description, fontsize=6.5, va=\"center\", wrap=True,\n                )\n        else:\n            ax_l.text(0.5, depth / 2, \"no drilling log\", ha=\"center\", fontsize=9,\n                      color=\"#888888\")\n        ax_l.axhline(0, color=\"#333333\", lw=1.2)\n        ax_l.text(0.02, -0.6, \"GL\", fontsize=7, color=\"#333333\")\n\n        # ------------------------------------------------------------------\n        # right: construction column\n        # ------------------------------------------------------------------\n        ax_c.set_xlim(0, 1)\n        ax_c.set_xticks([])\n        ax_c.set_title(\n            f'Borehole diagram ({design.borehole_diameter_in:g}\" hole, '\n            f'{design.casing_diameter_in:g}\" {design.casing_material})',\n            fontsize=10,\n        )\n        x_hole, w_hole = 0.30, 0.26\n        x_case = x_hole + w_hole / 2 - 0.055\n        w_case = 0.11\n\n        # annulus fills\n        seal_top, seal_bot = design.sanitary_seal\n        back_top, back_bot = design.backfill\n        grav_top, grav_bot = design.gravel_pack\n        for (top, bot), (color, hatch, label) in (\n            ((seal_top, seal_bot), (\"#B0B0B0\", \"//\", \"cement sanitary seal\")),\n            ((back_top, back_bot), (\"#E0D5C0\", \"\", \"backfill\")),\n            ((grav_top, grav_bot), (\"#F0E3B2\", \"..\", \"gravel pack\")),\n        ):\n            ax_c.add_patch(\n                Rectangle((x_hole, top), w_hole, bot - top, facecolor=color,\n                          hatch=hatch, edgecolor=\"#777777\", lw=0.5)\n            )\n        # borehole wall\n        ax_c.plot([x_hole, x_hole], [0, depth], color=\"#333333\", lw=1.4)\n        ax_c.plot([x_hole + w_hole, x_hole + w_hole], [0, depth], color=\"#333333\", lw=1.4)\n        ax_c.plot([x_hole, x_hole + w_hole], [depth, depth], color=\"#333333\", lw=1.6)\n\n        # casing string\n        for segment in design.segments:\n            if segment.kind == \"screen\":\n                face, hatch = \"white\", \"---\"\n                edge = style.accent_color\n            elif segment.kind == \"sump\":\n                face, hatch = \"#D8D8D8\", \"\"\n                edge = \"#333333\"\n            else:\n                face, hatch = \"white\", \"\"\n                edge = \"#333333\"\n            ax_c.add_patch(\n                Rectangle((x_case, segment.top_m), w_case,\n                          segment.bottom_m - segment.top_m,\n                          facecolor=face, hatch=hatch, edgecolor=edge, lw=1.0,\n                          zorder=5)\n            )\n        # stick-up and cap\n        ax_c.add_patch(\n            Rectangle((x_case, -stick), w_case, stick, facecolor=\"white\",\n                      edgecolor=\"#333333\", lw=1.0, zorder=5)\n        )\n        ax_c.plot([x_case - 0.02, x_case + w_case + 0.02], [-stick, -stick],\n                  color=\"#333333\", lw=2.0, zorder=6)\n        # bottom plug\n        ax_c.add_patch(\n            Rectangle((x_case, depth - 0.6), w_case, 0.6, facecolor=\"#555555\",\n                      edgecolor=\"#333333\", zorder=6)\n        )\n        # ground line\n        ax_c.axhline(0, color=\"#333333\", lw=1.2)\n\n        # water level and strikes\n        if design.static_water_level_m is not None:\n            swl = design.static_water_level_m\n            ax_c.plot([x_case + w_case / 2], [swl], marker=\"v\", ms=8,\n                      color=style.accent_color, zorder=7)\n            ax_c.annotate(f\"SWL {swl:.2f} m\", xy=(x_case + w_case + 0.03, swl),\n                          fontsize=7.5, va=\"center\", color=style.accent_color)\n        for strike in design.water_strikes_m:\n            ax_c.annotate(\n                \"\", xy=(x_hole, strike), xytext=(x_hole - 0.09, strike),\n                arrowprops=dict(arrowstyle=\"->\", color=\"#2A6EBB\", lw=1.4),\n            )\n            ax_c.text(x_hole - 0.10, strike, f\"{strike:g} m\", fontsize=7,\n                      ha=\"right\", va=\"center\", color=\"#2A6EBB\")\n        if design.pump_intake_m is not None:\n            y = design.pump_intake_m\n            ax_c.add_patch(Rectangle((x_case + 0.015, y - 1.2), w_case - 0.03, 1.2,\n                                     facecolor=style.secondary_color, zorder=8))\n            ax_c.annotate(f\"pump intake {y:.0f} m\",\n                          xy=(x_case + w_case + 0.03, y - 0.6), fontsize=7.5,\n                          va=\"center\", color=style.secondary_color)\n\n        # right-hand annotations with depths\n        screens = design.screens\n        annos = [\n            (seal_bot / 2 if seal_bot else 1.5,\n             f\"sanitary seal 0-{seal_bot:g} m\"),\n            ((back_top + back_bot) / 2, f\"backfill {back_top:g}-{back_bot:g} m\"),\n            ((grav_top + min(grav_bot, depth)) / 2,\n             f\"gravel pack {grav_top:g}-{grav_bot:g} m\"),\n        ]\n        for s in screens:\n            annos.append(((s.top_m + s.bottom_m) / 2,\n                          f\"screen {s.top_m:g}-{s.bottom_m:g} m\"))\n        sump = [s for s in design.segments if s.kind == \"sump\"]\n        if sump:\n            annos.append(((sump[0].top_m + sump[0].bottom_m) / 2,\n                          f\"sump {sump[0].top_m:g}-{sump[0].bottom_m:g} m\"))\n        annos.append((depth - 0.3, \"bottom plug\"))\n        x_text = x_hole + w_hole + 0.05\n        used: list[float] = []\n        for y, text in sorted(annos):\n            # avoid overlapping labels\n            min_gap = depth / 28.0\n            while any(abs(y - u) < min_gap for u in used):\n                y += min_gap\n            used.append(y)\n            ax_c.annotate(text, xy=(x_hole + w_hole, min(y, depth)),\n                          xytext=(x_text, y), fontsize=7.0, va=\"center\",\n                          arrowprops=dict(arrowstyle=\"-\", color=\"#999999\", lw=0.7))\n\n        # scale ticks every 5 m on both axes\n        ticks = np.arange(0, depth + 1, 5)\n        for ax in (ax_l, ax_c):\n            ax.set_yticks(ticks)\n\n        # ------------------------------------------------------------------\n        # title and header block\n        # ------------------------------------------------------------------\n        fig.suptitle(title or \"Borehole design\", fontsize=12, fontweight=\"bold\",\n                     color=style.accent_color)\n        if header_pairs:\n            header_text = \"    \".join(f\"{k}: {v}\" for k, v in header_pairs)\n            fig.text(0.5, 0.945, header_text, ha=\"center\", fontsize=8,\n                     color=\"#444444\")\n        fig.tight_layout(rect=(0, 0, 1, 0.94))\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n"}, "groundwater/extraction/__init__.py": {"t": "text", "d": "\"\"\"Scanned field sheet extraction workflow.\n\nTurns scanned field sheets and PDFs into the standard data templates\nwith low-confidence values flagged for manual review.\n\nTwo extraction paths share one output structure\n(:class:`~groundwater.extraction.models.ExtractedDocument`):\n\n* :func:`extract_pdf_text` - rule based, for PDFs with a text layer\n  (no API key needed).\n* :class:`ClaudeExtractor` - AI assisted, for photos and scans\n  (requires ``pip install groundwater-toolkit[ai]`` and an Anthropic\n  API key).\n\nBoth feed :func:`write_review_workbook`, which produces an Excel\nreview file with uncertain cells highlighted, and (for recognised\ndocument kinds) a filled standard template ready for the parsers.\n\"\"\"\n\nfrom .models import ExtractedDocument, ExtractedField, ExtractedTable, UncertainCell\nfrom .pdf_text import extract_pdf_text\nfrom .review import write_review_workbook, fill_ves_template\n\n__all__ = [\n    \"ExtractedDocument\",\n    \"ExtractedField\",\n    \"ExtractedTable\",\n    \"UncertainCell\",\n    \"extract_pdf_text\",\n    \"write_review_workbook\",\n    \"fill_ves_template\",\n    \"ClaudeExtractor\",\n]\n\n\ndef __getattr__(name):\n    if name == \"ClaudeExtractor\":\n        from .claude import ClaudeExtractor\n\n        return ClaudeExtractor\n    raise AttributeError(name)\n"}, "groundwater/extraction/claude.py": {"t": "text", "d": "\"\"\"AI assisted extraction of scanned field sheets with Claude.\n\nSends the scan (image or PDF) to the Claude API and gets back the\nheader fields and data tables as structured JSON with a confidence per\nvalue, which feeds the same review workflow as the rule based path.\n\nRequires the optional dependency (``pip install\ngroundwater-toolkit[ai]``) and an Anthropic API key (the SDK reads\n``ANTHROPIC_API_KEY`` from the environment).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport base64\nimport json\nimport mimetypes\nfrom pathlib import Path\n\nfrom .models import (\n    ExtractedDocument,\n    ExtractedField,\n    ExtractedTable,\n    UncertainCell,\n)\n\n_MODEL = \"claude-opus-4-8\"\n\n_SCHEMA = {\n    \"type\": \"object\",\n    \"properties\": {\n        \"document_kind\": {\n            \"type\": \"string\",\n            \"enum\": [\"ves\", \"pumping_test\", \"drilling_log\", \"water_quality\", \"unknown\"],\n        },\n        \"header\": {\n            \"type\": \"array\",\n            \"items\": {\n                \"type\": \"object\",\n                \"properties\": {\n                    \"name\": {\"type\": \"string\"},\n                    \"value\": {\"type\": \"string\"},\n                    \"confidence\": {\n                        \"type\": \"number\",\n                        \"description\": \"0 to 1; below 0.85 means needs manual review\",\n                    },\n                },\n                \"required\": [\"name\", \"value\", \"confidence\"],\n                \"additionalProperties\": False,\n            },\n        },\n        \"tables\": {\n            \"type\": \"array\",\n            \"items\": {\n                \"type\": \"object\",\n                \"properties\": {\n                    \"title\": {\"type\": \"string\"},\n                    \"columns\": {\"type\": \"array\", \"items\": {\"type\": \"string\"}},\n                    \"rows\": {\n                        \"type\": \"array\",\n                        \"items\": {\"type\": \"array\", \"items\": {\"type\": \"string\"}},\n                    },\n                },\n                \"required\": [\"title\", \"columns\", \"rows\"],\n                \"additionalProperties\": False,\n            },\n        },\n        \"uncertain_cells\": {\n            \"type\": \"array\",\n            \"items\": {\n                \"type\": \"object\",\n                \"properties\": {\n                    \"table_index\": {\"type\": \"integer\"},\n                    \"row\": {\"type\": \"integer\"},\n                    \"column\": {\"type\": \"integer\"},\n                    \"reason\": {\"type\": \"string\"},\n                },\n                \"required\": [\"table_index\", \"row\", \"column\", \"reason\"],\n                \"additionalProperties\": False,\n            },\n        },\n        \"notes\": {\"type\": \"string\"},\n    },\n    \"required\": [\"document_kind\", \"header\", \"tables\", \"uncertain_cells\", \"notes\"],\n    \"additionalProperties\": False,\n}\n\n_PROMPT = \"\"\"You are transcribing a groundwater field data sheet from Sierra Leone\n(vertical electrical sounding, pumping test, drilling log or water quality\nlaboratory sheet).\n\nExtract:\n1. document_kind: which sheet type this is.\n2. header: every label/value pair from the header block (community, client,\n   district, date, borehole reference, static water level, GPS coordinates,\n   elevation, supervisor and so on). Use the label wording from the sheet.\n3. tables: every data table, with its column headings and every row, in\n   order. Transcribe numbers exactly as written, including leading zeros\n   (for example 078.7). Do not invent values for illegible cells; write an\n   empty string and flag the cell.\n4. uncertain_cells: every table cell you are not fully certain about\n   (handwriting hard to read, smudges, ambiguous digits), with a short\n   reason. Indices are zero based; row counts data rows only.\n5. Give each header field a confidence between 0 and 1. Use values below\n   0.85 whenever a reasonable person could read the handwriting differently.\n\nAccuracy matters more than completeness: flag anything doubtful rather than\nguessing silently.\"\"\"\n\n\nclass ClaudeExtractor:\n    \"\"\"Extract field sheet content from scans using the Claude API.\"\"\"\n\n    def __init__(self, model: str = _MODEL, api_key: str | None = None):\n        try:\n            import anthropic\n        except ImportError as exc:\n            raise ImportError(\n                \"AI extraction needs the anthropic SDK; install with \"\n                \"'pip install groundwater-toolkit[ai]'\"\n            ) from exc\n        self._anthropic = anthropic\n        self.model = model\n        self.client = (\n            anthropic.Anthropic(api_key=api_key) if api_key else anthropic.Anthropic()\n        )\n\n    # ------------------------------------------------------------------\n\n    def extract(self, path: str | Path) -> ExtractedDocument:\n        \"\"\"Extract a scanned sheet (PNG, JPEG, WebP, GIF or PDF).\"\"\"\n        path = Path(path)\n        media_type = mimetypes.guess_type(path.name)[0] or \"application/pdf\"\n        data = base64.standard_b64encode(path.read_bytes()).decode(\"utf-8\")\n\n        if media_type == \"application/pdf\":\n            source_block = {\n                \"type\": \"document\",\n                \"source\": {\n                    \"type\": \"base64\",\n                    \"media_type\": \"application/pdf\",\n                    \"data\": data,\n                },\n            }\n        elif media_type.startswith(\"image/\"):\n            source_block = {\n                \"type\": \"image\",\n                \"source\": {\"type\": \"base64\", \"media_type\": media_type, \"data\": data},\n            }\n        else:\n            raise ValueError(f\"Unsupported file type for extraction: {media_type}\")\n\n        response = self.client.messages.create(\n            model=self.model,\n            max_tokens=16000,\n            thinking={\"type\": \"adaptive\"},\n            output_config={\"format\": {\"type\": \"json_schema\", \"schema\": _SCHEMA}},\n            messages=[\n                {\n                    \"role\": \"user\",\n                    \"content\": [source_block, {\"type\": \"text\", \"text\": _PROMPT}],\n                }\n            ],\n        )\n        if response.stop_reason == \"refusal\":\n            raise RuntimeError(\n                \"The extraction request was declined by the model; check the \"\n                \"document content.\"\n            )\n        text = next(b.text for b in response.content if b.type == \"text\")\n        payload = json.loads(text)\n        return self._to_document(payload, str(path))\n\n    # ------------------------------------------------------------------\n\n    @staticmethod\n    def _to_document(payload: dict, source: str) -> ExtractedDocument:\n        header = [\n            ExtractedField(\n                name=f.get(\"name\", \"\"),\n                value=f.get(\"value\", \"\"),\n                confidence=float(f.get(\"confidence\", 0.5)),\n            )\n            for f in payload.get(\"header\", [])\n        ]\n        tables = [\n            ExtractedTable(\n                title=t.get(\"title\", f\"Table {i + 1}\"),\n                columns=[str(c) for c in t.get(\"columns\", [])],\n                rows=[[str(c) for c in row] for row in t.get(\"rows\", [])],\n            )\n            for i, t in enumerate(payload.get(\"tables\", []))\n        ]\n        uncertain = [\n            UncertainCell(\n                table_index=int(c.get(\"table_index\", 0)),\n                row=int(c.get(\"row\", 0)),\n                column=int(c.get(\"column\", 0)),\n                reason=c.get(\"reason\", \"\"),\n            )\n            for c in payload.get(\"uncertain_cells\", [])\n        ]\n        return ExtractedDocument(\n            source=source,\n            document_kind=payload.get(\"document_kind\", \"unknown\"),\n            header=header,\n            tables=tables,\n            uncertain_cells=uncertain,\n            notes=payload.get(\"notes\", \"\"),\n            extractor=\"claude\",\n        )\n"}, "groundwater/extraction/models.py": {"t": "text", "d": "\"\"\"Common structure for extracted field sheet content.\n\nWhatever the source (text PDF, photographed sheet, AI extraction),\nthe result is header fields plus data tables, each value carrying a\nconfidence in [0, 1]. Values below the review threshold are flagged\nand highlighted in the review workbook rather than silently accepted.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nREVIEW_THRESHOLD = 0.85\n\n\n@dataclass\nclass ExtractedField:\n    name: str\n    value: str\n    confidence: float = 1.0\n\n    @property\n    def needs_review(self) -> bool:\n        return self.confidence < REVIEW_THRESHOLD\n\n\n@dataclass\nclass UncertainCell:\n    table_index: int\n    row: int  # 0-based data row\n    column: int  # 0-based column\n    reason: str = \"\"\n\n\n@dataclass\nclass ExtractedTable:\n    title: str\n    columns: list[str]\n    rows: list[list[str]]\n    row_confidence: list[float] = field(default_factory=list)\n\n    def confidence_for_row(self, index: int) -> float:\n        if index < len(self.row_confidence):\n            return self.row_confidence[index]\n        return 1.0\n\n\n@dataclass\nclass ExtractedDocument:\n    source: str\n    document_kind: str = \"unknown\"  # ves | pumping_test | drilling_log | water_quality | unknown\n    header: list[ExtractedField] = field(default_factory=list)\n    tables: list[ExtractedTable] = field(default_factory=list)\n    uncertain_cells: list[UncertainCell] = field(default_factory=list)\n    notes: str = \"\"\n    extractor: str = \"\"  # \"pdf-text\" | \"claude\"\n\n    def get(self, name: str) -> str:\n        key = name.strip().lower()\n        for f in self.header:\n            if f.name.strip().lower() == key:\n                return f.value\n        return \"\"\n\n    @property\n    def review_items(self) -> list[str]:\n        items = [\n            f\"header field '{f.name}' = '{f.value}' (confidence {f.confidence:.2f})\"\n            for f in self.header\n            if f.needs_review\n        ]\n        for cell in self.uncertain_cells:\n            if cell.table_index < len(self.tables):\n                table = self.tables[cell.table_index]\n                value = \"\"\n                if cell.row < len(table.rows) and cell.column < len(table.rows[cell.row]):\n                    value = table.rows[cell.row][cell.column]\n                items.append(\n                    f\"table '{table.title}' row {cell.row + 1}, column \"\n                    f\"'{table.columns[cell.column] if cell.column < len(table.columns) else cell.column + 1}'\"\n                    f\" = '{value}'\" + (f\" ({cell.reason})\" if cell.reason else \"\")\n                )\n        return items\n"}, "groundwater/extraction/pdf_text.py": {"t": "text", "d": "\"\"\"Rule based extraction from PDFs that carry a text layer.\n\nUses pdfplumber (``pip install groundwater-toolkit[extract]``) to pull\nwords and tables, then matches header labels with the same canonical\npatterns the template parsers use. Clean numeric parses get full\nconfidence; anything ambiguous is flagged for review. Image-only scans\nyield no text here and should go through the AI extractor instead.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nfrom ..ingestion.common import match_label, split_inline_value\nfrom ..utils import clean_text, parse_number\nfrom .models import (\n    ExtractedDocument,\n    ExtractedField,\n    ExtractedTable,\n    UncertainCell,\n)\n\n_KIND_MARKERS = {\n    \"ves\": (\"ves\", \"schlumberger\", \"apparent resistivity\", \"sounding\"),\n    \"pumping_test\": (\"pumping test\", \"step test\", \"constant discharge\", \"drawdown\"),\n    \"drilling_log\": (\"drilling\", \"borehole log\", \"penetration\"),\n    \"water_quality\": (\"water quality\", \"laboratory\", \"parameter\", \"guideline\"),\n}\n\n\ndef _guess_kind(text: str) -> str:\n    text = text.lower()\n    scores = {\n        kind: sum(1 for marker in markers if marker in text)\n        for kind, markers in _KIND_MARKERS.items()\n    }\n    best = max(scores, key=scores.get)\n    return best if scores[best] > 0 else \"unknown\"\n\n\ndef extract_pdf_text(path: str | Path) -> ExtractedDocument:\n    \"\"\"Extract header fields and tables from a text-layer PDF.\"\"\"\n    try:\n        import pdfplumber\n    except ImportError as exc:\n        raise ImportError(\n            \"PDF extraction needs pdfplumber; install with \"\n            \"'pip install groundwater-toolkit[extract]'\"\n        ) from exc\n\n    path = Path(path)\n    header: list[ExtractedField] = []\n    tables: list[ExtractedTable] = []\n    uncertain: list[UncertainCell] = []\n    all_text: list[str] = []\n    seen_fields: set[str] = set()\n\n    with pdfplumber.open(path) as pdf:\n        for page in pdf.pages:\n            text = page.extract_text() or \"\"\n            all_text.append(text)\n            # header labels from text lines (\"Community: Rokel   Date: ...\")\n            for line in text.splitlines():\n                for part in _split_line(line):\n                    label, value = split_inline_value(part)\n                    key = match_label(label)\n                    if key and value and key not in seen_fields:\n                        seen_fields.add(key)\n                        header.append(ExtractedField(key, clean_text(value), 0.95))\n\n            for raw_table in page.extract_tables() or []:\n                table = _clean_table(raw_table)\n                if table is None:\n                    continue\n                columns, rows = table\n                index = len(tables)\n                confidences = []\n                for r, row in enumerate(rows):\n                    row_conf = 1.0\n                    for c, cell in enumerate(row):\n                        conf, reason = _cell_confidence(cell, columns[c] if c < len(columns) else \"\")\n                        if conf < 1.0:\n                            uncertain.append(UncertainCell(index, r, c, reason))\n                            row_conf = min(row_conf, conf)\n                    confidences.append(row_conf)\n                tables.append(\n                    ExtractedTable(\n                        title=f\"Table {index + 1}\",\n                        columns=columns,\n                        rows=rows,\n                        row_confidence=confidences,\n                    )\n                )\n\n    text_blob = \"\\n\".join(all_text)\n    return ExtractedDocument(\n        source=str(path),\n        document_kind=_guess_kind(text_blob),\n        header=header,\n        tables=tables,\n        uncertain_cells=uncertain,\n        extractor=\"pdf-text\",\n        notes=\"Rule based extraction from the PDF text layer.\",\n    )\n\n\ndef _split_line(line: str) -> list[str]:\n    import re\n\n    return [p for p in re.split(r\"\\t+|\\s{3,}\", line) if p.strip()]\n\n\ndef _clean_table(raw: list[list]) -> tuple[list[str], list[list[str]]] | None:\n    rows = [[clean_text(c) for c in row] for row in raw if any(clean_text(c) for c in row)]\n    if len(rows) < 2:\n        return None\n    return rows[0], rows[1:]\n\n\ndef _cell_confidence(cell: str, column: str) -> tuple[float, str]:\n    \"\"\"Numeric columns should parse as numbers; empty cells in numeric\n    columns and non-numeric junk are review items.\"\"\"\n    numeric_column = any(\n        marker in column.lower()\n        for marker in (\"(m)\", \"m)\", \"ohm\", \"rate\", \"level\", \"depth\", \"time\", \"value\", \"ab/2\", \"mn\")\n    )\n    if not numeric_column:\n        return 1.0, \"\"\n    if cell == \"\":\n        return 0.6, \"empty cell in a numeric column\"\n    if parse_number(cell) is None:\n        return 0.4, \"does not parse as a number\"\n    return 1.0, \"\"\n"}, "groundwater/extraction/review.py": {"t": "text", "d": "\"\"\"Review workbook generation for extracted documents.\n\nEvery extraction produces a review workbook: the header fields and\nevery table, with uncertain values highlighted amber and a Review\nsheet listing everything that needs checking. For recognised VES\nsheets the standard template can also be filled directly so the normal\nparsers pick the data up after review.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nfrom openpyxl import Workbook, load_workbook\nfrom openpyxl.styles import Font, PatternFill\n\nfrom ..ingestion.common import match_label\nfrom .models import REVIEW_THRESHOLD, ExtractedDocument\n\n_AMBER = PatternFill(\"solid\", fgColor=\"FFE08A\")\n_HEADER_FONT = Font(bold=True)\n\n\ndef write_review_workbook(document: ExtractedDocument, path: str | Path) -> Path:\n    \"\"\"Write the extraction to an Excel review workbook.\n\n    Sheet 1 (Header): field, value, confidence; low confidence rows\n    highlighted. One sheet per table with uncertain cells highlighted.\n    Final Review sheet lists every flagged item with its reason.\n    \"\"\"\n    path = Path(path)\n    wb = Workbook()\n\n    ws = wb.active\n    ws.title = \"Header\"\n    ws.append([\"Field\", \"Value\", \"Confidence\"])\n    for cell in ws[1]:\n        cell.font = _HEADER_FONT\n    for field in document.header:\n        ws.append([field.name, field.value, round(field.confidence, 2)])\n        if field.needs_review:\n            for cell in ws[ws.max_row]:\n                cell.fill = _AMBER\n    ws.column_dimensions[\"A\"].width = 28\n    ws.column_dimensions[\"B\"].width = 32\n\n    flagged = {(c.table_index, c.row, c.column): c.reason for c in document.uncertain_cells}\n    for index, table in enumerate(document.tables):\n        sheet = wb.create_sheet(f\"Table {index + 1}\"[:31])\n        sheet.append([table.title])\n        sheet[\"A1\"].font = _HEADER_FONT\n        sheet.append(table.columns)\n        for cell in sheet[2]:\n            cell.font = _HEADER_FONT\n        for r, row in enumerate(table.rows):\n            sheet.append(row)\n            for c in range(len(row)):\n                if (index, r, c) in flagged:\n                    sheet.cell(row=sheet.max_row, column=c + 1).fill = _AMBER\n            if table.confidence_for_row(r) < REVIEW_THRESHOLD:\n                for c in range(len(row)):\n                    sheet.cell(row=sheet.max_row, column=c + 1).fill = _AMBER\n\n    review = wb.create_sheet(\"Review\")\n    review.append([\"Items needing manual review\"])\n    review[\"A1\"].font = _HEADER_FONT\n    items = document.review_items\n    if items:\n        for item in items:\n            review.append([item])\n    else:\n        review.append([\"None: all values extracted with high confidence.\"])\n    review.append([])\n    review.append([f\"Source: {document.source}\"])\n    review.append([f\"Extractor: {document.extractor}\"])\n    review.append([f\"Document kind: {document.document_kind}\"])\n    if document.notes:\n        review.append([f\"Notes: {document.notes}\"])\n    review.column_dimensions[\"A\"].width = 100\n\n    path.parent.mkdir(parents=True, exist_ok=True)\n    wb.save(path)\n    return path\n\n\ndef fill_ves_template(document: ExtractedDocument, path: str | Path) -> Path:\n    \"\"\"Fill the standard VES template from an extracted VES sheet.\n\n    Header fields are mapped through the same label patterns the\n    parsers use; the first table supplies the readings. Values that\n    need review keep their amber highlight in the filled template.\n    \"\"\"\n    from ..ingestion.templates import write_ves_template\n\n    if document.document_kind != \"ves\":\n        raise ValueError(\"fill_ves_template needs a document of kind 'ves'\")\n    if not document.tables:\n        raise ValueError(\"No data table was extracted\")\n\n    table = document.tables[0]\n    path = Path(path)\n    write_ves_template(path, n_soundings=1, n_rows=max(len(table.rows), 18))\n    wb = load_workbook(path)\n    ws = wb.active\n\n    # header mapping: canonical key -> template value cell\n    cell_map = {\n        \"client\": \"B2\", \"community\": \"D2\",\n        \"project\": \"B3\", \"sounding_id\": \"D3\",\n        \"district\": \"B4\", \"easting\": \"D4\",\n        \"date\": \"B5\", \"northing\": \"D5\",\n        \"supervisor\": \"B6\", \"elevation_m\": \"D6\",\n        \"chiefdom\": \"B7\", \"utm_zone\": \"D7\",\n        \"array_type\": \"B8\", \"instrument\": \"D8\",\n    }\n    for field in document.header:\n        key = match_label(field.name)\n        target = cell_map.get(key or \"\")\n        if target:\n            ws[target] = field.value\n            if field.needs_review:\n                ws[target].fill = _AMBER\n\n    flagged = {\n        (c.row, c.column): c.reason\n        for c in document.uncertain_cells\n        if c.table_index == 0\n    }\n    # locate the AB/2, MN and resistivity columns in the extracted table\n    def find_column(*needles):\n        for i, name in enumerate(table.columns):\n            low = name.lower()\n            if any(n in low for n in needles):\n                return i\n        return None\n\n    col_ab2 = find_column(\"ab/2\", \"ab2\")\n    col_mn = find_column(\"mn\")\n    col_rho = find_column(\"resist\", \"ohm\", \"rho\")\n    for r, row in enumerate(table.rows):\n        target_row = 11 + r\n        ws.cell(row=target_row, column=1, value=r + 1)\n        for source_col, target_col in ((col_ab2, 2), (col_mn, 3), (col_rho, 4)):\n            if source_col is None or source_col >= len(row):\n                continue\n            cell = ws.cell(row=target_row, column=target_col, value=row[source_col])\n            if (r, source_col) in flagged:\n                cell.fill = _AMBER\n    wb.save(path)\n    return path\n"}, "groundwater/geo.py": {"t": "text", "d": "\"\"\"Coordinate handling: WGS84 geographic and UTM zones 28N / 29N.\n\nImplements the transverse Mercator projection with the Krueger series\n(Karney 2011 formulation, terms to n**4), which is accurate to well\nunder a millimetre across a UTM zone. This keeps the toolkit free of\nheavy GIS dependencies; if pyproj is installed the same API is used\ntransparently for validation.\n\nSierra Leone spans two UTM zones. West of 12 degrees W (Freetown\npeninsula, Port Loko, Kambia, most of the coast) is zone 28N with\ncentral meridian 15 degrees W. East of 12 degrees W is zone 29N with\ncentral meridian 9 degrees W.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport math\nfrom dataclasses import dataclass\n\n# WGS84 ellipsoid\n_A = 6378137.0\n_F = 1 / 298.257223563\n_E2 = _F * (2 - _F)\n_E = math.sqrt(_E2)\n_N = _F / (2 - _F)  # third flattening\n\n_K0 = 0.9996\n_FALSE_EASTING = 500000.0\n\n# Rectifying radius\n_A1 = _A / (1 + _N) * (1 + _N**2 / 4 + _N**4 / 64)\n\n# Krueger series coefficients (Karney 2011, order n^4)\n_ALPHA = (\n    _N / 2 - 2 * _N**2 / 3 + 5 * _N**3 / 16 + 41 * _N**4 / 180,\n    13 * _N**2 / 48 - 3 * _N**3 / 5 + 557 * _N**4 / 1440,\n    61 * _N**3 / 240 - 103 * _N**4 / 140,\n    49561 * _N**4 / 161280,\n)\n_BETA = (\n    _N / 2 - 2 * _N**2 / 3 + 37 * _N**3 / 96 - _N**4 / 360,\n    _N**2 / 48 + _N**3 / 15 - 437 * _N**4 / 1440,\n    17 * _N**3 / 480 - 37 * _N**4 / 840,\n    4397 * _N**4 / 161280,\n)\n\n\n@dataclass(frozen=True)\nclass UTMCoordinate:\n    easting: float\n    northing: float\n    zone: int\n    hemisphere: str = \"N\"\n\n    def __str__(self) -> str:\n        return (\n            f\"{self.easting:.0f} mE, {self.northing:.0f} mN \"\n            f\"(UTM {self.zone}{self.hemisphere})\"\n        )\n\n\ndef utm_zone_from_lon(lon: float) -> int:\n    \"\"\"UTM zone number for a longitude in degrees.\"\"\"\n    return int((lon + 180) // 6) + 1\n\n\ndef _central_meridian(zone: int) -> float:\n    return -183.0 + 6.0 * zone\n\n\ndef geographic_to_utm(lat: float, lon: float, zone: int | None = None) -> UTMCoordinate:\n    \"\"\"Convert WGS84 latitude/longitude (degrees) to UTM.\n\n    If ``zone`` is omitted the natural zone for the longitude is used.\n    Passing a zone allows forcing the survey's working zone near the\n    28N/29N boundary at 12 degrees W.\n    \"\"\"\n    if zone is None:\n        zone = utm_zone_from_lon(lon)\n    lam0 = math.radians(_central_meridian(zone))\n    phi = math.radians(lat)\n    lam = math.radians(lon) - lam0\n\n    t = math.tan(phi)\n    sigma = math.sinh(_E * math.atanh(_E * t / math.sqrt(1 + t * t)))\n    tau_p = t * math.sqrt(1 + sigma * sigma) - sigma * math.sqrt(1 + t * t)\n\n    xi_p = math.atan2(tau_p, math.cos(lam))\n    eta_p = math.asinh(math.sin(lam) / math.hypot(tau_p, math.cos(lam)))\n\n    xi = xi_p\n    eta = eta_p\n    for j, alpha in enumerate(_ALPHA, start=1):\n        xi += alpha * math.sin(2 * j * xi_p) * math.cosh(2 * j * eta_p)\n        eta += alpha * math.cos(2 * j * xi_p) * math.sinh(2 * j * eta_p)\n\n    easting = _FALSE_EASTING + _K0 * _A1 * eta\n    northing = _K0 * _A1 * xi\n    hemisphere = \"N\"\n    if lat < 0:\n        northing += 10000000.0\n        hemisphere = \"S\"\n    return UTMCoordinate(easting, northing, zone, hemisphere)\n\n\ndef utm_to_geographic(\n    easting: float, northing: float, zone: int, hemisphere: str = \"N\"\n) -> tuple[float, float]:\n    \"\"\"Convert UTM to WGS84 latitude/longitude in degrees.\"\"\"\n    if hemisphere.upper().startswith(\"S\"):\n        northing = northing - 10000000.0\n    xi = northing / (_K0 * _A1)\n    eta = (easting - _FALSE_EASTING) / (_K0 * _A1)\n\n    xi_p = xi\n    eta_p = eta\n    for j, beta in enumerate(_BETA, start=1):\n        xi_p -= beta * math.sin(2 * j * xi) * math.cosh(2 * j * eta)\n        eta_p -= beta * math.cos(2 * j * xi) * math.sinh(2 * j * eta)\n\n    tau_p = math.sin(xi_p) / math.hypot(math.sinh(eta_p), math.cos(xi_p))\n    lam = math.atan2(math.sinh(eta_p), math.cos(xi_p))\n\n    # Invert tau'(tau) by Newton iteration (Karney 2011).\n    tau = tau_p / math.sqrt(1 - _E2)\n    for _ in range(10):\n        sigma = math.sinh(_E * math.atanh(_E * tau / math.sqrt(1 + tau * tau)))\n        f_tau = tau * math.sqrt(1 + sigma * sigma) - sigma * math.sqrt(1 + tau * tau)\n        d_tau = (\n            (math.sqrt((1 + sigma * sigma) * (1 + tau * tau)) - sigma * tau)\n            * (1 - _E2)\n            * math.sqrt(1 + tau * tau)\n            / (1 + (1 - _E2) * tau * tau)\n        )\n        delta = (tau_p - f_tau) / d_tau\n        tau += delta\n        if abs(delta) < 1e-14:\n            break\n\n    lat = math.degrees(math.atan(tau))\n    lon = math.degrees(lam) + _central_meridian(zone)\n    return lat, lon\n\n\ndef infer_zone_for_sierra_leone(easting: float) -> int:\n    \"\"\"Best guess of the UTM zone for a Sierra Leone easting.\n\n    Sierra Leone lies roughly between 13.4 W and 10.2 W. In zone 28N\n    valid eastings fall around 620000 to 800000 (east of the central\n    meridian); in zone 29N around 200000 to 500000 (west of it).\n    Overlap is impossible in-country, so the easting alone identifies\n    the zone.\n    \"\"\"\n    return 28 if easting > 550000 else 29\n"}, "groundwater/hydraulics/__init__.py": {"t": "text", "d": "\"\"\"Pumping test analysis: aquifer parameters, safe yield and diagnostics.\"\"\"\n\nfrom .analysis import (\n    CooperJacobResult,\n    TheisResult,\n    RecoveryResult,\n    StepTestResult,\n    YieldRecommendation,\n    PumpingTestAnalysis,\n    analyse_pumping_test,\n    cooper_jacob,\n    theis_fit,\n    theis_recovery,\n    hantush_bierschenk,\n)\nfrom .plots import (\n    plot_test_overview,\n    plot_cooper_jacob,\n    plot_theis,\n    plot_recovery,\n    plot_step_test,\n)\n\n__all__ = [\n    \"CooperJacobResult\",\n    \"TheisResult\",\n    \"RecoveryResult\",\n    \"StepTestResult\",\n    \"YieldRecommendation\",\n    \"PumpingTestAnalysis\",\n    \"analyse_pumping_test\",\n    \"cooper_jacob\",\n    \"theis_fit\",\n    \"theis_recovery\",\n    \"hantush_bierschenk\",\n    \"plot_test_overview\",\n    \"plot_cooper_jacob\",\n    \"plot_theis\",\n    \"plot_recovery\",\n    \"plot_step_test\",\n]\n"}, "groundwater/hydraulics/analysis.py": {"t": "text", "d": "\"\"\"Pumping test analysis methods.\n\nAll methods work on non-uniform time series (the sheets record 1, 2, 3\nand 5 minute spacings) and true drawdown recomputed from water level\nminus static water level. Internally time is converted to days and\ndischarge to m3/day so transmissivity comes out in m2/day.\n\nMethods\n-------\n* Cooper-Jacob straight line on drawdown against log time, with the\n  u < u_max validity check and automatic late time window selection.\n* Theis type curve fitting of W(u) by least squares. In a single\n  pumped well storativity is not resolvable (it trades off against the\n  effective well radius), so S is reported with a reliability warning\n  unless an observation well distance is given.\n* Theis recovery: residual drawdown against log(t/t').\n* Hantush-Bierschenk step test analysis: s_w/Q against Q gives the\n  aquifer loss coefficient B and well loss coefficient C, well\n  efficiency per step, and the drawdown-yield relationship.\n* Specific capacity, safe yield with an explicit safety factor, and a\n  recommended pump installation depth.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport math\nfrom dataclasses import dataclass, field\nfrom typing import Optional\n\nimport numpy as np\nfrom scipy.optimize import curve_fit\nfrom scipy.special import exp1\n\nfrom ..config import PumpingConfig\nfrom ..models import DataFlag, PumpingTest\n\nMIN_PER_DAY = 1440.0\n\n\n# ---------------------------------------------------------------------------\n# Result containers\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass CooperJacobResult:\n    transmissivity_m2_per_day: float\n    slope_m_per_log_cycle: float\n    intercept_t0_min: float  # time where the fitted line crosses s = 0\n    storativity: Optional[float]  # only when an observation distance is given\n    fit_window_min: tuple[float, float]\n    n_points: int\n    r_squared: float\n    u_check: str  # narrative of the validity check\n    discharge_m3_per_h: float\n\n\n@dataclass\nclass TheisResult:\n    transmissivity_m2_per_day: float\n    storativity: float\n    storativity_reliable: bool\n    rmse_m: float\n    discharge_m3_per_h: float\n    radius_m: float\n\n\n@dataclass\nclass RecoveryResult:\n    transmissivity_m2_per_day: float\n    slope_m_per_log_cycle: float\n    n_points: int\n    r_squared: float\n    discharge_m3_per_h: float\n    residual_at_end_m: float\n\n\n@dataclass\nclass StepTestResult:\n    aquifer_loss_B: float  # s = B Q + C Q^2 with Q in m3/day, s in m\n    well_loss_C: float\n    steps: list[dict]  # per step: Q, s_end, sw/Q, efficiency %\n    r_squared: float\n\n    def drawdown_at(self, q_m3_per_day: float) -> float:\n        return self.aquifer_loss_B * q_m3_per_day + self.well_loss_C * q_m3_per_day**2\n\n    def efficiency_at(self, q_m3_per_day: float) -> float:\n        s_total = self.drawdown_at(q_m3_per_day)\n        if s_total <= 0:\n            return 100.0\n        return 100.0 * self.aquifer_loss_B * q_m3_per_day / s_total\n\n\n@dataclass\nclass YieldRecommendation:\n    specific_capacity_m3hr_per_m: Optional[float]\n    available_drawdown_m: Optional[float]\n    usable_drawdown_m: Optional[float]\n    projected_drawdown_m: Optional[float]\n    long_term_yield_m3_per_h: Optional[float]\n    safe_yield_m3_per_h: Optional[float]\n    safety_factor: float\n    design_period_days: float\n    pump_installation_depth_m: Optional[float]\n    basis: str  # narrative of how the recommendation was derived\n    pending_reason: str = \"\"  # non-empty when discharge or SWL is missing\n\n\n@dataclass\nclass PumpingTestAnalysis:\n    test: PumpingTest\n    cooper_jacob: Optional[CooperJacobResult] = None\n    theis: Optional[TheisResult] = None\n    recovery: Optional[RecoveryResult] = None\n    step_test: Optional[StepTestResult] = None\n    yield_recommendation: Optional[YieldRecommendation] = None\n    stabilised_level_m: Optional[float] = None\n    max_drawdown_m: Optional[float] = None\n    flags: list[DataFlag] = field(default_factory=list)\n\n    @property\n    def transmissivity_m2_per_day(self) -> Optional[float]:\n        \"\"\"Preferred transmissivity: recovery is least affected by well\n        losses, then Cooper-Jacob, then Theis.\"\"\"\n        for result in (self.recovery, self.cooper_jacob, self.theis):\n            if result is not None:\n                return result.transmissivity_m2_per_day\n        return None\n\n\n# ---------------------------------------------------------------------------\n# Individual methods\n# ---------------------------------------------------------------------------\n\ndef _line_fit(x: np.ndarray, y: np.ndarray) -> tuple[float, float, float]:\n    \"\"\"Least squares line with r^2.\"\"\"\n    A = np.vstack([x, np.ones_like(x)]).T\n    coef, res, *_ = np.linalg.lstsq(A, y, rcond=None)\n    slope, intercept = float(coef[0]), float(coef[1])\n    ss_tot = float(np.sum((y - y.mean()) ** 2))\n    ss_res = float(np.sum((y - (slope * x + intercept)) ** 2))\n    r2 = 1.0 - ss_res / ss_tot if ss_tot > 0 else 1.0\n    return slope, intercept, r2\n\n\ndef cooper_jacob(\n    time_min: np.ndarray,\n    drawdown_m: np.ndarray,\n    discharge_m3_per_h: float,\n    config: PumpingConfig | None = None,\n    fit_window_min: tuple[float, float] | None = None,\n    observation_radius_m: float | None = None,\n    assumed_storativity: float = 1e-3,\n) -> CooperJacobResult:\n    \"\"\"Cooper-Jacob straight line analysis.\n\n    With no explicit window the fit uses the last full log cycle of\n    data (at least 6 points), which is where u is smallest and the\n    approximation holds. The u criterion is evaluated afterwards with\n    the fitted T (and an assumed S for the pumped well) and reported.\n    \"\"\"\n    config = config or PumpingConfig()\n    t = np.asarray(time_min, dtype=float)\n    s = np.asarray(drawdown_m, dtype=float)\n    keep = (t > 0) & np.isfinite(s)\n    t, s = t[keep], s[keep]\n    if len(t) < 4:\n        raise ValueError(\"Not enough readings for a Cooper-Jacob fit\")\n\n    if fit_window_min is None:\n        t_end = t.max()\n        t_start = max(t_end / 10.0, t.min())\n        window = (t >= t_start)\n        if window.sum() < 6:\n            window = np.argsort(t) >= max(len(t) - 6, 0)\n        fit_window_min = (float(t[window].min()), float(t[window].max()))\n    else:\n        window = (t >= fit_window_min[0]) & (t <= fit_window_min[1])\n\n    slope, intercept, r2 = _line_fit(np.log10(t[window]), s[window])\n    if slope <= 0:\n        raise ValueError(\n            \"Drawdown does
