sponses: dict[str, ChecklistResponse] | list[ChecklistResponse],\n) -> ChecklistAssessment:\n    \"\"\"Score responses against the checklist and flag critical failures.\"\"\"\n    if not isinstance(responses, dict):\n        responses = {r.item_id: r for r in responses}\n    stages: list[StageProgress] = []\n    flags: list[DataFlag] = []\n    stage_keys = [k for k in STAGE_ORDER if any(i.checklist == k for i in items)]\n    stage_keys += sorted({i.checklist for i in items} - set(stage_keys))\n    for key in stage_keys:\n        stage_items = [i for i in items if i.checklist == key]\n        answered = passed = failed = critical_failed = critical_open = 0\n        for item in stage_items:\n            response = responses.get(item.item_id)\n            status = response.status if response else \"pending\"\n            if status not in RESPONSE_STATES:\n                status = \"pending\"\n            if status != \"pending\":\n                answered += 1\n            if status in (\"yes\", \"na\"):\n                passed += 1\n            elif status == \"no\":\n                failed += 1\n                if item.critical:\n                    critical_failed += 1\n                    flags.append(\n                        DataFlag(\n                            \"error\",\n                            \"critical_item_failed\",\n                            item.text,\n                            context=stage_title(key),\n                        )\n                    )\n            elif item.critical:\n                critical_open += 1\n        stages.append(\n            StageProgress(\n                stage=key,\n                title=stage_title(key),\n                total=len(stage_items),\n                answered=answered,\n                passed=passed,\n                failed=failed,\n                critical_failed=critical_failed,\n                critical_open=critical_open,\n            )\n        )\n    return ChecklistAssessment(stages=stages, flags=flags)\n\n\n@dataclass\nclass SeparationDistance:\n    structure: str\n    min_distance_m: float\n    note: str = \"\"\n\n\ndef load_separation_distances(\n    path: str | Path | None = None,\n) -> list[SeparationDistance]:\n    \"\"\"Minimum borehole separation distances (FGN/NWRI 2010, via RWSN).\"\"\"\n    if path is not None:\n        text = Path(path).read_text(encoding=\"utf-8\")\n    else:\n        text = (\n            resources.files(\"groundwater\") / \"data\" / \"site_separation_distances.csv\"\n        ).read_text(encoding=\"utf-8\")\n    return [\n        SeparationDistance(\n            structure=row[\"structure\"].strip(),\n            min_distance_m=float(row[\"min_distance_m\"]),\n            note=(row.get(\"note\") or \"\").strip(),\n        )\n        for row in csv.DictReader(text.splitlines())\n    ]\n"}, "groundwater/supervision/field_checks.py": {"t": "text", "d": "\"\"\"Field acceptance checks and calculators for drilling supervision.\n\nEach function encodes a numeric standard from RWSN/UNICEF \"Supervising\nWater Well Drilling\" so the supervisor can check acceptance criteria\non site: sand content, verticality, screen open area, the handpump\nspecific capacity rule and the WHO chlorine disinfection dose.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport math\nfrom dataclasses import dataclass\nfrom typing import Optional\n\n\n@dataclass\nclass FieldCheck:\n    \"\"\"The outcome of one field acceptance check.\"\"\"\n\n    name: str\n    passed: Optional[bool]  # None when the check is informational\n    measured: str\n    limit: str\n    message: str\n\n    @property\n    def status(self) -> str:\n        if self.passed is None:\n            return \"info\"\n        return \"pass\" if self.passed else \"fail\"\n\n\ndef sand_content_check(samples_cm3: list[float], sample_volume_l: float = 20.0) -> FieldCheck:\n    \"\"\"Sand content at the end of the pumping test.\n\n    Three 20 litre samples are collected; the settled sand in each must\n    not exceed 0.2 cubic centimetres (10 parts per million by volume).\n    \"\"\"\n    limit_cm3 = sample_volume_l * 1000.0 * 10e-6  # 10 ppm by volume, in cm3\n    worst = max(samples_cm3) if samples_cm3 else 0.0\n    passed = bool(samples_cm3) and worst <= limit_cm3\n    return FieldCheck(\n        name=\"Sand content\",\n        passed=passed if samples_cm3 else None,\n        measured=f\"{worst:g} cm3 worst of {len(samples_cm3)} sample(s)\",\n        limit=f\"{limit_cm3:g} cm3 per {sample_volume_l:g} L sample (10 ppm by volume)\",\n        message=(\n            \"Sand content acceptable.\"\n            if passed\n            else \"Excessive sand: check drilling technique, gravel pack and \"\n            \"development; a replacement borehole may be at the driller's cost.\"\n        ),\n    )\n\n\ndef verticality_check(\n    deviation_mm: float, depth_m: float, casing_inner_diameter_mm: float\n) -> FieldCheck:\n    \"\"\"Plumb test: deviation must not exceed two thirds of the casing\n    inner diameter per 30 m of depth.\"\"\"\n    allowed_mm = (2.0 / 3.0) * casing_inner_diameter_mm * (depth_m / 30.0)\n    passed = deviation_mm <= allowed_mm\n    return FieldCheck(\n        name=\"Verticality (plumb test)\",\n        passed=passed,\n        measured=f\"{deviation_mm:g} mm over {depth_m:g} m\",\n        limit=f\"{allowed_mm:.0f} mm (two thirds of {casing_inner_diameter_mm:g} mm ID per 30 m)\",\n        message=(\n            \"Borehole is acceptably straight and vertical.\"\n            if passed\n            else \"Deviation exceeds the limit; the driller re-drills at own cost.\"\n        ),\n    )\n\n\ndef screen_open_area_check(\n    design_yield_l_per_s: float, screen_open_area_m2: float\n) -> FieldCheck:\n    \"\"\"Screen entrance velocity rule: open area A >= Q/30 (A in m2, Q in\n    L/s) keeps the entrance velocity below 0.03 m/s.\"\"\"\n    required = design_yield_l_per_s / 30.0\n    passed = screen_open_area_m2 >= required\n    return FieldCheck(\n        name=\"Screen open area\",\n        passed=passed,\n        measured=f\"{screen_open_area_m2:g} m2\",\n        limit=f\">= {required:.3f} m2 for Q = {design_yield_l_per_s:g} L/s\",\n        message=(\n            \"Entrance velocity within 0.03 m/s.\"\n            if passed\n            else \"Open area too small: turbulent inflow, encrustation and a \"\n            \"shortened screen life are likely; use more or larger screen.\"\n        ),\n    )\n\n\ndef specific_capacity_check(\n    discharge_m3_per_h: float, drawdown_m: float\n) -> FieldCheck:\n    \"\"\"Handpump adequacy rule of thumb: a specific capacity around\n    1 m3/h per metre of drawdown suggests the borehole suits a handpump.\"\"\"\n    if drawdown_m <= 0:\n        return FieldCheck(\n            name=\"Specific capacity\",\n            passed=None,\n            measured=\"n/a\",\n            limit=\">= 1 m3/h per m for a handpump\",\n            message=\"Drawdown must be positive to compute specific capacity.\",\n        )\n    sc = discharge_m3_per_h / drawdown_m\n    passed = sc >= 1.0\n    return FieldCheck(\n        name=\"Specific capacity\",\n        passed=passed,\n        measured=f\"{sc:.2f} m3/h per m\",\n        limit=\">= 1 m3/h per m for a handpump\",\n        message=(\n            \"Adequate for a handpump (about 1 m drawdown at 1 m3/h).\"\n            if passed\n            else \"Below the handpump rule of thumb; review the test data and \"\n            \"the pump setting before acceptance.\"\n        ),\n    )\n\n\ndef pack_aquifer_ratio_check(d50_pack_mm: float, d50_aquifer_mm: float) -> FieldCheck:\n    \"\"\"Filter pack sizing: pack D50 / aquifer D50 should be 4 to 6.\"\"\"\n    if d50_aquifer_mm <= 0:\n        return FieldCheck(\n            name=\"Pack aquifer ratio\",\n            passed=None,\n            measured=\"n/a\",\n            limit=\"4 to 6\",\n            message=\"Aquifer D50 must be positive.\",\n        )\n    ratio = d50_pack_mm / d50_aquifer_mm\n    passed = 4.0 <= ratio <= 6.0\n    return FieldCheck(\n        name=\"Pack aquifer ratio\",\n        passed=passed,\n        measured=f\"{ratio:.1f}\",\n        limit=\"4 to 6 (D50 pack / D50 aquifer)\",\n        message=(\n            \"Filter pack correctly sized for the formation.\"\n            if passed\n            else \"Pack aquifer ratio outside 4 to 6: risk of sand pumping \"\n            \"(too coarse) or a choked screen (too fine).\"\n        ),\n    )\n\n\ndef annular_space_check(\n    borehole_diameter_in: float, casing_od_mm: float\n) -> FieldCheck:\n    \"\"\"Annular space rule: at least 50 mm all round for placement, and a\n    gravel pack needs at least 70 mm to work as a filter (thinner is\n    only a formation stabiliser).\"\"\"\n    borehole_mm = borehole_diameter_in * 25.4\n    annulus_mm = (borehole_mm - casing_od_mm) / 2.0\n    passed = annulus_mm >= 50.0\n    if annulus_mm >= 70.0:\n        note = \"Full gravel pack possible.\"\n    elif passed:\n        note = (\n            \"Meets the 50 mm placement minimum, but under 70 mm the annular \"\n            \"fill acts as a formation stabiliser rather than a filter pack.\"\n        )\n    else:\n        note = (\n            \"Annulus below the 50 mm minimum: gravel is likely to bridge \"\n            \"during placement; use a larger bit or smaller casing.\"\n        )\n    return FieldCheck(\n        name=\"Annular space\",\n        passed=passed,\n        measured=f\"{annulus_mm:.0f} mm\",\n        limit=\">= 50 mm (70 mm for a true gravel pack)\",\n        message=note,\n    )\n\n\ndef handpump_corrosion_check(ph: float) -> FieldCheck:\n    \"\"\"Handpump corrosion risk rule (RWSN Stop the Rot).\n\n    Below pH 6.5 galvanised iron riser pipes and rods corrode rapidly\n    (failures within 3 months to 2 years), shedding iron and possibly\n    heavy metals into the supply; corrosion resistant components\n    (stainless steel 304/316 or uPVC risers) must be used instead.\n    \"\"\"\n    at_risk = ph < 6.5\n    return FieldCheck(\n        name=\"Handpump corrosion risk\",\n        passed=not at_risk,\n        measured=f\"pH {ph:g}\",\n        limit=\">= 6.5 for galvanised iron components\",\n        message=(\n            \"Corrosion risk low; standard components acceptable.\"\n            if not at_risk\n            else \"Corrosive water: specify stainless steel (grade 304/316) \"\n            \"or uPVC riser pipes and rods; galvanised iron can fail within \"\n            \"months and taint the water with iron.\"\n        ),\n    )\n\n\n@dataclass\nclass DisinfectionDose:\n    \"\"\"Chlorine quantities for shock disinfection at 20 mg/L (WHO).\"\"\"\n\n    well_volume_l: float\n    solution_02pct_l: float  # litres of 0.2 percent chlorine solution\n    hth_grams: float  # grams of 65 percent HTH powder for that solution\n    contact_hours: float = 4.0\n\n    def summary(self) -> str:\n        return (\n            f\"Well volume about {self.well_volume_l:,.0f} L: add \"\n            f\"{self.solution_02pct_l:,.1f} L of 0.2% chlorine solution \"\n            f\"(about {self.hth_grams:,.0f} g of 65% HTH in that much water) \"\n            f\"and wait at least {self.contact_hours:g} hours before pumping.\"\n        )\n\n\ndef disinfection_dose(\n    water_column_m: float, casing_inner_diameter_mm: float\n) -> DisinfectionDose:\n    \"\"\"WHO shock dose: 1 L of 0.2 percent solution per 100 L of well\n    volume gives 20 mg/L; do not pump for at least 4 hours.\"\"\"\n    radius_m = casing_inner_diameter_mm / 2000.0\n    volume_l = math.pi * radius_m**2 * max(0.0, water_column_m) * 1000.0\n    solution_l = volume_l / 100.0\n    # 0.2 percent solution = 2 g chlorine per litre; 65 percent HTH\n    # carries 0.65 g available chlorine per gram of powder.\n    hth_grams = solution_l * 2.0 / 0.65\n    return DisinfectionDose(\n        well_volume_l=volume_l,\n        solution_02pct_l=solution_l,\n        hth_grams=hth_grams,\n    )\n"}, "groundwater/utils.py": {"t": "text", "d": "\"\"\"Shared utilities: robust number parsing, rounding and formatting.\n\nField sheets and transcribed reports carry values such as ``078.7``\n(leading zeros), ``80m`` (units appended), ``19.28M`` or ``6.5''``.\nThe helpers here turn those into clean floats and format numbers\nconsistently across figures, tables and reports.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport math\nimport re\nfrom typing import Iterable\n\n_NUMBER_RE = re.compile(r\"[-+]?\\d*\\.?\\d+(?:[eE][-+]?\\d+)?\")\n\n\ndef parse_number(value, default=None) -> float | None:\n    \"\"\"Parse a numeric value from field data.\n\n    Handles plain numbers, strings with leading zeros (``078.7``),\n    appended units (``80m``, ``19.28M``, ``2,933lts/hr``), thousands\n    separators and stray whitespace. Returns ``default`` (``None``\n    unless given) when no number can be found.\n\n    >>> parse_number(\"078.7\")\n    78.7\n    >>> parse_number(\"0708958\")\n    708958.0\n    >>> parse_number(\"19.28M\")\n    19.28\n    >>> parse_number(\"2,933\")\n    2933.0\n    >>> parse_number(\"\") is None\n    True\n    \"\"\"\n    if value is None:\n        return default\n    if isinstance(value, (int, float)):\n        if isinstance(value, float) and math.isnan(value):\n            return default\n        return float(value)\n    text = str(value).strip()\n    if not text:\n        return default\n    text = text.replace(\",\", \"\")\n    match = _NUMBER_RE.search(text)\n    if match is None:\n        return default\n    return float(match.group(0))\n\n\n_INTERVAL_RE = re.compile(\n    r\"(\\d+(?:\\.\\d+)?)\\s*(?:-|to)\\s*(\\d+(?:\\.\\d+)?)\", re.IGNORECASE\n)\n\n\ndef parse_depth_interval(value) -> tuple[float, float] | None:\n    \"\"\"Parse a depth interval such as ``0-5``, ``5 - 10`` or ``12 to 18 m``.\n\n    Depths are unsigned; the hyphen is the range separator, never a\n    minus sign. Returns ``(top, bottom)`` in metres or ``None``.\n    \"\"\"\n    if value is None:\n        return None\n    match = _INTERVAL_RE.search(str(value))\n    if match is None:\n        return None\n    top, bottom = float(match.group(1)), float(match.group(2))\n    if bottom < top:\n        top, bottom = bottom, top\n    return top, bottom\n\n\ndef round_sig(value: float, sig: int = 3) -> float:\n    \"\"\"Round ``value`` to ``sig`` significant figures.\n\n    >>> round_sig(2102.804, 4)\n    2103.0\n    >>> round_sig(0.0123456, 3)\n    0.0123\n    \"\"\"\n    if value == 0 or not math.isfinite(value):\n        return value\n    ndigits = sig - 1 - int(math.floor(math.log10(abs(value))))\n    return round(value, ndigits)\n\n\ndef fmt_num(value, sig: int = 3, unit: str = \"\") -> str:\n    \"\"\"Format a number for reports with consistent significant figures.\n\n    Integers within tolerance print without a decimal part. ``None``\n    or NaN prints as an em-dash free placeholder ``n/a``.\n    \"\"\"\n    if value is None or (isinstance(value, float) and not math.isfinite(value)):\n        return \"n/a\"\n    v = round_sig(float(value), sig)\n    if abs(v - round(v)) < 1e-9 and abs(v) < 1e15:\n        text = f\"{int(round(v)):,}\"\n    else:\n        text = f\"{v:g}\"\n    return f\"{text} {unit}\".strip() if unit else text\n\n\ndef fmt_range(a, b, unit: str = \"m\", sep: str = \"-\") -> str:\n    \"\"\"Format a depth range such as ``20-30 m``.\"\"\"\n    return f\"{fmt_num(a)}{sep}{fmt_num(b)} {unit}\".strip()\n\n\ndef ordinal(n: int) -> str:\n    \"\"\"Return ``1st``, ``2nd``, ``3rd``, ``4th`` ... for ranking tables.\"\"\"\n    if 10 <= n % 100 <= 20:\n        suffix = \"th\"\n    else:\n        suffix = {1: \"st\", 2: \"nd\", 3: \"rd\"}.get(n % 10, \"th\")\n    return f\"{n}{suffix}\"\n\n\ndef strictly_increasing(values: Iterable[float]) -> bool:\n    vals = list(values)\n    return all(b > a for a, b in zip(vals, vals[1:]))\n\n\ndef clean_text(value) -> str:\n    \"\"\"Normalise whitespace in a text cell; empty for None.\"\"\"\n    if value is None:\n        return \"\"\n    return re.sub(r\"\\s+\", \" \", str(value)).strip()\n"}, "groundwater/ves/__init__.py": {"t": "text", "d": "\"\"\"Vertical electrical sounding analysis.\"\"\"\n\nfrom .arrays import geometric_factor, apparent_resistivity\nfrom .forward import forward_schlumberger, forward_wenner, forward_for_sounding\nfrom .inversion import invert_sounding, InversionResult\nfrom .ipi2win import read_ipi2win_models\nfrom .classify import classify_curve\nfrom .interpret import interpret_model, drilling_preference_table, SiteInterpretation\nfrom .splice import splice_segments\n\n__all__ = [\n    \"geometric_factor\",\n    \"apparent_resistivity\",\n    \"forward_schlumberger\",\n    \"forward_wenner\",\n    \"forward_for_sounding\",\n    \"invert_sounding\",\n    \"InversionResult\",\n    \"read_ipi2win_models\",\n    \"classify_curve\",\n    \"interpret_model\",\n    \"drilling_preference_table\",\n    \"SiteInterpretation\",\n    \"splice_segments\",\n]\n"}, "groundwater/ves/arrays.py": {"t": "text", "d": "\"\"\"Electrode array geometric factors.\n\nAll spacings are in metres and resistances in ohm; apparent\nresistivity is returned in ohm-m. ``mn`` is always the full potential\nelectrode spacing MN, matching the field sheets, not MN/2.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef geometric_factor(\n    array_type: str,\n    ab2: float | np.ndarray | None = None,\n    mn: float | np.ndarray | None = None,\n    a: float | np.ndarray | None = None,\n    n: float | np.ndarray | None = None,\n) -> np.ndarray:\n    \"\"\"Geometric factor K such that rho_a = K * (delta V / I).\n\n    Parameters\n    ----------\n    array_type:\n        \"schlumberger\", \"wenner\", \"dipole-dipole\" or \"pole-pole\".\n    ab2:\n        Half current electrode spacing AB/2 (Schlumberger).\n    mn:\n        Full potential electrode spacing MN (Schlumberger).\n    a:\n        Electrode spacing (Wenner) or dipole length (dipole-dipole,\n        pole-pole).\n    n:\n        Dipole separation multiplier (dipole-dipole).\n\n    For the Schlumberger array with finite MN the exact factor is\n    ``K = pi (L^2 - b^2) / (2 b)`` with L = AB/2 and b = MN/2.\n    \"\"\"\n    kind = array_type.strip().lower()\n    if kind.startswith(\"schlum\"):\n        if ab2 is None or mn is None:\n            raise ValueError(\"Schlumberger needs ab2 and mn\")\n        L = np.asarray(ab2, dtype=float)\n        b = np.asarray(mn, dtype=float) / 2.0\n        if np.any(b <= 0) or np.any(L <= b):\n            raise ValueError(\"Require 0 < MN/2 < AB/2 for Schlumberger\")\n        return np.pi * (L**2 - b**2) / (2.0 * b)\n    if kind.startswith(\"wenner\"):\n        if a is None:\n            raise ValueError(\"Wenner needs the spacing a\")\n        return 2.0 * np.pi * np.asarray(a, dtype=float)\n    if kind.startswith(\"dipole\"):\n        if a is None or n is None:\n            raise ValueError(\"dipole-dipole needs a and n\")\n        a_arr = np.asarray(a, dtype=float)\n        n_arr = np.asarray(n, dtype=float)\n        return np.pi * n_arr * (n_arr + 1) * (n_arr + 2) * a_arr\n    if kind.startswith(\"pole-pole\") or kind.startswith(\"pole pole\"):\n        if a is None:\n            raise ValueError(\"pole-pole needs the spacing a\")\n        return 2.0 * np.pi * np.asarray(a, dtype=float)\n    raise ValueError(f\"Unknown array type: {array_type}\")\n\n\ndef apparent_resistivity(\n    array_type: str,\n    resistance_ohm: float | np.ndarray,\n    **spacings,\n) -> np.ndarray:\n    \"\"\"Apparent resistivity from measured resistance (delta V / I).\"\"\"\n    K = geometric_factor(array_type, **spacings)\n    return K * np.asarray(resistance_ohm, dtype=float)\n"}, "groundwater/ves/classify.py": {"t": "text", "d": "\"\"\"Sounding curve type classification (H, K, A, Q and combinations).\n\nFor three layers the classical types are\n\n* H: rho1 > rho2 < rho3 (conductive middle layer)\n* K: rho1 < rho2 > rho3 (resistive middle layer)\n* A: rho1 < rho2 < rho3 (ascending)\n* Q: rho1 > rho2 > rho3 (descending)\n\nModels with more layers are classified by the sequence of overlapping\nthree layer triplets, giving the usual combined names such as HK, KH,\nHKH or QQ.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\nfrom ..models import LayeredModel\n\n__all__ = [\"classify_curve\", \"describe_curve_type\"]\n\n_TRIPLET = {\n    (1, 0): \"K\",  # up then down\n    (0, 1): \"H\",  # down then up\n    (1, 1): \"A\",  # up, up\n    (0, 0): \"Q\",  # down, down\n}\n\n\ndef classify_curve(model: LayeredModel) -> str:\n    \"\"\"Curve type letters for a layered model.\n\n    Two layer models return \"2-layer ascending\" or \"2-layer\n    descending\"; models with three or more layers return letter codes.\n    \"\"\"\n    rho = np.asarray(model.resistivities, dtype=float)\n    if len(rho) < 2:\n        return \"uniform\"\n    if len(rho) == 2:\n        return \"2-layer ascending\" if rho[1] > rho[0] else \"2-layer descending\"\n    letters = []\n    for i in range(len(rho) - 2):\n        up1 = 1 if rho[i + 1] > rho[i] else 0\n        up2 = 1 if rho[i + 2] > rho[i + 1] else 0\n        letters.append(_TRIPLET[(up1, up2)])\n    return \"\".join(letters)\n\n\n_DESCRIPTIONS = {\n    \"H\": \"a conductive layer between two more resistive layers, the classical \"\n    \"signature of a saturated weathered zone above fresh basement\",\n    \"K\": \"a resistive layer between two more conductive layers, often dry \"\n    \"laterite or duricrust over a conductive saprolite\",\n    \"A\": \"resistivity increasing with depth, typical of progressively less \"\n    \"weathered rock towards fresh basement\",\n    \"Q\": \"resistivity decreasing with depth, typical of deepening weathering \"\n    \"or increasing saturation with depth\",\n}\n\n\ndef describe_curve_type(curve_type: str) -> str:\n    \"\"\"Short hydrogeological reading of a curve type for report text.\"\"\"\n    if curve_type.startswith(\"2-layer\"):\n        direction = \"ascending\" if \"ascending\" in curve_type else \"descending\"\n        if direction == \"descending\":\n            return (\n                \"a two layer response with resistivity decreasing at depth, \"\n                \"consistent with weathered or fractured, possibly water bearing \"\n                \"rock beneath a resistive surface layer\"\n            )\n        return (\n            \"a two layer response with resistivity increasing at depth, \"\n            \"consistent with more competent rock beneath the surface layer\"\n        )\n    parts = [f\"type {curve_type}\"]\n    seen = []\n    for letter in curve_type:\n        if letter in _DESCRIPTIONS and letter not in seen:\n            seen.append(letter)\n            parts.append(_DESCRIPTIONS[letter])\n    return \"; \".join(parts)\n"}, "groundwater/ves/forward.py": {"t": "text", "d": "\"\"\"1D layered earth forward modelling for resistivity soundings.\n\nThe apparent resistivity over a stack of horizontal layers is obtained\nfrom the resistivity transform ``T(lambda)`` (Koefoed recurrence) and\na Hankel transform:\n\n* ideal Schlumberger (gradient array, MN -> 0)::\n\n      rho_a(L) = L^2 * Int_0^inf T(lam) J1(lam L) lam dlam\n\n* finite MN Schlumberger, from the surface potential\n  ``F(r) = Int_0^inf T(lam) J0(lam r) dlam``::\n\n      rho_a = (L^2 - b^2) / (2 b) * [F(L - b) - F(L + b)],  b = MN/2\n\n* Wenner::\n\n      rho_a(a) = 2 a * [F_hat(a) - F_hat(2a)],  F_hat(r) = r F(r) / 1\n\nThe integrals are evaluated by direct quadrature on a hybrid\nlogarithmic + linear abscissa after subtracting the half space\nasymptote (``T -> rho_1`` for large lambda), which makes the integrand\ndecay exponentially. This avoids relying on tabulated digital filter\ncoefficients and is validated against the analytic two layer image\nseries in the test suite (agreement better than 0.2 percent).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\nfrom numpy.polynomial.legendre import leggauss\nfrom scipy.special import j0, j1, jn_zeros\n\nfrom ..models import LayeredModel, VESSounding\n\n__all__ = [\n    \"resistivity_transform\",\n    \"forward_schlumberger\",\n    \"forward_schlumberger_finite_mn\",\n    \"forward_wenner\",\n    \"forward_for_sounding\",\n    \"two_layer_schlumberger_series\",\n]\n\n\ndef resistivity_transform(\n    lam: np.ndarray, resistivities: np.ndarray, thicknesses: np.ndarray\n) -> np.ndarray:\n    \"\"\"Koefoed/Pekeris recurrence for the resistivity transform T(lambda).\n\n    Stable downward recurrence starting from the half space:\n    ``T_n = rho_n``;\n    ``T_i = (T_{i+1} + rho_i tanh(lam h_i)) / (1 + T_{i+1} tanh(lam h_i) / rho_i)``.\n    \"\"\"\n    lam = np.asarray(lam, dtype=float)\n    rho = np.asarray(resistivities, dtype=float)\n    h = np.asarray(thicknesses, dtype=float)\n    T = np.full_like(lam, rho[-1])\n    for i in range(len(h) - 1, -1, -1):\n        th = np.tanh(lam * h[i])\n        T = (T + rho[i] * th) / (1.0 + T * th / rho[i])\n    return T\n\n\n# ---------------------------------------------------------------------------\n# Hankel integration machinery\n#\n# Integrals of the form Int_0^inf g(x) Jn(x) dx with g smooth and\n# exponentially decaying are computed in two sections:\n#\n# * x in (0, z1), z1 the first zero of Jn: composite Gauss-Legendre on\n#   log-subdivided panels. The resistivity transform varies over about\n#   a decade of lambda, so sub-decade panels resolve it for any layer\n#   thickness / spacing ratio.\n# * x > z1: 10 point Gauss-Legendre panels between consecutive zeros\n#   of Jn. Within a half period the integrand is smooth, so each panel\n#   is near exact. The number of panels follows the exponential decay\n#   scale of (T - rho1).\n#\n# Nodes and (weight x Bessel) products are precomputed once per order,\n# so each integral is two vectorised evaluations of g.\n# ---------------------------------------------------------------------------\n\n_N_ZEROS = 1200\n\n\ndef _build_tables(order: int):\n    zeros = jn_zeros(order, _N_ZEROS)\n    bessel = j0 if order == 0 else j1\n\n    # section 1: 14 log-spaced panels from 1e-6 to the first zero, GL-8\n    nodes8, weights8 = leggauss(8)\n    edges = np.geomspace(1e-6, zeros[0], 15)\n    s1_nodes, s1_wb = [], []\n    for lo, hi in zip(edges[:-1], edges[1:]):\n        mid, half = 0.5 * (lo + hi), 0.5 * (hi - lo)\n        x = mid + half * nodes8\n        s1_nodes.append(x)\n        s1_wb.append(half * weights8 * bessel(x))\n\n    # section 2: GL-10 between consecutive zeros\n    nodes10, weights10 = leggauss(10)\n    s2_nodes, s2_wb = [], []\n    lo = zeros[0]\n    for hi in zeros[1:]:\n        mid, half = 0.5 * (lo + hi), 0.5 * (hi - lo)\n        x = mid + half * nodes10\n        s2_nodes.append(x)\n        s2_wb.append(half * weights10 * bessel(x))\n        lo = hi\n    return {\n        \"s1_nodes\": np.concatenate(s1_nodes),\n        \"s1_wb\": np.concatenate(s1_wb),\n        \"s2_nodes\": np.concatenate(s2_nodes),\n        \"s2_wb\": np.concatenate(s2_wb),\n        \"panel_ends\": jn_zeros(order, _N_ZEROS)[1:],\n    }\n\n\n_TABLES = {0: _build_tables(0), 1: _build_tables(1)}\n\n\ndef _hankel_integral(g, order: int, x_decay: float) -> float:\n    \"\"\"Int_0^inf g(x) J_order(x) dx for smooth g decaying like\n    exp(-x / x_decay) at large x.\"\"\"\n    t = _TABLES[order]\n    acc = float(np.dot(g(t[\"s1_nodes\"]), t[\"s1_wb\"]))\n    x_stop = 18.0 * max(x_decay, 1.0)\n    n_panels = int(np.searchsorted(t[\"panel_ends\"], x_stop)) + 1\n    n_panels = min(max(n_panels, 8), len(t[\"panel_ends\"]))\n    k = n_panels * 10\n    acc += float(np.dot(g(t[\"s2_nodes\"][:k]), t[\"s2_wb\"][:k]))\n    return acc\n\n\ndef forward_schlumberger(\n    model: LayeredModel | tuple, ab2: np.ndarray\n) -> np.ndarray:\n    \"\"\"Ideal (gradient) Schlumberger apparent resistivity at AB/2 values.\"\"\"\n    rho, h = _model_arrays(model)\n    ab2 = np.atleast_1d(np.asarray(ab2, dtype=float))\n    h_min = float(np.min(h)) if len(h) else 1.0\n    out = np.empty_like(ab2)\n    for i, L in enumerate(ab2):\n        # substitute x = lambda L: rho_a = rho1 + Int (T(x/L) - rho1) J1(x) x dx\n        # (the L^2 prefactor cancels against the 1/L^2 from the substitution)\n        def g(x, L=L):\n            return (resistivity_transform(x / L, rho, h) - rho[0]) * x\n\n        # (T - rho1) decays like exp(-2 lambda h_min) = exp(-x / (L / (2 h_min)))\n        out[i] = rho[0] + _hankel_integral(g, 1, L / (2.0 * max(h_min, 0.1)))\n    return out\n\n\ndef _potential_integral(rho, h, r: float, h_min: float) -> float:\n    \"\"\"F(r) = Int T(lam) J0(lam r) dlam = (rho1 + Int (T - rho1) J0(x) dx) / r.\"\"\"\n\n    def g(x, r=r):\n        return resistivity_transform(x / r, rho, h) - rho[0]\n\n    return (rho[0] + _hankel_integral(g, 0, r / (2.0 * max(h_min, 0.1)))) / r\n\n\ndef forward_schlumberger_finite_mn(\n    model: LayeredModel | tuple, ab2: np.ndarray, mn: np.ndarray\n) -> np.ndarray:\n    \"\"\"Schlumberger apparent resistivity with finite MN spacing.\n\n    Reproduces what the instrument actually measures at each\n    (AB/2, MN) pair, including the small jumps at segment changes.\n    \"\"\"\n    rho, h = _model_arrays(model)\n    ab2 = np.atleast_1d(np.asarray(ab2, dtype=float))\n    mn = np.atleast_1d(np.asarray(mn, dtype=float))\n    h_min = float(np.min(h)) if len(h) else 1.0\n    out = np.empty_like(ab2)\n    for i, (L, m) in enumerate(zip(ab2, mn)):\n        b = m / 2.0\n        if not np.isfinite(b) or b <= 0 or b >= L:\n            # fall back to the ideal gradient value\n            out[i] = forward_schlumberger((rho, h), np.array([L]))[0]\n            continue\n        f_in = _potential_integral(rho, h, L - b, h_min)\n        f_out = _potential_integral(rho, h, L + b, h_min)\n        out[i] = (L**2 - b**2) / (2.0 * b) * (f_in - f_out)\n    return out\n\n\ndef forward_wenner(model: LayeredModel | tuple, a: np.ndarray) -> np.ndarray:\n    \"\"\"Wenner apparent resistivity at spacings a.\"\"\"\n    rho, h = _model_arrays(model)\n    a = np.atleast_1d(np.asarray(a, dtype=float))\n    h_min = float(np.min(h)) if len(h) else 1.0\n    out = np.empty_like(a)\n    for i, s in enumerate(a):\n        f1 = _potential_integral(rho, h, s, h_min)\n        f2 = _potential_integral(rho, h, 2.0 * s, h_min)\n        # rho_a = 2 pi a (V_M - V_N)/I; with A and B both contributing,\n        # V_M - V_N = (I/pi) (F(a) - F(2a)), so rho_a = 2 a (F(a) - F(2a)).\n        out[i] = 2.0 * s * (f1 - f2)\n    return out\n\n\ndef forward_for_sounding(\n    model: LayeredModel | tuple,\n    sounding: VESSounding,\n    finite_mn: bool = False,\n) -> np.ndarray:\n    \"\"\"Model response at a sounding's abscissas.\"\"\"\n    if sounding.array_type.startswith(\"wenner\"):\n        return forward_wenner(model, sounding.ab2)\n    if finite_mn and np.all(np.isfinite(sounding.mn)):\n        return forward_schlumberger_finite_mn(model, sounding.ab2, sounding.mn)\n    return forward_schlumberger(model, sounding.ab2)\n\n\ndef two_layer_schlumberger_series(\n    rho1: float, rho2: float, h: float, ab2: np.ndarray, n_terms: int = 4000\n) -> np.ndarray:\n    \"\"\"Analytic two layer ideal Schlumberger curve from image theory.\n\n    ``rho_a(L) = rho1 [1 + 2 sum_n k^n L^3 / (L^2 + (2 n h)^2)^(3/2)]``\n    with reflection coefficient k = (rho2 - rho1) / (rho2 + rho1).\n    Used to validate the numerical Hankel evaluation.\n    \"\"\"\n    ab2 = np.atleast_1d(np.asarray(ab2, dtype=float))\n    k = (rho2 - rho1) / (rho2 + rho1)\n    n = np.arange(1, n_terms + 1)[:, None]\n    L = ab2[None, :]\n    terms = (k**n) * L**3 / (L**2 + (2.0 * n * h) ** 2) ** 1.5\n    return rho1 * (1.0 + 2.0 * np.sum(terms, axis=0))\n\n\ndef _model_arrays(model: LayeredModel | tuple) -> tuple[np.ndarray, np.ndarray]:\n    if isinstance(model, LayeredModel):\n        return model.resistivities, model.thicknesses\n    rho, h = model\n    return np.asarray(rho, dtype=float), np.asarray(h, dtype=float)\n"}, "groundwater/ves/interpret.py": {"t": "text", "d": "\"\"\"Hydrogeological interpretation of layered models.\n\nThe rules target crystalline basement terrain typical of Sierra Leone:\na lateritic or clayey cover, saprolite, a weathered/fractured zone\nthat forms the main aquifer, and fresh basement at depth. Thresholds\nlive in :class:`~groundwater.config.VESConfig` so they can be tuned\nper area (coastal sedimentary sites use different ranges).\n\nOutputs:\n\n* per layer lithological/hydrogeological labels,\n* possible water zones as depth ranges,\n* estimated depth to (fresh) basement and aquifer thickness,\n* a recommended maximum drilling depth,\n* the ranked drilling preference table used in survey reports.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport math\nfrom dataclasses import dataclass, field\n\nimport numpy as np\n\nfrom ..config import VESConfig\nfrom ..models import LayeredModel, VESSounding\nfrom ..utils import fmt_num, ordinal\nfrom .classify import classify_curve, describe_curve_type\n\n__all__ = [\n    \"LayerInterpretation\",\n    \"SiteInterpretation\",\n    \"interpret_model\",\n    \"drilling_preference_table\",\n]\n\n\n@dataclass\nclass LayerInterpretation:\n    number: int\n    rho: float\n    thickness_m: float | None  # None for the half space\n    top_m: float\n    bottom_m: float  # inf for the half space\n    unit: str\n    water_bearing: bool\n\n\n@dataclass\nclass SiteInterpretation:\n    sounding_id: str\n    model: LayeredModel\n    curve_type: str\n    layers: list[LayerInterpretation]\n    water_zones: list[tuple[float, float]]\n    depth_to_basement_m: float | None\n    aquifer_thickness_m: float\n    max_drilling_depth_m: float\n    investigation_depth_m: float\n    score: float  # used for ranking between sites\n    narrative: str = \"\"\n    rank: int | None = None\n    site_easting: float | None = None\n    site_northing: float | None = None\n    site_elevation_m: float | None = None\n    flags: list = field(default_factory=list)\n\n\ndef _unit_label(\n    rho: float, is_top: bool, is_bottom: bool, config: VESConfig\n) -> tuple[str, bool]:\n    \"\"\"Label a layer and judge whether it is potentially water bearing.\"\"\"\n    lo, hi = config.fractured_zone_rho\n    if is_top:\n        if rho >= config.laterite_min_rho:\n            return \"dry lateritic topsoil / duricrust\", False\n        if rho >= hi:\n            return \"compact laterite / dry overburden\", False\n        if rho <= config.clay_max_rho:\n            return \"clayey topsoil\", False\n        return \"topsoil / laterite\", False\n    if rho >= config.fresh_basement_min_rho:\n        return \"fresh basement\", False\n    if rho >= hi:\n        if is_bottom:\n            return \"slightly weathered or fractured bedrock (limited water potential)\", False\n        return \"compact or dry weathered rock (regolith)\", False\n    if rho <= config.clay_max_rho:\n        return \"clay rich saprolite (low permeability)\", False\n    if is_bottom:\n        return \"fractured bedrock, low resistivity indicative of groundwater in fractures\", True\n    return \"weathered / fractured zone, potentially water bearing when saturated\", True\n\n\ndef interpret_model(\n    sounding: VESSounding | None,\n    model: LayeredModel,\n    config: VESConfig | None = None,\n) -> SiteInterpretation:\n    \"\"\"Interpret one layered model hydrogeologically.\"\"\"\n    config = config or VESConfig()\n    rho = model.resistivities\n    tops = model.depths_top\n    bottoms = model.depths_bottom\n    n = model.n_layers\n\n    investigation = (\n        float(np.max(sounding.ab2)) if sounding is not None else float(bottoms[-2] * 2 + 20)\n    )\n\n    layers: list[LayerInterpretation] = []\n    for i in range(n):\n        unit, water = _unit_label(\n            float(rho[i]), is_top=(i == 0), is_bottom=(i == n - 1), config=config\n        )\n        layers.append(\n            LayerInterpretation(\n                number=i + 1,\n                rho=float(rho[i]),\n                thickness_m=float(model.thicknesses[i]) if i < n - 1 else None,\n                top_m=float(tops[i]),\n                bottom_m=float(bottoms[i]),\n                unit=unit,\n                water_bearing=water,\n            )\n        )\n\n    # ---- water zones ------------------------------------------------------\n    zones: list[tuple[float, float]] = []\n    for layer in layers:\n        if not layer.water_bearing:\n            continue\n        top = max(layer.top_m, 3.0)  # the top few metres are vadose\n        bottom = layer.bottom_m if math.isfinite(layer.bottom_m) else investigation\n        if bottom - top >= 1.0:\n            zones.append((round(top), round(bottom)))\n    # merge touching zones\n    merged: list[tuple[float, float]] = []\n    for zone in sorted(zones):\n        if merged and zone[0] <= merged[-1][1] + 1:\n            merged[-1] = (merged[-1][0], max(merged[-1][1], zone[1]))\n        else:\n            merged.append(zone)\n    zones = merged\n\n    # ---- depth to basement -------------------------------------------------\n    depth_to_basement = None\n    for layer in layers:\n        if layer.rho >= config.fresh_basement_min_rho and layer.top_m > 0:\n            depth_to_basement = layer.top_m\n            break\n    if depth_to_basement is None and layers[-1].rho >= config.fractured_zone_rho[1]:\n        depth_to_basement = layers[-1].top_m\n\n    aquifer_thickness = sum(b - t for t, b in zones)\n\n    # ---- recommended maximum drilling depth ---------------------------------\n    # deepest target zone plus a margin, but never past the depth the\n    # sounding actually investigated (taken as the maximum AB/2)\n    if zones:\n        deepest = zones[-1][1] + config.max_drilling_margin_m\n    else:\n        deepest = investigation\n    step = config.round_drilling_depth_to_m\n    max_depth = min(deepest, investigation)\n    max_depth = math.ceil(max_depth / step) * step\n\n    # ---- suitability score for ranking --------------------------------------\n    score = 0.0\n    for top, bottom in zones:\n        thickness = bottom - top\n        mid_rho = _zone_rho(layers, top, bottom)\n        # favour thick zones with resistivities in the productive window\n        lo, hi = config.fractured_zone_rho\n        centre = math.sqrt(lo * hi)\n        rho_term = 1.0 / (1.0 + abs(math.log(max(mid_rho, 1e-3) / centre)))\n        score += thickness * rho_term\n    if depth_to_basement is not None and depth_to_basement < 5 and not zones:\n        score *= 0.5  # thin regolith and nothing water bearing\n\n    curve_type = classify_curve(model)\n    interp = SiteInterpretation(\n        sounding_id=model.sounding_id or (sounding.sounding_id if sounding else \"\"),\n        model=model,\n        curve_type=curve_type,\n        layers=layers,\n        water_zones=zones,\n        depth_to_basement_m=depth_to_basement,\n        aquifer_thickness_m=aquifer_thickness,\n        max_drilling_depth_m=max_depth,\n        investigation_depth_m=investigation,\n        score=score,\n    )\n    if sounding is not None and sounding.site is not None:\n        interp.site_easting = sounding.site.easting\n        interp.site_northing = sounding.site.northing\n        interp.site_elevation_m = sounding.site.elevation_m\n    interp.narrative = _narrative(interp)\n    return interp\n\n\ndef _zone_rho(layers: list[LayerInterpretation], top: float, bottom: float) -> float:\n    \"\"\"Thickness weighted geometric mean resistivity across a depth range.\"\"\"\n    total = 0.0\n    acc = 0.0\n    for layer in layers:\n        lo = max(layer.top_m, top)\n        hi = min(layer.bottom_m if math.isfinite(layer.bottom_m) else bottom, bottom)\n        if hi > lo:\n            acc += math.log(layer.rho) * (hi - lo)\n            total += hi - lo\n    return math.exp(acc / total) if total > 0 else 100.0\n\n\ndef _narrative(interp: SiteInterpretation) -> str:\n    \"\"\"Interpretation paragraph for the report, one block per sounding.\"\"\"\n    n = interp.model.n_layers\n    parts = [\n        f\"The data at {interp.sounding_id} resolves a {n} layer subsurface \"\n        f\"({describe_curve_type(interp.curve_type)}).\"\n    ]\n    for layer in interp.layers:\n        if layer.thickness_m is not None:\n            span = (\n                f\"from {fmt_num(layer.top_m)} m to {fmt_num(layer.bottom_m)} m \"\n                f\"({fmt_num(layer.thickness_m)} m thick)\"\n            )\n        else:\n            span = f\"below {fmt_num(layer.top_m)} m\"\n        parts.append(\n            f\"Layer {layer.number} {span} has a resistivity of about \"\n            f\"{fmt_num(layer.rho, 4)} ohm-m and is interpreted as {layer.unit}.\"\n        )\n    if interp.water_zones:\n        zones_text = \", \".join(f\"{int(t)} m to {int(b)} m\" for t, b in interp.water_zones)\n        parts.append(\n            \"The unusually low resistivity within the interpreted fractured or \"\n            \"weathered intervals is indicative of pore electrolyte, possibly \"\n            f\"groundwater. The possible water zones are {zones_text}.\"\n        )\n    else:\n        parts.append(\n            \"No clearly water bearing low resistivity zone is resolved at this \"\n            \"point within the investigated depth.\"\n        )\n    if interp.depth_to_basement_m is not None:\n        parts.append(\n            f\"The depth to bedrock is estimated at about \"\n            f\"{fmt_num(interp.depth_to_basement_m)} m.\"\n        )\n    return \" \".join(parts)\n\n\ndef drilling_preference_table(\n    interpretations: list[SiteInterpretation],\n    preferred_order: list[str] | None = None,\n) -> list[dict]:\n    \"\"\"Ranked drilling preference table (one row per VES point).\n\n    Matches the survey report layout: layers with thickness, depth and\n    resistivity, possible water zones, maximum drilling depth and the\n    ranking. Ranks are assigned from the suitability score (1st = most\n    preferred). When sites score close together the choice is a\n    professional judgment call, so ``preferred_order`` (a list of\n    sounding ids, most preferred first) lets the analyst set the\n    ranking explicitly; unlisted sites follow after, by score.\n    \"\"\"\n    if preferred_order:\n        position = {sid: i for i, sid in enumerate(preferred_order)}\n        ranked = sorted(\n            interpretations,\n            key=lambda i: (position.get(i.sounding_id, len(position)), -i.score),\n        )\n    else:\n        ranked = sorted(interpretations, key=lambda i: (-i.score, i.sounding_id))\n    for rank, interp in enumerate(ranked, start=1):\n        interp.rank = rank\n    rows = []\n    for i, interp in enumerate(interpretations, start=1):\n        layer_numbers = \"\\n\".join(str(l.number) for l in interp.layers)\n        thicknesses = \"\\n\".join(\n            fmt_num(l.thickness_m) if l.thickness_m is not None else \"\"\n            for l in interp.layers\n        )\n        depths = \"\\n\".join(\n            fmt_num(l.bottom_m) if math.isfinite(l.bottom_m) else \"\"\n            for l in interp.layers\n        )\n        rhos = \"\\n\".join(fmt_num(l.rho, 4) for l in interp.layers)\n        zones = \"\\n\".join(f\"{int(t)}-{int(b)}\" for t, b in interp.water_zones) or \"none resolved\"\n        rows.append(\n            {\n                \"No.\": i,\n                \"VES Point\": interp.sounding_id,\n                \"Layer\": layer_numbers,\n                \"Thickness (m)\": thicknesses,\n                \"Depth (m)\": depths,\n                \"Apparent Resistivity (Ohm-m)\": rhos,\n                \"Possible Water Zones (m)\": zones,\n                \"Max Drilling Depth (m)\": f\"{interp.max_drilling_depth_m:.0f} m\",\n                \"Ranking\": ordinal(interp.rank),\n            }\n        )\n    return rows\n"}, "groundwater/ves/inversion.py": {"t": "text", "d": "\"\"\"Damped least squares (Levenberg-Marquardt) 1D inversion of VES data.\n\nParameters are the logarithms of layer resistivities and thicknesses,\nthe misfit is measured on the logarithm of apparent resistivity, and a\nMarquardt damping term stabilises the ill posed steps, which is the\nclassical ridge regression approach used by IPI2Win and similar tools.\nThe reported fit error matches the IPI2Win ERR quantity::\n\n    ERR % = sqrt( mean( ((rho_calc - rho_obs) / rho_obs)^2 ) ) * 100\n\n``invert_sounding`` searches over the number of layers (2 to\n``max_layers``) from several deterministic starting models and returns\nthe simplest model that reaches the target fit, with all trial results\nattached for review.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nimport numpy as np\n\nfrom ..config import VESConfig\nfrom ..models import LayeredModel, VESSounding\nfrom .forward import forward_schlumberger, forward_wenner\nfrom .splice import splice_segments\n\n__all__ = [\"InversionResult\", \"invert_model\", \"invert_sounding\"]\n\n_RHO_BOUNDS = (0.5, 200000.0)\n_H_BOUNDS = (0.2, 300.0)\n\n\n@dataclass\nclass InversionResult:\n    model: LayeredModel\n    ab2: np.ndarray\n    rho_obs: np.ndarray\n    rho_calc: np.ndarray\n    fit_error_percent: float\n    n_iterations: int\n    converged: bool\n    trials: list = field(default_factory=list)  # (n_layers, err) for auto search\n    shifts: list = field(default_factory=list)  # splice diagnostics\n\n\ndef _forward(rho, h, ab2, array_type: str):\n    if array_type.startswith(\"wenner\"):\n        return forward_wenner((rho, h), ab2)\n    return forward_schlumberger((rho, h), ab2)\n\n\ndef fit_error_percent(rho_obs: np.ndarray, rho_calc: np.ndarray) -> float:\n    rel = (rho_calc - rho_obs) / rho_obs\n    return float(np.sqrt(np.mean(rel**2)) * 100.0)\n\n\ndef _pack(rho, h):\n    return np.concatenate([np.log(rho), np.log(h)]) if len(h) else np.log(rho)\n\n\ndef _unpack(theta, n_layers):\n    rho = np.exp(theta[:n_layers])\n    h = np.exp(theta[n_layers:])\n    return rho, h\n\n\ndef _clip(theta, n_layers):\n    lo = np.concatenate(\n        [np.full(n_layers, np.log(_RHO_BOUNDS[0])), np.full(len(theta) - n_layers, np.log(_H_BOUNDS[0]))]\n    )\n    hi = np.concatenate(\n        [np.full(n_layers, np.log(_RHO_BOUNDS[1])), np.full(len(theta) - n_layers, np.log(_H_BOUNDS[1]))]\n    )\n    return np.clip(theta, lo, hi)\n\n\ndef invert_model(\n    ab2: np.ndarray,\n    rho_app: np.ndarray,\n    rho0: np.ndarray,\n    h0: np.ndarray,\n    array_type: str = \"schlumberger\",\n    damping: float = 0.02,\n    max_iterations: int = 60,\n) -> tuple[LayeredModel, np.ndarray, float, int, bool]:\n    \"\"\"Levenberg-Marquardt refinement from one starting model.\"\"\"\n    n_layers = len(rho0)\n    theta = _clip(_pack(np.asarray(rho0, float), np.asarray(h0, float)), n_layers)\n    log_obs = np.log(rho_app)\n\n    def residuals(t):\n        rho, h = _unpack(t, n_layers)\n        calc = _forward(rho, h, ab2, array_type)\n        calc = np.maximum(calc, 1e-9)\n        return np.log(calc) - log_obs, calc\n\n    res, calc = residuals(theta)\n    cost = float(res @ res)\n    lam = damping\n    iterations = 0\n    converged = False\n    for iterations in range(1, max_iterations + 1):\n        # numerical Jacobian in log space\n        J = np.empty((len(ab2), len(theta)))\n        step = 1e-4\n        for j in range(len(theta)):\n            tp = theta.copy()\n            tp[j] += step\n            rp, _ = residuals(tp)\n            J[:, j] = (rp - res) / step\n\n        JtJ = J.T @ J\n        g = J.T @ res\n        improved = False\n        for _ in range(12):\n            try:\n                delta = np.linalg.solve(\n                    JtJ + lam * np.diag(np.maximum(np.diag(JtJ), 1e-8)), -g\n                )\n            except np.linalg.LinAlgError:\n                lam *= 10\n                continue\n            trial = _clip(theta + delta, n_layers)\n            r_trial, c_trial = residuals(trial)\n            cost_trial = float(r_trial @ r_trial)\n            if cost_trial < cost:\n                theta, res, calc, cost = trial, r_trial, c_trial, cost_trial\n                lam = max(lam / 3.0, 1e-7)\n                improved = True\n                break\n            lam *= 10\n            if lam > 1e8:\n                break\n        if not improved:\n            converged = True\n            break\n        if cost < 1e-10:\n            converged = True\n            break\n\n    rho, h = _unpack(theta, n_layers)\n    err = fit_error_percent(rho_app, calc)\n    model = LayeredModel(rho, h, fit_error_percent=err, method=\"damped-lsq\")\n    return model, calc, err, iterations, converged\n\n\ndef _starting_models(ab2: np.ndarray, rho: np.ndarray, n_layers: int) -> list:\n    \"\"\"Deterministic starting models from the smoothed field curve.\n\n    Thicknesses grow logarithmically over the depth range covered by\n    the spacings (depth of investigation taken as AB/2 / 2); starting\n    resistivities are read off the smoothed curve at the corresponding\n    spacings. Three variants bracket the depth scale.\n    \"\"\"\n    log_rho = np.log(rho)\n    starts = []\n    for depth_factor in (0.35, 0.7):\n        z_top = max(ab2[0] * depth_factor, 0.5)\n        z_bot = max(ab2[-1] * depth_factor, z_top * 4)\n        bounds = np.geomspace(z_top, z_bot, n_layers)\n        h0 = np.diff(np.concatenate([[0.0], bounds[:-1]]))\n        h0 = np.maximum(h0, 0.3)\n        rho0 = []\n        for z in bounds:\n            L = np.clip(2.0 * z, ab2[0], ab2[-1])\n            rho0.append(np.exp(np.interp(np.log(L), np.log(ab2), log_rho)))\n        starts.append((np.array(rho0), h0))\n    return starts\n\n\ndef invert_sounding(\n    sounding: VESSounding,\n    config: VESConfig | None = None,\n    n_layers: int | None = None,\n    initial_model: LayeredModel | None = None,\n    splice: bool = True,\n) -> InversionResult:\n    \"\"\"Invert a sounding to a layered model.\n\n    With ``n_layers=None`` the layer count is searched from\n    ``config.min_layers`` to ``config.max_layers`` and the simplest\n    model whose fit reaches ``config.target_fit_percent`` is kept (or\n    the best fitting model if none reaches it). Passing\n    ``initial_model`` (for example an imported IPI2Win model) refines\n    that model instead.\n    \"\"\"\n    config = config or VESConfig()\n    if splice and not sounding.array_type.startswith(\"wenner\"):\n        ab2, rho_app, shifts = splice_segments(sounding)\n    else:\n        order = np.argsort(sounding.ab2, kind=\"stable\")\n        ab2, rho_app, shifts = sounding.ab2[order], sounding.rho_app[order], [1.0]\n\n    keep = np.isfinite(rho_app) & (rho_app > 0)\n    ab2, rho_app = ab2[keep], rho_app[keep]\n    if len(ab2) < 4:\n        raise ValueError(\"Not enough readings to invert\")\n\n    candidates: list[tuple[LayeredModel, np.ndarray, float, int, bool]] = []\n    trials: list[tuple[int, float]] = []\n\n    if initial_model is not None:\n        result = invert_model(\n            ab2,\n            rho_app,\n            initial_model.resistivities,\n            initial_model.thicknesses,\n            sounding.array_type,\n            config.damping,\n            config.max_iterations,\n        )\n        candidates.append(result)\n        trials.append((result[0].n_layers, result[2]))\n    else:\n        layer_range = (\n            [n_layers]\n            if n_layers is not None\n            else list(range(config.min_layers, config.max_layers + 1))\n        )\n        for n in layer_range:\n            best_for_n = None\n            for rho0, h0 in _starting_models(ab2, rho_app, n):\n                result = invert_model(\n                    ab2, rho_app, rho0, h0,\n                    sounding.array_type, config.damping, config.max_iterations,\n                )\n                if best_for_n is None or result[2] < best_for_n[2]:\n                    best_for_n = result\n            candidates.append(best_for_n)\n            trials.append((n, best_for_n[2]))\n            if n_layers is None:\n                # stop adding layers once the target is comfortably reached\n                # or when the extra layer no longer helps materially\n                if best_for_n[2] <= config.target_fit_percent / 2:\n                    break\n                if len(trials) >= 2 and trials[-1][1] > 0.9 * trials[-2][1]:\n                    break\n\n    # Parsimony: the simplest model reaching the target; otherwise the\n    # simplest model whose fit is within 15 percent of the best fit\n    # (extra layers must earn their keep), otherwise the overall best.\n    chosen = None\n    for cand in candidates:\n        if cand[2] <= config.target_fit_percent:\n            chosen = cand\n            break\n    if chosen is None:\n        best_err = min(c[2] for c in candidates)\n        for cand in candidates:\n            if cand[2] <= 1.15 * best_err:\n                chosen = cand\n                break\n    if chosen is None:\n        chosen = min(candidates, key=lambda c: c[2])\n\n    model, calc, err, iterations, converged = chosen\n    model.sounding_id = sounding.sounding_id\n    return InversionResult(\n        model=model,\n        ab2=ab2,\n        rho_obs=rho_app,\n        rho_calc=calc,\n        fit_error_percent=err,\n        n_iterations=iterations,\n        converged=converged,\n        trials=trials,\n        shifts=shifts,\n    )\n"}, "groundwater/ves/ipi2win.py": {"t": "text", "d": "\"\"\"Import layered models from IPI2Win output tables.\n\nIPI2Win reports models as a table with columns N, rho, h and z, where\nz is the depth to the top of the layer, the first z prints as ``0/0``\nand the half space row has no thickness. The overall fit is reported\nas ``ERR = <percent>``. Interpretations already made in IPI2Win can be\ntranscribed into a small Excel/CSV table and reused directly.\n\nExpected layout (one worksheet per sounding, or one CSV per sounding):\n\n    Sounding Number: 1        (optional header row(s))\n    ERR (%): 21.5             (optional)\n    N | rho | h | z\n    1 | 832.14 | 1    | 0/0\n    2 | 2102.8 | 7.37 | 1\n    3 | 36.71  |      | 8.37\n\"\"\"\n\nfrom __future__ import annotations\n\nimport csv\nfrom pathlib import Path\n\nimport numpy as np\n\nfrom ..models import LayeredModel\nfrom ..utils import clean_text, parse_number\n\n__all__ = [\"read_ipi2win_models\", \"model_from_rows\"]\n\n\ndef _find_table(grid: list[list]) -> tuple[int, dict] | None:\n    for r, row in enumerate(grid):\n        texts = [clean_text(c).lower().rstrip(\".\") for c in row]\n        cols: dict[str, int] = {}\n        for c, t in enumerate(texts):\n            base = t.replace(\"(m)\", \"\").replace(\"(ohm-m)\", \"\").strip()\n            if base in (\"n\", \"no\", \"layer\"):\n                cols[\"n\"] = c\n            elif base in (\"rho\", \"p\", \"resistivity\") or \"rho\" in base or \"resist\" in base:\n                cols.setdefault(\"rho\", c)\n            elif base in (\"h\", \"thickness\") or base.startswith(\"h \"):\n                cols.setdefault(\"h\", c)\n            elif base in (\"z\", \"depth\") or base.startswith(\"z \"):\n                cols.setdefault(\"z\", c)\n        if \"rho\" in cols and (\"h\" in cols or \"z\" in cols):\n            return r, cols\n    return None\n\n\ndef _find_err(grid: list[list]) -> float | None:\n    for row in grid:\n        for cell in row:\n            text = clean_text(cell)\n            if \"err\" in text.lower():\n                value = parse_number(text.split(\"=\")[-1] if \"=\" in text else text)\n                if value is not None:\n                    return value\n    return None\n\n\ndef model_from_rows(\n    rows: list[dict], err: float | None = None, sounding_id: str = \"\"\n) -> LayeredModel:\n    \"\"\"Build a LayeredModel from row dicts with rho / h / z entries.\"\"\"\n    rho = [r[\"rho\"] for r in rows]\n    h = [r.get(\"h\") for r in rows]\n    z = [r.get(\"z\") for r in rows]\n    thicknesses: list[float] = []\n    for i in range(len(rho) - 1):\n        if h[i] is not None:\n            thicknesses.append(float(h[i]))\n        elif z[i + 1] is not None and z[i] is not None:\n            thicknesses.append(float(z[i + 1]) - float(z[i]))\n        elif z[i + 1] is not None and i == 0:\n            thicknesses.append(float(z[i + 1]))\n        else:\n            raise ValueError(\"Cannot determine layer thicknesses from the table\")\n    return LayeredModel(\n        np.asarray(rho, float),\n        np.asarray(thicknesses, float),\n        fit_error_percent=err,\n        method=\"ipi2win-import\",\n        sounding_id=sounding_id,\n    )\n\n\ndef _model_from_grid(grid: list[list], sounding_id: str) -> LayeredModel | None:\n    located = _find_table(grid)\n    if located is None:\n        return None\n    header_row, cols = located\n    rows = []\n    for row in grid[header_row + 1 :]:\n        def cell(key):\n            c = cols.get(key)\n            return row[c] if c is not None and c < len(row) else None\n\n        rho = parse_number(cell(\"rho\"))\n        if rho is None:\n            if rows:\n                break\n            continue\n        z_raw = clean_text(cell(\"z\"))\n        z = 0.0 if z_raw.startswith(\"0/0\") else parse_number(cell(\"z\"))\n        rows.append({\"rho\": rho, \"h\": parse_number(cell(\"h\")), \"z\": z})\n    if not rows:\n        return None\n    err = _find_err(grid)\n    return model_from_rows(rows, err=err, sounding_id=sounding_id)\n\n\ndef read_ipi2win_models(path: str | Path) -> dict[str, LayeredModel]:\n    \"\"\"Read IPI2Win model tables from an Excel workbook or CSV file.\n\n    Returns a mapping of sounding id (worksheet title or a \"Sounding\n    Number\" header value, else the file stem) to the layered model.\n    \"\"\"\n    from ..ingestion import common\n\n    path = Path(path)\n    models: dict[str, LayeredModel] = {}\n    if path.suffix.lower() == \".csv\":\n        with open(path, newline=\"\", encoding=\"utf-8-sig\") as fh:\n            grid = [[c if c != \"\" else None for c in row] for row in csv.reader(fh)]\n        fields = common.extract_header_fields(grid)\n        sounding_id = str(fields.get(\"sounding_id\", \"\") or path.stem)\n        model = _model_from_grid(grid, sounding_id)\n        if model is not None:\n            models[sounding_id] = model\n        return models\n\n    for name in common.sheet_names(path):\n        grid, title = common.load_grid(path, sheet=name)\n        fields = common.extract_header_fields(grid)\n        sounding_id = str(fields.get(\"sounding_id\", \"\") or title)\n        model = _model_from_grid(grid, sounding_id)\n        if model is not None:\n            models[sounding_id] = model\n    return models\n"}, "groundwater/ves/plots.py": {"t": "text", "d": "\"\"\"VES figures: sounding curves with models, layer pseudo-sections and\nmulti-sounding geoelectric cross-sections.\"\"\"\n\nfrom __future__ import annotations\n\nimport math\nfrom pathlib import Path\n\nimport matplotlib.pyplot as plt\nimport numpy as np\nfrom matplotlib import colors as mcolors\nfrom matplotlib import cm\n\nfrom ..config import HouseStyle\nfrom ..models import LayeredModel, VESSounding\nfrom ..plotting import figure_context, save_figure\nfrom ..utils import fmt_num\nfrom .forward import forward_schlumberger\nfrom .splice import splice_segments\n\n__all__ = [\n    \"plot_sounding_curve\",\n    \"plot_model_pseudosection\",\n    \"plot_geoelectric_section\",\n]\n\n_RHO_NORM = mcolors.LogNorm(vmin=10, vmax=5000)\n\n\ndef _model_step(model: LayeredModel, depth_max: float) -> tuple[np.ndarray, np.ndarray]:\n    \"\"\"Stepwise rho(z) profile for plotting.\"\"\"\n    tops = model.depths_top\n    rho = model.resistivities\n    z = [0.0]\n    r = [rho[0]]\n    for i in range(1, len(rho)):\n        z.extend([tops[i], tops[i]])\n        r.extend([rho[i - 1], rho[i]])\n    z.append(depth_max)\n    r.append(rho[-1])\n    return np.array(z), np.array(r)\n\n\ndef plot_sounding_curve(\n    sounding: VESSounding,\n    model: LayeredModel | None = None,\n    rho_calc: np.ndarray | None = None,\n    ab2_calc: np.ndarray | None = None,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n    show_splice: bool = True,\n):\n    \"\"\"Log-log sounding curve with optional fitted model panel.\n\n    Left: apparent resistivity against AB/2 with the field segments,\n    the spliced curve and the model response. Right: the layered model\n    as a resistivity-depth step plot, annotated with the fit error.\n    \"\"\"\n    style = style or HouseStyle()\n    with figure_context(style):\n        if model is not None:\n            fig, (ax, axm) = plt.subplots(\n                1, 2, figsize=(style.figure_width_in, 3.4), width_ratios=[1.6, 1]\n            )\n        else:\n            fig, ax = plt.subplots(figsize=(style.figure_width_in * 0.75, 3.4))\n            axm = None\n\n        # field segments\n        markers = [\"o\", \"s\", \"^\", \"D\", \"v\", \"P\"]\n        for k, idx in enumerate(sounding.segments()):\n            mn = sounding.mn[idx][0] if len(idx) else float(\"nan\")\n            label = f\"MN = {fmt_num(mn)} m\" if np.isfinite(mn) else \"field data\"\n            ax.loglog(\n                sounding.ab2[idx],\n                sounding.rho_app[idx],\n                markers[k % len(markers)],\n                ms=4.5,\n                mfc=\"white\",\n                mec=style.accent_color,\n                mew=1.2,\n                ls=\"none\",\n                label=label,\n            )\n        if show_splice and len(sounding.segments()) > 1:\n            ab2_s, rho_s, _ = splice_segments(sounding)\n            ax.loglog(\n                ab2_s, rho_s, \"-\", color=style.accent_color, lw=1.0, alpha=0.8,\n                label=\"spliced curve\",\n            )\n        if model is not None:\n            if rho_calc is None or ab2_calc is None:\n                ab2_calc = np.geomspace(sounding.ab2.min(), sounding.ab2.max(), 60)\n                rho_calc = forward_schlumberger(model, ab2_calc)\n            ax.loglog(\n                ab2_calc, rho_calc, \"-\", color=style.secondary_color, lw=1.8,\n                label=\"model response\",\n            )\n        ax.set_xlabel(\"AB/2 (m)\")\n        ax.set_ylabel(\"Apparent resistivity (ohm-m)\")\n        ax.set_title(f\"{sounding.label} sounding curve\")\n        ax.legend(loc=\"best\")\n        ax.grid(True, which=\"both\")\n\n        if axm is not None and model is not None:\n            depth_max = max(float(np.max(sounding.ab2)), model.depths_top[-1] * 1.5 + 5)\n            z, r = _model_step(model, depth_max)\n            axm.plot(r, z, color=style.secondary_color, lw=2.0)\n            axm.set_xscale(\"log\")\n            axm.set_ylim(depth_max, 0)\n            axm.set_xlabel(\"Layer resistivity (ohm-m)\")\n            axm.set_ylabel(\"Depth (m)\")\n            err = model.fit_error_percent\n            title = \"Layered model\"\n            if err is not None:\n                title += f\" (ERR = {err:.1f}%)\"\n            axm.set_title(title)\n            tops = model.depths_top\n            for i, row in enumerate(model.as_table()):\n                top = tops[i]\n                bottom = tops[i + 1] if i + 1 < len(tops) else depth_max\n                z_label = 0.5 * (top + min(bottom, depth_max))\n                axm.annotate(\n                    f\"{fmt_num(row['rho_ohm_m'], 4)}\",\n                    xy=(row[\"rho_ohm_m\"], z_label),\n                    xytext=(3, 0), textcoords=\"offset points\",\n                    fontsize=7.5, va=\"center\", color=\"#333333\",\n                )\n            axm.grid(True, which=\"both\")\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n\n\ndef plot_model_pseudosection(\n    model: LayeredModel,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n    depth_max: float | None = None,\n    title: str | None = None,\n):\n    \"\"\"Single sounding layer column coloured by resistivity.\n\n    The 'pseudo-section showing apparent resistivity and layer\n    thicknesses' figure of the survey reports: horizontal bands to\n    scale with a logarithmic resistivity colour bar.\n    \"\"\"\n    style = style or HouseStyle()\n    with figure_context(style):\n        fig, ax = plt.subplots(figsize=(style.figure_width_in * 0.72, 3.6))\n        tops = model.depths_top\n        if depth_max is None:\n            depth_max = (tops[-1] if len(tops) > 1 else 10) * 1.35 + 3\n        cmap = plt.get_cmap(\"viridis\")\n        for i, rho in enumerate(model.resistivities):\n            top = tops[i]\n            bottom = tops[i + 1] if i + 1 < len(tops) else depth_max\n            ax.axhspan(top, bottom, color=cmap(_RHO_NORM(max(rho, _RHO_NORM.vmin))))\n            z_text = (top + min(bottom, depth_max)) / 2\n            ax.text(\n                0.5, z_text, f\"{fmt_num(rho, 4)} ohm-m\",\n                ha=\"center\", va=\"center\", fontsize=9,\n                color=\"white\", transform=ax.get_yaxis_transform(),\n                path_effects=None,\n                bbox=dict(boxstyle=\"round,pad=0.25\", fc=\"#00000055\", ec=\"none\"),\n            )\n        for z in tops[1:]:\n            ax.axhline(z, color=\"white\", lw=1.0)\n        ax.set_ylim(depth_max, 0)\n        ax.set_xlim(0, 1)\n        ax.set_xticks([])\n        ax.set_ylabel(\"Depth (m)\")\n        ax.set_title(title or f\"{model.sounding_id or 'VES'} layer section\")\n        sm = cm.ScalarMappable(norm=_RHO_NORM, cmap=cmap)\n        cbar = fig.colorbar(sm, ax=ax, pad=0.04)\n        cbar.set_label(\"Resistivity (ohm-m)\")\n        ax.grid(False)\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n\n\ndef plot_geoelectric_section(\n    models: list[LayeredModel],\n    positions: list[float] | None = None,\n    labels: list[str] | None = None,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n    depth_max: float | None = None,\n    title: str = \"Interpreted geoelectric cross-section\",\n):\n    \"\"\"Cross-section through several soundings along a profile.\n\n    Each sounding is drawn as a column at its chainage; layer\n    boundaries are connected between adjacent soundings.\n    \"\"\"\n    style = style or HouseStyle()\n    if positions is None:\n        positions = list(np.arange(len(models), dtype=float) * 100.0)\n    if labels is None:\n        labels = [m.sounding_id or f\"VES {i + 1}\" for i, m in enumerate(models)]\n    if depth_max is None:\n        depth_max = max(\n            (m.depths_top[-1] if m.n_layers > 1 else 10) * 1.35 + 5 for m in models\n        )\n    span = max(positions) - min(positions) or 100.0\n    half_w = span / (len(models) * 2.6)\n    cmap = plt.get_cmap(\"viridis\")\n\n    with figure_context(style):\n        fig, ax = plt.subplots(figsize=(style.figure_width_in, 3.6))\n        for x, model in zip(positions, models):\n            tops = model.depths_top\n            for i, rho in enumerate(model.resistivities):\n                top = tops[i]\n                bottom = tops[i + 1] if i + 1 < len(tops) else depth_max\n                ax.fill_between(\n                    [x - half_w, x + half_w], top, bottom,\n                    color=cmap(_RHO_NORM(max(rho, _RHO_NORM.vmin))), lw=0,\n                )\n            for z in tops[1:]:\n                ax.plot([x - half_w, x + half_w], [z, z], color=\"white\", lw=1.0)\n        # connect boundaries between neighbouring soundings\n        for a in range(len(models) - 1):\n            m1, m2 = models[a], models[a + 1]\n            n_shared = min(m1.n_layers, m2.n_layers) - 1\n            for k in range(1, n_shared + 1):\n                z1 = m1.depths_top[k] if k < m1.n_layers else None\n                z2 = m2.depths_top[k] if k < m2.n_layers else None\n                if z1 is None or z2 is None:\n                    continue\n                ax.plot(\n                    [positions[a] + half_w, positions[a + 1] - half_w],\n                    [z1, z2],\n                    color=\"#777777\", lw=1.0, ls=\"--\",\n                )\n        for x, label in zip(positions, labels):\n            ax.text(\n                x, depth_max * 0.035, label, ha=\"center\", va=\"top\", fontsize=9,\n                fontweight=\"bold\", color=style.accent_color,\n                bbox=dict(boxstyle=\"round,pad=0.25\", fc=\"white\", ec=\"none\", alpha=0.85),\n            )\n        ax.set_ylim(depth_max, 0)\n        ax.set_xlabel(\"Distance along profile (m)\")\n        ax.set_ylabel(\"Depth (m)\")\n        ax.set_title(title)\n        sm = cm.ScalarMappable(norm=_RHO_NORM, cmap=cmap)\n        cbar = fig.colorbar(sm, ax=ax, pad=0.03)\n        cbar.set_label(\"Resistivity (ohm-m)\")\n        ax.grid(False)\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n"}, "groundwater/ves/splice.py": {"t": "text", "d": "\"\"\"Schlumberger segment handling and optional curve splicing.\n\nAt MN segment changes the same AB/2 is read with the old and new MN,\nand the two readings differ slightly (electrode geometry and lateral\nheterogeneity). Both readings are kept in the raw data. For plotting\nand for inversion with the ideal gradient forward model the segments\ncan be spliced into one smooth curve: each segment after the first is\nscaled by the ratio of overlapping readings (multiplicative shift,\nstandard practice), then overlapping points are merged by geometric\nmean.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\n\nfrom ..models import VESSounding\n\n__all__ = [\"splice_segments\"]\n\n\ndef splice_segments(\n    sounding: VESSounding, mode: str = \"merge\"\n) -> tuple[np.ndarray, np.ndarray, list[float]]:\n    \"\"\"Combine a segmented Schlumberger sounding into a single curve.\n\n    Parameters\n    ----------\n    sounding:\n        The sounding with possible duplicate AB/2 readings at segment\n        changes.\n    mode:\n        \"merge\" (default) keeps every segment at its measured level and\n        merges duplicate AB/2 readings by geometric mean. This honours\n        the absolute values of the deep branch that drive the aquifer\n        interpretation and matches how IPI2Win treats the data.\n        \"first\" applies multiplicative shifts so overlaps coincide,\n        anchored to the first (smallest MN) segment; \"last\" anchors to\n        the deepest segment. Shifted modes give a visually smooth\n        curve but redistribute any overlap jump onto the other\n        segments, so they are offered for plotting rather than as the\n        inversion default.\n\n    Returns\n    -------\n    ab2, rho:\n        Strictly increasing AB/2 and the combined apparent resistivity.\n    shifts:\n        The multiplicative shift applied to each segment (all 1.0 for\n        \"merge\"; values far from 1 in the shifted modes indicate noisy\n        overlaps).\n    \"\"\"\n    segments = sounding.segments()\n    if len(segments) <= 1:\n        order = np.argsort(sounding.ab2, kind=\"stable\")\n        return sounding.ab2[order], sounding.rho_app[order], [1.0]\n\n    if mode == \"merge\":\n        shifts = [1.0] * len(segments)\n    else:\n        shifts = [1.0]\n        # cumulative shift so each segment matches the (already shifted) previous\n        for i in range(1, len(segments)):\n            prev_idx = segments[i - 1]\n            cur_idx = segments[i]\n            prev_ab2 = sounding.ab2[prev_idx]\n            cur_ab2 = sounding.ab2[cur_idx]\n            common = np.intersect1d(prev_ab2, cur_ab2)\n            if len(common) == 0:\n                shifts.append(shifts[-1])\n                continue\n            ratios = []\n            for value in common:\n                r_prev = sounding.rho_app[prev_idx][prev_ab2 == value]\n                r_cur = sounding.rho_app[cur_idx][cur_ab2 == value]\n                ratios.append(np.mean(r_prev) / np.mean(r_cur))\n            # geometric mean of overlap ratios\n            shifts.append(shifts[i - 1] * float(np.exp(np.mean(np.log(ratios)))))\n        if mode == \"last\":\n            shifts = [s / shifts[-1] for s in shifts]\n\n    ab2_all, rho_all = [], []\n    for shift, idx in zip(shifts, segments):\n        ab2_all.extend(sounding.ab2[idx])\n        rho_all.extend(sounding.rho_app[idx] * shift)\n    ab2_all = np.asarray(ab2_all)\n    rho_all = np.asarray(rho_all)\n\n    # merge duplicates by geometric mean\n    unique = np.unique(ab2_all)\n    rho_merged = np.array(\n        [np.exp(np.mean(np.log(rho_all[ab2_all == u]))) for u in unique]\n    )\n    return unique, rho_merged, shifts\n"}, "examples/data/rokel/rokel_ves.xlsx": {"t": "b64", "d": "UEsDBBQAAAAIAIi471xGx01IlQAAAM0AAAAQAAAAZG9jUHJvcHMvYXBwLnhtbE3PTQvCMAwG4L9SdreZih6kDkQ9ip68zy51hbYpbYT67+0EP255ecgboi6JIia2mEXxLuRtMzLHDUDWI/o+y8qhiqHke64x3YGMsRoPpB8eA8OibdeAhTEMOMzit7Dp1C5GZ3XPlkJ3sjpRJsPiWDQ6sScfq9wcChDneiU+ixNLOZcrBf+LU8sVU57mym/8ZAW/B7oXUEsDBBQAAAAIAIi471wveuv97wAAACsCAAARAAAAZG9jUHJvcHMvY29yZS54bWzNks9KxDAQh19Fcm8nbbVC6PaieFIQXFC8hWR2N9j8IRlp9+1t424X0QfwmJlfvvkGplNBKB/xOfqAkQymq8kOLgkVNuxAFARAUge0MpVzws3NnY9W0vyMewhSfcg9Qs15CxZJakkSFmARViLrO62EiijJxxNeqxUfPuOQYVoBDmjRUYKqrID1y8RwnIYOLoAFRhht+i6gXom5+ic2d4CdklMya2ocx3Jscm7eoYK3p8eXvG5hXCLpFM6/khF0DLhh58mvzd399oH1Na/bgt8W1c22bgS/FlX7vrj+8LsIW6/Nzvxj47Ng38Gvu+i/AFBLAwQUAAAACACIuO9cmVycIxAGAACcJwAAEwAAAHhsL3RoZW1lL3RoZW1lMS54bWztWltz2jgUfu+v0Hhn9m0LxjaBtrQTc2l227SZhO1OH4URWI1seWSRhH+/RzYQy5YN7ZJNups8BCzp+85FR+foOHnz7i5i6IaIlPJ4YNkv29a7ty/e4FcyJBFBMBmnr/DACqVMXrVaaQDDOH3JExLD3IKLCEt4FMvWXOBbGi8j1uq0291WhGlsoRhHZGB9XixoQNBUUVpvXyC05R8z+BXLVI1lowETV0EmuYi08vlsxfza3j5lz+k6HTKBbjAbWCB/zm+n5E5aiOFUwsTAamc/VmvH0dJIgILJfZQFukn2o9MVCDINOzqdWM52fPbE7Z+Mytp0NG0a4OPxeDi2y9KLcBwE4FG7nsKd9Gy/pEEJtKNp0GTY9tqukaaqjVNP0/d93+ubaJwKjVtP02t33dOOic
