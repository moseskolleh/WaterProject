not increase with log time; Cooper-Jacob does not apply\"\n        )\n    q_day = discharge_m3_per_h * 24.0\n    T = 2.303 * q_day / (4.0 * math.pi * slope)\n    t0_min = 10 ** (-intercept / slope)\n\n    storativity = None\n    if observation_radius_m is not None:\n        t0_day = t0_min / MIN_PER_DAY\n        storativity = 2.25 * T * t0_day / observation_radius_m**2\n\n    # validity: u = r^2 S / (4 T t) at the start of the fit window\n    r_eff = observation_radius_m if observation_radius_m else 0.1\n    S_eff = storativity if storativity else assumed_storativity\n    u_start = r_eff**2 * S_eff / (4.0 * T * (fit_window_min[0] / MIN_PER_DAY))\n    if u_start < config.cooper_jacob_u_max:\n        u_check = (\n            f\"u = {u_start:.2e} at the start of the fitted window, below the \"\n            f\"{config.cooper_jacob_u_max} criterion; the straight line \"\n            \"approximation is valid\"\n        )\n    else:\n        u_check = (\n            f\"u = {u_start:.2e} at the start of the fitted window exceeds \"\n            f\"{config.cooper_jacob_u_max}; early data were excluded or results \"\n            \"should be treated with caution\"\n        )\n\n    return CooperJacobResult(\n        transmissivity_m2_per_day=T,\n        slope_m_per_log_cycle=slope,\n        intercept_t0_min=t0_min,\n        storativity=storativity,\n        fit_window_min=fit_window_min,\n        n_points=int(window.sum()),\n        r_squared=r2,\n        u_check=u_check,\n        discharge_m3_per_h=discharge_m3_per_h,\n    )\n\n\ndef theis_fit(\n    time_min: np.ndarray,\n    drawdown_m: np.ndarray,\n    discharge_m3_per_h: float,\n    radius_m: float = 0.1,\n    observation_well: bool = False,\n) -> TheisResult:\n    \"\"\"Least squares fit of the Theis well function.\n\n    ``s = Q / (4 pi T) W(u)``, ``u = r^2 S / (4 T t)``. Fitting is done\n    in log parameter space to keep T and S positive.\n    \"\"\"\n    t = np.asarray(time_min, dtype=float) / MIN_PER_DAY\n    s = np.asarray(drawdown_m, dtype=float)\n    keep = (t > 0) & (s > 0)\n    t, s = t[keep], s[keep]\n    if len(t) < 5:\n        raise ValueError(\"Not enough readings for a Theis fit\")\n    q_day = discharge_m3_per_h * 24.0\n\n    def model(tt, logT, logS):\n        T = 10.0**logT\n        S = 10.0**logS\n        u = radius_m**2 * S / (4.0 * T * tt)\n        return q_day / (4.0 * math.pi * T) * exp1(u)\n\n    # start from a Cooper-Jacob style estimate\n    slope0 = max((s[-1] - s[len(s) // 2]) / max(np.log10(t[-1] / t[len(s) // 2]), 0.3), 0.1)\n    T0 = 2.303 * q_day / (4.0 * math.pi * slope0)\n    p0 = (math.log10(max(T0, 1e-2)), -3.0)\n    popt, _ = curve_fit(model, t, s, p0=p0, maxfev=20000)\n    T = 10.0 ** popt[0]\n    S = 10.0 ** popt[1]\n    rmse = float(np.sqrt(np.mean((model(t, *popt) - s) ** 2)))\n    return TheisResult(\n        transmissivity_m2_per_day=T,\n        storativity=S,\n        storativity_reliable=bool(observation_well),\n        rmse_m=rmse,\n        discharge_m3_per_h=discharge_m3_per_h,\n        radius_m=radius_m,\n    )\n\n\ndef theis_recovery(\n    recovery_time_min: np.ndarray,\n    residual_drawdown_m: np.ndarray,\n    pumping_duration_min: float,\n    discharge_m3_per_h: float,\n) -> RecoveryResult:\n    \"\"\"Theis recovery analysis on residual drawdown against t/t'.\n\n    ``s' = 2.303 Q / (4 pi T) log10(t/t')`` with t measured since\n    pumping started and t' since it stopped.\n    \"\"\"\n    tp = np.asarray(recovery_time_min, dtype=float)  # t'\n    sp = np.asarray(residual_drawdown_m, dtype=float)\n    keep = (tp > 0) & np.isfinite(sp)\n    tp, sp = tp[keep], sp[keep]\n    if len(tp) < 4:\n        raise ValueError(\"Not enough recovery readings\")\n    ratio = (pumping_duration_min + tp) / tp\n    slope, _, r2 = _line_fit(np.log10(ratio), sp)\n    if slope <= 0:\n        raise ValueError(\"Residual drawdown does not decrease; check the data\")\n    q_day = discharge_m3_per_h * 24.0\n    T = 2.303 * q_day / (4.0 * math.pi * slope)\n    return RecoveryResult(\n        transmissivity_m2_per_day=T,\n        slope_m_per_log_cycle=slope,\n        n_points=len(tp),\n        r_squared=r2,\n        discharge_m3_per_h=discharge_m3_per_h,\n        residual_at_end_m=float(sp[-1]),\n    )\n\n\ndef hantush_bierschenk(\n    step_discharges_m3_per_h: list[float],\n    step_end_drawdowns_m: list[float],\n) -> StepTestResult:\n    \"\"\"Hantush-Bierschenk analysis of a step drawdown test.\n\n    Fits ``s_w = B Q + C Q^2`` through the end-of-step drawdowns by\n    linear regression of s_w/Q on Q. Q is converted to m3/day, so B is\n    in day/m2 and C in day2/m5.\n    \"\"\"\n    q = np.asarray(step_discharges_m3_per_h, dtype=float) * 24.0\n    s = np.asarray(step_end_drawdowns_m, dtype=float)\n    if len(q) < 2:\n        raise ValueError(\"A step test needs at least two steps with discharge\")\n    sq = s / q\n    C, B, r2 = _line_fit(q, sq)\n    if C < 0:\n        # negative well loss has no physical meaning; fall back to pure\n        # aquifer loss\n        C = 0.0\n        B = float(np.mean(sq))\n    steps = []\n    for i, (qi, si) in enumerate(zip(q, s), start=1):\n        eff = 100.0 * B * qi / (B * qi + C * qi**2) if (B * qi + C * qi**2) > 0 else 100.0\n        steps.append(\n            {\n                \"step\": i,\n                \"discharge_m3_per_h\": qi / 24.0,\n                \"drawdown_end_m\": float(si),\n                \"sw_over_q_day_per_m2\": float(si / qi),\n                \"efficiency_percent\": float(eff),\n            }\n        )\n    return StepTestResult(aquifer_loss_B=float(B), well_loss_C=float(C), steps=steps, r_squared=r2)\n\n\n# ---------------------------------------------------------------------------\n# Yield recommendation\n# ---------------------------------------------------------------------------\n\ndef recommend_yield(\n    test: PumpingTest,\n    transmissivity: Optional[float],\n    step_result: Optional[StepTestResult],\n    config: PumpingConfig | None = None,\n    assumed_storativity: float = 1e-3,\n    effective_radius_m: float = 0.1,\n) -> YieldRecommendation:\n    \"\"\"Specific capacity, sustainable yield and pump depth.\n\n    The long term yield solves ``s_proj(Q) = f_avail x s_available``\n    where ``s_proj`` projects Cooper-Jacob drawdown to the design\n    period with the fitted T (plus well losses when a step test is\n    available). The stated safety factor is then applied. Every input\n    is recorded in ``basis`` so the recommendation is traceable.\n    \"\"\"\n    config = config or PumpingConfig()\n    swl = test.static_water_level_m\n\n    # observed end-of-test state\n    q_last = None\n    s_end = None\n    if test.steps:\n        last = test.steps[-1]\n        q_last = last.discharge_m3_per_h\n        if swl is not None:\n            s_end = float(last.water_level_m[-1] - swl)\n\n    specific_capacity = None\n    if q_last and s_end and s_end > 0:\n        specific_capacity = q_last / s_end\n\n    # available drawdown: static level to pump intake less a submergence margin\n    available = None\n    if swl is not None and test.pump_setting_m is not None:\n        available = test.pump_setting_m - swl - config.pump_submergence_min_m\n    elif swl is not None and test.borehole_depth_m is not None:\n        available = test.borehole_depth_m - swl - config.pump_submergence_min_m - 3.0\n\n    usable = available * config.available_drawdown_fraction if available else None\n\n    if transmissivity is None or swl is None:\n        reason = (\n            \"discharge is missing on the field sheet\"\n            if transmissivity is None\n            else \"static water level is missing\"\n        )\n        return YieldRecommendation(\n            specific_capacity_m3hr_per_m=specific_capacity,\n            available_drawdown_m=available,\n            usable_drawdown_m=usable,\n            projected_drawdown_m=None,\n            long_term_yield_m3_per_h=None,\n            safe_yield_m3_per_h=None,\n            safety_factor=config.safety_factor,\n            design_period_days=config.design_period_days,\n            pump_installation_depth_m=None,\n            basis=\"Yield recommendation pending: \" + reason + \".\",\n            pending_reason=reason,\n        )\n\n    t_design = config.design_period_days\n    log_term = math.log10(\n        2.25 * transmissivity * t_design / (effective_radius_m**2 * assumed_storativity)\n    )\n\n    def projected_drawdown(q_m3_per_h: float) -> float:\n        q_day = q_m3_per_h * 24.0\n        s = 2.303 * q_day / (4.0 * math.pi * transmissivity) * log_term\n        if step_result is not None:\n            # B Q + C Q^2 reflects drawdown at the step duration; add the\n            # Cooper-Jacob time projection from step length to design period\n            t_step_min = test.step_length_min or test.pumping_duration_min or 180.0\n            s = step_result.drawdown_at(q_day)\n            s += (\n                2.303\n                * q_day\n                / (4.0 * math.pi * transmissivity)\n                * math.log10(t_design / (t_step_min / MIN_PER_DAY))\n            )\n        return s\n\n    long_term = None\n    if usable and usable > 0:\n        # bisect Q so projected drawdown equals the usable drawdown\n        q_lo, q_hi = 0.01, 200.0\n        for _ in range(80):\n            q_mid = 0.5 * (q_lo + q_hi)\n            if projected_drawdown(q_mid) > usable:\n                q_hi = q_mid\n            else:\n                q_lo = q_mid\n        long_term = q_lo\n\n    safe = long_term / config.safety_factor if long_term else None\n\n    pump_depth = None\n    if safe is not None:\n        s_at_safe = projected_drawdown(safe)\n        pump_depth = swl + s_at_safe + config.seasonal_allowance_m + config.pump_submergence_min_m\n        if test.borehole_depth_m:\n            pump_depth = min(pump_depth, test.borehole_depth_m - 3.0)\n        pump_depth = math.ceil(pump_depth)\n\n    basis = (\n        f\"Transmissivity {transmissivity:.1f} m2/day; drawdown projected to \"\n        f\"{t_design:.0f} days with storativity assumed {assumed_storativity:g} and \"\n        f\"effective radius {effective_radius_m} m; usable drawdown taken as \"\n        f\"{config.available_drawdown_fraction:.0%} of the available drawdown\"\n        + (\n            f\" {available:.1f} m (static level to pump intake less \"\n            f\"{config.pump_submergence_min_m:.0f} m submergence)\"\n            if available\n            else \"\"\n        )\n        + (\n            \"; well losses from the step test are included\"\n            if step_result is not None\n            else \"\"\n        )\n        + f\". A safety factor of {config.safety_factor} is applied to the long \"\n        \"term yield.\"\n    )\n    return YieldRecommendation(\n        specific_capacity_m3hr_per_m=specific_capacity,\n        available_drawdown_m=available,\n        usable_drawdown_m=usable,\n        projected_drawdown_m=projected_drawdown(safe) if safe else None,\n        long_term_yield_m3_per_h=long_term,\n        safe_yield_m3_per_h=safe,\n        safety_factor=config.safety_factor,\n        design_period_days=t_design,\n        pump_installation_depth_m=pump_depth,\n        basis=basis,\n    )\n\n\n# ---------------------------------------------------------------------------\n# Orchestration\n# ---------------------------------------------------------------------------\n\ndef analyse_pumping_test(\n    test: PumpingTest,\n    config: PumpingConfig | None = None,\n    observation_radius_m: float | None = None,\n) -> PumpingTestAnalysis:\n    \"\"\"Run every applicable analysis on a parsed pumping test.\n\n    Methods that need missing inputs (discharge, static level) are\n    skipped with a flag instead of failing, so partially filled sheets\n    still produce curves and a report skeleton.\n    \"\"\"\n    config = config or PumpingConfig()\n    analysis = PumpingTestAnalysis(test=test)\n    # drop parse-time discharge flags that the analyst has since resolved\n    flags = [\n        f\n        for f in test.flags\n        if not (\n            f.code in (\"missing_discharge\", \"discharge_ambiguous\")\n            and all(s.discharge_m3_per_h is not None for s in test.steps)\n        )\n    ]\n    swl = test.static_water_level_m\n\n    if test.steps and swl is not None:\n        last = test.steps[-1]\n        analysis.max_drawdown_m = float(np.nanmax(last.water_level_m) - swl)\n        tail = last.water_level_m[-3:]\n        if len(tail) >= 2 and (np.max(tail) - np.min(tail)) <= 0.05:\n            analysis.stabilised_level_m = float(np.mean(tail))\n\n    # ---- Cooper-Jacob and Theis on the first step -----------------------------\n    # The first step pumps at a single rate from static conditions, so the\n    # single well solutions apply directly (later steps would need\n    # superposition of the earlier rates).\n    if swl is not None and test.steps:\n        step = test.steps[0]\n        q = step.discharge_m3_per_h\n        if q is not None:\n            t = np.where(step.time_min <= 0, np.nan, step.time_min)\n            s = test.drawdown(step)\n            keep = np.isfinite(t) & np.isfinite(s)\n            try:\n                analysis.cooper_jacob = cooper_jacob(\n                    t[keep], s[keep], q, config,\n                    observation_radius_m=observation_radius_m,\n                )\n            except ValueError as exc:\n                flags.append(DataFlag(\"warning\", \"cooper_jacob_failed\", str(exc)))\n            try:\n                analysis.theis = theis_fit(\n                    t[keep], s[keep], q,\n                    observation_well=observation_radius_m is not None,\n                    radius_m=observation_radius_m or 0.1,\n                )\n            except (ValueError, RuntimeError) as exc:\n                flags.append(DataFlag(\"warning\", \"theis_failed\", str(exc)))\n\n    # ---- recovery -----------------------------------------------------------\n    residual = test.residual_drawdown()\n    if residual is not None and test.recovery_time_min is not None:\n        q_rec = None\n        for step in reversed(test.steps):\n            if step.discharge_m3_per_h is not None:\n                q_rec = step.discharge_m3_per_h\n                break\n        if q_rec is not None and test.pumping_duration_min:\n            try:\n                analysis.recovery = theis_recovery(\n                    test.recovery_time_min, residual, test.pumping_duration_min, q_rec\n                )\n            except ValueError as exc:\n                flags.append(DataFlag(\"warning\", \"recovery_failed\", str(exc)))\n\n    # ---- step test ----------------------------------------------------------\n    if test.test_type.startswith(\"step\") and swl is not None and len(test.steps) >= 2:\n        with_q = [s for s in test.steps if s.discharge_m3_per_h is not None]\n        if len(with_q) >= 2:\n            try:\n                analysis.step_test = hantush_bierschenk(\n                    [s.discharge_m3_per_h for s in with_q],\n                    [float(s.water_level_m[-1] - swl) for s in with_q],\n                )\n            except ValueError as exc:\n                flags.append(DataFlag(\"warning\", \"step_test_failed\", str(exc)))\n        else:\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    \"step_test_pending\",\n                    \"Step test analysis pending: discharge per step is missing.\",\n                )\n            )\n\n    # ---- yield ---------------------------------------------------------------\n    analysis.yield_recommendation = recommend_yield(\n        test,\n        analysis.transmissivity_m2_per_day,\n        analysis.step_test,\n        config,\n    )\n\n    analysis.flags = flags\n    return analysis\n"}, "groundwater/hydraulics/plots.py": {"t": "text", "d": "\"\"\"Pumping test diagnostic plots.\n\nAll plots work from the parsed test (true drawdown recomputed from\nstatic water level) and accept the analysis results for fitted line\noverlays. Missing discharge does not block the water level and\ndrawdown curves.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nimport matplotlib.pyplot as plt\nimport numpy as np\n\nfrom ..config import HouseStyle\nfrom ..models import PumpingTest\nfrom ..plotting import figure_context, save_figure\nfrom .analysis import (\n    CooperJacobResult,\n    RecoveryResult,\n    StepTestResult,\n    TheisResult,\n)\n\n__all__ = [\n    \"plot_test_overview\",\n    \"plot_cooper_jacob\",\n    \"plot_theis\",\n    \"plot_recovery\",\n    \"plot_step_test\",\n]\n\n\ndef plot_test_overview(\n    test: PumpingTest,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n):\n    \"\"\"Water level against time for the whole test including recovery.\"\"\"\n    style = style or HouseStyle()\n    with figure_context(style):\n        fig, ax = plt.subplots(figsize=(style.figure_width_in, 3.2))\n        t_end = 0.0\n        for step in test.steps:\n            label = step.label if len(test.steps) > 1 else \"pumping phase\"\n            ax.plot(step.time_min, step.water_level_m, \"-o\", ms=3,\n                    color=style.accent_color, lw=1.2,\n                    label=label if step.step_number in (1,) else None)\n            t_end = max(t_end, float(step.time_min.max()))\n        if test.recovery_time_min is not None:\n            ax.plot(test.recovery_time_min + t_end, test.recovery_level_m, \"-s\",\n                    ms=3, color=style.secondary_color, lw=1.2, label=\"recovery\")\n        if test.static_water_level_m is not None:\n            ax.axhline(test.static_water_level_m, color=\"#666666\", lw=1.0, ls=\"--\",\n                       label=f\"static water level {test.static_water_level_m:.2f} m\")\n        if test.pump_setting_m:\n            ax.axhline(test.pump_setting_m, color=\"#999999\", lw=1.0, ls=\":\",\n                       label=f\"pump setting {test.pump_setting_m:.0f} m\")\n        ax.invert_yaxis()\n        ax.set_xlabel(\"Time since pumping started (min)\")\n        ax.set_ylabel(\"Water level (m below datum)\")\n        title = \"Pumping test overview\"\n        if test.site.community:\n            title += f\" - {test.site.community}\"\n        ax.set_title(title)\n        ax.legend(loc=\"best\")\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n\n\ndef plot_cooper_jacob(\n    time_min: np.ndarray,\n    drawdown_m: np.ndarray,\n    result: CooperJacobResult | None = None,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n    title: str = \"Cooper-Jacob straight line analysis\",\n):\n    \"\"\"Semi-log drawdown against time with the fitted straight line.\"\"\"\n    style = style or HouseStyle()\n    t = np.asarray(time_min, dtype=float)\n    s = np.asarray(drawdown_m, dtype=float)\n    keep = t > 0\n    with figure_context(style):\n        fig, ax = plt.subplots(figsize=(style.figure_width_in * 0.85, 3.2))\n        ax.semilogx(t[keep], s[keep], \"o\", ms=4, mfc=\"white\",\n                    mec=style.accent_color, mew=1.2, label=\"drawdown\")\n        if result is not None:\n            t_line = np.geomspace(max(result.intercept_t0_min, t[keep].min() / 3), t[keep].max() * 1.3, 50)\n            s_line = result.slope_m_per_log_cycle * np.log10(t_line / result.intercept_t0_min)\n            ax.semilogx(t_line, s_line, \"-\", color=style.secondary_color, lw=1.8,\n                        label=(\n                            f\"fit: {result.slope_m_per_log_cycle:.2f} m/log cycle, \"\n                            f\"T = {result.transmissivity_m2_per_day:.1f} m2/day\"\n                        ))\n            ax.axvspan(*result.fit_window_min, color=style.accent_color, alpha=0.08,\n                       label=\"fitted window\")\n        ax.set_xlabel(\"Time (min)\")\n        ax.set_ylabel(\"Drawdown (m)\")\n        ax.invert_yaxis()\n        ax.set_title(title)\n        ax.legend(loc=\"best\")\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n\n\ndef plot_theis(\n    time_min: np.ndarray,\n    drawdown_m: np.ndarray,\n    result: TheisResult | None = None,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n    title: str = \"Theis curve fit\",\n):\n    \"\"\"Log-log drawdown against time with the fitted Theis curve.\"\"\"\n    from scipy.special import exp1\n\n    style = style or HouseStyle()\n    t = np.asarray(time_min, dtype=float)\n    s = np.asarray(drawdown_m, dtype=float)\n    keep = (t > 0) & (s > 0)\n    with figure_context(style):\n        fig, ax = plt.subplots(figsize=(style.figure_width_in * 0.85, 3.2))\n        ax.loglog(t[keep], s[keep], \"o\", ms=4, mfc=\"white\",\n                  mec=style.accent_color, mew=1.2, label=\"drawdown\")\n        if result is not None:\n            t_line = np.geomspace(t[keep].min(), t[keep].max(), 80)\n            t_day = t_line / 1440.0\n            q_day = result.discharge_m3_per_h * 24.0\n            u = result.radius_m**2 * result.storativity / (\n                4.0 * result.transmissivity_m2_per_day * t_day\n            )\n            s_line = q_day / (4.0 * np.pi * result.transmissivity_m2_per_day) * exp1(u)\n            label = (\n                f\"Theis fit: T = {result.transmissivity_m2_per_day:.1f} m2/day, \"\n                f\"S = {result.storativity:.1e}\"\n            )\n            if not result.storativity_reliable:\n                label += \" (S indicative)\"\n            ax.loglog(t_line, s_line, \"-\", color=style.secondary_color, lw=1.8, label=label)\n        ax.set_xlabel(\"Time (min)\")\n        ax.set_ylabel(\"Drawdown (m)\")\n        ax.set_title(title)\n        ax.legend(loc=\"best\")\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n\n\ndef plot_recovery(\n    recovery_time_min: np.ndarray,\n    residual_drawdown_m: np.ndarray,\n    pumping_duration_min: float,\n    result: RecoveryResult | None = None,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n    title: str = \"Theis recovery analysis\",\n):\n    \"\"\"Residual drawdown against t/t' on a semi-log axis.\"\"\"\n    style = style or HouseStyle()\n    tp = np.asarray(recovery_time_min, dtype=float)\n    sp = np.asarray(residual_drawdown_m, dtype=float)\n    keep = tp > 0\n    ratio = (pumping_duration_min + tp[keep]) / tp[keep]\n    with figure_context(style):\n        fig, ax = plt.subplots(figsize=(style.figure_width_in * 0.85, 3.2))\n        ax.semilogx(ratio, sp[keep], \"o\", ms=4, mfc=\"white\",\n                    mec=style.accent_color, mew=1.2, label=\"residual drawdown\")\n        if result is not None:\n            r_line = np.geomspace(1.001, ratio.max() * 1.2, 50)\n            s_line = result.slope_m_per_log_cycle * np.log10(r_line)\n            ax.semilogx(r_line, s_line, \"-\", color=style.secondary_color, lw=1.8,\n                        label=(\n                            f\"fit: {result.slope_m_per_log_cycle:.2f} m/log cycle, \"\n                            f\"T = {result.transmissivity_m2_per_day:.1f} m2/day\"\n                        ))\n        ax.set_xlabel(\"t / t'\")\n        ax.set_ylabel(\"Residual drawdown (m)\")\n        ax.set_title(title)\n        ax.legend(loc=\"best\")\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n\n\ndef plot_step_test(\n    test: PumpingTest,\n    result: StepTestResult | None = None,\n    path: str | Path | None = None,\n    style: HouseStyle | None = None,\n):\n    \"\"\"Step test figure: drawdown per step, plus the Hantush-Bierschenk\n    sw/Q against Q fit when discharges are available.\"\"\"\n    style = style or HouseStyle()\n    swl = test.static_water_level_m\n    with figure_context(style):\n        if result is not None:\n            fig, (ax, ax2) = plt.subplots(1, 2, figsize=(style.figure_width_in, 3.2))\n        else:\n            fig, ax = plt.subplots(figsize=(style.figure_width_in * 0.85, 3.2))\n            ax2 = None\n        for step in test.steps:\n            s = step.water_level_m - swl if swl is not None else step.water_level_m\n            q_note = (\n                f\", Q = {step.discharge_m3_per_h:.1f} m3/h\"\n                if step.discharge_m3_per_h is not None\n                else \", Q pending\"\n            )\n            ax.plot(step.time_min, s, \"-o\", ms=3, lw=1.2, label=f\"{step.label}{q_note}\")\n        ax.invert_yaxis()\n        ax.set_xlabel(\"Time since test start (min)\")\n        ax.set_ylabel(\"Drawdown below static (m)\" if swl is not None else \"Water level (m)\")\n        ax.set_title(\"Step drawdown test\")\n        ax.legend(loc=\"best\", fontsize=8)\n\n        if ax2 is not None and result is not None:\n            q = np.array([s[\"discharge_m3_per_h\"] for s in result.steps]) * 24.0\n            sq = np.array([s[\"sw_over_q_day_per_m2\"] for s in result.steps])\n            ax2.plot(q, sq, \"o\", ms=5, mfc=\"white\", mec=style.accent_color, mew=1.4,\n                     label=\"observed\")\n            q_line = np.linspace(0, q.max() * 1.15, 40)\n            ax2.plot(q_line, result.aquifer_loss_B + result.well_loss_C * q_line, \"-\",\n                     color=style.secondary_color, lw=1.8,\n                     label=(\n                         f\"B = {result.aquifer_loss_B:.2e} day/m2\\n\"\n                         f\"C = {result.well_loss_C:.2e} day2/m5\"\n                     ))\n            ax2.set_xlabel(\"Discharge Q (m3/day)\")\n            ax2.set_ylabel(\"s_w / Q (day/m2)\")\n            ax2.set_title(\"Hantush-Bierschenk\")\n            ax2.legend(loc=\"best\", fontsize=8)\n        fig.tight_layout()\n        if path is not None:\n            return save_figure(fig, path, style)\n        return fig\n"}, "groundwater/ingestion/__init__.py": {"t": "text", "d": "\"\"\"Data ingestion: standard templates, parsers and consistency checks.\"\"\"\n\nfrom .templates import write_all_templates\nfrom .ves import read_ves_workbook, read_ves_csv\nfrom .pumping import read_pumping_workbook, read_pumping_docx\nfrom .drilling import read_drilling_workbook\nfrom .waterquality import read_quality_workbook\nfrom .checks import check_site_consistency, check_all\n\n__all__ = [\n    \"write_all_templates\",\n    \"read_ves_workbook\",\n    \"read_ves_csv\",\n    \"read_pumping_workbook\",\n    \"read_pumping_docx\",\n    \"read_drilling_workbook\",\n    \"read_quality_workbook\",\n    \"check_site_consistency\",\n    \"check_all\",\n]\n"}, "groundwater/ingestion/checks.py": {"t": "text", "d": "\"\"\"Metadata consistency checks.\n\nField sheets are often filled by copying the previous sheet, so wrong\ndistricts, communities and coordinates slip through (the Rokel survey\nreport states \"Port Loko\" for a sounding whose coordinates fall in the\nWestern Area). These checks flag such conflicts before they reach a\nreport.\n\nDistrict extents are approximate bounding boxes bundled with the\npackage (``data/sl_districts.csv``); they are meant to catch gross\ncopy-over errors, not to adjudicate points near district boundaries.\nA configurable buffer keeps borderline points from being flagged.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport csv\nfrom importlib import resources\nfrom typing import Iterable\n\nfrom ..geo import infer_zone_for_sierra_leone, utm_to_geographic\nfrom ..models import DataFlag, SiteMetadata\n\n_BUFFER_DEG = 0.05  # about 5.5 km; boundary points are not flagged\n\n# Sierra Leone in geographic coordinates, generous margin\n_SL_BOUNDS = (-13.6, -10.0, 6.7, 10.2)  # lon_min, lon_max, lat_min, lat_max\n\n\ndef _load_districts() -> dict[str, dict]:\n    with resources.files(\"groundwater.data\").joinpath(\"sl_districts.csv\").open(\n        \"r\", encoding=\"utf-8\"\n    ) as fh:\n        rows = list(csv.DictReader(fh))\n    return {\n        row[\"district\"].strip().lower(): {\n            \"district\": row[\"district\"],\n            \"province\": row[\"province\"],\n            \"lon_min\": float(row[\"lon_min\"]),\n            \"lon_max\": float(row[\"lon_max\"]),\n            \"lat_min\": float(row[\"lat_min\"]),\n            \"lat_max\": float(row[\"lat_max\"]),\n        }\n        for row in rows\n    }\n\n\n_DISTRICTS = None\n\n\ndef districts() -> dict[str, dict]:\n    global _DISTRICTS\n    if _DISTRICTS is None:\n        _DISTRICTS = _load_districts()\n    return _DISTRICTS\n\n\ndef _normalise_district(name: str) -> str | None:\n    \"\"\"Map a stated district name onto the lookup table.\"\"\"\n    key = name.strip().lower()\n    if not key:\n        return None\n    table = districts()\n    if key in table:\n        return key\n    # \"Western Area\" without urban/rural, \"Western Urban\", abbreviations\n    candidates = [k for k in table if key in k or k in key]\n    if candidates:\n        return candidates[0]\n    if \"western\" in key:\n        return \"western area rural\"\n    return None\n\n\ndef districts_containing(lat: float, lon: float, buffer_deg: float = _BUFFER_DEG) -> list[str]:\n    \"\"\"Districts whose (approximate) box contains the point.\"\"\"\n    hits = []\n    for key, box in districts().items():\n        if (\n            box[\"lon_min\"] - buffer_deg <= lon <= box[\"lon_max\"] + buffer_deg\n            and box[\"lat_min\"] - buffer_deg <= lat <= box[\"lat_max\"] + buffer_deg\n        ):\n            hits.append(box[\"district\"])\n    return hits\n\n\ndef check_site_consistency(site: SiteMetadata, context: str = \"\") -> list[DataFlag]:\n    \"\"\"Check one site record: coordinates against country, zone and district.\"\"\"\n    flags: list[DataFlag] = []\n    ctx = context or site.community or \"\"\n\n    if site.easting is None or site.northing is None:\n        flags.append(\n            DataFlag(\"info\", \"missing_coordinates\", \"No GPS coordinates recorded.\", ctx)\n        )\n        return flags\n\n    zone = site.utm_zone\n    if zone is None:\n        zone = infer_zone_for_sierra_leone(site.easting)\n        flags.append(\n            DataFlag(\n                \"info\",\n                \"utm_zone_assumed\",\n                f\"UTM zone not recorded; assumed {zone}N from the easting.\",\n                ctx,\n            )\n        )\n    lat, lon = utm_to_geographic(site.easting, site.northing, zone)\n\n    lon_min, lon_max, lat_min, lat_max = _SL_BOUNDS\n    if not (lon_min <= lon <= lon_max and lat_min <= lat <= lat_max):\n        flags.append(\n            DataFlag(\n                \"error\",\n                \"coordinates_outside_country\",\n                f\"Coordinates convert to {lat:.4f} N, {lon:.4f} E which is outside \"\n                \"Sierra Leone; check easting/northing and the UTM zone.\",\n                ctx,\n            )\n        )\n        return flags\n\n    stated = _normalise_district(site.district)\n    if site.district and stated is None:\n        flags.append(\n            DataFlag(\n                \"warning\",\n                \"unknown_district\",\n                f\"District '{site.district}' is not a recognised Sierra Leone \"\n                \"district name.\",\n                ctx,\n            )\n        )\n    elif stated is not None:\n        box = districts()[stated]\n        inside = (\n            box[\"lon_min\"] - _BUFFER_DEG <= lon <= box[\"lon_max\"] + _BUFFER_DEG\n            and box[\"lat_min\"] - _BUFFER_DEG <= lat <= box[\"lat_max\"] + _BUFFER_DEG\n        )\n        if not inside:\n            likely = districts_containing(lat, lon)\n            hint = f\" The point falls in {', '.join(likely)}.\" if likely else \"\"\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    \"district_coordinate_conflict\",\n                    f\"Stated district '{site.district}' does not contain the \"\n                    f\"coordinates ({lat:.4f} N, {lon:.4f} E).{hint} District \"\n                    \"extents are approximate; verify against the field notes.\",\n                    ctx,\n                )\n            )\n    return flags\n\n\ndef check_group_consistency(\n    sites: Iterable[tuple[str, SiteMetadata]], max_separation_km: float = 5.0\n) -> list[DataFlag]:\n    \"\"\"Cross-record checks for one survey or project.\n\n    Flags differing client/community/district values between sheets of\n    the same project and points unexpectedly far apart.\n    \"\"\"\n    flags: list[DataFlag] = []\n    records = list(sites)\n    if len(records) < 2:\n        return flags\n\n    for field in (\"client\", \"community\", \"district\"):\n        values = {}\n        for label, site in records:\n            value = getattr(site, field).strip()\n            if value:\n                values.setdefault(value.lower(), (value, []))[1].append(label)\n        if len(values) > 1:\n            detail = \"; \".join(\n                f\"'{v}' on {', '.join(labels)}\" for v, labels in values.values()\n            )\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    f\"inconsistent_{field}\",\n                    f\"Different {field} values within one project: {detail}. \"\n                    \"This usually comes from copying the previous sheet.\",\n                )\n            )\n\n    # pairwise separation\n    points = []\n    for label, site in records:\n        if site.easting is not None and site.northing is not None:\n            points.append((label, site.easting, site.northing))\n    for i in range(len(points)):\n        for j in range(i + 1, len(points)):\n            li, ei, ni = points[i]\n            lj, ej, nj = points[j]\n            dist_km = ((ei - ej) ** 2 + (ni - nj) ** 2) ** 0.5 / 1000.0\n            if dist_km > max_separation_km:\n                flags.append(\n                    DataFlag(\n                        \"warning\",\n                        \"points_far_apart\",\n                        f\"{li} and {lj} are {dist_km:.1f} km apart, which is \"\n                        \"unusually far for one site; check the coordinates.\",\n                    )\n                )\n    return flags\n\n\ndef check_all(records: Iterable[tuple[str, SiteMetadata]]) -> list[DataFlag]:\n    \"\"\"Per-site and cross-site checks for a set of (label, site) records.\"\"\"\n    records = list(records)\n    flags: list[DataFlag] = []\n    for label, site in records:\n        flags.extend(check_site_consistency(site, context=label))\n    flags.extend(check_group_consistency(records))\n    return flags\n"}, "groundwater/ingestion/common.py": {"t": "text", "d": "\"\"\"Shared helpers for reading field sheet layouts.\n\nField sheets use a header block of ``Label: value`` pairs followed by\none or more data tables. Labels vary between sheets (\"Field\nSupervisor\", \"Test conducted by\", \"Operator\"), values sometimes live\nin the same cell after a colon and sometimes several columns to the\nright, and numbers may be stored as text with leading zeros. The\nhelpers here deal with all of that in one place.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport re\nfrom pathlib import Path\n\nfrom openpyxl import load_workbook\n\nfrom ..models import SiteMetadata\nfrom ..utils import clean_text, parse_number\n\n# Canonical header keys and the label patterns that map to them.\nLABEL_PATTERNS: dict[str, list[str]] = {\n    \"client\": [r\"^client\\b\"],\n    \"project\": [r\"^project(?!\\s*ref)\"],\n    \"project_ref\": [r\"^project\\s*ref\", r\"^geophysics\\s*ref\"],\n    \"community\": [r\"^community\\b\", r\"^village\\b\", r\"^location\\b\"],\n    \"chiefdom\": [r\"^chiefdom\\b\"],\n    \"district\": [r\"^district\\b\"],\n    \"sounding_id\": [r\"^sounding\\s*(number|no)\", r\"^ves\\s*(point|number|no)\"],\n    \"date\": [r\"^date\\b\"],\n    \"supervisor\": [\n        r\"^field\\s*supervisor\",\n        r\"^test\\s*conducted\\s*by\",\n        r\"^operator\\b\",\n        r\"^supervisor\\b\",\n    ],\n    \"contractor\": [r\"^(drilling\\s*)?contractor\\b\"],\n    \"easting\": [r\"^gps\\s*coordinate\\s*east\", r\"^east(ing)?\\b\", r\"^utm\\s*east\"],\n    \"northing\": [r\"^gps\\s*coordinate\\s*north\", r\"^north(ing)?\\b\", r\"^utm\\s*north\"],\n    \"utm_zone\": [r\"^utm\\s*zone\", r\"^zone\\b\"],\n    \"elevation_m\": [r\"^elevation\", r\"^altitude\"],\n    \"array_type\": [r\"^array\\b\", r\"^electrode\\s*(array|configuration)\"],\n    \"instrument\": [r\"^instrument\\b\", r\"^equipment\\b\"],\n    \"borehole_ref\": [r\"^borehole\\s*/?\\s*ref\", r\"^bh\\s*ref\", r\"^borehole\\s*(number|no)\"],\n    \"borehole_depth_m\": [r\"^depth\\s*of\\s*borehole\", r\"^borehole\\s*depth\", r\"^total\\s*depth\", r\"^depth\\b\"],\n    \"static_water_level_m\": [r\"^static\\s*water\\s*level\", r\"^swl\\b\"],\n    \"pump_setting_m\": [r\"^pump\\s*setting\", r\"^pump\\s*installation\\s*depth\"],\n    \"step_length_min\": [r\"^length\\s*of\\s*each\\s*step\", r\"^step\\s*length\"],\n    \"test_type\": [r\"^test\\s*type\"],\n    \"start_time\": [r\"^time\\b\", r\"^start\\s*time\"],\n    \"duration\": [r\"^duration\"],\n    \"drilling_method\": [r\"^(drilling\\s*)?method\\b\"],\n    \"start_date\": [r\"^(drilling\\s*)?start\\s*date\"],\n    \"completion_date\": [r\"^compl(etion)?\\.?\\s*date\"],\n    \"status\": [r\"^(bh\\s*)?status\"],\n    \"sample_id\": [r\"^sample\\s*(id|number|no|ref)\"],\n    \"laboratory\": [r\"^lab(oratory)?\\b\"],\n    \"sample_date\": [r\"^sample\\s*date\", r\"^date\\s*sampled\"],\n    \"grouting_depth_m\": [r\"^grout(ing)?\\b\"],\n    \"drill_rig\": [r\"^drill\\s*rig\"],\n}\n\n_COMPILED = {\n    key: [re.compile(p, re.IGNORECASE) for p in pats]\n    for key, pats in LABEL_PATTERNS.items()\n}\n\nNUMERIC_HEADER_KEYS = {\n    \"easting\",\n    \"northing\",\n    \"elevation_m\",\n    \"borehole_depth_m\",\n    \"static_water_level_m\",\n    \"pump_setting_m\",\n    \"step_length_min\",\n    \"grouting_depth_m\",\n}\n\n\ndef load_grid(path: str | Path, sheet: str | None = None) -> tuple[list[list], str]:\n    \"\"\"Load a worksheet as a rectangular grid of raw cell values.\"\"\"\n    wb = load_workbook(path, data_only=True, read_only=True)\n    ws = wb[sheet] if sheet else wb.worksheets[0]\n    grid = [list(row) for row in ws.iter_rows(values_only=True)]\n    title = ws.title\n    wb.close()\n    return grid, title\n\n\ndef sheet_names(path: str | Path) -> list[str]:\n    wb = load_workbook(path, read_only=True)\n    names = list(wb.sheetnames)\n    wb.close()\n    return names\n\n\ndef match_label(text: str) -> str | None:\n    \"\"\"Return the canonical key for a label cell, if any.\"\"\"\n    matched = match_label_priority(text)\n    return matched[0] if matched else None\n\n\ndef match_label_priority(text: str) -> tuple[str, int] | None:\n    \"\"\"Return ``(key, priority)`` for a label cell.\n\n    Priority is the pattern index within the key's list: 0 is the most\n    specific wording (\"Depth of Borehole\"), higher numbers are generic\n    fallbacks (\"Depth\"). A more specific match later in the sheet may\n    overwrite a generic one.\n    \"\"\"\n    label = clean_text(text).rstrip(\":\").strip()\n    if not label:\n        return None\n    best: tuple[str, int] | None = None\n    for key, patterns in _COMPILED.items():\n        for priority, pattern in enumerate(patterns):\n            if pattern.search(label):\n                if best is None or priority < best[1]:\n                    if priority == 0:\n                        return key, 0\n                    best = (key, priority)\n                break\n    return best\n\n\ndef split_inline_value(cell_text: str) -> tuple[str, str | None]:\n    \"\"\"Split ``\"Community: Kuntoloh\"`` into label and inline value.\"\"\"\n    text = clean_text(cell_text)\n    if \":\" in text:\n        label, _, value = text.partition(\":\")\n        value = value.strip()\n        return label, value if value else None\n    return text, None\n\n\ndef extract_header_fields(grid: list[list], max_rows: int = 30) -> dict:\n    \"\"\"Scan the top of a sheet for ``Label -> value`` pairs.\n\n    A value is taken from the same cell after a colon when present,\n    otherwise from the next non-empty cell to the right. The first\n    occurrence of a key wins, except that a more specific label wording\n    later in the sheet (\"Depth of Borehole\") overrides a generic one\n    seen earlier (\"Depth\").\n    \"\"\"\n    fields: dict = {}\n    priorities: dict[str, int] = {}\n    for r, row in enumerate(grid[:max_rows]):\n        for c, cell in enumerate(row):\n            if cell is None or isinstance(cell, (int, float)):\n                continue\n            label_text, inline_value = split_inline_value(str(cell))\n            matched = match_label_priority(label_text)\n            if matched is None:\n                continue\n            key, priority = matched\n            if key in fields and priorities.get(key, 99) <= priority:\n                continue\n            value = inline_value\n            if value is None:\n                for cc in range(c + 1, min(c + 8, len(row))):\n                    nxt = row[cc]\n                    if nxt is not None and clean_text(nxt) != \"\":\n                        # Stop if the neighbouring cell is itself a label\n                        # (with or without its own inline value).\n                        if not isinstance(nxt, (int, float)):\n                            nxt_label, _ = split_inline_value(str(nxt))\n                            if match_label(nxt_label):\n                                break\n                        value = nxt\n                        break\n            if value is None:\n                continue\n            if key in NUMERIC_HEADER_KEYS:\n                number = parse_number(value)\n                if number is not None:\n                    fields[key] = number\n                    priorities[key] = priority\n            else:\n                fields[key] = clean_text(value)\n                priorities[key] = priority\n    return fields\n\n\ndef site_from_fields(fields: dict, source: str = \"\") -> SiteMetadata:\n    \"\"\"Build SiteMetadata from extracted header fields.\"\"\"\n    zone = fields.get(\"utm_zone\")\n    if isinstance(zone, str):\n        zone = parse_number(zone)\n    return SiteMetadata(\n        client=fields.get(\"client\", \"\"),\n        project=fields.get(\"project\", \"\"),\n        community=fields.get(\"community\", \"\"),\n        chiefdom=fields.get(\"chiefdom\", \"\"),\n        district=fields.get(\"district\", \"\"),\n        project_ref=fields.get(\"project_ref\", \"\"),\n        easting=fields.get(\"easting\"),\n        northing=fields.get(\"northing\"),\n        utm_zone=int(zone) if zone else None,\n        elevation_m=fields.get(\"elevation_m\"),\n        date=str(fields.get(\"date\", \"\")),\n        supervisor=fields.get(\"supervisor\", \"\"),\n        contractor=fields.get(\"contractor\", \"\"),\n        source=source,\n    )\n\n\ndef find_row(grid: list[list], predicate, start: int = 0) -> int | None:\n    \"\"\"Index of the first row for which ``predicate(row)`` is true.\"\"\"\n    for r in range(start, len(grid)):\n        if predicate(grid[r]):\n            return r\n    return None\n\n\ndef row_text(row: list) -> list[str]:\n    return [clean_text(c).lower() for c in row]\n"}, "groundwater/ingestion/drilling.py": {"t": "text", "d": "\"\"\"Parser for drilling log sheets (Excel template and WiNGiN style tables).\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nfrom ..models import DataFlag, DrillingLog, LithologyInterval\nfrom ..utils import clean_text, parse_depth_interval, parse_number\nfrom . import common\n\n\ndef _find_log_header(grid: list[list]) -> tuple[int, dict] | None:\n    \"\"\"Locate the drilling table header row and map its columns.\"\"\"\n    for r, row in enumerate(grid):\n        texts = common.row_text(row)\n        cols: dict[str, int] = {}\n        for c, t in enumerate(texts):\n            if not t:\n                continue\n            if (\"depth\" in t and \"interval\" in t) or t.startswith(\"depth /\"):\n                cols[\"interval\"] = c\n            elif t.startswith(\"depth\") and \"interval\" not in cols:\n                cols.setdefault(\"interval\", c)\n            elif t.startswith(\"from\"):\n                cols.setdefault(\"from_time\", c)\n            elif t.startswith(\"to\"):\n                cols.setdefault(\"to_time\", c)\n            elif \"penetration\" in t:\n                cols[\"rate\"] = c\n            elif \"sample\" in t or \"litholog\" in t or \"description\" in t:\n                cols.setdefault(\"description\", c)\n            elif \"diameter\" in t or \"bit\" in t:\n                cols.setdefault(\"diameter\", c)\n            elif \"strike\" in t:\n                cols[\"strike\"] = c\n        if \"interval\" in cols:\n            return r, cols\n    return None\n\n\ndef read_drilling_workbook(path: str | Path) -> DrillingLog:\n    grid, _ = common.load_grid(path)\n    return drilling_from_grid(grid, source=str(path))\n\n\ndef drilling_from_grid(grid: list[list], source: str = \"\") -> DrillingLog:\n    fields = common.extract_header_fields(grid, max_rows=len(grid))\n    site = common.site_from_fields(fields, source=source)\n    flags: list[DataFlag] = []\n\n    located = _find_log_header(grid)\n    intervals: list[LithologyInterval] = []\n    strikes: list[float] = []\n    if located is not None:\n        header_row, cols = located\n        for row in grid[header_row + 1 :]:\n            def cell(key):\n                c = cols.get(key)\n                return row[c] if c is not None and c < len(row) else None\n\n            raw_interval = cell(\"interval\")\n            if clean_text(raw_interval).lower().startswith(\"note\"):\n                continue\n            interval = parse_depth_interval(raw_interval)\n            if interval is None:\n                continue\n            top, bottom = interval\n            description = clean_text(cell(\"description\"))\n            intervals.append(\n                LithologyInterval(\n                    top_m=top,\n                    bottom_m=bottom,\n                    description=description,\n                    from_time=clean_text(cell(\"from_time\")),\n                    to_time=clean_text(cell(\"to_time\")),\n                    penetration_rate_m_per_min=parse_number(cell(\"rate\")),\n                    bit_diameter_in=parse_number(cell(\"diameter\")),\n                )\n            )\n            strike = parse_number(cell(\"strike\"))\n            if strike is not None:\n                strikes.append(strike)\n\n    # Water strikes noted as text lines (\"First water strike: 12m\")\n    for row in grid:\n        for c in row:\n            text = clean_text(c).lower()\n            if \"water strike\" in text and not text.startswith(\"note\"):\n                value = parse_number(text.split(\":\")[-1])\n                if value is not None and value > 0 and value not in strikes:\n                    strikes.append(value)\n\n    total = fields.get(\"borehole_depth_m\")\n    if total is None and intervals:\n        total = max(iv.bottom_m for iv in intervals)\n\n    log = DrillingLog(\n        site=site,\n        borehole_ref=str(fields.get(\"borehole_ref\", \"\") or \"\"),\n        total_depth_m=total,\n        drilling_method=fields.get(\"drilling_method\", \"\"),\n        intervals=sorted(intervals, key=lambda iv: iv.top_m),\n        water_strikes_m=sorted(strikes),\n        grouting_depth_m=fields.get(\"grouting_depth_m\"),\n        start_date=str(fields.get(\"start_date\", \"\")),\n        completion_date=str(fields.get(\"completion_date\", \"\")),\n        status=fields.get(\"status\", \"\"),\n        source=str(source),\n    )\n\n    # consistency of the interval column\n    for a, b in zip(log.intervals, log.intervals[1:]):\n        if b.top_m < a.bottom_m - 1e-9:\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    \"interval_overlap\",\n                    f\"Depth intervals overlap at {b.top_m} m.\",\n                )\n            )\n        elif b.top_m > a.bottom_m + 1e-9:\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    \"interval_gap\",\n                    f\"Gap in the drilling log between {a.bottom_m} m and {b.top_m} m.\",\n                )\n            )\n    if total and log.intervals and abs(log.intervals[-1].bottom_m - total) > 1e-6:\n        flags.append(\n            DataFlag(\n                \"warning\",\n                \"depth_mismatch\",\n                f\"Stated total depth {total} m differs from the deepest logged \"\n                f\"interval {log.intervals[-1].bottom_m} m.\",\n            )\n        )\n    if not log.intervals:\n        flags.append(\n            DataFlag(\"error\", \"no_intervals\", \"No depth intervals found in the log.\")\n        )\n    missing_desc = sum(1 for iv in log.intervals if not iv.description)\n    if log.intervals and missing_desc:\n        flags.append(\n            DataFlag(\n                \"info\",\n                \"missing_lithology\",\n                f\"{missing_desc} interval(s) have no lithology description.\",\n            )\n        )\n    log.flags = flags\n    return log\n"}, "groundwater/ingestion/pumping.py": {"t": "text", "d": "\"\"\"Parsers for pumping test field sheets (Excel template and Word sheets).\n\nThe paper layout (WiNGiN step test sheet) records readings in side by\nside hourly column groups, each with Time (min), Water Level (m) and\nDrawdown (m), followed by a Recovery block. Two rules from the sheets\ndrive the parsing:\n\n* The recorded drawdown column is the increment between successive\n  readings, not drawdown below static. Only time and water level are\n  read; true drawdown is always recomputed as water level minus static\n  water level.\n* Discharge is often missing. The test still parses and produces water\n  level and drawdown series, but a ``missing_discharge`` flag marks all\n  transmissivity and yield results as pending.\n\nTimes within each group are irregular (1, 2, 3 and 5 minute spacing);\nnothing assumes uniform sampling.\n\nTwo recovery layouts occur on real sheets and both are handled:\n\n* A dedicated recovery group with its own Time, Water Level and\n  Recovery columns (Kuntolo sheet). Water level is read; the recovery\n  increment column is ignored.\n* A single shared time column with a Recovery column holding water\n  levels during recovery (Dr. Timbo sheet). The recovery column is\n  read against the shared times, interpreted as minutes since the pump\n  stopped.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport re\nfrom pathlib import Path\n\nimport numpy as np\n\nfrom ..models import DataFlag, PumpingStep, PumpingTest\nfrom ..utils import clean_text, parse_number\nfrom . import common\n\n_DISCHARGE_TEXT_RE = re.compile(\n    r\"discharge\\s*(?:of|0f)?\\s*[:=]?\\s*(\\d+(?:\\.\\d+)?)\\s*m3?\\s*/?\\s*h\", re.IGNORECASE\n)\n\n\n# ---------------------------------------------------------------------------\n# Locating the column groups\n# ---------------------------------------------------------------------------\n\ndef _find_groups(grid: list[list]) -> tuple[int, list[dict]] | None:\n    \"\"\"Find the header row of Time / Water Level / ... column groups.\n\n    Returns ``(row_index, groups)``. Each group has column indices and\n    ``kind`` of \"pumping\" or \"recovery\". A \"reco\" column adjacent to a\n    time column forms a recovery triplet (level read from its own water\n    level column); a distant \"reco\" column shares the pumping time\n    column and holds water levels itself.\n    \"\"\"\n    best: tuple[int, list[dict]] | None = None\n    for r, row in enumerate(grid):\n        texts = common.row_text(row)\n        time_cols = [c for c, t in enumerate(texts) if t.startswith(\"time\")]\n        if not time_cols:\n            continue\n        groups: list[dict] = []\n        for gi, c in enumerate(time_cols):\n            end = time_cols[gi + 1] if gi + 1 < len(time_cols) else len(texts)\n            level_col = None\n            reco_col = None\n            for cc in range(c + 1, end):\n                t = texts[cc]\n                if not t:\n                    continue\n                if (\"water\" in t or t.startswith(\"level\")) and level_col is None:\n                    level_col = cc\n                elif \"reco\" in t and reco_col is None:\n                    reco_col = cc\n            if level_col is None and reco_col is None:\n                continue\n            if reco_col is not None and level_col is not None:\n                if reco_col - c <= 2:\n                    # Kuntolo style triplet: Time, Water Level, Recovery increment\n                    groups.append({\"time\": c, \"level\": level_col, \"kind\": \"recovery\"})\n                else:\n                    # Dr. Timbo style: shared time column; recovery column holds levels\n                    groups.append({\"time\": c, \"level\": level_col, \"kind\": \"pumping\"})\n                    groups.append({\"time\": c, \"level\": reco_col, \"kind\": \"recovery\"})\n            elif reco_col is not None:\n                groups.append({\"time\": c, \"level\": reco_col, \"kind\": \"recovery\"})\n            else:\n                groups.append({\"time\": c, \"level\": level_col, \"kind\": \"pumping\"})\n        if groups and (best is None or len(groups) > len(best[1])):\n            best = (r, groups)\n    return best\n\n\ndef _read_series(grid: list[list], header_row: int, group: dict) -> tuple[np.ndarray, np.ndarray]:\n    times, levels = [], []\n    for row in grid[header_row + 1 :]:\n        t = parse_number(row[group[\"time\"]]) if group[\"time\"] < len(row) else None\n        wl = parse_number(row[group[\"level\"]]) if group[\"level\"] < len(row) else None\n        if t is None or wl is None:\n            continue\n        times.append(t)\n        levels.append(wl)\n    return np.array(times, dtype=float), np.array(levels, dtype=float)\n\n\ndef _find_step_discharges(grid: list[list]) -> dict[int, float]:\n    \"\"\"Read per step discharge from 'Step n Q' labelled cells.\"\"\"\n    discharges: dict[int, float] = {}\n    for row in grid:\n        for c, cell in enumerate(row):\n            text = clean_text(cell).lower()\n            if text.startswith(\"step\") and \"q\" in text:\n                num = parse_number(text.split(\"q\")[0])\n                if num is None:\n                    continue\n                for cc in range(c + 1, min(c + 3, len(row))):\n                    val = parse_number(row[cc])\n                    if val is not None:\n                        discharges[int(num)] = val\n                        break\n    return discharges\n\n\ndef _discharge_candidates_from_text(grid: list[list]) -> list[float]:\n    \"\"\"Discharge values mentioned in free text such as\n    'Constant Discharge of 2.93m3/h'.\"\"\"\n    found: list[float] = []\n    for row in grid:\n        for cell in row:\n            if cell is None or isinstance(cell, (int, float)):\n                continue\n            for m in _DISCHARGE_TEXT_RE.finditer(str(cell)):\n                value = float(m.group(1))\n                if value not in found:\n                    found.append(value)\n    return found\n\n\ndef _sheet_test_type(grid: list[list]) -> str:\n    \"\"\"Look for 'STEP TEST' or 'CONSTANT DISCHARGE' banners in the sheet.\"\"\"\n    for row in grid:\n        for cell in row:\n            text = clean_text(cell).lower()\n            if not text:\n                continue\n            if \"step test\" in text or \"step drawdown\" in text:\n                return \"step\"\n            if \"constant discharge\" in text or \"constant rate\" in text:\n                return \"constant\"\n    return \"\"\n\n\n# ---------------------------------------------------------------------------\n# Assembling the PumpingTest\n# ---------------------------------------------------------------------------\n\ndef _assemble(grid: list[list], source: str) -> PumpingTest:\n    fields = common.extract_header_fields(grid, max_rows=len(grid))\n    site = common.site_from_fields(fields, source=source)\n    flags: list[DataFlag] = []\n\n    located = _find_groups(grid)\n    if located is None:\n        raise ValueError(f\"No Time/Water Level column groups found in {source}\")\n    header_row, groups = located\n\n    pumping_series = [\n        _read_series(grid, header_row, g) for g in groups if g[\"kind\"] == \"pumping\"\n    ]\n    pumping_series = [(t, wl) for t, wl in pumping_series if len(t)]\n    recovery_series = [\n        _read_series(grid, header_row, g) for g in groups if g[\"kind\"] == \"recovery\"\n    ]\n    recovery_series = [(t, wl) for t, wl in recovery_series if len(t)]\n\n    test_type = str(fields.get(\"test_type\", \"\")).strip().lower()\n    if not test_type:\n        test_type = _sheet_test_type(grid)\n    if not test_type:\n        test_type = \"step\" if len(pumping_series) > 1 else \"constant\"\n\n    if test_type.startswith(\"constant\") and len(pumping_series) > 1:\n        # hourly column groups are one continuous series on constant tests\n        t = np.concatenate([s[0] for s in pumping_series])\n        wl = np.concatenate([s[1] for s in pumping_series])\n        order = np.argsort(t, kind=\"stable\")\n        pumping_series = [(t[order], wl[order])]\n\n    step_length = fields.get(\"step_length_min\")\n    discharges = _find_step_discharges(grid)\n\n    steps: list[PumpingStep] = []\n    for i, (t, wl) in enumerate(pumping_series, start=1):\n        steps.append(\n            PumpingStep(\n                step_number=i,\n                time_min=t,\n                water_level_m=wl,\n                discharge_m3_per_h=discharges.get(i),\n                label=f\"Step {i}\" if len(pumping_series) > 1 else \"Pumping phase\",\n            )\n        )\n\n    # Free-text discharge: use it only when unambiguous (one candidate, one step)\n    candidates = _discharge_candidates_from_text(grid)\n    missing = [s for s in steps if s.discharge_m3_per_h is None]\n    if candidates and missing:\n        if len(candidates) == 1 and len(steps) == 1:\n            steps[0].discharge_m3_per_h = candidates[0]\n            flags.append(\n                DataFlag(\n                    \"info\",\n                    \"discharge_from_text\",\n                    f\"Discharge {candidates[0]} m3/h taken from a text note on the \"\n                    \"sheet; confirm against the measured value.\",\n                )\n            )\n        else:\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    \"discharge_ambiguous\",\n                    \"Discharge mentioned in sheet text (\"\n                    + \", \".join(f\"{c} m3/h\" for c in candidates)\n                    + \") but not assigned per step; enter values in the template.\",\n                )\n            )\n\n    recovery_time = recovery_level = None\n    if recovery_series:\n        recovery_time, recovery_level = recovery_series[0]\n\n    if recovery_time is not None:\n        test_type += \"+recovery\"\n\n    swl = fields.get(\"static_water_level_m\")\n    pumping_duration = None\n    if steps:\n        pumping_duration = float(max(s.time_min.max() for s in steps))\n\n    test = PumpingTest(\n        site=site,\n        borehole_ref=str(fields.get(\"borehole_ref\", \"\") or \"\"),\n        test_type=test_type,\n        static_water_level_m=swl,\n        borehole_depth_m=fields.get(\"borehole_depth_m\"),\n        pump_setting_m=fields.get(\"pump_setting_m\"),\n        step_length_min=step_length,\n        steps=steps,\n        recovery_time_min=recovery_time,\n        recovery_level_m=recovery_level,\n        pumping_duration_min=pumping_duration,\n        source=str(source),\n    )\n\n    # ---- data quality flags ------------------------------------------------\n    if swl is None:\n        flags.append(\n            DataFlag(\n                \"error\",\n                \"missing_static_water_level\",\n                \"Static water level is missing; drawdown cannot be computed.\",\n            )\n        )\n    missing_q = [s.step_number for s in steps if s.discharge_m3_per_h is None]\n    if missing_q:\n        flags.append(\n            DataFlag(\n                \"warning\",\n                \"missing_discharge\",\n                \"Discharge not recorded for step(s) \"\n                + \", \".join(str(n) for n in missing_q)\n                + \". Drawdown and recovery curves are produced, but transmissivity \"\n                \"and yield results are pending until discharge values are supplied.\",\n            )\n        )\n    if swl is not None and steps:\n        if any(np.any(s.water_level_m < swl - 0.01) for s in steps):\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    \"water_level_above_static\",\n                    \"Some pumping water levels are above the stated static water \"\n                    \"level, giving negative drawdown. Check the static level and \"\n                    \"the measuring datum on the sheet.\",\n                )\n            )\n    for s in steps:\n        if np.any(np.diff(s.time_min) <= 0):\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    \"time_not_increasing\",\n                    f\"Times are not strictly increasing in {s.label}.\",\n                    s.label,\n                )\n            )\n    if test.borehole_depth_m and test.pump_setting_m:\n        if test.pump_setting_m > test.borehole_depth_m:\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    \"pump_below_borehole\",\n                    \"Pump setting is deeper than the borehole depth.\",\n                )\n            )\n    if test.borehole_depth_m and steps:\n        max_wl = max(float(np.nanmax(s.water_level_m)) for s in steps)\n        if max_wl > test.borehole_depth_m:\n            flags.append(\n                DataFlag(\n                    \"warning\",\n                    \"level_below_borehole\",\n                    f\"Recorded water level {max_wl:.2f} m exceeds the stated \"\n                    f\"borehole depth {test.borehole_depth_m:.0f} m; check the sheet.\",\n                )\n            )\n    test.flags = flags\n    return test\n\n\n# ---------------------------------------------------------------------------\n# Entry points\n# ---------------------------------------------------------------------------\n\ndef read_pumping_workbook(path: str | Path) -> PumpingTest:\n    \"\"\"Read a pumping test from the Excel template layout.\"\"\"\n    grid, _ = common.load_grid(path)\n    return _assemble(grid, source=str(path))\n\n\ndef read_pumping_docx(path: str | Path) -> PumpingTest:\n    \"\"\"Read a pumping test from a Word field sheet (Kuntolo style).\n\n    Paragraph text supplies the header block; the table whose header\n    contains Time / Water Level column groups supplies the readings.\n    \"\"\"\n    import docx  # python-docx\n\n    path = Path(path)\n    document = docx.Document(str(path))\n\n    header_grid: list[list] = []\n    for para in document.paragraphs:\n        text = para.text.strip()\n        if not text:\n            continue\n        parts = [p for p in re.split(r\"\\t+|\\s{3,}\", text) if p.strip()]\n        header_grid.append(parts)\n\n    best_table: list[list] | None = None\n    best_count = 0\n    for table in document.tables:\n        grid = [[cell.text for cell in row.cells] for row in table.rows]\n        located = _find_groups(grid)\n        if located and len(located[1]) > best_count:\n            best_table = grid\n            best_count = len(located[1])\n    if best_table is None:\n        raise ValueError(f\"No pumping test table found in {path}\")\n\n    return _assemble(header_grid + best_table, source=str(path))\n"}, "groundwater/ingestion/templates.py": {"t": "text", "d": "\"\"\"Generate the standard Excel field data templates.\n\nThe templates mirror the paper field sheets in use (Rokel VES sheet,\nWiNGiN step test sheet) so the field team can transcribe data cell for\ncell, while adding the fields that are often missing on paper, such as\ndischarge per step and the UTM zone.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nfrom openpyxl import Workbook\nfrom openpyxl.styles import Alignment, Border, Font, PatternFill, Side\nfrom openpyxl.utils import get_column_letter\n\nACCENT = \"1F5C8B\"\nLIGHT = \"DCE6F1\"\n\n_thin = Side(style=\"thin\", color=\"9BB3C8\")\nBORDER = Border(left=_thin, right=_thin, top=_thin, bottom=_thin)\n\n\ndef _label(ws, cell: str, text: str) -> None:\n    ws[cell] = text\n    ws[cell].font = Font(bold=True, size=10)\n    ws[cell].fill = PatternFill(\"solid\", fgColor=LIGHT)\n    ws[cell].border = BORDER\n\n\ndef _value(ws, cell: str, text: str = \"\") -> None:\n    ws[cell] = text\n    ws[cell].border = BORDER\n\n\ndef _title(ws, cell: str, text: str, span: str | None = None) -> None:\n    ws[cell] = text\n    ws[cell].font = Font(bold=True, size=12, color=ACCENT)\n    if span:\n        ws.merge_cells(span)\n        ws[cell].alignment = Alignment(horizontal=\"center\")\n\n\ndef _table_header(ws, row: int, headers: list[str], start_col: int = 1) -> None:\n    for i, h in enumerate(headers):\n        cell = ws.cell(row=row, column=start_col + i, value=h)\n        cell.font = Font(bold=True, size=10, color=\"FFFFFF\")\n        cell.fill = PatternFill(\"solid\", fgColor=ACCENT)\n        cell.alignment = Alignment(horizontal=\"center\", wrap_text=True)\n        cell.border = BORDER\n\n\ndef write_ves_template(path: str | Path, n_soundings: int = 2, n_rows: int = 24) -> Path:\n    \"\"\"VES field data template, one worksheet per sounding.\"\"\"\n    wb = Workbook()\n    for s in range(1, n_soundings + 1):\n        ws = wb.active if s == 1 else wb.create_sheet()\n        ws.title = f\"VES {s}\"\n        _title(ws, \"A1\", \"SCHLUMBERGER ARRAY VES FIELD DATA\", \"A1:D1\")\n        pairs = [\n            (\"A2\", \"Client\", \"B2\"), (\"C2\", \"Community\", \"D2\"),\n            (\"A3\", \"Project\", \"B3\"), (\"C3\", \"Sounding Number\", \"D3\"),\n            (\"A4\", \"District\", \"B4\"), (\"C4\", \"GPS Coordinate East\", \"D4\"),\n            (\"A5\", \"Date\", \"B5\"), (\"C5\", \"GPS Coordinate North\", \"D5\"),\n            (\"A6\", \"Field Supervisor\", \"B6\"), (\"C6\", \"Elevation (m)\", \"D6\"),\n            (\"A7\", \"Chiefdom\", \"B7\"), (\"C7\", \"UTM Zone (28N or 29N)\", \"D7\"),\n            (\"A8\", \"Array\", \"B8\"), (\"C8\", \"Instrument\", \"D8\"),\n        ]\n        for lab_cell, lab, val_cell in pairs:\n            _label(ws, lab_cell, lab)\n            _value(ws, val_cell)\n        ws[\"B8\"] = \"Schlumberger\"\n        ws[\"D8\"] = \"Syscal Junior\"\n        ws[\"D3\"] = s\n        _table_header(ws, 10, [\"No.\", \"AB/2 (m)\", \"MN (m)\", \"Apparent Resistivity (ohm-m)\"])\n        for r in range(11, 11 + n_rows):\n            ws.cell(row=r, column=1, value=r - 10).border = BORDER\n            for c in range(2, 5):\n                ws.cell(row=r, column=c).border = BORDER\n        note = (\n            \"Notes: MN is the full potential electrode spacing. Repeat the same AB/2 \"\n            \"with the old and new MN at every segment change.\"\n        )\n        ws.cell(row=12 + n_rows, column=1, value=note).font = Font(italic=True, size=9)\n        for col, width in zip(\"ABCD\", (22, 16, 16, 28)):\n            ws.column_dimensions[col].width = width\n    wb.save(path)\n    return Path(path)\n\n\ndef write_pumping_template(path: str | Path) -> Path:\n    \"\"\"Pumping test template: header, four step groups and recovery.\"\"\"\n    wb = Workbook()\n    ws = wb.active\n    ws.title = \"Pumping Test\"\n    _title(ws, \"A1\", \"PUMPING TEST FIELD SHEET (STEP / CONSTANT DISCHARGE)\", \"A1:O1\")\n    pairs = [\n        (\"A2\", \"Community\", \"B2\"), (\"D2\", \"Date\", \"E2\"),\n        (\"A3\", \"Client\", \"B3\"), (\"D3\", \"Length of each step (min)\", \"E3\"),\n        (\"A4\", \"Test conducted by\", \"B4\"), (\"D4\", \"Start time\", \"E4\"),\n        (\"A5\", \"Borehole Ref. No.\", \"B5\"), (\"D5\", \"Depth of Borehole (m)\", \"E5\"),\n        (\"A6\", \"Static water level (m)\", \"B6\"), (\"D6\", \"Pump setting (m)\", \"E6\"),\n        (\"A7\", \"Test type (step or constant)\", \"B7\"), (\"D7\", \"District\", \"E7\"),\n        (\"G2\", \"GPS Coordinate East\", \"H2\"), (\"G3\", \"GPS Coordinate North\", \"H3\"),\n        (\"G4\", \"UTM Zone (28N or 29N)\", \"H4\"), (\"G5\", \"Elevation (m)\", \"H5\"),\n    ]\n    for lab_cell, lab, val_cell in pairs:\n        _label(ws, lab_cell, lab)\n        _value(ws, val_cell)\n\n    # Discharge row: one value per step group; leave blank if not measured\n    _label(ws, \"A9\", \"Discharge per step (m3/h)\")\n    for i, col in enumerate((\"B\", \"E\", \"H\", \"K\")):\n        _label(ws, f\"{col}9\", f\"Step {i + 1} Q\")\n        _value(ws, f\"{chr(ord(col) + 1)}9\")\n\n    groups = [\"0-60 min\", \"61-120 min\", \"121-180 min\", \"181-240 min\"]\n    start_cols = [1, 4, 7, 10]\n    header_row = 11\n    for g, (label, c0) in enumerate(zip(groups, start_cols)):\n        cell = ws.cell(row=header_row - 1, column=c0, value=f\"Constant discharge {label}\")\n        cell.font = Font(bold=True, size=10, color=ACCENT)\n        _table_header(\n            ws, header_row, [\"Time (min)\", \"Water Level (m)\", \"Drawdown (m)\"], start_col=c0\n        )\n    cell = ws.cell(row=header_row - 1, column=13, value=\"Recovery\")\n    cell.font = Font(bold=True, size=10, color=ACCENT)\n    _table_header(\n        ws, header_row, [\"Time (min)\", \"Water Level (m)\", \"Recovery (m)\"], start_col=13\n    )\n    for r in range(header_row + 1, header_row + 41):\n        for c in list(range(1, 12 + 1)) + [13, 14, 15]:\n            ws.cell(row=r, column=c).border = BORDER\n    note = (\n        \"Notes: record depth to water in metres below the measuring point. The Drawdown \"\n        \"and Recovery columns are the change between successive readings; the analysis \"\n        \"recomputes true drawdown from the static water level. Recovery time is minutes \"\n        \"since the pump stopped. Record the discharge of every step; results stay \"\n        \"provisional until discharge is supplied.\"\n    )\n    ws.cell(row=header_row + 42, column=1, value=note).font = Font(italic=True, size=9)\n    for c in range(1, 16):\n        ws.column_dimensions[get_column_letter(c)].width = 13\n    wb.save(path)\n    return Path(path)\n\n\ndef write_drilling_template(path: str | Path, n_rows: int = 20) -> Path:\n    \"\"\"Drilling log template.\"\"\"\n    wb = Workbook()\n    ws = wb.active\n    ws.title = \"Drilling Log\"\n    _title(ws, \"A1\", \"BOREHOLE DRILLING LOG\", \"A1:G1\")\n    pairs = [\n        (\"A2\", \"Community\", \"B2\"), (\"D2\", \"Client\", \"E2\"),\n        (\"A3\", \"Contractor\", \"B3\"), (\"D3\", \"Borehole Ref. No.\", \"E3\"),\n        (\"A4\", \"Drilling start date\", \"B4\"), (\"D4\", \"Completion date\", \"E4\"),\n        (\"A5\", \"Drilling method\", \"B5\"), (\"D5\", \"Total depth (m)\", \"E5\"),\n        (\"A6\", \"District\", \"B6\"), (\"D6\", \"BH status\", \"E6\"),\n        (\"A7\", \"GPS Coordinate East\", \"B7\"), (\"D7\", \"GPS Coordinate North\", \"E7\"),\n        (\"A8\", \"UTM Zone (28N or 29N)\", \"B8\"), (\"D8\", \"Elevation (m)\", \"E8\"),\n        (\"A9\", \"Grouting depth (m)\", \"B9\"), (\"D9\", \"Drill rig\", \"E9\"),\n    ]\n    for lab_cell, lab, val_cell in pairs:\n        _label(ws, lab_cell, lab)\n        _value(ws, val_cell)\n    _table_header(\n        ws,\n        11,\n        [\n            \"Depth interval (m)\",\n            \"From time\",\n            \"To time\",\n            \"Penetration rate (m/min)\",\n            \"Sample / lithology description\",\n            \"Drilling diameter (in)\",\n            \"Water strike depth (m)\",\n        ],\n    )\n    for r in range(12, 12 + n_rows):\n        for c in range(1, 8):\n            ws.cell(row=r, column=c).border = BORDER\n    ws.cell(row=13 + n_rows, column=1, value=(\n        \"Notes: write depth intervals as 0-5, 5-10 and so on. Enter a water strike \"\n        \"depth on the row of the interval where water was struck.\"\n    )).font = Font(italic=True, size=9)\n    for col, width in zip(\"ABCDEFG\", (18, 10, 10, 20, 42, 18, 20)):\n        ws.column_dimensions[col].width = width\n    wb.save(path)\n    return Path(path)\n\n\nSTANDARD_PARAMETERS = [\n    (\"pH\", \"pH units\"), (\"Electrical conductivity\", \"uS/cm\"), (\"TDS\", \"mg/L\"),\n    (\"Turbidity\", \"NTU\"), (\"Temperature\", \"deg C\"), (\"Total hardness\", \"mg/L as CaCO3\"),\n    (\"Alkalinity\", \"mg/L as CaCO3\"), (\"Calcium\", \"mg/L\"), (\"Magnesium\", \"mg/L\"),\n    (\"Sodium\", \"mg/L\"), (\"Potassium\", \"mg/L\"), (\"Bicarbonate\", \"mg/L\"),\n    (\"Chloride\", \"mg/L\"), (\"Sulfate\", \"mg/L\"), (\"Nitrate (as NO3)\", \"mg/L\"),\n    (\"Nitrite (as NO2)\", \"mg/L\"), (\"Ammonia (as N)\", \"mg/L\"), (\"Fluoride\", \"mg/L\"),\n    (\"Iron\", \"mg/L\"), (\"Manganese\", \"mg/L\"), (\"Arsenic\", \"mg/L\"), (\"Lead\", \"mg/L\"),\n    (\"Copper\", \"mg/L\"), (\"Zinc\", \"mg/L\"), (\"Chromium (total)\", \"mg/L\"),\n    (\"Cadmium\", \"mg/L\"), (\"E. coli\", \"CFU/100 mL\"), (\"Total coliforms\", \"CFU/100 mL\"),\n]\n\n\ndef write_quality_template(path: str | Path) -> Path:\n    \"\"\"Water quality laboratory results template.\"\"\"\n    wb = Workbook()\n    ws = wb.active\n    ws.title = \"Water Quality\"\n    _title(ws, \"A1\", \"WATER QUALITY LABORATORY RESULTS\", \"A1:E1\")\n    pairs = [\n        (\"A2\", \"Community\", \"B2\"), (\"D2\", \"Client\", \"E2\"),\n        (\"A3\", \"Sample ID\", \"B3\"), (\"D3\", \"Borehole Ref. No.\", \"E3\"),\n        (\"A4\", \"Sample date\", \"B4\"), (\"D4\", \"Laboratory\", \"E4\"),\n        (\"A5\", \"District\", \"B5\"), (\"D5\", \"Project\", \"E5\"),\n    ]\n    for lab_cell, lab, val_cell in pairs:\n        _label(ws, lab_cell, lab)\n        _value(ws, val_cell)\n    _table_header(\n        ws, 7, [\"Parameter\", \"Unit\", \"Value\", \"Detection limit\", \"Method\"]\n    )\n    for i, (param, unit) in enumerate(STANDARD_PARAMETERS):\n        r = 8 + i\n        ws.cell(row=r, column=1, value=param).border = BORDER\n        ws.cell(row=r, column=2, value=unit).border = BORDER\n        for c in (3, 4, 5):\n            ws.cell(row=r, column=c).border = BORDER\n    ws.cell(row=9 + len(STANDARD_PARAMETERS), column=1, value=(\n        \"Notes: for results below detection write <DL in Value (for example <0.01) \"\n        \"or leave Value empty and fill Detection limit. Add extra parameters on new rows.\"\n    )).font = Font(italic=True, size=9)\n    for col, width in zip(\"ABCDE\", (26, 16, 12, 16, 18)):\n        ws.column_dimensions[col].width = width\n    wb.save(path)\n    return Path(path)\n\n\ndef write_all_templates(folder: str | Path) -> list[Path]:\n    \"\"\"Write every field template into ``folder`` and return the paths.\"\"\"\n    folder = Path(folder)\n    folder.mkdir(parents=True, exist_ok=True)\n    return [\n        write_ves_template(folder / \"template_ves.xlsx\"),\n        write_pumping_template(folder / \"template_pumping_test.xlsx\"),\n        write_drilling_template(folder / \"template_drilling_log.xlsx\"),\n        write_quality_template(folder / \"template_water_quality.xlsx\"),\n    ]\n"}, "groundwater/ingestion/ves.py": {"t": "text", "d": "\"\"\"Parser for VES field data sheets (Excel and CSV).\n\nReads the Rokel style layout: a header block (client, community,\ndistrict, sounding number, GPS east/north, elevation, date, field\nsupervisor) followed by a table with columns No., AB/2 (m), MN (m) and\napparent resistivity (ohm-m). Values stored as text with leading\nzeros (for example ``078.7`` or GPS ``0708958``) parse cleanly.\n\nDuplicate AB/2 values with different MN mark Schlumberger segment\nchanges; both readings are kept.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport csv\nfrom pathlib import Path\n\nimport numpy as np\n\nfrom ..models import DataFlag, VESSounding\nfrom ..utils import clean_text, parse_number\nfrom . import common\n\n\ndef _find_data_header(grid: list[list]) -> tuple[int, dict] | None:\n    \"\"\"Locate the data table header row and map columns.\n\n    Returns (row_index, {\"no\": c, \"ab2\": c, \"mn\": c, \"rho\": c}).\n    \"\"\"\n    for r, row in enumerate(grid):\n        texts = common.row_text(row)\n        cols: dict[str, int] = {}\n        for c, t in enumerate(texts):\n            if not t:\n                continue\n            if \"ab/2\" in t or t == \"ab2\" or \"ab / 2\" in t:\n                cols[\"ab2\"] = c\n            elif t.startswith(\"mn\") and \"/2\" not in t:\n                cols[\"mn\"] = c\n            elif t.startswith(\"mn/2\") or \"mn / 2\" in t:\n                cols[\"mn_half\"] = c\n            elif \"resistivity\" in t or t.startswith(\"rho\") or \"ohm\" in t:\n                cols[\"rho\"] = c\n            elif t in (\"no.\", \"no\", \"reading\", \"n\"):\n                cols[\"no\"] = c\n        if \"ab2\" in cols and \"rho\" in cols:\n            return r, cols\n    return None\n\n\ndef _sounding_from_grid(\n    grid: list[list], source: str, sheet_name: str = \"\"\n) -> VESSounding | None:\n    fields = common.extract_header_fields(grid)\n    site = common.site_from_fields(fields, source=source)\n    located = _find_data_header(grid)\n    if located is None:\n        return None\n    header_row, cols = located\n\n    ab2, mn, rho = [], [], []\n    flags: list[DataFlag] = []\n    mn_is_half = \"mn\" not in cols and \"mn_half\" in cols\n    mn_col = cols.get(\"mn\", cols.get(\"mn_half\"))\n    for row in grid[header_row + 1 :]:\n        a = parse_number(row[cols[\"ab2\"]]) if cols[\"ab2\"] < len(row) else None\n        r = parse_number(row[cols[\"rho\"]]) if cols[\"rho\"] < len(row) else None\n        m = (\n            parse_number(row[mn_col])\n            if mn_col is not None and mn_col < len(row)\n            else None\n        )\n        if a is None and r is None:\n            # allow a single blank row inside the table, stop on two\n            if ab2 and all(\n                v is None or clean_text(v) == \"\" for v in row\n            ):\n                break\n            continue\n        if a is None or r is None:\n            continue\n        if m is not None and mn_is_half:\n            m = 2.0 * m\n        ab2.append(a)\n        mn.append(m if m is not None else np.nan)\n        rho.append(r)\n\n    if not ab2:\n        return None\n\n    sounding_id = str(fields.get(\"sounding_id\", \"\") or sheet_name or \"VES 1\")\n    sounding = VESSounding(\n        site=site,\n        sounding_id=sounding_id if sounding_id else \"VES 1\",\n        ab2=np.array(ab2),\n        mn=np.array(mn),\n        rho_app=np.array(rho),\n        array_type=str(fields.get(\"array_type\", \"schlumberger\")).lower() or \"schlumberger\",\n        instrument=fields.get(\"instrument\", \"\"),\n        source=str(source),\n    )\n\n    # Data quality checks\n    if np.any(sounding.rho_app <= 0):\n        flags.append(\n            DataFlag(\n                \"error\",\n                \"nonpositive_resistivity\",\n                \"Apparent resist
