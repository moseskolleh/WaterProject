roundwater/reporting/docx_utils.py": {"t": "text", "d": "\"\"\"House-styled .docx building blocks.\n\nWraps python-docx with the toolkit's house style: white background,\none accent colour, clean tables, automatic figure and table numbering,\na real table of contents field, page numbers, and a reproducible save\n(fixed zip timestamps so re-running on the same data gives an\nidentical file).\n\nHouse language rules are enforced here: em and en dashes are replaced\nwith plain hyphens and a lint helper flags contractions so template\ntext stays in plain professional English.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport re\nimport zipfile\nfrom pathlib import Path\n\nimport docx\nfrom docx.enum.section import WD_SECTION\nfrom docx.enum.table import WD_TABLE_ALIGNMENT\nfrom docx.enum.text import WD_ALIGN_PARAGRAPH, WD_BREAK\nfrom docx.oxml import OxmlElement\nfrom docx.oxml.ns import qn\nfrom docx.shared import Cm, Pt, RGBColor\n\nfrom ..config import HouseStyle\n\n_CONTRACTION_RE = re.compile(\n    r\"\\b(?:can't|won't|don't|doesn't|didn't|isn't|aren't|wasn't|weren't|\"\n    r\"hasn't|haven't|hadn't|shouldn't|couldn't|wouldn't|it's|that's|there's|\"\n    r\"what's|let's|they're|we're|you're|i'm|he's|she's|who's|it'll|we'll|\"\n    r\"you'll|they'll|i've|we've|you've|they've)\\b\",\n    re.IGNORECASE,\n)\n\n\ndef lint_text(text: str) -> list[str]:\n    \"\"\"Return house style violations in a piece of report text.\"\"\"\n    problems = []\n    if \"\u2014\" in text or \"\u2013\" in text:\n        problems.append(\"em or en dash present\")\n    for match in _CONTRACTION_RE.finditer(text):\n        problems.append(f\"contraction '{match.group(0)}'\")\n    return problems\n\n\ndef _clean(text: str) -> str:\n    \"\"\"Apply the house language rules to outgoing text.\"\"\"\n    return text.replace(\"\u2014\", \" - \").replace(\"\u2013\", \"-\")\n\n\ndef _hex_to_rgb(color: str) -> RGBColor:\n    color = color.lstrip(\"#\")\n    return RGBColor(int(color[0:2], 16), int(color[2:4], 16), int(color[4:6], 16))\n\n\nclass ReportBuilder:\n    \"\"\"Assemble a styled report document section by section.\"\"\"\n\n    def __init__(self, style: HouseStyle | None = None, title: str = \"Report\"):\n        self.style = style or HouseStyle()\n        self.doc = docx.Document()\n        self.title = title\n        self._figure_no = 0\n        self._table_no = 0\n        self._setup_styles()\n        self._setup_page()\n\n    # ------------------------------------------------------------------\n    # set-up\n    # ------------------------------------------------------------------\n\n    def _setup_styles(self) -> None:\n        accent = _hex_to_rgb(self.style.accent_color)\n        normal = self.doc.styles[\"Normal\"]\n        normal.font.name = self.style.font_name\n        normal.font.size = Pt(self.style.base_font_size_pt)\n        normal.paragraph_format.space_after = Pt(6)\n        normal.paragraph_format.line_spacing = 1.15\n\n        for level, size, bold in ((1, 14, True), (2, 12, True), (3, 11, True)):\n            h = self.doc.styles[f\"Heading {level}\"]\n            h.font.name = self.style.font_name\n            h.font.size = Pt(size)\n            h.font.bold = bold\n            h.font.color.rgb = accent\n            h.paragraph_format.space_before = Pt(12 if level == 1 else 8)\n            h.paragraph_format.space_after = Pt(6)\n            h.paragraph_format.keep_with_next = True\n\n        caption = self.doc.styles[\"Caption\"] if \"Caption\" in [s.name for s in self.doc.styles] else None\n        if caption is not None:\n            caption.font.name = self.style.font_name\n            caption.font.size = Pt(9)\n            caption.font.bold = True\n            caption.font.color.rgb = RGBColor(0x33, 0x33, 0x33)\n\n    def _setup_page(self) -> None:\n        section = self.doc.sections[0]\n        section.page_width = Cm(21.0)\n        section.page_height = Cm(29.7)\n        for side in (\"top\", \"bottom\", \"left\", \"right\"):\n            setattr(section, f\"{side}_margin\", Cm(2.5))\n        self._add_page_numbers(section)\n\n    def _add_page_numbers(self, section) -> None:\n        footer_para = section.footer.paragraphs[0]\n        footer_para.alignment = WD_ALIGN_PARAGRAPH.CENTER\n        run = footer_para.add_run()\n        for element, text in ((\"begin\", None), (None, \"PAGE\"), (\"end\", None)):\n            if element:\n                fld = OxmlElement(\"w:fldChar\")\n                fld.set(qn(\"w:fldCharType\"), element)\n                run._r.append(fld)\n            else:\n                instr = OxmlElement(\"w:instrText\")\n                instr.set(qn(\"xml:space\"), \"preserve\")\n                instr.text = \" PAGE \"\n                run._r.append(instr)\n        run.font.size = Pt(9)\n\n    # ------------------------------------------------------------------\n    # content\n    # ------------------------------------------------------------------\n\n    def cover(\n        self,\n        title_lines: list[str],\n        subtitle_lines: list[str] | None = None,\n        details: list[tuple[str, str]] | None = None,\n    ) -> None:\n        \"\"\"Simple clean cover: organisation, title block, detail lines.\"\"\"\n        if self.style.logo_path and Path(self.style.logo_path).exists():\n            p = self.doc.add_paragraph()\n            p.alignment = WD_ALIGN_PARAGRAPH.CENTER\n            p.add_run().add_picture(self.style.logo_path, width=Cm(4.5))\n        if self.style.organisation:\n            p = self.doc.add_paragraph()\n            p.alignment = WD_ALIGN_PARAGRAPH.CENTER\n            run = p.add_run(_clean(self.style.organisation))\n            run.font.size = Pt(14)\n            run.font.bold = True\n            run.font.color.rgb = _hex_to_rgb(self.style.accent_color)\n            if self.style.organisation_details:\n                p2 = self.doc.add_paragraph()\n                p2.alignment = WD_ALIGN_PARAGRAPH.CENTER\n                r2 = p2.add_run(_clean(self.style.organisation_details))\n                r2.font.size = Pt(9)\n        for _ in range(4):\n            self.doc.add_paragraph()\n        for line in title_lines:\n            p = self.doc.add_paragraph()\n            p.alignment = WD_ALIGN_PARAGRAPH.CENTER\n            run = p.add_run(_clean(line))\n            run.font.size = Pt(20)\n            run.font.bold = True\n            run.font.color.rgb = _hex_to_rgb(self.style.accent_color)\n        for line in subtitle_lines or []:\n            p = self.doc.add_paragraph()\n            p.alignment = WD_ALIGN_PARAGRAPH.CENTER\n            run = p.add_run(_clean(line))\n            run.font.size = Pt(13)\n        if details:\n            for _ in range(3):\n                self.doc.add_paragraph()\n            for label, value in details:\n                p = self.doc.add_paragraph()\n                p.alignment = WD_ALIGN_PARAGRAPH.CENTER\n                run = p.add_run(f\"{_clean(label)}: \")\n                run.font.bold = True\n                p.add_run(_clean(str(value)))\n        self.page_break()\n\n    def table_of_contents(self) -> None:\n        self.heading(\"Table of Contents\", level=1, numbered=False)\n        para = self.doc.add_paragraph()\n        run = para.add_run()\n        fld_begin = OxmlElement(\"w:fldChar\")\n        fld_begin.set(qn(\"w:fldCharType\"), \"begin\")\n        instr = OxmlElement(\"w:instrText\")\n        instr.set(qn(\"xml:space\"), \"preserve\")\n        instr.text = 'TOC \\\\o \"1-3\" \\\\h \\\\z \\\\u'\n        fld_sep = OxmlElement(\"w:fldChar\")\n        fld_sep.set(qn(\"w:fldCharType\"), \"separate\")\n        placeholder = OxmlElement(\"w:t\")\n        placeholder.text = (\n            \"Right-click and choose Update Field to fill the table of contents.\"\n        )\n        fld_end = OxmlElement(\"w:fldChar\")\n        fld_end.set(qn(\"w:fldCharType\"), \"end\")\n        for el in (fld_begin, instr, fld_sep, placeholder, fld_end):\n            run._r.append(el)\n        self.page_break()\n\n    def heading(self, text: str, level: int = 1, numbered: bool = True) -> None:\n        self.doc.add_heading(_clean(text), level=level)\n\n    def paragraph(self, text: str, bold: bool = False, italic: bool = False,\n                  align: str | None = None):\n        p = self.doc.add_paragraph()\n        run = p.add_run(_clean(text))\n        run.font.bold = bold\n        run.font.italic = italic\n        if align == \"center\":\n            p.alignment = WD_ALIGN_PARAGRAPH.CENTER\n        elif align == \"justify\":\n            p.alignment = WD_ALIGN_PARAGRAPH.JUSTIFY\n        return p\n\n    def bullets(self, items: list[str]) -> None:\n        for item in items:\n            self.doc.add_paragraph(_clean(item), style=\"List Bullet\")\n\n    def figure(self, image_path: str | Path, caption: str, width_cm: float = 15.0) -> int:\n        \"\"\"Insert an image with an automatic 'Figure N.' caption.\n\n        Returns the figure number so body text can reference it.\n        \"\"\"\n        self._figure_no += 1\n        p = self.doc.add_paragraph()\n        p.alignment = WD_ALIGN_PARAGRAPH.CENTER\n        p.add_run().add_picture(str(image_path), width=Cm(width_cm))\n        cap = self.doc.add_paragraph()\n        run = cap.add_run(f\"Figure {self._figure_no}. {_clean(caption)}\")\n        run.font.size = Pt(9)\n        run.font.bold = True\n        cap.alignment = WD_ALIGN_PARAGRAPH.CENTER\n        return self._figure_no\n\n    @property\n    def next_figure_number(self) -> int:\n        return self._figure_no + 1\n\n    @property\n    def next_table_number(self) -> int:\n        return self._table_no + 1\n\n    def table(\n        self,\n        rows: list[list],\n        header: list[str] | None = None,\n        caption: str | None = None,\n        col_widths_cm: list[float] | None = None,\n        font_size_pt: float = 9.5,\n    ) -> int:\n        \"\"\"Insert a styled table; returns the table number.\n\n        The caption goes above the table (report convention). Cell\n        values may contain newlines for stacked layer entries.\n        \"\"\"\n        self._table_no += 1\n        if caption:\n            cap = self.doc.add_paragraph()\n            run = cap.add_run(f\"Table {self._table_no}. {_clean(caption)}\")\n            run.font.size = Pt(9)\n            run.font.bold = True\n        n_cols = len(header) if header else max(len(r) for r in rows)\n        table = self.doc.add_table(rows=0, cols=n_cols)\n        table.alignment = WD_TABLE_ALIGNMENT.CENTER\n        table.style = \"Table Grid\"\n        accent = self.style.accent_color.lstrip(\"#\")\n\n        if header:\n            cells = table.add_row().cells\n            for i, text in enumerate(header):\n                cells[i].text = \"\"\n                para = cells[i].paragraphs[0]\n                run = para.add_run(_clean(str(text)))\n                run.font.bold = True\n                run.font.size = Pt(font_size_pt)\n                run.font.color.rgb = RGBColor(0xFF, 0xFF, 0xFF)\n                shading = OxmlElement(\"w:shd\")\n                shading.set(qn(\"w:val\"), \"clear\")\n                shading.set(qn(\"w:fill\"), accent)\n                cells[i]._tc.get_or_add_tcPr().append(shading)\n        for row in rows:\n            cells = table.add_row().cells\n            for i, value in enumerate(row):\n                if i >= n_cols:\n                    break\n                cells[i].text = \"\"\n                para = cells[i].paragraphs[0]\n                run = para.add_run(_clean(\"\" if value is None else str(value)))\n                run.font.size = Pt(font_size_pt)\n        if col_widths_cm:\n            for row in table.rows:\n                for i, width in enumerate(col_widths_cm[:n_cols]):\n                    row.cells[i].width = Cm(width)\n        self.doc.add_paragraph()\n        return self._table_no\n\n    def header_block_table(self, pairs: list[tuple[str, str]], font_size_pt: float = 9.5) -> None:\n        \"\"\"Two label/value pairs per row, like the field sheet headers.\"\"\"\n        table = self.doc.add_table(rows=0, cols=4)\n        table.style = \"Table Grid\"\n        for i in range(0, len(pairs), 2):\n            row = table.add_row().cells\n            for j, (label, value) in enumerate(pairs[i : i + 2]):\n                cell_label = row[j * 2]\n                cell_value = row[j * 2 + 1]\n                cell_label.text = \"\"\n                run = cell_label.paragraphs[0].add_run(_clean(label))\n                run.font.bold = True\n                run.font.size = Pt(font_size_pt)\n                cell_value.text = \"\"\n                run_v = cell_value.paragraphs[0].add_run(_clean(str(value)))\n                run_v.font.size = Pt(font_size_pt)\n        self.doc.add_paragraph()\n\n    def signature_block(\n        self, name: str, role: str, phone: str = \"\", organisation: str = \"\", email: str = \"\"\n    ) -> None:\n        self.paragraph(\"REPORT SUBMITTED BY:\", bold=True)\n        self.doc.add_paragraph()\n        self.doc.add_paragraph()\n        self.paragraph(\".\" * 30)\n        self.paragraph(name, bold=True)\n        p = self.paragraph(role)\n        p.runs[0].font.italic = True\n        if organisation:\n            self.paragraph(organisation)\n        if phone:\n            self.paragraph(f\"Cell: {phone}\")\n        if email:\n            self.paragraph(f\"Email: {email}\")\n\n    def page_break(self) -> None:\n        self.doc.add_paragraph().add_run().add_break(WD_BREAK.PAGE)\n\n    # ------------------------------------------------------------------\n    # save\n    # ------------------------------------------------------------------\n\n    def save(self, path: str | Path) -> Path:\n        path = Path(path)\n        path.parent.mkdir(parents=True, exist_ok=True)\n        core = self.doc.core_properties\n        core.title = self.title\n        core.author = self.style.organisation or \"Groundwater Toolkit\"\n        self.doc.save(path)\n        _normalise_zip_timestamps(path)\n        return path\n\n\ndef _normalise_zip_timestamps(path: Path) -> None:\n    \"\"\"Rewrite the .docx zip with fixed timestamps and sorted entries so\n    identical content produces an identical file.\"\"\"\n    with zipfile.ZipFile(path, \"r\") as zin:\n        entries = sorted(zin.namelist())\n        contents = {name: zin.read(name) for name in entries}\n    with zipfile.ZipFile(path, \"w\", zipfile.ZIP_DEFLATED) as zout:\n        for name in entries:\n            info = zipfile.ZipInfo(name, date_time=(2020, 1, 1, 0, 0, 0))\n            info.compress_type = zipfile.ZIP_DEFLATED\n            info.external_attr = 0o600 << 16\n            zout.writestr(info, contents[name])\n"}, "groundwater/reporting/geophysical.py": {"t": "text", "d": "\"\"\"Geophysical survey report generator.\n\nFollows the structure of the Rokel example report: table of contents,\nintroduction, background and geology of the project area, field work\n(reconnaissance with geomorphology and hydrogeology, traverse and VES\npoint selection, then survey method and instrument), data analysis\nwith one block per sounding (header and data table, curve and model\nfigure, layer pseudo-section, interpretation paragraph), the ranked\ntable of VES points in order of drilling preference, conclusions and\nrecommendations, and a signature block.\n\nEvery figure and table is numbered by the builder and referenced from\nthe body text; every number in the tables comes from the parsed raw\ndata or the fitted models.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom pathlib import Path\n\nfrom ..config import Config\nfrom ..models import DataFlag, VESSounding\nfrom ..utils import fmt_num\nfrom ..ves.classify import classify_curve\nfrom ..ves.interpret import SiteInterpretation, drilling_preference_table\nfrom ..ves.inversion import InversionResult\nfrom ..ves.plots import plot_model_pseudosection, plot_sounding_curve\nfrom .docx_utils import ReportBuilder\n\n_DEFAULT_GEOLOGY = (\n    \"The project area lies within the crystalline basement terrain of Sierra \"\n    \"Leone, where groundwater occurs mainly within the weathered overburden \"\n    \"(regolith) and in fractured zones of the underlying bedrock. The \"\n    \"weathered zone develops on granites, gneisses and related rocks, and its \"\n    \"thickness and degree of fracturing control the groundwater potential. \"\n    \"Groundwater quality and quantity can be favourable where the borehole \"\n    \"position is properly located through appropriate hydrogeological and \"\n    \"geophysical investigations.\"\n)\n\n_FREETOWN_GEOLOGY = (\n    \"The project area lies within the Freetown Basic Complex. The Freetown \"\n    \"Complex is a layered gabbroic anorthosite intrusion emplaced against \"\n    \"gneisses and schists of the Kasila Group, and it forms part of the \"\n    \"Peninsula and Banana Islands. It is thought to have been formed by \"\n    \"multiple injections of magma that occurred intermittently. Groundwater \"\n    \"potential within the Freetown Basic Complex is found within weathered \"\n    \"and fractured zones of these igneous (crystalline) rocks. Groundwater \"\n    \"quality and quantity can be high if the borehole is properly located \"\n    \"through appropriate hydrogeological and geophysical investigations.\"\n)\n\n\n@dataclass\nclass GeophysicalReportInputs:\n    \"\"\"Everything the geophysical survey report needs.\"\"\"\n\n    soundings: list[VESSounding]\n    inversions: list[InversionResult]\n    interpretations: list[SiteInterpretation]\n    figures_dir: Path\n    site_map_path: Path | None = None\n    survey_photo_path: Path | None = None\n    geology_text: str = \"\"\n    reconnaissance_date: str = \"\"\n    reconnaissance_notes: str = \"\"\n    profiling_note: str = \"\"\n    geologist_name: str = \"\"\n    geologist_role: str = \"Geologist / Field Supervisor\"\n    geologist_phone: str = \"\"\n    flags: list[DataFlag] = field(default_factory=list)\n    include_qa_annex: bool = False\n\n\ndef _geology_for(district: str, override: str) -> str:\n    if override:\n        return override\n    if \"western\" in (district or \"\").lower():\n        return _FREETOWN_GEOLOGY\n    return _DEFAULT_GEOLOGY\n\n\ndef build_geophysical_report(\n    inputs: GeophysicalReportInputs,\n    out_path: str | Path,\n    config: Config | None = None,\n) -> Path:\n    \"\"\"Write the geophysical survey report to ``out_path`` (.docx).\"\"\"\n    config = config or Config()\n    soundings = inputs.soundings\n    if not soundings:\n        raise ValueError(\"At least one sounding is required\")\n    site = soundings[0].site\n    community = site.community or \"the project area\"\n    district = site.district or \"\"\n    client = site.client or \"the client\"\n\n    rb = ReportBuilder(config.style, title=f\"Geophysical Survey Report - {community}\")\n\n    # ---- cover -------------------------------------------------------------\n    rb.cover(\n        title_lines=[\"GEOPHYSICAL SURVEY REPORT\"],\n        subtitle_lines=[\n            \"Groundwater Investigation for Borehole Siting\",\n            f\"at {community}\" + (f\", {district} District\" if district and \"western\" not in district.lower() else f\", {district}\" if district else \"\"),\n        ],\n        details=[\n            (\"Client\", client),\n            (\"Project\", site.project or \"Geophysical Survey\"),\n            (\"Survey date\", soundings[0].site.date or \"\"),\n            (\"Prepared by\", inputs.geologist_name or config.style.organisation or \"\"),\n        ],\n    )\n\n    # ---- table of contents ---------------------------------------------------\n    rb.table_of_contents()\n\n    # ---- 1 introduction --------------------------------------------------------\n    rb.heading(\"1. Introduction\", 1)\n    rb.paragraph(\n        \"Geological and hydrogeological/geophysical investigations are \"\n        f\"prerequisites for borehole drilling. {client} requested a \"\n        \"geophysical investigation to site the borehole position at \"\n        f\"{community}\" + (f\" in {district}\" if district else \"\") + \". \"\n        \"The study assessed the possibility of accessing groundwater in the \"\n        \"project area, and the details of the investigations are documented \"\n        \"in this report.\",\n        align=\"justify\",\n    )\n\n    # ---- 2 background / geology ---------------------------------------------\n    rb.heading(\"2. Background and Geology of the Project Area\", 1)\n    rb.paragraph(_geology_for(district, inputs.geology_text), align=\"justify\")\n\n    # ---- 3 field work -----------------------------------------------------------\n    rb.heading(\"3. Field Work\", 1)\n    rb.heading(\"3.1 Reconnaissance Survey\", 2)\n    recon_date = inputs.reconnaissance_date or site.date\n    rb.paragraph(\n        \"The aim of the reconnaissance survey was to select suitable points \"\n        \"for the geophysical survey. Existing water points, environmental \"\n        \"and other physical conditions were also assessed.\"\n        + (f\" The field reconnaissance survey was conducted on {recon_date}.\" if recon_date else \"\"),\n        align=\"justify\",\n    )\n    rb.paragraph(\"Geomorphological survey of the area\", bold=True)\n    rb.paragraph(\n        inputs.reconnaissance_notes\n        or (\n            \"The landscape and other physical features of the area were \"\n            \"examined, including slopes, drainage lines and streams, since \"\n            \"there is normally hydraulic continuity between groundwater and \"\n            \"surface water.\"\n        ),\n        align=\"justify\",\n    )\n    rb.paragraph(\n        \"Geological and hydrogeological survey to determine the formation \"\n        \"of the area and identify possible features\",\n        bold=True,\n    )\n    rb.paragraph(\n        \"The weathered products overlying the bedrock were assessed as the \"\n        \"principal prospect for groundwater, since groundwater occurs mostly \"\n        \"in weathered and unconsolidated materials compared with \"\n        \"consolidated and crystalline rocks.\",\n        align=\"justify\",\n    )\n    if inputs.site_map_path and Path(inputs.site_map_path).exists():\n        rb.figure(inputs.site_map_path, f\"Topographic map of the project area at {community}.\")\n\n    rb.paragraph(\"Selection of traverse line for the geophysical survey\", bold=True)\n    rb.paragraph(\n        \"The traverse line for the resistivity survey was selected on the \"\n        \"basis of geomorphologic and geological/hydrogeological features as \"\n        \"well as the location of the project area. Points for the vertical \"\n        \"electrical soundings were selected considering the available space \"\n        \"and the environmental and other physical conditions, and the \"\n        \"proposed borehole locations were marked with pegs for \"\n        \"identification.\",\n        align=\"justify\",\n    )\n\n    rb.heading(\"3.2 Geophysical Survey\", 2)\n    instrument = soundings[0].instrument or \"Syscal Junior\"\n    rb.paragraph(\n        \"The geophysical survey consisted of electrical resistivity \"\n        \"measurements, specifically vertical electrical sounding (VES) \"\n        f\"using the {instrument} instrument.\",\n        align=\"justify\",\n    )\n    if inputs.survey_photo_path and Path(inputs.survey_photo_path).exists():\n        rb.figure(\n            inputs.survey_photo_path,\n            f\"Geophysical survey using the {instrument} equipment.\",\n        )\n\n    rb.heading(\"3.2.1 Resistivity Profiling\", 3)\n    rb.paragraph(\n        inputs.profiling_note\n        or (\n            \"Electrical resistivity profiling is usually carried out along a \"\n            \"selected traverse of 50 m to 100 m length at 10 m intervals to \"\n            \"determine the lateral variation of subsurface resistivities and \"\n            \"delineate anomalous points with groundwater potential. Where \"\n            \"the available land extent does not permit profiling, the \"\n            \"vertical electrical soundings are carried out at the selected \"\n            \"points directly.\"\n        ),\n        align=\"justify\",\n    )\n\n    rb.heading(\"3.2.2 Selection of VES Points\", 3)\n    labels = \", \".join(s.sounding_id for s in soundings)\n    rb.paragraph(\n        f\"{len(soundings)} vertical electrical sounding point(s) were \"\n        \"selected based on the available space and the location of the \"\n        \"project area, considering geological, hydrogeological and \"\n        f\"environmental conditions. The points are labelled {labels} in \"\n        \"this report.\",\n        align=\"justify\",\n    )\n\n    rb.heading(\"3.2.3 Vertical Electrical Sounding (VES)\", 3)\n    rb.paragraph(\n        \"Vertical electrical soundings were carried out with the aim of \"\n        \"determining the formation resistivities and the depth to bedrock, \"\n        \"as well as the possibility of finding water bearing fractures or \"\n        \"aquifers at depth with their corresponding thicknesses. The \"\n        \"Schlumberger electrode configuration and the required procedures \"\n        \"were used for the soundings.\",\n        align=\"justify\",\n    )\n\n    # ---- 4 data analysis ------------------------------------------------------\n    rb.heading(\"4. Data Analysis and Interpretation\", 1)\n    for sounding, inversion, interp in zip(\n        soundings, inputs.inversions, inputs.interpretations\n    ):\n        _sounding_block(rb, sounding, inversion, interp, inputs.figures_dir)\n\n    # ---- preference table -----------------------------------------------------\n    rows = drilling_preference_table(inputs.interpretations)\n    header = list(rows[0].keys()) if rows else []\n    rb.table(\n        [[row[h] for h in header] for row in rows],\n        header=header,\n        caption=\"List of VES points in order of preference for drilling.\",\n        font_size_pt=8.5,\n    )\n\n    # ---- 5 conclusions and recommendations -------------------------------------\n    rb.heading(\"5. Conclusions and Recommendations\", 1)\n    rb.paragraph(\"Conclusions:\", bold=True)\n    conclusions = _conclusions(inputs.interpretations, district, community)\n    rb.bullets(conclusions)\n    rb.paragraph(\"Recommendations:\", bold=True)\n    rb.bullets(_recommendations(inputs.interpretations))\n\n    # ---- QA annex (optional) -----------------------------------------------------\n    if inputs.include_qa_annex and inputs.flags:\n        rb.heading(\"Annex A. Data Verification Notes\", 1)\n        rb.paragraph(\n            \"The following checks were raised automatically during data \"\n            \"processing and should be verified against the field notes.\"\n        )\n        rb.bullets([str(f) for f in inputs.flags])\n\n    # ---- signature ------------------------------------------------------------\n    rb.signature_block(\n        name=inputs.geologist_name or soundings[0].site.supervisor or \"\",\n        role=inputs.geologist_role,\n        phone=inputs.geologist_phone,\n        organisation=config.style.organisation,\n    )\n\n    return rb.save(out_path)\n\n\ndef _sounding_block(\n    rb: ReportBuilder,\n    sounding: VESSounding,\n    inversion: InversionResult,\n    interp: SiteInterpretation,\n    figures_dir: Path,\n) -> None:\n    \"\"\"One data analysis block per sounding: tables, figures, narrative.\"\"\"\n    site = sounding.site\n    sid = sounding.sounding_id\n    safe_id = sid.replace(\" \", \"_\").replace(\"(\", \"\").replace(\")\", \"\")\n\n    # data table with the field sheet header block\n    table_no = rb.next_table_number\n    rb.paragraph(\n        f\"Table {table_no} presents the Schlumberger array VES data recorded \"\n        f\"at point {sid}, from which the sounding curve of apparent \"\n        \"resistivity against half the current electrode spacing (AB/2) in \"\n        f\"Figure {rb.next_figure_number} is plotted.\",\n        align=\"justify\",\n    )\n    rb.header_block_table(\n        [\n            (\"Client\", site.client), (\"Community\", site.community),\n            (\"Project\", site.project or \"Geophysical Survey\"), (\"Sounding Number\", sid),\n            (\"District\", site.district), (\"GPS Coordinate East\", fmt_num(site.easting, 7)),\n            (\"Date\", site.date), (\"GPS Coordinate North\", fmt_num(site.northing, 7)),\n            (\"Field Supervisor\", site.supervisor), (\"Elevation\", fmt_num(site.elevation_m) + \" m\" if site.elevation_m else \"\"),\n        ]\n    )\n    rows = [\n        [i + 1, fmt_num(a), fmt_num(m), fmt_num(r, 4)]\n        for i, (a, m, r) in enumerate(zip(sounding.ab2, sounding.mn, sounding.rho_app))\n    ]\n    rb.table(\n        rows,\n        header=[\"No.\", \"AB/2 (m)\", \"MN (m)\", \"Apparent Resistivity (ohm-m)\"],\n        caption=f\"Schlumberger array VES data at point {sid}.\",\n        col_widths_cm=[1.5, 3.0, 3.0, 7.0],\n    )\n\n    # curve + model figure\n    curve_path = figures_dir / f\"ves_curve_{safe_id}.png\"\n    if not curve_path.exists():\n        plot_sounding_curve(\n            sounding, inversion.model, inversion.rho_calc, inversion.ab2, path=curve_path\n        )\n    rb.figure(curve_path, f\"Schlumberger array VES curve and model at point {sid}.\")\n\n    # model table (IPI2Win layout)\n    model_rows = []\n    for row in inversion.model.as_table():\n        model_rows.append(\n            [\n                row[\"N\"],\n                fmt_num(row[\"rho_ohm_m\"], 4),\n                fmt_num(row[\"h_m\"]) if row[\"h_m\"] is not None else \"\",\n                \"0/0\" if row[\"z_m\"] == \"0/0\" else fmt_num(row[\"z_m\"]),\n            ]\n        )\n    err = inversion.fit_error_percent\n    rb.table(\n        model_rows,\n        header=[\"N\", \"rho (ohm-m)\", \"h (m)\", \"z (m)\"],\n        caption=(\n            f\"Layered earth model at point {sid} \"\n            f\"(curve type {classify_curve(inversion.model)}, ERR = {err:.1f}%).\"\n        ),\n        col_widths_cm=[1.5, 4.0, 3.0, 3.0],\n    )\n\n    # pseudo-section figure\n    pseudo_path = figures_dir / f\"ves_pseudosection_{safe_id}.png\"\n    if not pseudo_path.exists():\n        plot_model_pseudosection(\n            inversion.model,\n            path=pseudo_path,\n            depth_max=interp.investigation_depth_m * 0.5,\n            title=f\"Layer section at {sid}\",\n        )\n    rb.figure(\n        pseudo_path,\n        f\"Pseudo-section showing resistivity and layer thicknesses at point {sid}.\",\n    )\n\n    # interpretation paragraph\n    rb.paragraph(interp.narrative, align=\"justify\")\n    rb.page_break()\n\n\ndef _conclusions(\n    interpretations: list[SiteInterpretation], district: str, community: str\n) -> list[str]:\n    items = []\n    if district and \"western\" in district.lower():\n        items.append(\n            \"The project area is part of the Freetown Basic Complex \"\n            \"lithological formation.\"\n        )\n    items.append(\n        \"Groundwater potential (quality and quantity) could be favourable at \"\n        \"depth within weathered zones and fractured bedrock.\"\n    )\n    for interp in interpretations:\n        if interp.water_zones:\n            zones = \" and \".join(f\"{int(t)} m to {int(b)} m\" for t, b in interp.water_zones)\n            items.append(\n                f\"The potential water zones at point {interp.sounding_id} are \"\n                f\"found between {zones}.\"\n            )\n        else:\n            items.append(\n                f\"No clearly water bearing zone was resolved at point \"\n                f\"{interp.sounding_id} within the investigated depth.\"\n            )\n    best = min(interpretations, key=lambda i: i.rank or 99)\n    items.append(\n        f\"Point {best.sounding_id} is selected as the preferred point for \"\n        \"drilling according to the results and data analysis.\"\n    )\n    items.append(\n        \"It is premature to estimate quantities, which can only be \"\n        \"determined during test drilling and test pumping.\"\n    )\n    items.append(\n        \"The borehole locations were selected within both national and \"\n        \"international borehole siting guidelines.\"\n    )\n    return items\n\n\ndef _recommendations(interpretations: list[SiteInterpretation]) -> list[str]:\n    best = min(interpretations, key=lambda i: i.rank or 99)\n    others = [i for i in interpretations if i is not best]\n    items = [\n        f\"Drilling should be carried out at the selected point \"\n        f\"{best.sounding_id} to confirm the existence of groundwater.\"\n    ]\n    if others:\n        items.append(\n            \"Point(s) \"\n            + \", \".join(i.sounding_id for i in others)\n            + \" are optional drilling points.\"\n        )\n    depths = \"; \".join(\n        f\"{i.max_drilling_depth_m:.0f} m at point {i.sounding_id}\"\n        for i in sorted(interpretations, key=lambda i: i.rank or 99)\n    )\n    items.append(\n        f\"The maximum drilling depth should be {depths}, to cut across the \"\n        \"probable water zones for sustainable productivity and a high yield \"\n        \"of the borehole(s).\"\n    )\n    items.append(\n        \"The borehole must be constructed using correct and standard \"\n        \"materials such as standard uPVC screens and plain casings and well \"\n        \"sorted gravel pack.\"\n    )\n    items.append(\n        \"Both physico-chemical and bacteriological tests should be carried \"\n        \"out on water samples from the completed well.\"\n    )\n    return items\n"}, "groundwater/reporting/handover.py": {"t": "text", "d": "\"\"\"Project handover report generator.\n\nThe closing deliverable for the client, NGO or government partner: a\nproject summary, the works completed, the borehole data sheet with all\nkey results, the as-built design drawing, the water quality verdict,\noperation and maintenance guidance, the community/WASH committee\ndetails, recommendations and the handover signature blocks.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom pathlib import Path\n\nfrom ..config import Config\nfrom ..design.designer import BoreholeDesign\nfrom ..design.drawing import draw_borehole_design\nfrom ..hydraulics.analysis import PumpingTestAnalysis\nfrom ..models import DrillingLog, SiteMetadata\nfrom ..quality.assess import WaterQualityAssessment\nfrom ..utils import fmt_num\nfrom .docx_utils import ReportBuilder\n\n_OM_GUIDANCE = [\n    (\n        \"Daily\",\n        [\n            \"Keep the apron and surroundings clean; no washing or animal \"\n            \"watering on the apron.\",\n            \"Check for leaks, unusual pump noise and discoloured water.\",\n            \"Keep the drainage channel and soakaway free flowing.\",\n        ],\n    ),\n    (\n        \"Weekly\",\n        [\n            \"Tighten loose bolts on the pump head and inspect the apron for cracks.\",\n            \"Record the approximate hours of use or strokes per day.\",\n        ],\n    ),\n    (\n        \"Monthly\",\n        [\n            \"Measure and record the water level where a dip access exists.\",\n            \"Collect the agreed user fees and update the cash book.\",\n            \"Inspect the fence and the sanitary protection zone (no pit \"\n            \"latrine, refuse pit or animal pen within 30 m).\",\n        ],\n    ),\n    (\n        \"Yearly\",\n        [\n            \"Service the pump according to the manufacturer schedule and \"\n            \"replace fast wearing parts.\",\n            \"Repeat the physico-chemical and bacteriological water tests.\",\n            \"Review the tariff against the cost of spare parts.\",\n        ],\n    ),\n]\n\n\n@dataclass\nclass CommitteeMember:\n    role: str\n    name: str\n    phone: str = \"\"\n\n\n@dataclass\nclass HandoverReportInputs:\n    site: SiteMetadata\n    log: DrillingLog | None = None\n    design: BoreholeDesign | None = None\n    pumping: PumpingTestAnalysis | None = None\n    quality: WaterQualityAssessment | None = None\n    figures_dir: Path = Path(\".\")\n    works_completed: list[str] = field(default_factory=list)\n    committee: list[CommitteeMember] = field(default_factory=list)\n    committee_notes: str = \"\"\n    tariff_note: str = \"\"\n    pump_type: str = \"\"\n    extra_recommendations: list[str] = field(default_factory=list)\n    contractor_rep: str = \"\"\n    client_rep: str = \"\"\n    community_rep: str = \"\"\n\n\ndef build_handover_report(\n    inputs: HandoverReportInputs,\n    out_path: str | Path,\n    config: Config | None = None,\n) -> Path:\n    config = config or Config()\n    site = inputs.site\n    figures = Path(inputs.figures_dir)\n    figures.mkdir(parents=True, exist_ok=True)\n\n    rb = ReportBuilder(config.style, title=f\"Handover Report - {site.community}\")\n    rb.cover(\n        title_lines=[\"PROJECT HANDOVER REPORT\"],\n        subtitle_lines=[\n            \"Borehole Water Supply\",\n            f\"at {site.community}\" + (f\", {site.district} District\" if site.district else \"\"),\n        ],\n        details=[\n            (\"Client\", site.client),\n            (\"Project\", site.project),\n            (\"Contractor\", site.contractor),\n            (\"Date\", site.date),\n        ],\n    )\n    rb.table_of_contents()\n\n    # ---- 1 project summary ----------------------------------------------------\n    rb.heading(\"1. Project Summary\", 1)\n    lat_lon = site.latlon\n    rb.header_block_table(\n        [\n            (\"Community\", site.community), (\"Chiefdom\", site.chiefdom),\n            (\"District\", site.district), (\"Client\", site.client),\n            (\"Contractor\", site.contractor), (\"Project reference\", site.project_ref),\n            (\"GPS East\", fmt_num(site.easting, 7) if site.easting else \"\"),\n            (\"GPS North\", fmt_num(site.northing, 7) if site.northing else \"\"),\n            (\"Latitude / Longitude\",\n             f\"{lat_lon[0]:.5f} N, {abs(lat_lon[1]):.5f} W\" if lat_lon else \"\"),\n            (\"Elevation\", fmt_num(site.elevation_m) + \" m\" if site.elevation_m else \"\"),\n        ]\n    )\n\n    # ---- 2 works completed ---------------------------------------------------------\n    rb.heading(\"2. Works Completed\", 1)\n    works = inputs.works_completed or _default_works(inputs)\n    rb.bullets(works)\n\n    # ---- 3 borehole data sheet ---------------------------------------------------\n    rb.heading(\"3. Borehole Data Sheet\", 1)\n    rows: list[list[str]] = []\n    log = inputs.log\n    if log is not None:\n        rows += [\n            [\"Borehole reference\", log.borehole_ref],\n            [\"Total depth\", fmt_num(log.total_depth_m) + \" m\"],\n            [\"Drilling method\", log.drilling_method],\n            [\"Water strikes\", \", \".join(f\"{w:g} m\" for w in log.water_strikes_m) or \"n/a\"],\n            [\"Completion date\", log.completion_date],\n            [\"Status\", log.status],\n        ]\n    if inputs.design is not None:\n        rows += [[k, v] for k, v in inputs.design.summary_rows()]\n    analysis = inputs.pumping\n    if analysis is not None:\n        if analysis.transmissivity_m2_per_day:\n            rows.append([\"Transmissivity\", fmt_num(analysis.transmissivity_m2_per_day) + \" m2/day\"])\n        yr = analysis.yield_recommendation\n        if yr is not None:\n            if yr.safe_yield_m3_per_h:\n                rows.append([\n                    f\"Safe yield (safety factor {yr.safety_factor:g})\",\n                    fmt_num(yr.safe_yield_m3_per_h) + \" m3/h\",\n                ])\n            if yr.pump_installation_depth_m:\n                rows.append([\"Pump installation depth\", fmt_num(yr.pump_installation_depth_m) + \" m\"])\n    if inputs.pump_type:\n        rows.append([\"Pump type\", inputs.pump_type])\n    rb.table(rows, header=[\"Item\", \"Value\"], caption=\"Key borehole data.\")\n\n    if inputs.design is not None:\n        design_fig = figures / \"borehole_design.png\"\n        if not design_fig.exists():\n            draw_borehole_design(\n                inputs.design, log, path=design_fig, style=config.style,\n                title=f\"Borehole design - {site.community}\",\n            )\n        rb.figure(design_fig, \"As-built borehole diagram.\", width_cm=13.0)\n\n    # ---- 4 water quality ------------------------------------------------------------\n    rb.heading(\"4. Water Quality\", 1)\n    if inputs.quality is not None:\n        rb.paragraph(inputs.quality.verdict, align=\"justify\")\n        exceed = inputs.quality.health_exceedances + inputs.quality.aesthetic_exceedances\n        if exceed:\n            rb.table(\n                [[r.parameter, fmt_num(r.value), r.unit, r.remark] for r in exceed],\n                header=[\"Parameter\", \"Value\", \"Unit\", \"Remark\"],\n                caption=\"Parameters above guideline or standard limits.\",\n            )\n    else:\n        rb.paragraph(\"Water quality results are reported separately.\")\n\n    # ---- 5 O&M -------------------------------------------------------------------------\n    rb.heading(\"5. Operation and Maintenance Guidance\", 1)\n    rb.paragraph(\n        \"The lifetime of the borehole depends on routine care. The tasks \"\n        \"below follow standard rural water supply practice; the community \"\n        \"should keep a logbook of all maintenance, breakdowns and payments.\",\n        align=\"justify\",\n    )\n    for period, tasks in _OM_GUIDANCE:\n        rb.paragraph(period, bold=True)\n        rb.bullets(tasks)\n    yr = analysis.yield_recommendation if analysis else None\n    if yr is not None and yr.safe_yield_m3_per_h:\n        rb.paragraph(\n            f\"Operate the pump at no more than {fmt_num(yr.safe_yield_m3_per_h)} \"\n            \"m3/h and allow the recommended rest periods. If the water level \"\n            \"reaches the pump intake, stop pumping and let the borehole recover.\",\n            bold=True,\n        )\n    if inputs.tariff_note:\n        rb.paragraph(f\"Tariff arrangement: {inputs.tariff_note}\")\n\n    # ---- 6 committee -----------------------------------------------------------------\n    rb.heading(\"6. Community / WASH Committee\", 1)\n    if inputs.committee:\n        rb.table(\n            [[m.role, m.name, m.phone] for m in inputs.committee],\n            header=[\"Role\", \"Name\", \"Phone\"],\n            caption=\"WASH committee members responsible for the water point.\",\n        )\n    else:\n        rb.paragraph(\n            \"The WASH committee membership should be recorded here (chair, \"\n            \"secretary, treasurer, caretakers) with contact numbers.\"\n        )\n    if inputs.committee_notes:\n        rb.paragraph(inputs.committee_notes, align=\"justify\")\n\n    # ---- 7 recommendations -----------------------------------------------------------\n    rb.heading(\"7. Recommendations\", 1)\n    recs = [\n        \"Protect the wellhead: keep the 30 m sanitary zone free of latrines, \"\n        \"refuse pits and animal pens.\",\n        \"Keep this report and the borehole data sheet with the committee \"\n        \"records; any future contractor will need them.\",\n        \"Report persistent taste, odour or discolouration to the district \"\n        \"water office and arrange a water quality test.\",\n    ]\n    if inputs.quality is not None and inputs.quality.health_exceedances:\n        recs.insert(\n            0,\n            \"Implement the treatment measures in the water quality report \"\n            \"before the water is used for drinking.\",\n        )\n    recs.extend(inputs.extra_recommendations)\n    rb.bullets(recs)\n\n    # ---- signatures ----------------------------------------------------------------------\n    rb.heading(\"8. Handover Signatures\", 1)\n    rb.paragraph(\n        \"The works described above are handed over to the client and the \"\n        \"community in working condition.\"\n    )\n    for role, name in (\n        (\"For the contractor\", inputs.contractor_rep or site.contractor),\n        (\"For the client\", inputs.client_rep or site.client),\n        (\"For the community / WASH committee\", inputs.community_rep),\n    ):\n        rb.paragraph(\"\")\n        rb.paragraph(\".\" * 30)\n        rb.paragraph(f\"{role}: {name}\", bold=True)\n        rb.paragraph(\"Date: ........................\")\n\n    return rb.save(out_path)\n\n\ndef _default_works(inputs: HandoverReportInputs) -> list[str]:\n    works = [\"Geophysical siting survey and borehole location selection.\"]\n    if inputs.log is not None:\n        works.append(\n            f\"Drilling of the borehole to {fmt_num(inputs.log.total_depth_m)} m\"\n            + (f\" by {inputs.log.drilling_method}\" if inputs.log.drilling_method else \"\")\n            + \".\"\n        )\n    if inputs.design is not None:\n        works.append(\n            \"Construction with \"\n            f\"{inputs.design.casing_diameter_in:g} inch {inputs.design.casing_material} \"\n            \"casing and screens, gravel pack and sanitary seal.\"\n        )\n    works += [\n        \"Development of the borehole by air lifting until clear.\",\n        \"Pumping test and yield assessment.\",\n        \"Water quality sampling and laboratory analysis.\",\n        \"Wellhead completion with apron and drainage.\",\n    ]\n    return works\n"}, "groundwater/reporting/pumping.py": {"t": "text", "d": "\"\"\"Pumping test report generator.\n\nCovers the test details, data quality notes, diagnostic plots, the\naquifer parameters from every applicable method, and the safe yield\nrecommendation with its full basis. When discharge is missing the\nreport still carries the drawdown and recovery curves, the stabilised\nlevel and available drawdown, with transmissivity and yield stated as\npending.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\nfrom pathlib import Path\n\nimport numpy as np\n\nfrom ..config import Config\nfrom ..hydraulics.analysis import PumpingTestAnalysis\nfrom ..hydraulics.plots import (\n    plot_cooper_jacob,\n    plot_recovery,\n    plot_step_test,\n    plot_test_overview,\n    plot_theis,\n)\nfrom ..utils import fmt_num\nfrom .docx_utils import ReportBuilder\n\n\n@dataclass\nclass PumpingReportInputs:\n    analysis: PumpingTestAnalysis\n    figures_dir: Path\n    analyst_name: str = \"\"\n    analyst_role: str = \"Hydrogeologist\"\n    analyst_phone: str = \"\"\n    include_qa_section: bool = True\n\n\ndef build_pumping_report(\n    inputs: PumpingReportInputs,\n    out_path: str | Path,\n    config: Config | None = None,\n) -> Path:\n    config = config or Config()\n    analysis = inputs.analysis\n    test = analysis.test\n    site = test.site\n    figures = Path(inputs.figures_dir)\n    figures.mkdir(parents=True, exist_ok=True)\n\n    rb = ReportBuilder(config.style, title=f\"Pumping Test Report - {site.community}\")\n    rb.cover(\n        title_lines=[\"PUMPING TEST REPORT\"],\n        subtitle_lines=[\n            f\"{test.test_type.replace('+', ' with ').title()} Test\",\n            f\"at {site.community}\" + (f\", {site.district} District\" if site.district else \"\"),\n        ],\n        details=[\n            (\"Client\", site.client),\n            (\"Borehole\", test.borehole_ref or \"n/a\"),\n            (\"Test date\", site.date),\n            (\"Conducted by\", site.supervisor),\n        ],\n    )\n\n    # ---- 1 test details ---------------------------------------------------\n    rb.heading(\"1. Test Details\", 1)\n    rb.header_block_table(\n        [\n            (\"Community\", site.community), (\"Client\", site.client),\n            (\"Borehole Ref. No.\", test.borehole_ref or \"\"), (\"Date\", site.date),\n            (\"Test type\", test.test_type), (\"Conducted by\", site.supervisor),\n            (\"Depth of borehole\", fmt_num(test.borehole_depth_m) + \" m\" if test.borehole_depth_m else \"\"),\n            (\"Static water level\", fmt_num(test.static_water_level_m) + \" m\" if test.static_water_level_m is not None else \"\"),\n            (\"Pump setting\", fmt_num(test.pump_setting_m) + \" m\" if test.pump_setting_m else \"\"),\n            (\"Length of each step\", fmt_num(test.step_length_min) + \" min\" if test.step_length_min else \"\"),\n        ]\n    )\n    discharges = \", \".join(\n        f\"{s.label}: \" + (f\"{s.discharge_m3_per_h:g} m3/h\" if s.discharge_m3_per_h else \"not recorded\")\n        for s in test.steps\n    )\n    rb.paragraph(f\"Discharge rates: {discharges}.\")\n    if not test.has_discharge:\n        rb.paragraph(\n            \"The discharge rate was not recorded on the field sheet. The \"\n            \"drawdown and recovery curves below remain valid; transmissivity \"\n            \"and yield results are pending until the discharge is supplied.\",\n            bold=True,\n        )\n\n    # ---- 2 data ------------------------------------------------------------\n    rb.heading(\"2. Field Data\", 1)\n    rb.paragraph(\n        \"True drawdown is computed as the measured water level minus the \"\n        \"static water level. The drawdown column recorded on the field sheet \"\n        \"holds the increment between successive readings and is not used \"\n        \"directly. Reading intervals are irregular and are handled as \"\n        \"recorded.\",\n        align=\"justify\",\n    )\n    overview_path = figures / \"test_overview.png\"\n    if not overview_path.exists():\n        plot_test_overview(test, path=overview_path, style=config.style)\n    fig_no = rb.figure(overview_path, \"Water level record for the full test including recovery.\")\n    if analysis.stabilised_level_m is not None:\n        rb.paragraph(\n            f\"The pumped water level stabilised at about \"\n            f\"{fmt_num(analysis.stabilised_level_m)} m (Figure {fig_no}).\"\n        )\n    if analysis.max_drawdown_m is not None:\n        rb.paragraph(\n            f\"The maximum drawdown reached {fmt_num(analysis.max_drawdown_m)} m \"\n            \"below the static water level.\"\n        )\n    if inputs.include_qa_section and analysis.flags:\n        rb.paragraph(\"Data verification notes:\", bold=True)\n        rb.bullets([str(f) for f in analysis.flags])\n\n    # ---- 3 analysis ----------------------------------------------------------\n    rb.heading(\"3. Analysis\", 1)\n    swl = test.static_water_level_m\n    section = 0\n\n    if analysis.cooper_jacob is not None:\n        section += 1\n        cj = analysis.cooper_jacob\n        rb.heading(f\"3.{section} Cooper-Jacob straight line method\", 2)\n        step = test.steps[0]\n        t = step.time_min\n        s = step.water_level_m - swl\n        cj_path = figures / \"cooper_jacob.png\"\n        if not cj_path.exists():\n            plot_cooper_jacob(t, s, cj, path=cj_path, style=config.style)\n        rb.figure(cj_path, \"Drawdown against log time with the fitted straight line.\")\n        rb.paragraph(\n            f\"The late time slope is {fmt_num(cj.slope_m_per_log_cycle)} m per \"\n            f\"log cycle over {cj.n_points} readings \"\n            f\"(R squared {cj.r_squared:.3f}), giving a transmissivity of \"\n            f\"{fmt_num(cj.transmissivity_m2_per_day)} m2/day at a discharge of \"\n            f\"{fmt_num(cj.discharge_m3_per_h)} m3/h. {cj.u_check}.\",\n            align=\"justify\",\n        )\n        if cj.storativity is not None:\n            rb.paragraph(\n                f\"Storativity from the zero drawdown intercept: \"\n                f\"{cj.storativity:.2e} (observation well data).\"\n            )\n\n    if analysis.theis is not None:\n        section += 1\n        th = analysis.theis\n        rb.heading(f\"3.{section} Theis type curve fit\", 2)\n        step = test.steps[0]\n        theis_path = figures / \"theis_fit.png\"\n        if not theis_path.exists():\n            plot_theis(step.time_min, step.water_level_m - swl, th, path=theis_path, style=config.style)\n        rb.figure(theis_path, \"Log-log drawdown with the fitted Theis curve.\")\n        s_note = \"\" if th.storativity_reliable else (\n            \" In a single pumped well storativity trades off against the \"\n            \"effective well radius, so the fitted S is indicative only.\"\n        )\n        rb.paragraph(\n            f\"Least squares fitting of the Theis well function gives \"\n            f\"T = {fmt_num(th.transmissivity_m2_per_day)} m2/day and \"\n            f\"S = {th.storativity:.1e} (RMSE {fmt_num(th.rmse_m)} m).{s_note}\",\n            align=\"justify\",\n        )\n\n    if analysis.recovery is not None:\n        section += 1\n        rec = analysis.recovery\n        rb.heading(f\"3.{section} Theis recovery method\", 2)\n        rec_path = figures / \"recovery.png\"\n        if not rec_path.exists():\n            plot_recovery(\n                test.recovery_time_min, test.residual_drawdown(),\n                test.pumping_duration_min, rec, path=rec_path, style=config.style,\n            )\n        rb.figure(rec_path, \"Residual drawdown against t/t'.\")\n        rb.paragraph(\n            f\"The recovery slope is {fmt_num(rec.slope_m_per_log_cycle)} m per \"\n            f\"log cycle (R squared {rec.r_squared:.3f}), giving \"\n            f\"T = {fmt_num(rec.transmissivity_m2_per_day)} m2/day. Residual \"\n            f\"drawdown at the end of monitoring was {fmt_num(rec.residual_at_end_m)} m. \"\n            \"Recovery derived transmissivity is generally the most reliable \"\n            \"single well estimate because it is unaffected by pumping rate \"\n            \"fluctuations and well losses.\",\n            align=\"justify\",\n        )\n\n    if analysis.step_test is not None:\n        section += 1\n        st = analysis.step_test\n        rb.heading(f\"3.{section} Step drawdown analysis (Hantush-Bierschenk)\", 2)\n        st_path = figures / \"step_test.png\"\n        if not st_path.exists():\n            plot_step_test(test, st, path=st_path, style=config.style)\n        rb.figure(st_path, \"Step drawdown data and the specific drawdown fit.\")\n        rows = [\n            [s[\"step\"], fmt_num(s[\"discharge_m3_per_h\"]), fmt_num(s[\"drawdown_end_m\"]),\n             fmt_num(s[\"sw_over_q_day_per_m2\"], 3), f\"{s['efficiency_percent']:.0f}%\"]\n            for s in st.steps\n        ]\n        rb.table(\n            rows,\n            header=[\"Step\", \"Q (m3/h)\", \"End drawdown (m)\", \"s/Q (day/m2)\", \"Efficiency\"],\n            caption=\"Step test summary and well efficiency.\",\n        )\n        rb.paragraph(\n            f\"The drawdown-discharge relationship is s = BQ + CQ2 with \"\n            f\"B = {st.aquifer_loss_B:.3e} day/m2 (aquifer loss) and \"\n            f\"C = {st.well_loss_C:.3e} day2/m5 (well loss), fitted with \"\n            f\"R squared {st.r_squared:.3f}.\",\n            align=\"justify\",\n        )\n    elif test.test_type.startswith(\"step\") and not test.has_discharge:\n        section += 1\n        rb.heading(f\"3.{section} Step drawdown analysis\", 2)\n        step_path = figures / \"step_test.png\"\n        if not step_path.exists():\n            plot_step_test(test, None, path=step_path, style=config.style)\n        rb.figure(step_path, \"Step drawdown curves (discharge pending).\")\n        rb.paragraph(\n            \"Hantush-Bierschenk analysis is pending until the discharge of \"\n            \"each step is supplied.\",\n        )\n\n    # ---- 4 results summary ------------------------------------------------\n    rb.heading(\"4. Results Summary\", 1)\n    rows = []\n    if analysis.cooper_jacob:\n        rows.append([\"Cooper-Jacob\", fmt_num(analysis.cooper_jacob.transmissivity_m2_per_day)])\n    if analysis.theis:\n        rows.append([\"Theis curve fit\", fmt_num(analysis.theis.transmissivity_m2_per_day)])\n    if analysis.recovery:\n        rows.append([\"Theis recovery\", fmt_num(analysis.recovery.transmissivity_m2_per_day)])\n    if rows:\n        rb.table(rows, header=[\"Method\", \"Transmissivity (m2/day)\"],\n                 caption=\"Transmissivity estimates.\")\n    else:\n        rb.paragraph(\"Transmissivity: pending (discharge not recorded).\", bold=True)\n    yr = analysis.yield_recommendation\n    if yr is not None:\n        summary_rows = [\n            [\"Specific capacity\", fmt_num(yr.specific_capacity_m3hr_per_m) + \" m3/h per m\"\n             if yr.specific_capacity_m3hr_per_m else \"pending\"],\n            [\"Available drawdown\", fmt_num(yr.available_drawdown_m) + \" m\"\n             if yr.available_drawdown_m else \"n/a\"],\n            [\"Usable drawdown\", fmt_num(yr.usable_drawdown_m) + \" m\"\n             if yr.usable_drawdown_m else \"n/a\"],\n            [\"Long term yield\", fmt_num(yr.long_term_yield_m3_per_h) + \" m3/h\"\n             if yr.long_term_yield_m3_per_h else \"pending\"],\n            [f\"Recommended safe yield (safety factor {yr.safety_factor:g})\",\n             fmt_num(yr.safe_yield_m3_per_h) + \" m3/h\" if yr.safe_yield_m3_per_h else \"pending\"],\n            [\"Recommended pump installation depth\",\n             fmt_num(yr.pump_installation_depth_m) + \" m\" if yr.pump_installation_depth_m else \"pending\"],\n        ]\n        rb.table(summary_rows, header=[\"Quantity\", \"Value\"], caption=\"Yield summary.\")\n\n    # ---- 5 recommendation ----------------------------------------------------\n    rb.heading(\"5. Yield Recommendation\", 1)\n    if yr is not None:\n        rb.paragraph(yr.basis, align=\"justify\")\n        if yr.safe_yield_m3_per_h:\n            rb.bullets(\n                [\n                    f\"Operate the borehole at no more than \"\n                    f\"{fmt_num(yr.safe_yield_m3_per_h)} m3/h.\",\n                    f\"Install the pump intake at {fmt_num(yr.pump_installation_depth_m)} m \"\n                    \"below ground level.\",\n                    \"Monitor the pumping water level and re-assess the yield if \"\n                    \"the level approaches the pump intake.\",\n                ]\n            )\n\n    rb.signature_block(\n        name=inputs.analyst_name or site.supervisor,\n        role=inputs.analyst_role,\n        phone=inputs.analyst_phone,\n        organisation=config.style.organisation,\n    )\n    return rb.save(out_path)\n"}, "groundwater/reporting/quality.py": {"t": "text", "d": "\"\"\"Water quality report generator.\n\nPresents the laboratory results against WHO guideline values and the\nnational standard, flags every exceedance clearly (bold red status),\nreports the ionic balance check and, where the major ions are\navailable, the Piper and Stiff diagrams, and closes with treatment\nrecommendations matched to the exceedances found.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\nfrom pathlib import Path\n\nfrom docx.shared import Pt, RGBColor\n\nfrom ..config import Config\nfrom ..quality.assess import WaterQualityAssessment\nfrom ..quality.diagrams import plot_piper, plot_stiff\nfrom ..utils import fmt_num\nfrom .docx_utils import ReportBuilder\n\n_STATUS_LABEL = {\n    \"within_limits\": \"Complies\",\n    \"exceeds_health\": \"EXCEEDS HEALTH GUIDELINE\",\n    \"exceeds_national\": \"Exceeds national limit\",\n    \"exceeds_aesthetic\": \"Exceeds acceptability value\",\n    \"below_detection\": \"Below detection\",\n    \"no_guideline\": \"No guideline value\",\n    \"not_measured\": \"Not measured\",\n}\n\n_TREATMENT_ADVICE = {\n    \"iron\": \"Iron above the acceptability value causes staining and metallic \"\n    \"taste; aeration followed by sand filtration or a simple oxidation \"\n    \"filter normally resolves it.\",\n    \"manganese\": \"Manganese requires oxidation and filtration (aeration or \"\n    \"chlorination followed by filtration); monitor infant exposure in the \"\n    \"meantime.\",\n    \"e. coli\": \"Any E. coli detection calls for shock chlorination of the \"\n    \"borehole, verification of the sanitary seal and apron, and re-sampling \"\n    \"before use.\",\n    \"total coliforms\": \"Coliform detection calls for disinfection of the \"\n    \"borehole and pump, a sanitary inspection of the wellhead, and re-sampling.\",\n    \"nitrate (as no3)\": \"Elevated nitrate usually indicates pollution from \"\n    \"sanitation or agriculture; investigate the sanitary protection zone. Do \"\n    \"not give the water to bottle fed infants until resolved.\",\n    \"fluoride\": \"Fluoride above 1.5 mg/L requires an alternative source or \"\n    \"defluoridation (bone char or activated alumina).\",\n    \"arsenic\": \"Arsenic above 0.01 mg/L requires an alternative source or \"\n    \"specialised removal; re-test to confirm before any use for drinking.\",\n    \"ph\": \"Low pH water is corrosive to metal fittings; a limestone contactor \"\n    \"or careful choice of corrosion resistant materials is advised.\",\n    \"turbidity\": \"High turbidity interferes with disinfection; extend \"\n    \"development of the borehole and re-sample.\",\n}\n\n\n@dataclass\nclass QualityReportInputs:\n    assessment: WaterQualityAssessment\n    figures_dir: Path\n    analyst_name: str = \"\"\n    analyst_role: str = \"Water Quality Analyst\"\n    analyst_phone: str = \"\"\n    include_diagrams: bool = True\n\n\ndef build_quality_report(\n    inputs: QualityReportInputs,\n    out_path: str | Path,\n    config: Config | None = None,\n) -> Path:\n    config = config or Config()\n    assessment = inputs.assessment\n    sample = assessment.sample\n    site = sample.site\n    figures = Path(inputs.figures_dir)\n    figures.mkdir(parents=True, exist_ok=True)\n\n    rb = ReportBuilder(config.style, title=f\"Water Quality Report - {site.community}\")\n    rb.cover(\n        title_lines=[\"WATER QUALITY REPORT\"],\n        subtitle_lines=[\n            f\"Borehole water assessment at {site.community}\"\n            + (f\", {site.district} District\" if site.district else \"\"),\n        ],\n        details=[\n            (\"Client\", site.client),\n            (\"Sample ID\", sample.sample_id),\n            (\"Borehole\", sample.borehole_ref),\n            (\"Sample date\", sample.sample_date),\n            (\"Laboratory\", sample.laboratory),\n        ],\n    )\n\n    # ---- 1 sample details -------------------------------------------------\n    rb.heading(\"1. Sample Details\", 1)\n    rb.header_block_table(\n        [\n            (\"Community\", site.community), (\"Client\", site.client),\n            (\"Sample ID\", sample.sample_id), (\"Borehole Ref. No.\", sample.borehole_ref),\n            (\"Sample date\", sample.sample_date), (\"Laboratory\", sample.laboratory),\n            (\"District\", site.district), (\"Project\", site.project),\n        ]\n    )\n    rb.paragraph(\n        \"Results are compared against the WHO Guidelines for Drinking-water \"\n        \"Quality (fourth edition with addenda) and the national standard \"\n        \"limits configured for this project. Values reported by the \"\n        \"laboratory as below the detection limit are shown as such.\",\n        align=\"justify\",\n    )\n\n    # ---- 2 results table ------------------------------------------------------\n    rb.heading(\"2. Results Against Guideline Values\", 1)\n    table_no = rb.next_table_number\n    rb.paragraph(\n        f\"Table {table_no} lists every parameter tested. Exceedances are \"\n        \"highlighted in the status column.\"\n    )\n    header = [\"Parameter\", \"Value\", \"Unit\", \"WHO health\", \"WHO acceptability\",\n              \"National\", \"Status\"]\n    rows = []\n    highlight = []\n    for r in assessment.rows:\n        value = \"< DL\" if (r.below_detection and r.value is None) else fmt_num(r.value)\n        rows.append([\n            r.parameter, value, r.unit, r.who_health, r.who_aesthetic,\n            r.sl_standard, _STATUS_LABEL.get(r.status, r.status),\n        ])\n        highlight.append(r.status in (\"exceeds_health\", \"exceeds_national\", \"exceeds_aesthetic\"))\n    rb.table(rows, header=header, caption=\"Laboratory results against guideline values.\",\n             font_size_pt=8.5)\n    # bold red status text on exceedance rows\n    table = rb.doc.tables[-1]\n    for i, is_exceed in enumerate(highlight):\n        if not is_exceed:\n            continue\n        cell = table.rows[i + 1].cells[len(header) - 1]\n        for para in cell.paragraphs:\n            for run in para.runs:\n                run.font.bold = True\n                run.font.color.rgb = RGBColor(0xB0, 0x00, 0x00)\n\n    rb.paragraph(assessment.verdict, bold=True, align=\"justify\")\n\n    # ---- 3 ionic balance ---------------------------------------------------------\n    rb.heading(\"3. Ionic Balance Check\", 1)\n    ionic = assessment.ionic\n    if ionic is None:\n        rb.paragraph(\n            \"The major ion analysis is incomplete, so no ionic balance check \"\n            \"is possible for this sample.\"\n        )\n    else:\n        note = (\n            \" Bicarbonate was estimated from total alkalinity.\"\n            if ionic.used_alkalinity_for_bicarbonate\n            else \"\"\n        )\n        rb.paragraph(\n            f\"Sum of cations {fmt_num(ionic.sum_cations_meq, 3)} meq/L, sum of \"\n            f\"anions {fmt_num(ionic.sum_anions_meq, 3)} meq/L, charge balance \"\n            f\"error {ionic.error_percent:+.1f} percent.{note} \"\n            + (\n                \"The analysis balances within the normal 5 percent tolerance.\"\n                if abs(ionic.error_percent) <= 5\n                else \"The balance error exceeds 5 percent; the laboratory \"\n                \"analysis should be reviewed.\"\n            ),\n            align=\"justify\",\n        )\n\n    # ---- 4 diagrams ----------------------------------------------------------------\n    if inputs.include_diagrams and ionic is not None:\n        rb.heading(\"4. Hydrochemical Facies\", 1)\n        piper_path = figures / \"piper.png\"\n        stiff_path = figures / \"stiff.png\"\n        if not piper_path.exists():\n            plot_piper([sample], path=piper_path, style=config.style)\n        if not stiff_path.exists():\n            plot_stiff(sample, path=stiff_path, style=config.style)\n        rb.figure(piper_path, \"Piper diagram.\", width_cm=13.0)\n        rb.figure(stiff_path, \"Stiff diagram.\", width_cm=11.0)\n\n    # ---- 5 recommendations -----------------------------------------------------------\n    rb.heading(\"5. Recommendations\", 1)\n    advice = []\n    for r in assessment.health_exceedances + assessment.aesthetic_exceedances:\n        key = r.parameter.strip().lower()\n        for match, text in _TREATMENT_ADVICE.items():\n            if match in key:\n                advice.append(text)\n                break\n    if not advice:\n        advice.append(\n            \"No treatment is required on the basis of the parameters tested. \"\n            \"Maintain the sanitary seal and apron in good condition.\"\n        )\n    advice.append(\n        \"Repeat physico-chemical and bacteriological testing at least once a \"\n        \"year, and after any flooding or repair work on the wellhead.\"\n    )\n    rb.bullets(advice)\n\n    rb.signature_block(\n        name=inputs.analyst_name,\n        role=inputs.analyst_role,\n        phone=inputs.analyst_phone,\n        organisation=config.style.organisation,\n    )\n    return rb.save(out_path)\n"}, "groundwater/reporting/supervision.py": {"t": "text", "d": "\"\"\"Drilling supervision checklist report generator.\n\nTurns the supervisor's checklist responses into a signed record: stage\nby stage tables with each item's status and remark, the critical\nfailures up front, and the three party sign off block (supervisor,\ndriller, community representative) that RWSN supervision practice\nexpects.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom pathlib import Path\n\nfrom ..config import Config\nfrom ..models import SiteMetadata\nfrom ..supervision.checklists import (\n    ChecklistAssessment,\n    ChecklistItem,\n    ChecklistResponse,\n    stage_title,\n)\nfrom .docx_utils import ReportBuilder\n\n_STATUS_LABEL = {\n    \"yes\": \"Yes\",\n    \"no\": \"NO\",\n    \"na\": \"N/A\",\n    \"pending\": \"-\",\n}\n\n\n@dataclass\nclass SupervisionReportInputs:\n    site: SiteMetadata\n    items: list[ChecklistItem]\n    responses: dict[str, ChecklistResponse]\n    assessment: ChecklistAssessment\n    supervisor: str = \"\"\n    driller: str = \"\"\n    community_rep: str = \"\"\n    notes: list[str] = field(default_factory=list)\n\n\ndef build_supervision_report(\n    inputs: SupervisionReportInputs,\n    out_path: str | Path,\n    config: Config | None = None,\n) -> Path:\n    config = config or Config()\n    site = inputs.site\n    assessment = inputs.assessment\n\n    rb = ReportBuilder(\n        config.style,\n        title=f\"Supervision Checklist - {site.community or 'Borehole'}\",\n    )\n    rb.cover(\n        title_lines=[\"DRILLING SUPERVISION\", \"CHECKLIST RECORD\"],\n        subtitle_lines=[\n            f\"at {site.community}\" + (f\", {site.district} District\" if site.district else \"\")\n            if site.community\n            else \"Borehole Construction Supervision\",\n        ],\n        details=[\n            (\"Client\", site.client),\n            (\"Project\", site.project),\n            (\"Contractor\", site.contractor),\n            (\"Supervisor\", inputs.supervisor or site.supervisor),\n            (\"Date\", site.date),\n        ],\n    )\n    rb.table_of_contents()\n\n    # ---- 1 summary -------------------------------------------------------\n    rb.heading(\"1. Summary\", 1)\n    rb.paragraph(assessment.verdict, bold=True)\n    rb.table(\n        [\n            [\n                progress.title,\n                f\"{progress.answered}/{progress.total}\",\n                str(progress.failed),\n                str(progress.critical_failed),\n            ]\n            for progress in assessment.stages\n        ],\n        header=[\"Stage\", \"Answered\", \"Failed\", \"Critical failed\"],\n        caption=\"Checklist progress by supervision stage.\",\n    )\n    critical = [f for f in assessment.flags if f.code == \"critical_item_failed\"]\n    if critical:\n        rb.paragraph(\"Critical items that failed:\", bold=True)\n        rb.bullets([f\"{f.context}: {f.message}\" for f in critical])\n\n    # ---- 2 checklists -----------------------------------------------------\n    rb.heading(\"2. Checklist Record\", 1)\n    rb.paragraph(\n        \"The checklists follow the RWSN/UNICEF guidance for supervising \"\n        \"water well drilling. Critical items are marked with an asterisk; \"\n        \"a failed critical item stops acceptance of the works.\"\n    )\n    stage_keys: list[str] = []\n    for item in inputs.items:\n        if item.checklist not in stage_keys:\n            stage_keys.append(item.checklist)\n    for number, key in enumerate(stage_keys, start=1):\n        stage_items = [i for i in inputs.items if i.checklist == key]\n        rb.heading(f\"2.{number} {stage_title(key)}\", 2)\n        rows = []\n        for item in stage_items:\n            response = inputs.responses.get(item.item_id)\n            status = _STATUS_LABEL.get(\n                response.status if response else \"pending\", \"-\"\n            )\n            remark = response.remark if response else \"\"\n            marker = \"*\" if item.critical else \"\"\n            rows.append([f\"{item.text}{marker}\", status, remark])\n        rb.table(\n            rows,\n            header=[\"Item\", \"Status\", \"Remark\"],\n            caption=f\"{stage_title(key)} checklist.\",\n        )\n\n    # ---- 3 notes ----------------------------------------------------------\n    if inputs.notes:\n        rb.heading(\"3. Site Notes and Instructions\", 1)\n        rb.paragraph(\n            \"Site instructions are issued in writing and signed in \"\n            \"duplicate by the supervisor and the driller.\"\n        )\n        rb.bullets(inputs.notes)\n\n    # ---- signatures --------------------------------------------------------\n    rb.heading(\"4. Sign Off\", 1)\n    rb.paragraph(\n        \"The undersigned confirm that the checklist record above reflects \"\n        \"the works as inspected.\"\n    )\n    for role, name in (\n        (\"Supervisor\", inputs.supervisor or site.supervisor),\n        (\"For the driller\", inputs.driller or site.contractor),\n        (\"For the community\", inputs.community_rep),\n    ):\n        rb.paragraph(\"\")\n        rb.paragraph(\".\" * 30)\n        rb.paragraph(f\"{role}: {name}\", bold=True)\n        rb.paragraph(\"Date: ........................\")\n\n    return rb.save(out_path)\n"}, "groundwater/supervision/__init__.py": {"t": "text", "d": "\"\"\"Drilling supervision: stage checklists and field acceptance checks.\n\nEncodes RWSN/UNICEF supervision guidance: the nine step supervision\nworkflow as editable checklists, the minimum site separation\ndistances, and the numeric acceptance criteria (sand content,\nverticality, screen open area, specific capacity, disinfection dose).\n\"\"\"\n\nfrom .checklists import (\n    RESPONSE_STATES,\n    STAGE_ORDER,\n    STAGE_TITLES,\n    ChecklistAssessment,\n    ChecklistItem,\n    ChecklistResponse,\n    SeparationDistance,\n    StageProgress,\n    evaluate_checklist,\n    load_checklists,\n    load_separation_distances,\n    stage_title,\n)\nfrom .field_checks import (\n    DisinfectionDose,\n    FieldCheck,\n    annular_space_check,\n    disinfection_dose,\n    handpump_corrosion_check,\n    pack_aquifer_ratio_check,\n    sand_content_check,\n    screen_open_area_check,\n    specific_capacity_check,\n    verticality_check,\n)\n\n__all__ = [\n    \"RESPONSE_STATES\",\n    \"STAGE_ORDER\",\n    \"STAGE_TITLES\",\n    \"ChecklistAssessment\",\n    \"ChecklistItem\",\n    \"ChecklistResponse\",\n    \"SeparationDistance\",\n    \"StageProgress\",\n    \"evaluate_checklist\",\n    \"load_checklists\",\n    \"load_separation_distances\",\n    \"stage_title\",\n    \"DisinfectionDose\",\n    \"FieldCheck\",\n    \"annular_space_check\",\n    \"disinfection_dose\",\n    \"handpump_corrosion_check\",\n    \"pack_aquifer_ratio_check\",\n    \"sand_content_check\",\n    \"screen_open_area_check\",\n    \"specific_capacity_check\",\n    \"verticality_check\",\n]\n"}, "groundwater/supervision/checklists.py": {"t": "text", "d": "\"\"\"Drilling supervision checklists as data.\n\nThe checklist content follows RWSN/UNICEF \"Supervising Water Well\nDrilling: a Guide for Supervisors\" (Adekile), whose Annex B checklists\ncover the nine step borehole construction workflow, and the WASH\nfunders infrastructure checklists for boreholes and handpumps. Items\nlive in an editable CSV (``data/supervision_checklists.csv``) so a\nproject can adapt them without code changes.\n\nCritical items are the ones whose failure should stop acceptance of\nthe works (safety, records, acceptance criteria and sign offs).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport csv\nfrom dataclasses import dataclass, field\nfrom importlib import resources\nfrom pathlib import Path\n\nfrom ..models import DataFlag\n\n# Ordered stages of the supervision workflow, keyed as in the CSV.\nSTAGE_TITLES: tuple[tuple[str, str], ...] = (\n    (\"procurement\", \"Procurement and contract\"),\n    (\"pre_contract\", \"Pre-contract inspection\"),\n    (\"siting\", \"Siting\"),\n    (\"mobilisation\", \"Mobilisation\"),\n    (\"drilling\", \"Drilling\"),\n    (\"design\", \"Design and installation\"),\n    (\"development\", \"Development and completion\"),\n    (\"demobilisation\", \"Demobilisation\"),\n    (\"handover\", \"Documentation and handover\"),\n    (\"post_construction\", \"Post-construction monitoring\"),\n)\n\nSTAGE_ORDER = tuple(key for key, _ in STAGE_TITLES)\n\nRESPONSE_STATES = (\"pending\", \"yes\", \"no\", \"na\")\n\n\n@dataclass\nclass ChecklistItem:\n    \"\"\"One supervision checklist requirement.\"\"\"\n\n    item_id: str  # stable id, e.g. \"drilling-03\"\n    checklist: str  # stage key, e.g. \"drilling\"\n    section: str  # grouping within the stage, e.g. \"Safety\"\n    text: str\n    critical: bool = False\n    guidance: str = \"\"\n\n\ndef stage_title(key: str) -> str:\n    for stage_key, title in STAGE_TITLES:\n        if stage_key == key:\n            return title\n    return key.replace(\"_\", \" \").capitalize()\n\n\ndef load_checklists(path: str | Path | None = None) -> list[ChecklistItem]:\n    \"\"\"Load the checklist items (bundled CSV unless a path is given).\"\"\"\n    if path is not None:\n        text = Path(path).read_text(encoding=\"utf-8\")\n    else:\n        text = (\n            resources.files(\"groundwater\") / \"data\" / \"supervision_checklists.csv\"\n        ).read_text(encoding=\"utf-8\")\n    items: list[ChecklistItem] = []\n    counters: dict[str, int] = {}\n    for row in csv.DictReader(text.splitlines()):\n        checklist = row[\"checklist\"].strip()\n        counters[checklist] = counters.get(checklist, 0) + 1\n        items.append(\n            ChecklistItem(\n                item_id=f\"{checklist}-{counters[checklist]:02d}\",\n                checklist=checklist,\n                section=row[\"section\"].strip(),\n                text=row[\"item\"].strip(),\n                critical=(row.get(\"critical\") or \"\").strip().lower() == \"yes\",\n                guidance=(row.get(\"guidance\") or \"\").strip(),\n            )\n        )\n    return items\n\n\n@dataclass\nclass ChecklistResponse:\n    \"\"\"The supervisor's answer to one checklist item.\"\"\"\n\n    item_id: str\n    status: str = \"pending\"  # pending | yes | no | na\n    remark: str = \"\"\n\n\n@dataclass\nclass StageProgress:\n    stage: str\n    title: str\n    total: int\n    answered: int\n    passed: int\n    failed: int\n    critical_failed: int\n    critical_open: int\n\n    @property\n    def complete(self) -> bool:\n        return self.answered == self.total\n\n    @property\n    def percent(self) -> float:\n        return 100.0 * self.answered / self.total if self.total else 0.0\n\n\n@dataclass\nclass ChecklistAssessment:\n    \"\"\"Roll-up of the responses across all stages.\"\"\"\n\n    stages: list[StageProgress]\n    flags: list[DataFlag] = field(default_factory=list)\n\n    @property\n    def total(self) -> int:\n        return sum(s.total for s in self.stages)\n\n    @property\n    def answered(self) -> int:\n        return sum(s.answered for s in self.stages)\n\n    @property\n    def percent(self) -> float:\n        return 100.0 * self.answered / self.total if self.total else 0.0\n\n    @property\n    def critical_failures(self) -> int:\n        return sum(s.critical_failed for s in self.stages)\n\n    @property\n    def verdict(self) -> str:\n        if self.critical_failures:\n            return (\n                f\"{self.critical_failures} critical item(s) failed; the works \"\n                \"should not be accepted until they are resolved.\"\n            )\n        open_critical = sum(s.critical_open for s in self.stages)\n        if open_critical:\n            return (\n                f\"{open_critical} critical item(s) still open; complete them \"\n                \"before sign off.\"\n            )\n        if self.answered < self.total:\n            return \"No critical failures; routine items remain open.\"\n        return \"All checklist items answered with no critical failures.\"\n\n\ndef evaluate_checklist(\n    items: list[ChecklistItem],\n    re
