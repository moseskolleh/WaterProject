name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10/3.11 are the floor; 3.12/3.13 are what the Streamlit Cloud and
        # browser (stlite/Pyodide + numpy 2.x) builds actually ship on.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      # headless matplotlib for figure generation in reports/maps
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the toolkit and test/app/extract extras
        run: |
          python -m pip install --upgrade pip
          # streamlit + pdfplumber let the end-to-end AppTest and the
          # scanned-sheet tests run; dev brings pytest. pyarrow is pinned
          # <25 because 25.x can segfault when streamlit serialises tables
          # (see requirements.txt).
          pip install -e ".[dev,app,extract]" "pyarrow<25"

      - name: Run the test suite
        run: python -m pytest -q
